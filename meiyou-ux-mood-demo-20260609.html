function SisterAnalysisContent({playAnimation, onCycleComplete, animateText}){
  const [animated, setAnimated] = React.useState(false);
  const [leadDone, setLeadDone] = React.useState(!animateText);
  const [chartDone, setChartDone] = React.useState(!animateText);
  const [para1Done, setPara1Done] = React.useState(!animateText);
  const [showSignal, setShowSignal] = React.useState(!animateText);
  const [showClosing, setShowClosing] = React.useState(!animateText);
  const [closingDone, setClosingDone] = React.useState(!animateText);
  const prevPlayRef = React.useRef(playAnimation);
  const onCycleCompleteRef = React.useRef(onCycleComplete);
  const bodyRef = React.useRef(null);
  onCycleCompleteRef.current = onCycleComplete;

  React.useLayoutEffect(()=>{
    if(!animateText || !bodyRef.current) return;
    requestAnimationFrame(()=>scrollFeedContentIntoView(bodyRef.current));
  }, [animateText, leadDone, chartDone, para1Done, showSignal, showClosing]);

  React.useEffect(()=>{
    if(!animateText){
      setAnimated(false);
      setLeadDone(true);
      setChartDone(true);
      setPara1Done(true);
      setClosingDone(true);
      setShowSignal(true);
      setShowClosing(true);
      return;
    }
    if(playAnimation > prevPlayRef.current){
      setLeadDone(false);
      setChartDone(false);
      setPara1Done(false);
      setClosingDone(false);
      setShowSignal(false);
      setShowClosing(false);
      setAnimated(false);
    }
    prevPlayRef.current = playAnimation;
  }, [animateText, playAnimation]);

  const handleLeadComplete = React.useCallback(()=>{
    setLeadDone(true);
    if(animateText){
      setChartDone(false);
      setAnimated(true);
      setShowSignal(false);
      setShowClosing(false);
    }
  }, [animateText]);

  React.useEffect(()=>{
    if(!animateText || !para1Done) return;
    const delay = playAnimation ? 480 : 320;
    const t = setTimeout(()=>setShowSignal(true), delay);
    return ()=>clearTimeout(t);
  }, [animateText, para1Done, playAnimation]);

  React.useEffect(()=>{
    if(!animateText || !showSignal) return;
    const delay = playAnimation ? 2400 : 880;
    const t = setTimeout(()=>setShowClosing(true), delay);
    return ()=>clearTimeout(t);
  }, [animateText, showSignal, playAnimation]);

  React.useEffect(()=>{
    if(!animateText || !showClosing || !closingDone) return;
    onCycleCompleteRef.current?.();
  }, [animateText, showClosing, closingDone]);

  const showChart = !animateText || (leadDone && animated);
  const showPara1 = !animateText || (leadDone && chartDone);

  return (
    <div className="tl-t5-analysis-body" ref={bodyRef}>
      <p className="tl-t5-analysis-lead">
        {animateText && !leadDone ? (
          <TypewriterText text={SISTER_LEAD} active followScroll onComplete={handleLeadComplete}/>
        ) : SISTER_LEAD}

      {showChart && (
        <SisterCycleChart
          animated={animated}
          staticView={!animateText}
          onComplete={()=>setChartDone(true)}
        />
      )}
      {showPara1 && (
        <p className="tl-t5-analysis-text">
          {animateText && !para1Done ? (
            <TypewriterText
              segments={SISTER_PARA1}
              active
              followScroll
              onComplete={()=>setPara1Done(true)}
            />
          ) : (
            renderTypedSegments(SISTER_PARA1, segmentsFullText(SISTER_PARA1).length)
          )}
        </p>
      )}
      {showSignal && (!animateText || para1Done) && (
        <>
          <div className="tl-t5-chart-divider" role="separator"/>
          <SisterSignalCard animated={animated}/>
        </>
      )}
      {showClosing && (!animateText || para1Done) && (
        <p className="tl-t5-analysis-text">
          {animateText && !closingDone ? (
            <TypewriterText
              segments={SISTER_CLOSING}
              active
              followScroll
              onComplete={()=>setClosingDone(true)}
            />
          ) : (
            renderTypedSegments(SISTER_CLOSING, segmentsFullText(SISTER_CLOSING).length)
          )}
        </p>
      )}
    </div>
  );
}

function ChartWeightTrend({compact = false}){
  const gradId = React.useMemo(()=>'v3wt'+Math.random().toString(36).slice(2,9), []);
  const N = 30;
  const data = Array.from({length:N}, (_, i)=>{
    const base = 53;
    const trend = -i * 0.025;
    const noise = Math.sin(i * 0.9) * 0.25 + Math.cos(i * 0.4) * 0.15;
    return base + trend + noise;
  });
  const min = Math.min(...data);
  const max = Math.max(...data);
  const w = 100;
  const h = compact ? 36 : 60;
  const points = data.map((v, i)=>{
    const x = i / (N - 1) * w;
    const y = h - (v - min) / (max - min || 1) * (h - 6) - 3;
    return [x, y];
  });
  const path = points.map(([x, y], i)=>`${i === 0 ? 'M' : 'L'}${x.toFixed(1)} ${y.toFixed(1)}`).join(' ');
  const fill = `${path} L${w} ${h} L0 ${h} Z`;
  const [lastX, lastY] = points[points.length - 1];
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={TL_PRIMARY} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={TL_PRIMARY} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fill} fill={`url(#${gradId})`}/>
      <path d={path} fill="none" stroke={TL_PRIMARY} strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke"/>
      <circle cx={lastX} cy={lastY} r="2" fill={TL_PRIMARY}/>
    </svg>
  );
}

  const gradId = React.useMemo(()=>'v3tm'+Math.random().toString(36).slice(2,9), []);
  const w = 100;
  const h = compact ? 36 : 60;
  const minV = 1;
  const maxV = 5;
  const range = maxV - minV;
  const points = (data || []).filter(d => Number.isFinite(d.v));

  if(points.length === 0){
    return (
      <div style={{height: h, display:'flex', alignItems:'center', justifyContent:'center', color:TL_MUTED, fontSize:11}}>
        今天暂未记录情绪
      </div>
    );
  }

  if(points.length === 1){
    const only = points[0];
    const y = h - ((only.v - minV) / range) * (h - 10) - 5;
    return (
      <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:'block'}}>
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={TL_PRIMARY} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={TL_PRIMARY} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <line x1="0" y1={y} x2={w} y2={y} stroke={TL_PRIMARY} strokeWidth="1.2" strokeOpacity="0.35" strokeDasharray="2,3"/>
        <circle cx={w / 2} cy={y} r="2.4" fill={TL_PRIMARY}/>
      </svg>
    );
  }

  const xs = points.map(p => p.t);
  const minT = Math.min(...xs);
  const maxT = Math.max(...xs);
  const tRange = maxT - minT || 1;
  const xy = points.map(p => {
    const x = ((p.t - minT) / tRange) * w;
    const y = h - ((p.v - minV) / range) * (h - 10) - 5;
    return [x, y];
  });
  const path = xy.map(([x, y], i)=>`${i === 0 ? 'M' : 'L'}${x.toFixed(1)} ${y.toFixed(1)}`).join(' ');
  const fill = `${path} L${w} ${h} L0 ${h} Z`;
  const [lastX, lastY] = xy[xy.length - 1];

  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:'block'}}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={TL_PRIMARY} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={TL_PRIMARY} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fill} fill={`url(#${gradId})`}/>
      <path
        d={path}
        fill="none"
        stroke={TL_PRIMARY}
        strokeWidth="1.6"
        strokeLinejoin="round"
        strokeLinecap="round"
        vectorEffect="non-scaling-stroke"
      />
      <circle cx={lastX} cy={lastY} r="2" fill={TL_PRIMARY}/>
    </svg>
  );
}

function TLChart({type, compact = false, data}){
  if(type === 'moodWeek') return <ChartMoodWeek compact={compact}/>;
  if(type === 'weightTrend') return <ChartWeightTrend compact={compact}/>;
  if(type === 'caloriePanel') return <ChartCaloriePanel compact={compact}/>;
  if(type === 'todayMoodWave') return <ChartTodayMoodWave data={data} compact={compact}/>;
  return null;
}

function V3Chevron({open}){
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{transform:`rotate(${open ? 180 : 0}deg)`, transition:'transform 0.2s'}} aria-hidden="true">
      <path d="M6 9l6 6 6-6" stroke={TL_MUTED} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>

}

function V3v2Header({time, title}){
  if(!time && !title) return null;
  return (
    <div style={{display:'flex', alignItems:'center', gap:6, minWidth:0}}>
      {time && (
        <div style={{
          fontSize:11.5, color:TL_MUTED, fontWeight:400, fontVariantNumeric:'tabular-nums', flexShrink:0,
        }}>{time}</div>
      )}
      {title && (
        <div style={{
          fontSize:12, color:TL_TEXT, fontWeight:500,
          flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
        }}>{title}</div>
      )}

  );
}

function V3v2PrimaryBody({entry, showTags = true, tagsAnimate = false}){
  const tagRowStyle = { display: 'flex', gap: 6, flexWrap: 'wrap' };
  if(entry.kind === 'mood-face'){
    const MoodFace = window.MoodFace;
    const mood = entry.primaryMood;
    return (
      <div style={{display:'flex', alignItems:'center', gap:10}}>
        {MoodFace && mood && (
          <div style={{width:40, height:40, borderRadius:'50%', overflow:'hidden', flexShrink:0,
            display:'flex', alignItems:'center', justifyContent:'center',
            background:'rgba(255,77,136,0.06)',
          }}>
            <MoodFace face={mood.face} bg={mood.bg}/>
          </div>
        )}
        <span style={{fontSize:18, fontWeight:500, color:TL_TEXT, lineHeight:1.2}}>{entry.text}</span>
      </div>
    );
  }
  if(entry.kind === 'voice'){
    const text = entry.text || entry.body || '';
    const voice = entry.voice || (entry.duration ? { duration: entry.duration } : null);
    return (
      <div style={{display:'flex', flexDirection:'column', gap:8}}>
        <TlVoiceInline voice={voice} text={text}/>
        {showTags && (entry.tags || []).length > 0 && (
          <div style={tagRowStyle}>
            {(entry.tags || []).map((t, i)=>(
              <span
                key={i}
                className={tagsAnimate ? 'tl-tags-reveal' : undefined}
                style={tagsAnimate ? { animationDelay: `${i * 90}ms` } : undefined}
              >
                <TLTag tag={t}/>
              </span>
            ))}
          </div>
        )}
      </div>
    );
  }
  if(entry.kind === 'image'){
    const items = (entry.text || entry.body || '').split(/[；;]\s*/).filter(Boolean);
    const imgSrc = entry.useRealImage ? (entry.photo?.src || entry.imageSrc) : null;
    return (
      <div style={{display:'flex', flexDirection:'column', gap:10}}>
        <div style={{width:'100%', aspectRatio:'4/3', borderRadius:10, overflow:'hidden', background:'#eee'}}>
          {imgSrc ? (
            <img src={imgSrc} alt={entry.label || '午餐'} style={{width:'100%', height:'100%', objectFit:'cover', display:'block'}}/>
          ) : (
            <TLImageThumb size="100%" radius={10}/>
          )}
        </div>
        <ul style={{margin:0, padding:0, listStyle:'none', display:'flex', flexDirection:'column', gap:4}}>
          {items.map((it, i)=>(
            <li key={i} style={{fontSize:13, color:TL_TEXT, lineHeight:1.45, display:'flex', alignItems:'baseline', gap:6}}>
              <span style={{width:3, height:3, borderRadius:1.5, background:TL_PRIMARY, flexShrink:0, alignSelf:'center'}}/>
              <span>{it}</span>
            </li>
          ))}
          {entry.totalKcal != null && (
            <li style={{
              fontSize:13, color:TL_TEXT, lineHeight:1.45, display:'flex', alignItems:'baseline', gap:6,
              marginTop:4, paddingTop:6, borderTop:`0.5px solid ${TL_HAIR}`, fontWeight:500,
            }}>
              <span style={{color:TL_MUTED, fontWeight:500}}>总卡路里</span>
              <span style={{marginLeft:'auto', color:TL_PRIMARY, fontVariantNumeric:'tabular-nums'}}>{entry.totalKcal} kcal</span>
            </li>
          )}
        </ul>
      </div>
    );
  }
  return (
    <div style={{display:'flex', flexDirection:'column', gap:8}}>
      <div style={{fontSize:14, color:TL_TEXT, lineHeight:1.5}}>{entry.text || entry.body}</div>

        <div style={tagRowStyle}>

            <span
              key={i}
              className={tagsAnimate ? 'tl-tags-reveal' : undefined}
              style={tagsAnimate ? { animationDelay: `${i * 90}ms` } : undefined}
            >
              <TLTag tag={t}/>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}


function normalizeV3Entry(raw){
  if(!raw) return null;
  const kind = raw.kind || raw.recordKind;
  return {
    ...raw,
    kind,
    text: raw.text || raw.body || '',
    duration: raw.duration || raw.voice?.duration,
    time: raw.time,
  };
}

function V3v2Card({primary, ai, aiDefaultOpen = false, isNew, staggerReveal = false}){
  const cardRef = React.useRef(null);
  const aiPanelRef = React.useRef(null);
  const [revealStep, setRevealStep] = React.useState(() => (staggerReveal && isNew ? 0 : 2));
  const [open, setOpen] = React.useState(() => (!staggerReveal || !isNew) && aiDefaultOpen);
  const p = normalizeV3Entry(primary);
  const a = normalizeV3Entry(ai);

  const scrollAfterAiChartReveal = React.useCallback(() => {
    const run = () => {
      if(typeof window.scrollTimelineToBottom === 'function'){
        window.scrollTimelineToBottom('smooth');
      } else {
        const target = aiPanelRef.current || cardRef.current;
        window.scrollFeedContentIntoView?.(target);
      }
    };
    requestAnimationFrame(() => requestAnimationFrame(run));
  }, []);

  React.useEffect(() => {
    if(!staggerReveal || !isNew){
      setRevealStep(2);
      if(aiDefaultOpen) setOpen(true);
      return;
    }
    setRevealStep(0);
    setOpen(false);
    const tTags = setTimeout(() => setRevealStep(1), 380);
    const tAi = setTimeout(() => {
      setRevealStep(2);
      setOpen(true);
      setTimeout(scrollAfterAiChartReveal, 400);
    }, 980);
    return () => {
      clearTimeout(tTags);
      clearTimeout(tAi);
    };
  }, [staggerReveal, isNew, aiDefaultOpen, primary?.id, scrollAfterAiChartReveal]);

  if(!p && a){
    return (
      <div className={isNew ? 'fade-in' : undefined} style={{
        background:'#fff', borderRadius:14, border:`0.5px solid ${TL_LINE}`,
        padding:'11px 12px 12px',
      }}>
        <V3v2Header time={a.time} title={a.title}/>
        <div style={{marginTop:8}}>
          <TLChart type={a.chartType} data={a.chartData}/>
          {a.note && <div style={{fontSize:11, color:TL_MUTED, marginTop:8}}>{a.note}</div>}
        </div>
      </div>
    );
  }

  const shellClass = isNew
    ? (staggerReveal ? 'v3-card-enter' : 'fade-in')
    : undefined;
  const showTags = revealStep >= 1;
  const showAi = revealStep >= 2;

  return (
    <div
      ref={cardRef}
      className={shellClass}
      style={{
        background:'#fff', borderRadius:14, border:`0.5px solid ${TL_LINE}`,
        padding:'11px 12px 4px', overflow:'hidden',
      }}
    >
      <V3v2Header time={p.time}/>
      <div style={{marginTop:8, paddingBottom:(a && showAi) ? 10 : 8}}>
        <V3v2PrimaryBody entry={p} showTags={showTags} tagsAnimate={staggerReveal && showTags}/>
      </div>
      {a && showAi && (
        <div className="v3-ai-stagger-in">
          <div style={{borderTop:`0.5px dashed ${TL_HAIR}`, marginInline:-12}}/>
          <button
            type="button"
            onClick={()=>setOpen(v=>!v)}
            style={{
              width:'100%', background:'transparent', border:0,
              display:'flex', alignItems:'center', gap:6,
              padding:'10px 0', cursor:'pointer', fontFamily:'inherit',
            }}
            aria-expanded={open}
          >
            <div style={{
              width:18, height:18, borderRadius:9, background:TL_SOFT,
              display:'flex', alignItems:'center', justifyContent:'center',
            }}>
              <TLKindIcon kind="chart" color={TL_PRIMARY} size={10}/>
            </div>
            <span style={{fontSize:11, color:TL_PRIMARY, fontWeight:500}}>AI</span>
            <span style={{fontSize:12.5, color:TL_TEXT, fontWeight:500, flex:1, textAlign:'left'}}>{a.title}</span>
            <V3Chevron open={open}/>
          </button>
          {open && (
            <div ref={aiPanelRef} className="v3-ai-panel-in" style={{paddingBottom:12}}>
              {a.chartType && <TLChart type={a.chartType} data={a.chartData}/>}
              {a.note && (
                <div style={{
                  fontSize:13, color:TL_TEXT, lineHeight:1.55,
                  marginTop:a.chartType ? 8 : 0,
                }}>{a.note}</div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function V3RecordGroupCard({group, isNew}){
  if(group.vtAsync && window.VtAsyncRecordGroupCard){
    return <VtAsyncRecordGroupCard group={group} isNew={isNew} />;
  }
  return (
    <V3v2Card
      primary={group.primary}
      ai={group.ai}
      aiDefaultOpen={group.aiDefaultOpen}
      isNew={isNew}
      staggerReveal={!!group.staggerReveal}
    />
  );
}

Object.assign(window, {
  V3RecordGroupCard, V3v2Card, V3v2PrimaryBody, V3v2Header, TLChart, TLTag,
});

      const f = buildFollowUp(primary);
      return f ? c + '。' + f : c;
    })(),
    chart: {
      title:'近 1 周情绪波动曲线',
      data: buildMoodTrend(primary),
    },

      score,

    },

const MOOD_SCORE_MAP = {
  'super-happy':5,'excited':5,'surprised':5,'satisfied':5,'heart-flutter':5,'confident':5,
  'happy':4,'relaxed':4,
  'normal':3,'calm':3,'indifferent':3,
  'unhappy':2,'irritable':2,'temper':2,'anxious':2,'overthink':2,'stressed':2,'scared':2,
  'very-sad':1,'angry':1,
};

const MOOD_WEEK_BASELINE = [
  { d:'周一', v:3 },
  { d:'周二', v:2 },
  { d:'周三', v:3 },
  { d:'周四', v:4 },
  { d:'周五', v:3 },
  { d:'周六', v:4 },
];

function moodScoreOf(mood){
  if(!mood) return 3;
  if(typeof mood.score === 'number') return mood.score;
  return MOOD_SCORE_MAP[mood.id] || MOOD_SCORE_MAP[mood.face] || 3;
}

function buildMoodTrend(currentMood){
  const todayScore = moodScoreOf(currentMood);
  return [
    ...MOOD_WEEK_BASELINE,
    { d:'今天', v: todayScore, isToday:true },
  ];
}

function buildMoodCopy(mood){
  const id = mood?.id || '';
  if(id === 'very-sad' || id === 'angry') return '这一刻的难过是真实的，允许自己情绪低落';
  if(id === 'unhappy' || MOOD_SCORE_MAP[id] === 2) return '不开心也是今天的一部分，不用急着赶走它';
  if(id === 'super-happy' || id === 'excited' || id === 'heart-flutter') return '这份雀跃挺珍贵，慢慢享受它';
  if(MOOD_SCORE_MAP[id] >= 4) return '今天的好心情值得被记下来';
  return '平平淡淡也是一种状态，不必勉强自己振作';
}

function buildFollowUp(mood){
  const id = mood?.id || '';
  const label = mood?.label || '';
  const triggered = (
    id === 'very-sad' || id === 'angry' ||
    id === 'unhappy' || MOOD_SCORE_MAP[id] === 2 ||
    id === 'happy' || id === 'relaxed' ||
    id === 'super-happy' || id === 'excited' || id === 'heart-flutter' || id === 'confident'
  );
  if(!triggered || !label) return '';
  return `是因为什么事${label}呢？可以通过语音告诉我，我帮你记录下来。`;
}

function buildPhaseCopy(mood){
  const id = mood?.id || '';
  const score = MOOD_SCORE_MAP[id] || 3;
  if(id === 'very-sad' || id === 'angry') return '卵泡期雌激素正在回升，身体会帮你慢慢恢复力气';
  if(score <= 2) return '卵泡期通常情绪相对平稳，如果今天格外低落，可能和睡眠、压力更相关';
  if(score === 3) return '卵泡期身体处于修复阶段，"还行"其实是不错的信号';
  if(id === 'super-happy' || id === 'excited' || id === 'heart-flutter') return '卵泡期是一个周期里精力和情绪的高点，适合做点想做很久的事';
  if(score >= 4) return '卵泡期雌激素上升，大脑对愉悦的感受会更敏锐一些';
  return '卵泡期身体处于修复阶段，"还行"其实是不错的信号';
}

function timeStrToMinutes(s){
  if(!s) return 0;
  const parts = String(s).split(':');
  return (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0);
}

function buildTodayMoodPoints(history, currentMood){
  const list = (history || []).map(h => ({
    t: timeStrToMinutes(h.time),
    v: h.score,
    label: h.label,
  }));
  const time = window.formatNowTime();
  list.push({
    t: timeStrToMinutes(time),
    v: moodScoreOf(currentMood),
    label: currentMood?.label || '',
    isLast: true,
  });
  list.sort((a, b) => a.t - b.t);
  return { points: list, time };
}

function createMoodQuickEntry(moods, history){
  const list = Array.isArray(moods) ? moods : [moods];
  const primary = list[0];
  const label = primary?.label || '愉快';
  const { time } = buildTodayMoodPoints(history, primary);
  const score = moodScoreOf(primary);
  const stamp = Date.now();

  return {
    kind:'record-group',
    id:'e-mood-quick-'+stamp,
    isNew: true,
    skipExtractLabel: true,
    isQuickMood: true,
    primary:{
      id:'e-mood-quick-p-'+stamp,
      kind:'mood-face',
      time,
      text: label,
      primaryMood: primary,
    },
    quickMood: {
      label,
      score,
      time,
    },
  };
}

function createMoodRecordEntryLegacy(moods){

    tagLayout:'rows',
    skipExtractLabel: true,
    isNew: true,
  };
}

Object.assign(window, {

  createMoodQuickEntry,
  moodScoreOf,
  buildMoodTrend,
  buildMoodCopy,
  buildPhaseCopy,
  buildTodayMoodPoints,
  timeStrToMinutes,
});

      setValue(v=>(v || '0') + '.');

      if(v === '0') return key;
      if(v.includes('.') && v.split('.')[1]?.length >= 1) return v;
      if(!v.includes('.') && v.replace('.','').length >= 3) return v;
      return v + key;

<script type="text/babel">
/* === timeline-modules.jsx === */
// ============ 时间轴模块占位 & 场景卡片 ============

function parseDayParts(dateStr){
  const [m, d] = (dateStr || '').split('/');
  return { month: m || '', day: d || '' };
}

function extractKcalFromText(text){
  if(!text) return 0;
  const m = String(text).match(/(\d+(?:\.\d+)?)\s*kcal/i);
  return m ? parseFloat(m[1]) : 0;
}

function extractWeightFromItem(item){
  const text = [item.body, item.voiceText].filter(Boolean).join(' ');
  const scaleMatch = text.match(/称[^0-9]*(\d+\.?\d*)/);
  if(scaleMatch) return parseFloat(scaleMatch[1]);

  if(item.kind === 'wellness' && item.panels){
    const panel = item.panels.find(p => p.type === 'weight');
    const trend = panel?.weightTrend;
    if(trend?.length) return trend[trend.length - 1].v;
  }
  return null;
}

function summarizeDayItems(items, day){
  if(day?.summaryStats?.length) return { stats: day.summaryStats };

  let count = 0;
  let kcal = 0;
  let weight = null;

  (items || []).forEach((it, idx)=>{
    if(it.kind === 'sister-card' && (items[idx - 1]?.kind === 'voice-card' || items[idx - 1]?.kind === 'sync-card')) return;
    if(it.kind === 'guide') return;

    if(it.kind === 'record-group'){
      if(it.primary) count += 1;
      if(it.ai) count += 1;
      if(it.primary?.totalKcal) kcal += it.primary.totalKcal;
      (it.primary?.tags || []).forEach(tag=>{
        const m = String(tag.val || '').match(/(\d+(?:\.\d+)?)\s*kcal/i);
        if(m) kcal += parseFloat(m[1]);
        const wm = String(tag.val || '').match(/(\d+\.?\d*)\s*kg/i);
        if(wm) weight = parseFloat(wm[1]);
      });
      const w = extractWeightFromItem(it.primary || it);
      if(w != null) weight = w;
      return;
    }

    count += 1;
    kcal += extractKcalFromText(it.aiNote?.total);

    const w = extractWeightFromItem(it);
    if(w != null) weight = w;
  });

  const stats = [];
  if(count > 0) stats.push({ v: String(count), l: '条' });
  if(kcal > 0) stats.push({ v: String(Math.round(kcal)), l: 'kcal' });
  if(weight != null) stats.push({ v: weight.toFixed(1), l: 'kg' });

  return { count, kcal, weight, stats };
}

function resolveDayTitleLabel(day, allDays){
  if(day.isToday) return '今天';
  const days = allDays || [];
  const todayIdx = days.findIndex(d => d.isToday);
  const idx = days.findIndex(d => d.id === day.id);
  if(todayIdx >= 0 && idx === todayIdx - 1) return '昨天';
  if(todayIdx >= 0 && idx === todayIdx - 2) return '前天';
  const { month, day: dayNum } = parseDayParts(day.date);
  return `${month}/${dayNum}`;
}

function formatDayMeta(day, titleLabel){
  const relative = titleLabel === '今天' || titleLabel === '昨天' || titleLabel === '前天';
  if(relative){
    const { month, day: dayNum } = parseDayParts(day.date);
    const datePart = `${month}月${dayNum}日`;
    return day.weekday ? `${datePart} · ${day.weekday}` : datePart;
  }
  return day.weekday || '';
}

function CycleDayHeader({day, items, dayBlocks}){
  const title = resolveDayTitleLabel(day, dayBlocks);
  const meta = formatDayMeta(day, title);
  const { stats } = summarizeDayItems(items, day);

  return (
    <div className={'tl-day-summary'+(day.isToday ? ' is-today' : '')}>
      <div className="tl-day-summary-top">
        <span className="tl-day-summary-title">{title}</span>
        {meta && <span className="tl-day-summary-meta">{meta}</span>}
      </div>
      {stats.length > 0 && (
        <div className="tl-day-summary-stats">
          {stats.map((s, i)=>(
            <span key={i} className="tl-day-summary-stat">
              <span className="tl-day-summary-stat-v">{s.v}</span>
              <span className="tl-day-summary-stat-l">{s.l}</span>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

}

const GUIDE_REVEAL_DELAY_MS = 1800;
const GUIDE_TYPEWRITER_MS = 84;

function TodayGuideCard({item, isNew, animate}){
  const scrollFeed = window.scrollFeedContentIntoView;
  const textRef = React.useRef(null);
  const skipDelay = !!(item.skipRevealDelay || item.alwaysShow);
  const [ready, setReady] = React.useState(!animate || skipDelay);

  React.useEffect(()=>{
    if(!animate){
      setReady(true);
      return;
    }
    if(skipDelay){
      setReady(true);
      return;
    }
    setReady(false);
    const t = setTimeout(()=>setReady(true), GUIDE_REVEAL_DELAY_MS);
    return ()=>clearTimeout(t);
  }, [animate, item.text, skipDelay]);

  React.useEffect(()=>{
    if(!ready || !animate) return;
    requestAnimationFrame(()=>{
      scrollFeed?.(textRef.current);
    });
  }, [ready, animate, scrollFeed]);

  if(!ready) return null;

  return (
    <div className={'tl-rail-guide'+(isNew?' fade-in':'')}>
      <p className="tl-rail-guide-text" ref={textRef}>
        {animate ? (
          <TypewriterText text={item.text} active charMs={GUIDE_TYPEWRITER_MS} followScroll/>
        ) : item.text}
      </p>
    </div>
  );
}

function buildWeeklyPanels(item){
  const panels = [];
  if(item.moodTrend?.length){
    panels.push({
      id:'mood', type:'mood', icon:'💜', title:'心情趋势',
      moodTrend: item.moodTrend,
      summary: item.moodSummary || '',
    });
  }
  if(item.weightTrend?.length){
    panels.push({
      id:'weight', type:'weight', icon:'⚖️', title:'体重变化',
      weightTrend: item.weightTrend,
      weightDelta: item.weightDelta,
      summary: item.weightSummary || '',
    });
  }
  if(panels.length === 1 && item.summary){
    panels[0].summary = item.summary;
  }
  return panels;
}

function WeeklyMoodChart({data}){
  const maxM = Math.max(...data.map(d=>d.v), 1);
  return (
    <div className="tl-trend-chart mood">
      {data.map((d,i)=>(
        <div key={i} className="tl-trend-col">
          <div
            className="tl-trend-bar"
            style={{height: Math.round((d.v / maxM) * 48)+'px'}}
          />
          <span className="tl-trend-day">{d.d}</span>
        </div>
      ))}
    </div>
  );
}

function WeeklyWeightChart({data, delta}){
  const wVals = data.map(d=>d.v);
  const minW = Math.min(...wVals);
  const maxW = Math.max(...wVals);
  const wRange = maxW - minW || 1;
  return (
    <>
      <div className="tl-trend-chart weight">
        {data.map((d,i)=>(
          <div key={i} className="tl-trend-col">
            <div
              className="tl-trend-dot"
              style={{bottom: Math.round(((d.v - minW) / wRange) * 40)+'px'}}
            />
            <span className="tl-trend-day">{d.d}</span>
          </div>
        ))}
        <svg className="tl-trend-line" viewBox="0 0 200 48" preserveAspectRatio="none">
          <polyline
            fill="none"
            stroke="rgba(255,77,136,0.5)"
            strokeWidth="2"
            points={data.map((d,i)=>{
              const x = (i / Math.max(data.length - 1, 1)) * 200;
              const y = 44 - ((d.v - minW) / wRange) * 36;
              return x+','+y;
            }).join(' ')}
          />
        </svg>
      </div>
      {delta && <div className="tl-weekly-panel-delta">{delta}</div>}
    </>
  );
}

function WeeklySleepChart({data}){
  const maxH = Math.max(...data.map(d=>d.v), 1);
  const minH = Math.min(...data.map(d=>d.v));
  return (
    <div className="tl-trend-chart sleep">
      {data.map((d,i)=>(
        <div key={i} className="tl-trend-col">
          <div
            className="tl-trend-bar sleep-bar"
            style={{height: Math.round(((d.v - minH * 0.85) / (maxH - minH * 0.85 || 1)) * 44)+'px'}}
          />
          <span className="tl-trend-day">{d.d}</span>
        </div>
      ))}
    </div>
  );
}

function panelStat(panel){
  if(panel.type === 'weight') return panel.weightDelta || null;
  if(panel.type === 'sleep') return panel.sleepDelta || null;
  return null;
}

function WeeklyPanel({panel, variant}){
  const statOnly = variant === 'wellness-stat';
  const showChart = variant === 'weekly-mood' || variant === 'weekly-trend';
  const stat = panelStat(panel);
  let chart = null;

  if(showChart){
    if(panel.type === 'mood'){
      chart = <WeeklyMoodChart data={panel.moodTrend || []}/>;
    } else if(panel.type === 'weight'){
      chart = <WeeklyWeightChart data={panel.weightTrend || []} delta={panel.weightDelta}/>;
    } else if(panel.type === 'sleep'){
      chart = <WeeklySleepChart data={panel.sleepTrend || []}/>;
    }
  }

  return (
    <article className={'tl-weekly-panel tone-'+panel.type+(showChart ? ' has-chart' : ' is-stat-only')}>
      <div className="tl-weekly-panel-head">
        <span className="tl-weekly-panel-icon">{panel.icon || '📊'}</span>
        <span className="tl-weekly-panel-title">{panel.title}</span>
      </div>
      {statOnly && stat && (
        <div className="tl-weekly-panel-stat">{stat}</div>

      {showChart && chart && (

  );
}

function MoodCurveChart({data, animateToday = false, onTodayAnimated}){
  const w = 280;
  const h = 64;
  const padX = 14;
  const padTop = 8;
  const padBot = 22;
  const minV = 1;
  const maxV = 5;
  const range = maxV - minV;
  const innerW = w - padX * 2;
  const innerH = h - padTop - padBot;
  const gradId = React.useId().replace(/:/g, '');
  const wrapRef = React.useRef(null);
  const doneRef = React.useRef(false);
  const allData = data || [];

  const toPoint = (d, i)=>{
    const x = padX + (innerW * i) / Math.max(1, (allData.length - 1));
    const y = padTop + innerH - ((d.v - minV) / range) * innerH;
    return { x, y, d };
  };

  const allPoints = allData.map(toPoint);

  const pathFrom = pts => pts.length
    ? pts.map((p, i)=>(i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ')
    : '';
  const areaFrom = pts => {
    if(!pts.length) return '';
    const line = pathFrom(pts);
    const last = pts[pts.length - 1];
    const first = pts[0];
    const floor = padTop + innerH;
    return `${line} L${last.x.toFixed(1)},${floor} L${first.x.toFixed(1)},${floor} Z`;
  };

  const fullLine = pathFrom(allPoints);
  const fullArea = areaFrom(allPoints);
  const pointCount = allPoints.length;
  const axisFinishMs = 80 + Math.max(0, pointCount - 1) * 92 + 340;
  const revealMs = animateToday ? Math.max(880, 120 + pointCount * 100, axisFinishMs) : 0;

  React.useEffect(()=>{
    if(!animateToday) return;
    doneRef.current = false;
    requestAnimationFrame(()=>{
      window.scrollFeedContentIntoView?.(wrapRef.current);
    });
    const t = setTimeout(()=>{
      if(doneRef.current) return;
      doneRef.current = true;
      onTodayAnimated?.();
    }, revealMs + 80);
    return ()=>clearTimeout(t);
  }, [animateToday, onTodayAnimated, revealMs, allData]);

  return (
    <div
      ref={wrapRef}
      className={'tl-mood-curve' + (animateToday ? ' is-anim' : '')}

const MOOD_GUIDE_AFTER_CHART_MS = 900;

function MoodInsightCard({item, isNew}){
  const MoodFace = window.MoodFace;
  const TypewriterText = window.TypewriterText;
  const scrollFeed = window.scrollFeedContentIntoView;
  const cardRef = React.useRef(null);
  const [aiOpen, setAiOpen] = React.useState(true);
  const [step, setStep] = React.useState(isNew ? 0 : 10);
  const doneRef = React.useRef(false);

  const primary = item.primaryMood || (item.moods && item.moods[0]);
  const moodLabel = primary?.label || '愉快';
  const chart = item.chart || {};
  const phaseCopy = item.phaseCopy || '';
  const hasAi = !!(phaseCopy || chart.data?.length > 0);
  const hasTodayPoint = !!(chart.data || []).some(d => d.isToday);
  const chartAnimatesToday = isNew && hasTodayPoint;
  const [chartDone, setChartDone] = React.useState(!chartAnimatesToday);

  React.useEffect(()=>{
    if(!isNew || step < 1) return;
    requestAnimationFrame(()=>{
      scrollFeed?.(cardRef.current);
    });
  }, [step, isNew, scrollFeed]);

  React.useEffect(()=>{
    if(!isNew) return;
    setChartDone(!chartAnimatesToday);
    doneRef.current = false;
    const ts = [
      setTimeout(()=>setStep(1), 80),
      setTimeout(()=>setStep(2), 600),
      setTimeout(()=>setStep(3), 1200),
      setTimeout(()=>setStep(4), 1600),
    ];
    return ()=>ts.forEach(clearTimeout);
  }, [isNew, chartAnimatesToday]);

  React.useEffect(()=>{
    if(!isNew || step !== 4 || phaseCopy) return;
    const t = setTimeout(()=>setStep(5), 300);
    return ()=>clearTimeout(t);
  }, [step, isNew, phaseCopy]);

  const handlePhaseTyped = React.useCallback(()=>{
    setStep(s => Math.max(s, 5));
  }, []);

  const handleChartTodayAnimated = React.useCallback(()=>{
    setChartDone(true);
  }, []);

  React.useEffect(()=>{
    if(!isNew || doneRef.current) return;
    const targetStep = hasAi ? 5 : 3;
    if(step < targetStep) return;
    if(chartAnimatesToday && step >= 5 && !chartDone) return;
    doneRef.current = true;
    const t = setTimeout(()=>{
      window.dispatchEvent(new CustomEvent('moodCardStreamDone'));
    }, chartAnimatesToday ? MOOD_GUIDE_AFTER_CHART_MS : 500);
    return ()=>clearTimeout(t);
  }, [step, isNew, hasAi, chartAnimatesToday, chartDone]);

  React.useEffect(()=>{
    if(!isNew || !chartAnimatesToday || chartDone) return;
    const t = setTimeout(()=>setChartDone(true), 2600);
    return ()=>clearTimeout(t);
  }, [isNew, chartAnimatesToday, chartDone]);

  const vis = n => isNew ? {
    opacity: step >= n ? 1 : 0,
    transform: step >= n ? 'translateY(0)' : 'translateY(6px)',
    transition: 'opacity 0.4s ease, transform 0.38s ease',
  } : {};

  return (
    <article className="tl-mood-insight" ref={cardRef}>
      <header className="tl-mood-insight-hd" style={vis(1)}>
        <span className="tl-mood-insight-time">{item.time}</span>
      </header>

      <div className="tl-mood-insight-user" style={vis(2)}>
        <span className="tl-mood-insight-face">
          {primary && MoodFace ? <MoodFace face={primary.face} bg={primary.bg}/> : null}
        </span>
        <span className="tl-mood-insight-mood-value">{moodLabel}</span>
      </div>

      {hasAi && step >= 3 && (
        <div className="tl-mood-insight-ai-wrap" style={vis(3)}>
          <div className="tl-mood-insight-divider"/>
          <button
            type="button"
            className="tl-mood-insight-ai-toggle"
            onClick={()=>setAiOpen(v=>!v)}
            aria-expanded={aiOpen}
          >
            <span className="tl-mood-insight-ai-badge">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 20V6M4 20h16M8 16v-4M12 16V8M16 16v-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/>
              </svg>
            </span>
            <span className="tl-mood-insight-ai-label">AI</span>
            <span className="tl-mood-insight-ai-title">情绪与周期分析</span>
            <svg
              className="tl-mood-insight-ai-chev"
              width="14" height="14" viewBox="0 0 24 24" fill="none"
              style={{transform: aiOpen ? 'rotate(180deg)' : 'rotate(0deg)', transition:'transform 0.2s'}}
              aria-hidden="true"
            >
              <path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>

          {aiOpen && step >= 4 && (
            <div className="tl-mood-insight-ai-body">
              {phaseCopy && (
                <div className="tl-mood-insight-phase-row">
                  <span className="tl-mood-insight-phase-pill">卵泡期</span>
                  <span className="tl-mood-insight-phase-text">
                    {(isNew && TypewriterText)
                      ? <TypewriterText text={phaseCopy} active charMs={55} followScroll onComplete={handlePhaseTyped}/>
                      : phaseCopy}
                  </span>
                </div>
              )}
              {step >= 5 && chart.data?.length > 0 && (
                <div className="tl-mood-insight-chart-block" style={vis(5)}>
                  <div className="tl-mood-insight-inner-sep"/>
                  <span className="tl-mood-insight-chart-label">{chart.title || '近 1 周情绪波动曲线'}</span>
                  <MoodCurveChart
                    data={chart.data}
                    animateToday={chartAnimatesToday}
                    onTodayAnimated={handleChartTodayAnimated}
                  />
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </article>
  );
}

function TimelineItem({item, sisterItem, isNew, phaseKind, isFeedLast, sisterPlayAnimation, onSisterCycleComplete, firstDropAnim, onFirstDropLand, onFirstDropComplete}){
  const cycleDay = item.cycleDay;
  const guideAnimate = item.kind === 'guide' && !item.noAnimate && (
    isNew || item.hiddenUntilSisterDone
  );

  let body = null;
  if(item.kind === 'record-group'){
    body = item.pendingDrop ? null : <V3RecordGroupCard group={item} isNew={isNew}/>;
  } else if(item.kind === 'guide'){
    body = <TodayGuideCard item={item} isNew={isNew} animate={guideAnimate}/>;
  } else if(item.kind === 'mood-insight'){
    body = item.pendingDrop ? null : <MoodInsightCard item={item} isNew={isNew}/>;
  } else if(item.kind === 'weekly' || item.kind === 'wellness'){
    body = <WeeklyTrendCard item={item}/>;
  } else if(item.kind === 'voice-card' || item.kind === 'sync-card'){
    body = (
      <VoiceRecordCard
        entry={item}
        isNew={isNew}
        animateAnalysis={isFeedLast}
        analysisProps={sisterItem ? {
          playAnimation: sisterPlayAnimation,
          onCycleComplete: onSisterCycleComplete,
        } : null}
      />
    );
  } else if(item.kind === 'sister-card'){
    body = (
      <SisterAnalysisCard
        item={item}
        playAnimation={sisterPlayAnimation}
        onCycleComplete={onSisterCycleComplete}
        animateText={sisterPlayAnimation > 0}
      />
    );
  } else if(item.module) {
    body = (
      <div className="tl-rec-group">
        <RecordCard entry={item} isNew={isNew} typewriterAiNote={!!(isNew && item.aiNote)}/>
        <ModulePlaceholder mod={item.module} cycleDay={cycleDay || item.module.cycleDay}/>
      </div>
    );
  } else {
    body = (
      <RecordCard
        entry={item}
        isNew={isNew}
        typewriterAiNote={!!(isNew && item.aiNote)}
        hideBodyUntilDrop={item.hideBodyUntilDrop}
      />
    );
  }

  const isDropTarget = firstDropAnim?.entryId === item.id;

  return (
    <TimelineRailNode
      phaseKind={phaseKind}
      railDot={item.railDot || sisterItem?.railDot || (item.kind === 'sister-card' ? 'ai' : (item.ai && !item.primary ? 'ai' : undefined))}
      isFeedLast={isFeedLast}
      nodeKind={item.kind === 'record-group' ? (item.ai && !item.primary ? 'sister-card' : 'voice-card') : (sisterItem ? (item.kind === 'sync-card' ? 'sync-card' : 'voice-card') : item.kind)}
      dropAnim={isDropTarget}
      onDropLand={isDropTarget ? onFirstDropLand : undefined}
      onDropComplete={isDropTarget ? onFirstDropComplete : undefined}
    >
      <TimelineItemWrap item={item}>{body}</TimelineItemWrap>
    </TimelineRailNode>
  );
}

Object.assign(window, {
  CycleDayHeader, TimelineRailNode, TlNodeCaption, summarizeDayItems,
  resolveDayTitleLabel, formatDayMeta,
  ModulePlaceholder, TodayGuideCard, WeeklyTrendCard, TimelineItem,
  MoodInsightCard, MoodCurveChart,
});

</script>
<script type="text/babel">
/* === timeline.jsx === */
// ============ 时间轴 — 分日 · 单条记录 · AI 批注 ============

function VoiceBar({voice}){
  return <TlVoiceBar voice={voice}/>;
}

function RecordCard({entry, isNew, typewriterAiNote, animateAnalysis, hideBodyUntilDrop}){
  return (
    <SegmentedRecordCard
      entry={entry}
      isNew={isNew}
      typewriterAiNote={typewriterAiNote}
      animateAnalysis={animateAnalysis}
      hideBodyUntilDrop={hideBodyUntilDrop}
    />
  );
}

function CycleSumCard({item}){
  return (
    <div className={'cycle-sum'+(item.tone==='warn'?' warn':'')}>
      <div className="cs-head">
        <span className="cs-icon">{item.icon || '🟢'}</span>
        <span className="cs-title">{item.title}</span>
      </div>
      <div className="cs-body">{item.body}</div>
      {item.link && <span className="cs-link">{item.link}</span>}
    </div>
  );
}

function WeeklyCard({item}){
  return (
    <div className="weekly-card">
      <div className="wk-left">
        <div className="wk-icon">{item.icon || '📊'}</div>
        <div>
          <div className="wk-title">{item.title}</div>
          <div className="wk-sub">{item.sub}</div>
        </div>
      </div>
      <span className="wk-action">{item.action || '查看 ›'}</span>
    </div>
  );
}

function filterDayItems(items, sisterCycleDone, hideTodayGuide){
  return (items || []).filter(it=>{
    if(it.kind === 'guide' && hideTodayGuide && !it.alwaysShow) return false;
    if(!it.hiddenUntilSisterDone) return true;
    return sisterCycleDone;
  });
}

function resolveTimelineLastItemId(blocks, sisterCycleDone, hideTodayGuide){
  const ids = [];
  blocks.forEach(block=>{
    if(block.type !== 'day') return;
    const items = filterDayItems(block.items || block.entries, sisterCycleDone, hideTodayGuide);
    items.forEach(it=>ids.push(it.id));
  });
  return ids[ids.length - 1];
}

function TimelineDateSection({day, dayBlocks, sisterPlayAnimation, sisterCycleDone, hideTodayGuide, onSisterCycleComplete, lastItemId, hideDayHeader, firstDropAnim, onFirstDropLand, onFirstDropComplete}){
  const items = filterDayItems(day.items || day.entries, sisterCycleDone, hideTodayGuide);
  const phaseCls = day.phaseKind || '';
  return (
    <>
      {hideDayHeader ? null : (
        <div className={'tl-day-section-head tl-rail-break'+(day.isToday?' is-today':'')+(phaseCls?' phase-'+phaseCls:'')}>
          <CycleDayHeader day={day} items={items} dayBlocks={dayBlocks}/>
        </div>
      )}
      {items.map((it, idx)=>{
        if(it.kind === 'sister-card' && (items[idx - 1]?.kind === 'voice-card' || items[idx - 1]?.kind === 'sync-card')) return null;
        const sisterItem = (it.kind === 'voice-card' || it.kind === 'sync-card') && items[idx + 1]?.kind === 'sister-card'
          ? items[idx + 1]
          : null;
        return (
        <TimelineItem
          key={it.id}
          item={it}
          sisterItem={sisterItem}
          isNew={it.isNew || (it.hiddenUntilSisterDone && sisterCycleDone && sisterPlayAnimation > 0)}
          phaseKind={day.phaseKind}
          isFeedLast={it.id === lastItemId || sisterItem?.id === lastItemId}
          sisterPlayAnimation={sisterPlayAnimation}
          onSisterCycleComplete={onSisterCycleComplete}
          firstDropAnim={firstDropAnim}
          onFirstDropLand={onFirstDropLand}
          onFirstDropComplete={onFirstDropComplete}
        />
        );
      })}
    </>
  );
}

function CycleStartMarker({block}){
  return (
    <div className="tl-cycle-start">
      <div className="tl-cycle-start-marker" aria-hidden="true">
        <span className="tl-cycle-start-dot"/>
      </div>
      <div className="tl-cycle-start-body">
        <span className="tl-cycle-start-icon">🩸</span>
        <span className="tl-cycle-start-text">{block.label || '本次周期开始'}</span>
        {block.sub && <span className="tl-cycle-start-sub">{block.sub}</span>}
      </div>
    </div>
  );
}

function TimelineStream({blocks, endRef, sisterPlayAnimation, sisterCycleDone, hideTodayGuide, onSisterCycleComplete, hideGapDivider, hideDayHeader, firstDropAnim, onFirstDropLand, onFirstDropComplete}){
  const lastItemId = resolveTimelineLastItemId(blocks, sisterCycleDone, hideTodayGuide);
  const dayBlocks = blocks.filter(b => b.type === 'day');

  return (
    <div className="tl-feed">
      <div className="tl-rail-continuous">
        {blocks.map((block, i)=>{
          if(block.type === 'day'){
            return (
              <TimelineDateSection
                key={block.id}
                day={block}
                dayBlocks={dayBlocks}
                sisterPlayAnimation={sisterPlayAnimation}
                sisterCycleDone={sisterCycleDone}
                hideTodayGuide={hideTodayGuide}
                onSisterCycleComplete={onSisterCycleComplete}
                lastItemId={lastItemId}
                hideDayHeader={hideDayHeader}
                firstDropAnim={firstDropAnim}
                onFirstDropLand={onFirstDropLand}
                onFirstDropComplete={onFirstDropComplete}
              />
            );
          }
          if(block.type === 'cycle-start'){
            return (
              <div key={block.id} className="tl-rail-break">
                <CycleStartMarker block={block}/>
              </div>
            );
          }
          if(block.type === 'gap'){
            if(hideGapDivider) return null;
            return (
              <div key={block.id || ('gap-'+i)} className="tl-gap-divider tl-feed-more tl-rail-break">
                上滑查看更多
              </div>
            );
          }
          if(block.type === 'cycle-sum'){
            return (
              <div key={block.id} className="tl-rail-break">
                <CycleSumCard item={block}/>
              </div>
            );
          }
          if(block.type === 'weekly'){
            return (
              <div key={block.id} className="tl-rail-break">
                <WeeklyCard item={block}/>
              </div>
            );
          }
          return null;
        })}
      </div>
      <div ref={endRef} className="tl-feed-end" aria-hidden="true"/>
    </div>
  );
}

function formatNowTime(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function formatVoiceDur(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m+':'+String(s).padStart(2,'0');
}

function resolveEntryDayId(text, blocks){
  const days = blocks.filter(b=>b.type==='day');
  const todayIdx = days.findIndex(d=>d.isToday);
  if(/前天/.test(text) && todayIdx > 1) return days[todayIdx - 2].id;
  if(/昨天|昨晚/.test(text) && todayIdx > 0) return days[todayIdx - 1].id;
  return days.find(d=>d.isToday)?.id || days[days.length - 1]?.id;
}

function resolveDayHint(text, blocks, dayId){
  const day = blocks.find(b=>b.type==='day' && b.id===dayId);
  if(!day || day.isToday) return '';
  if(/昨天|昨晚|前天/.test(text)) return day.date;
  return '';
}

function appendTimelineEntry(blocks, entry, opts={}){
  const dayId = opts.dayId || resolveEntryDayId(entry.body || '', blocks);
  return blocks.map(b=>{
    if(b.type !== 'day' || b.id !== dayId) return b;
    const list = b.items || b.entries || [];
    return {
      ...b,
      items: [...list, entry],
      entries: undefined,
    };
  });
}

function appendTodayEntry(blocks, entry){
  return appendTimelineEntry(blocks, entry);
}

function isTimelineEmpty(blocks){
  return !(blocks || []).some(b=>{
    if(b.type !== 'day') return true;
    return (b.items || b.entries || []).length > 0;
  });
}

Object.assign(window, {
  VoiceBar, RecordCard, CycleSumCard, WeeklyCard,
  TimelineDateSection, TimelineStream, CycleStartMarker,
  formatNowTime, formatVoiceDur,
  appendTodayEntry, appendTimelineEntry,
  resolveEntryDayId, resolveDayHint, resolveTimelineLastItemId,
  isTimelineEmpty,
});

</script>

const { useState, useEffect, useRef } = React;

const EMPTY_LOOP_SEC = 4.6;
const EMPTY_DEMO_ACTIVE_SEC = 3.6;

function useLoopTime(duration = EMPTY_LOOP_SEC, speed = 1) {
  const [t, setT] = useState(0);
  const startRef = useRef(performance.now());
  const speedRef = useRef(speed);
  useEffect(() => { speedRef.current = speed; }, [speed]);

  useEffect(() => {
    let raf;
    const tick = () => {
      const now = performance.now();
      const elapsed = ((now - startRef.current) / 1000) * speedRef.current;
      setT(elapsed % duration);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [duration]);
  return t;
}

const clamp01 = (v) => Math.max(0, Math.min(1, v));
const range = (t, a, b) => clamp01((t - a) / (b - a));

      <div className="record-empty-hero">

const AXIS_FALL_MS = 540;
const AXIS_SPLASH_MS = 480;
const AXIS_SHRINK_MS = 160;
const AXIS_LAND_MS = AXIS_FALL_MS;
const AXIS_SETTLE_MS = AXIS_FALL_MS + AXIS_SPLASH_MS;
const AXIS_DONE_MS = AXIS_SETTLE_MS + AXIS_SHRINK_MS;
const SPLASH_ANGLES = [0, 60, 120, 180, 240, 300];

function easeInQuad(t){
  return t * t;
}

function easeOutCubic(t){
  return 1 - Math.pow(1 - t, 3);
}

function easeOutQuart(t){
  return 1 - Math.pow(1 - t, 4);
}

function computeAxisFall(t, distance){
  const p = Math.min(1, t / AXIS_FALL_MS);
  const gravity = easeInQuad(p);
  let y = -distance + gravity * distance;
  let sx = 1;
  let sy = 1;

  const speed = p < 1 ? Math.min(1, p * 1.35) : 0;
  const stretch = speed * (1 - p * 0.45);
  sy = 1 + stretch * 0.16;
  sx = 1 - stretch * 0.06;

  if(p >= 0.78){
    const u = (p - 0.78) / 0.22;
    const bounce = Math.sin(u * Math.PI);
    sy = 1 - bounce * 0.24;
    sx = 1 + bounce * 0.16;
    y -= bounce * 4;
  }

  const fadeTail = p > 0.94 ? (p - 0.94) / 0.06 : 0;
  return {
    y,
    sx,
    sy,
    opacity: 1 - fadeTail * 0.85,
  };
}

function RecordBlankAxisSplash({ elapsed, shrinkElapsed = 0 }) {
  const uid = React.useId().replace(/:/g, '');
  const gradId = 'rbAxisGrad' + uid;
  const p = Math.min(1, elapsed / AXIS_SPLASH_MS);
  const burst = easeOutCubic(Math.min(1, p / 0.36));
  const fade = p > 0.5 ? easeOutQuart((p - 0.5) / 0.5) : 0;
  const shrinkT = Math.min(1, shrinkElapsed / AXIS_SHRINK_MS);
  const shrinkEase = easeOutCubic(shrinkT);
  const dropScale = (1 - fade * 0.18) * (1 - shrinkEase * 0.86);
  const ringScale = 0.4 + burst * 1.05;
  const ringOp = 0.38 * (1 - easeOutQuart(p));

  return (
    <div className="record-blank-axis-splash" aria-hidden="true">
      <span
        className="record-blank-axis-splash-ring is-outer"
        style={{
          transform: `scale(${ringScale})`,
          opacity: ringOp * (1 - shrinkEase),
        }}
      />
      <span
        className="record-blank-axis-splash-ring is-inner"
        style={{
          transform: `scale(${0.35 + burst * 0.72})`,
          opacity: ringOp * 0.82 * (1 - shrinkEase),
        }}
      />
      <svg
        className="record-blank-axis-splash-svg"
        width="48"
        height="48"
        viewBox="0 0 48 48"
        fill="none"
        style={{ transform: `scale(${dropScale})` }}
      >
        <defs>
          <linearGradient id={gradId} x1="24" y1="10" x2="24" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#ffb8d0" stopOpacity="0.55"/>
            <stop offset="38%" stopColor="#ff8fb4" stopOpacity="0.78"/>
            <stop offset="100%" stopColor="#ff4d88" stopOpacity="0.92"/>
          </linearGradient>
        </defs>
        {SPLASH_ANGLES.map((deg, i) => {
          const delay = i * 32;
          const local = Math.max(0, elapsed - delay);
          const lp = Math.min(1, local / (AXIS_SPLASH_MS * 0.72));
          const expand = easeOutCubic(lp);
          const particleFade = lp > 0.58 ? easeOutQuart((lp - 0.58) / 0.42) : 0;
          const orbit = 2 + expand * 15 - particleFade * 4;
          const dotOp = 0.58 * (1 - particleFade) * (1 - shrinkEase * 0.9);
          const rad = (deg - 90) * Math.PI / 180;
          const r = 3.4 - particleFade * 1.4;
          if(dotOp <= 0.02) return null;
          return (
            <circle
              key={deg}
              cx={24 + Math.cos(rad) * orbit}
              cy={24 + Math.sin(rad) * orbit}
              r={r}
              fill="#ff4d88"
              fillOpacity={dotOp}
            />
          );
        })}
        <path
          d="M24 11 C24 11, 17 20, 17 23.5 C17 27.2, 20.1 30, 24 30 C27.9 30, 31 27.2, 31 23.5 C31 20, 24 11, 24 11Z"
          fill={`url(#${gradId})`}
          fillOpacity={1 - shrinkEase * 0.15}
        />
        <ellipse
          cx="21.5"
          cy="21"
          rx="1.6"
          ry="2.2"
          fill="#fff"
          fillOpacity={0.42 * (1 - shrinkEase)}
          transform="rotate(-18 21.5 21)"
        />
      </svg>
      {shrinkEase > 0.08 && (
        <span
          className="record-blank-axis-settle-dot"
          style={{
            transform: `scale(${0.18 + shrinkEase * 0.12})`,
            opacity: shrinkEase,
          }}
        />
      )}
    </div>
  );
}

function RecordBlankAxisLand({ t, variant = 'ceremony' }) {
  const distance = variant === 'timeline' ? 76 : 128;
  const landClass = 'record-blank-axis-land' + (variant === 'timeline' ? ' is-timeline' : '');
  const fallT = Math.min(t, AXIS_LAND_MS);
  const fall = computeAxisFall(fallT, distance);
  const splashElapsed = Math.max(0, t - AXIS_LAND_MS);
  const shrinkElapsed = Math.max(0, t - AXIS_SETTLE_MS);
  const inFall = t < AXIS_LAND_MS;
  const inSplash = t >= AXIS_LAND_MS && t < AXIS_DONE_MS;
  const preSplash = t >= AXIS_LAND_MS - 64 && t < AXIS_LAND_MS;
  const preSplashMix = preSplash ? (t - (AXIS_LAND_MS - 64)) / 64 : 0;
  const showFallDroplet = inFall && fall.opacity > 0.08;
  const showSplash = inSplash || preSplashMix > 0.12;
  const showCeremonyDot = variant !== 'timeline' && t >= AXIS_DONE_MS;

  const innerTransform = inFall
    ? `translateY(${fall.y}px) scale(${fall.sx}, ${fall.sy})`
    : 'translateY(0) scale(1, 1)';

  return (
    <div className={landClass} aria-hidden="true">
      <div
        className="record-blank-axis-land-inner"
        style={{ transform: innerTransform }}
      >
        {showFallDroplet && (
          <RecordBlankDroplet
            className="is-axis-fall"
            style={{ opacity: fall.opacity * (1 - preSplashMix * 0.75) }}
          />
        )}
        {showSplash && (
          <div
            className="record-blank-axis-splash-wrap"
            style={{ opacity: inSplash ? 1 : preSplashMix * 0.55 }}
          >
            <RecordBlankAxisSplash
              elapsed={inSplash ? splashElapsed : 0}
              shrinkElapsed={variant === 'timeline' ? shrinkElapsed : 0}
            />
          </div>
        )}
        {showCeremonyDot && <span className="record-blank-node-dot is-landed"/>}
      </div>
    </div>
  );
}

function RecordBlankAxisDropAnim({ onLand, onComplete }) {
  const [t, setT] = useState(0);
  const landRef = useRef(false);
  const completeRef = useRef(false);
  const startRef = useRef(performance.now());

  useEffect(() => {
    landRef.current = false;
    completeRef.current = false;
    startRef.current = performance.now();
    setT(0);
    let raf;
    const tick = () => {
      const elapsed = performance.now() - startRef.current;
      setT(elapsed);
      if(elapsed < AXIS_DONE_MS + 40) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  useEffect(() => {
    if(t >= AXIS_LAND_MS && !landRef.current){
      landRef.current = true;
      onLand?.();
    }
  }, [t, onLand]);

  useEffect(() => {
    if(t >= AXIS_DONE_MS && !completeRef.current){
      completeRef.current = true;
      onComplete?.();
    }
  }, [t, onComplete]);

  return <RecordBlankAxisLand t={t} variant="timeline"/>;
}

Object.assign(window, {

<script type="text/babel">
/* === search-page.jsx === */
// ============ 记录搜索页 ============

const SEARCH_TAGS = [
  { id: 'cat-period', label: '月经', cat: 'period', emoji: '🩸' },
  { id: 'cat-symptom', label: '症状', cat: 'symptom', emoji: '🤕' },
  { id: 'cat-mood', label: '心情', cat: 'mood', emoji: '💭' },
  { id: 'cat-sleep', label: '睡眠', cat: 'sleep', emoji: '😴' },
  { id: 'cat-diet', label: '饮食', cat: 'diet', emoji: '🥗' },
  { id: 'cat-weight', label: '体重', cat: 'weight', emoji: '⚖️' },
];

const SEARCH_TAG_MAP = {};
SEARCH_TAGS.forEach(t => { SEARCH_TAG_MAP[t.id] = t; });

function flattenSearchableItems(blocks){
  const out = [];
  (blocks || []).forEach(block=>{
    if(block.type !== 'day') return;
    const dayMeta = {
      date: block.date,
      weekday: block.weekday || '',
      phaseTag: block.phaseTag || '',
    };
    (block.items || []).forEach(item=>{
      if(item.kind !== 'rec' && item.kind !== 'voice-card') return;
      const text = (item.body || item.voiceText || '').trim();
      if(!text && !item.photo) return;
      out.push({
        id: item.id,
        dayMeta,
        time: item.time,
        text,
        tags: item.tags || [],
        voice: item.voice,
        photo: item.photo,
      });
    });
  });
  return out;
}

function itemMatchesFilters(item, query, activeTags){
  const q = query.trim().toLowerCase();
  const hasTags = activeTags.length > 0;

  let matchQuery = !q;
  if(q){
    const tagText = (item.tags || []).map(t=>t.label).join(' ');
    const haystack = (item.text + ' ' + tagText).toLowerCase();
    matchQuery = haystack.includes(q);
  }

  let matchTags = !hasTags;
  if(hasTags){
    matchTags = activeTags.some(filter=>{
      const tagHit = (item.tags || []).some(tag=>{
        const r = window.resolveTag(tag);
        if(filter.cat && !filter.matchLabel) return r.cat === filter.cat;
        if(filter.matchLabel){
          if(r.label.includes(filter.matchLabel) || filter.matchLabel.includes(r.label)) return true;
          if(filter.cat && r.cat === filter.cat) return true;
        }
        return false;
      });
      if(tagHit) return true;
      if(filter.matchLabel && item.text.includes(filter.matchLabel)) return true;
      if(filter.cat === 'period' && /月经|经期/.test(item.text)) return true;
      if(filter.cat === 'symptom' && /腹胀|腰酸|疲惫|痛|不适/.test(item.text)) return true;
      if(filter.cat === 'mood' && /心情|情绪|愉快|低落|平静/.test(item.text)) return true;
      if(filter.cat === 'sleep' && /睡/.test(item.text)) return true;
      if(filter.cat === 'weight' && /体重|kg|公斤|斤/.test(item.text)) return true;
      if(filter.cat === 'diet' && /吃|餐|饮食|午饭|晚饭|早餐/.test(item.text)) return true;
      if(filter.cat === 'fitness' && /跑|运动|健身/.test(item.text)) return true;
      return false;
    });
  }

  return matchQuery && matchTags;
}

function highlightQuery(text, query){
  const q = query.trim();
  if(!q || !text) return text;
  const lower = text.toLowerCase();
  const idx = lower.indexOf(q.toLowerCase());
  if(idx < 0) return text;
  return (
    <>
      {text.slice(0, idx)}
      <mark className="search-hl">{text.slice(idx, idx + q.length)}</mark>
      {text.slice(idx + q.length)}
    </>
  );
}

function SearchResultCard({item, query}){
  const RecordedTags = window.RecordedTags;
  const excerpt = item.text.length > 72 ? item.text.slice(0, 72) + '…' : item.text;
  const dayLine = [item.dayMeta.date, item.dayMeta.weekday].filter(Boolean).join(' · ');

  return (
    <article className="search-result-card">
      <div className="search-result-meta-row">
        <span className="search-result-date">{dayLine}</span>
        {item.time && <span className="search-result-time">{item.time}</span>}
        {item.voice && (
          <span className="search-result-voice">
            <span aria-hidden="true">🎙</span>
            {item.voice.duration || '语音'}
          </span>
        )}
      </div>
      {item.text && (
        <p className="search-result-body">{highlightQuery(excerpt, query)}</p>
      )}
      {item.tags.length > 0 && (
        <RecordedTags tags={item.tags} layout="t5"/>
      )}
    </article>
  );
}

function SearchPage({timeline, onClose}){
  const [query, setQuery] = React.useState('');
  const [selectedIds, setSelectedIds] = React.useState([]);
  const inputRef = React.useRef(null);

  const allItems = React.useMemo(()=>flattenSearchableItems(timeline), [timeline]);
  const activeTags = React.useMemo(
    ()=>selectedIds.map(id=>SEARCH_TAG_MAP[id]).filter(Boolean),
    [selectedIds]
  );
  const hasFilter = !!(query.trim() || selectedIds.length);

  const results = React.useMemo(()=>{
    if(!hasFilter) return [];
    return allItems
      .filter(item=>itemMatchesFilters(item, query, activeTags))
      .slice()
      .reverse();
  }, [allItems, query, activeTags, hasFilter]);

  React.useEffect(()=>{
    const tm = setTimeout(()=>inputRef.current?.focus(), 120);
    return ()=>clearTimeout(tm);
  }, []);

  const toggleTag = (id)=>{
    setSelectedIds(prev=>prev.includes(id) ? prev.filter(x=>x !== id) : [...prev, id]);
  };

  const clearFilters = ()=>{
    setQuery('');
    setSelectedIds([]);
    inputRef.current?.focus();
  };

  const I = window.Icon;

  return (
    <div className="search-page" role="dialog" aria-modal="true" aria-label="搜索">
      <div className="search-nav">
        <button type="button" className="search-back" aria-label="返回" onClick={onClose}>
          <I name="arrow-left" size={22} stroke={2}/>
        </button>
        <h1 className="search-nav-title">搜索</h1>
        {hasFilter && (
          <button type="button" className="search-reset" onClick={clearFilters}>清除</button>
        )}
      </div>

      <div className="search-field-wrap">
        <span className="search-field-ico" aria-hidden="true">
          <I name="search" size={18} stroke={1.8}/>
        </span>
        <input
          ref={inputRef}
          className="search-field"
          type="search"
          enterKeyHint="search"
          placeholder="输入关键字检索"
          value={query}
          onChange={e=>setQuery(e.target.value)}
        />
        {query && (
          <button type="button" className="search-field-clear" aria-label="清空" onClick={()=>setQuery('')}>
            <I name="close" size={14} stroke={2}/>
          </button>
        )}
      </div>

      <div className="search-scroll">
        <section className="search-tags-section" aria-label="标签筛选">
          <div className="search-tags">
            {SEARCH_TAGS.map(tag=>{
              const active = selectedIds.includes(tag.id);
              return (
                <button
                  key={tag.id}
                  type="button"
                  className={'search-tag'+(active ? ' is-active' : '')}
                  aria-pressed={active}
                  onClick={()=>toggleTag(tag.id)}
                >
                  {tag.emoji && <span className="search-tag-emoji" aria-hidden="true">{tag.emoji}</span>}
                  {tag.label}
                </button>
              );
            })}
          </div>
        </section>

        <section className="search-results" aria-live="polite">
          {!hasFilter && (
            <div className="search-empty search-empty--idle">
              <p className="search-empty-desc">输入关键字，或点选标签筛选</p>
            </div>
          )}

          {hasFilter && (
            <div className="search-results-head">
              <h2 className="search-results-title">搜索结果</h2>
              <span className="search-results-count">{results.length} 条</span>
            </div>
          )}

          {hasFilter && results.length === 0 && (
            <div className="search-empty">
              <p className="search-empty-title">没有找到相关记录</p>
              <p className="search-empty-desc">换个关键字或标签试试</p>
            </div>
          )}

          <div className="search-result-list">
            {results.map(item=>(
              <SearchResultCard key={item.id} item={item} query={query}/>
            ))}
          </div>
        </section>
      </div>
    </div>
  );
}

Object.assign(window, { SearchPage, flattenSearchableItems });

</script>

/** 方案 I · 卡片扇 — 4 项快捷发布（落点由放射菜单算法动态计算） */
const QUICK_CARDS = [
  { id:'mood', label:'心情', hint:'5 档表情', title:'记录心情' },
  { id:'symptom', label:'症状', hint:'快速多选', title:'今日症状' },
  { id:'weight', label:'体重', hint:'±0.1 kg', title:'今日体重' },
  { id:'diet', label:'饮食', hint:'餐食速记', title:'今日饮食' },
];

const RADIAL_MENU = {
  radius: 124,
  angle: 140,
  center: 180,
  stagger: 0.04,
  duration: 0.5,
};

function computeRadialCards(cards, config = RADIAL_MENU){
  const N = cards.length;
  const { radius: R, angle: WHOLE, center: CENTER, stagger: STAG } = config;
  const step = N > 1 ? WHOLE / (N - 1) : 0;
  const start = CENTER - WHOLE / 2;
  return cards.map((card, i)=>{
    const a = (start + step * i) * Math.PI / 180;
    const x = R * Math.cos(a);
    const y = -R * Math.sin(a);
    return {
      ...card,
      x: x.toFixed(1),
      y: y.toFixed(1),
      dOut: (i * STAG).toFixed(3) + 's',
      dIn: ((N - 1 - i) * STAG).toFixed(3) + 's',
    };
  });
}

const QUICK_CARDS_RADIAL = computeRadialCards(QUICK_CARDS);

const DEMO_VOICE_LINE = '哎，昨天月经来了，昨天肚子不太舒服';

const DOCK_PLACEHOLDER = '记录生活点滴';

function DockWavePlaceholder({show, focused}){
  if(!show) return null;

  return (
    <span
      className={'dock-float-ph'+(focused ? ' is-focused' : '')}
      aria-hidden="true"
    >
      <span className="dock-float-ph-char is-idle">{DOCK_PLACEHOLDER}</span>
    </span>
  );
}

function QuickCardFan({
  open, selected, closingToMood, onFabTap, onSelectCard, onMoodPick, onClose,
  onSymptomSubmit, onWeightSubmit, onFoodSubmit,
}){
  const I = window.Icon;
  const QuickCardIcon = window.QuickCardIcon;
  const QuickSymptomPicker = window.QuickSymptomPicker;
  const QuickWeightPicker = window.QuickWeightPicker;
  const QuickFoodPicker = window.QuickFoodPicker;
  const [closing, setClosing] = React.useState(false);
  const wasOpenRef = React.useRef(false);

  React.useEffect(()=>{
    if(open){
      setClosing(false);
      wasOpenRef.current = true;
      return;
    }
    if(!wasOpenRef.current || selected) return;
    setClosing(true);
    const dur = closingToMood
      ? 0.22
      : RADIAL_MENU.duration * 0.8 + (QUICK_CARDS.length - 1) * RADIAL_MENU.stagger;
    const tm = setTimeout(()=>{
      setClosing(false);
      wasOpenRef.current = false;
    }, dur * 1000 + 80);
    return ()=>clearTimeout(tm);
  }, [open, selected, closingToMood]);

  const fanClosing = closing || (closingToMood && !open);

  return (
    <div
      className={'quick-card-fan'
        +(open ? ' is-open' : '')
        +(fanClosing ? ' is-closing' : '')
        +(closingToMood ? ' to-mood' : '')
        +(selected ? ' has-selected' : '')}
      style={{'--rm-duration': RADIAL_MENU.duration + 's'}}
    >
      {QUICK_CARDS_RADIAL.map((card)=>{
        const isSel = selected === card.id;
        const isOther = selected && !isSel;

        return (
          <div
            key={card.id}
            className={'quick-card-fan-item'
              +(isSel ? ' is-selected' : '')
              +(isOther ? ' is-faded' : '')}
            data-card={card.id}
            style={{
              '--x': card.x + 'px',
              '--y': card.y + 'px',
              '--d-out': card.dOut,
              '--d-in': card.dIn,
            }}
          >
            <button
              type="button"
              className="quick-card-fan-face"
              onPointerDown={(e)=>{
                if(!open || selected) return;
                if(card.id === 'mood'){
                  e.preventDefault();
                  e.stopPropagation();
                  onMoodPick?.();
                }
              }}
              onClick={()=>{
                if(!open || selected) return;
                if(card.id !== 'mood') onSelectCard(card.id);
              }}
              aria-label={card.label}
              tabIndex={open && !selected ? 0 : -1}
            >
              <span className="quick-card-fan-ico">
                <QuickCardIcon kind={card.id} size={32}/>
              </span>
            </button>

            <div className="quick-card-fan-panel" aria-hidden={!isSel}>
              <div className="quick-card-fan-panel-hd">
                <span className="quick-card-fan-panel-title">{card.title}</span>
                <button type="button" className="quick-card-fan-panel-close" onClick={onClose} aria-label="关闭">
                  ×
                </button>
              </div>
              <div className="quick-card-fan-panel-body">
                {card.id === 'symptom' ? (
                  <QuickSymptomPicker onSubmit={onSymptomSubmit}/>
                ) : card.id === 'diet' ? (
                  <QuickFoodPicker onSubmit={onFoodSubmit}/>
                ) : card.id === 'weight' ? (
                  <QuickWeightPicker onSubmit={onWeightSubmit}/>
                ) : null}
              </div>
            </div>
          </div>
        );
      })}

      <button
        type="button"
        className={'quick-card-fab'+(open ? ' is-open' : '')+(selected ? ' is-covered' : '')}
        onClick={onFabTap}
        aria-expanded={open}
        aria-label={open ? '收起快捷记录' : '快捷记录'}
      >
        <I name="plus" size={24} stroke={2.2}/>
      </button>
    </div>
  );
}

function DockPublisher({
  draft, onDraft, onSend, onQuickMark, onMoodConfirm, onSymptomConfirm, onWeightConfirm,
  onFoodConfirm,
  onVoiceDone, onPhoto, onDockExpandedChange, activeTab, showScheme3Bubble,
  highlightScheme3Input, dockPlaceholder, defaultInputMode = 'text',
}){
  const I = window.Icon;
  const DockMoodPicker = window.DockMoodPicker;
  const DockSymptomPicker = window.DockSymptomPicker;
  const DockWeightPicker = window.DockWeightPicker;
  const [inputMode, setInputMode] = React.useState(defaultInputMode);
  const [quickOpen, setQuickOpen] = React.useState(false);
  const [quickSelected, setQuickSelected] = React.useState(null);
  const [closingToMood, setClosingToMood] = React.useState(false);
  const [moodPickerOpen, setMoodPickerOpen] = React.useState(false);
  const [dockSheet, setDockSheet] = React.useState(null);
  const [recording, setRecording] = React.useState(false);
  const [recSec, setRecSec] = React.useState(0);
  const [inputFocused, setInputFocused] = React.useState(false);
  const recTimer = React.useRef(null);
  const prevTabRef = React.useRef(activeTab);

  React.useEffect(()=>{
    setInputMode(defaultInputMode);
  }, [defaultInputMode]);

  React.useEffect(()=>{
    if(activeTab === 'note' && prevTabRef.current !== 'note'){
      setQuickOpen(false);
      setQuickSelected(null);
      setDockSheet(null);
      setMoodPickerOpen(false);
      setClosingToMood(false);
    }
    prevTabRef.current = activeTab;
  }, [activeTab]);

  React.useEffect(()=>{
    if(!showScheme3Bubble) return;
    const tm = setTimeout(()=>window.markScheme3BubbleSeen?.(), 2400);
    return ()=>clearTimeout(tm);
  }, [showScheme3Bubble]);

  const closeQuick = ()=>{
    setQuickSelected(null);
    setQuickOpen(false);
    setClosingToMood(false);
  };

  const handleMoodFanTap = ()=>{
    setMoodPickerOpen(true);
    setClosingToMood(true);
    setQuickOpen(false);
    window.setTimeout(()=> setClosingToMood(false), 260);
  };

  const closeMoodPicker = ()=>{
    setMoodPickerOpen(false);
    setClosingToMood(false);
  };

  const handleMoodOverlaySubmit = (moods)=>{
    setMoodPickerOpen(false);
    setClosingToMood(false);
    setQuickOpen(false);
    setQuickSelected(null);
    onMoodConfirm?.(moods);
  };

  const handleFabTap = ()=>{
    if(quickOpen) closeQuick();
    else setQuickOpen(true);
  };


  React.useEffect(()=>{
    if(recording){
      recTimer.current = setInterval(()=>setRecSec(s=>s+1), 1000);
    } else {
      clearInterval(recTimer.current);
      setRecSec(0);
    }
    return ()=>clearInterval(recTimer.current);
  }, [recording]);

  const startRec = ()=> setRecording(true);
  const stopRec = ()=>{
    if(!recording) return;
    setRecording(false);
    onVoiceDone(DEMO_VOICE_LINE, Math.max(recSec, 3));
  };

  const toggleMode = ()=>{
    setInputMode(m=>m==='text' ? 'voice' : 'text');
    closeQuick();
  };

  const closeDockSheet = ()=> setDockSheet(null);

  const handleQuickSymptomSubmit = (symptoms)=>{
    closeQuick();
    onSymptomConfirm?.(symptoms);
  };

  const handleQuickWeightSubmit = (payload)=>{
    closeQuick();
    onWeightConfirm?.(payload);
  };

  const handleQuickFoodSubmit = (foods)=>{
    closeQuick();
    onFoodConfirm?.(foods);
  };

  const handleMoodConfirm = (moods)=>{
    setDockSheet(null);
    onMoodConfirm?.(moods);
  };

  const handleSymptomConfirm = (symptoms)=>{
    setDockSheet(null);
    onSymptomConfirm?.(symptoms);
  };

  const handleWeightConfirm = (payload)=>{
    setDockSheet(null);
    onWeightConfirm?.(payload);
  };

  React.useEffect(()=>{
    onDockExpandedChange?.(!!dockSheet || !!quickSelected);
  }, [dockSheet, quickSelected, onDockExpandedChange]);

  const isDockExpanded = !!dockSheet;
  const isQuickActive = quickOpen || !!quickSelected;
  const inputPlaceholder = dockPlaceholder || DOCK_PLACEHOLDER;
  const MoodOverlay = window.MoodQuickOverlay || (()=>null);

  return (
    <>
      <div className={'quick-float-wrap'+(isDockExpanded ? ' is-covered' : '')+(isQuickActive ? ' is-quick-active' : '')}>
        <QuickCardFan
          open={quickOpen}
          selected={quickSelected}
          closingToMood={closingToMood}
          onFabTap={handleFabTap}
          onSelectCard={setQuickSelected}
          onMoodPick={handleMoodFanTap}
          onClose={closeQuick}
          onSymptomSubmit={handleQuickSymptomSubmit}
          onWeightSubmit={handleQuickWeightSubmit}
          onFoodSubmit={handleQuickFoodSubmit}
        />
      </div>

      {ReactDOM.createPortal(
        <MoodOverlay
          open={moodPickerOpen}
          onSubmit={handleMoodOverlaySubmit}
          onClose={closeMoodPicker}
        />,
        document.body
      )}

      <div className={'dock-wrap'+(isDockExpanded?' is-mood-expanded':'')}>
        <div className={'dock-panel'+(isDockExpanded?' is-mood-expanded':'')}>
          {dockSheet === 'mood' ? (
            <DockMoodPicker
              onConfirm={handleMoodConfirm}
              onCancel={closeDockSheet}
            />
          ) : dockSheet === 'symptom' ? (
            <DockSymptomPicker
              onConfirm={handleSymptomConfirm}
              onCancel={closeDockSheet}
            />
          ) : dockSheet === 'weight' ? (
            <DockWeightPicker
              onConfirm={handleWeightConfirm}
              onCancel={closeDockSheet}
            />
          ) : (
          <div className="dock-bar">
            <div className="dock-input-row">
              <button
                type="button"
                className="dock-mode-btn"
                onClick={toggleMode}
                aria-label={inputMode==='text'?'切换语音':'切换键盘'}
              >
                {inputMode==='text'
                  ? <DockVoiceCircleIco size={26}/>
                  : <DockKbdCircleIco size={26}/>}
              </button>

              {inputMode==='text' ? (
                <div className={'dock-text-field'
                  +(inputFocused?' is-focused':'')
                  +(highlightScheme3Input?' is-scheme3-highlight':'')}>
                  {showScheme3Bubble && !draft.trim() && !inputFocused ? (
                    <span className="dock-scheme3-bubble" aria-hidden="true">
                      ✏️ 记下第一刻
                    </span>
                  ) : null}
                  <DockWavePlaceholder
                    show={inputMode === 'text' && !draft.trim() && !showScheme3Bubble}
                    focused={inputFocused}
                  />
                  <textarea
                    rows="1"
                    placeholder=""
                    aria-label={inputPlaceholder}
                    value={draft}
                    onChange={(e)=>{
                      onDraft(e.target.value);
                      e.target.style.height='auto';
                      e.target.style.height = Math.min(e.target.scrollHeight, 72)+'px';
                    }}
                    onFocus={()=>setInputFocused(true)}
                    onBlur={()=>setInputFocused(false)}
                    onKeyDown={(e)=>{
                      if(e.key==='Enter' && !e.shiftKey && draft.trim()){
                        e.preventDefault();
                        onSend();
                      }
                    }}
                  />
                </div>
              ) : (
                <div className={'dock-voice-wrap'+(recording?' is-recording':'')}>
                  <div className="dock-voice-stage" aria-hidden="true">
                    <span className="dock-voice-shimmer"/>
                  </div>
                  <button
                    type="button"
                    className={'dock-voice-btn'+(recording?' recording':'')}
                    onPointerDown={(e)=>{ e.preventDefault(); startRec(); }}
                    onPointerUp={stopRec}
                    onPointerLeave={recording ? stopRec : undefined}
                  >
                    {recording ? (
                      <>
                        <span className="dock-voice-waves" aria-hidden="true">
                          {[4,8,12,8,6,10,7].map((h,j)=><span key={j} style={{height:h+'px'}}/>)}
                        </span>
                        <span>松开 结束{recSec > 0 ? ' '+recSec+'s' : ''}</span>
                      </>
                    ) : (
                      <span className="dock-voice-label">按住 说话</span>
                    )}
                  </button>
                </div>
              )}

              {inputMode==='text' && draft.trim() ? (
                <button type="button" className="dock-send-btn" onClick={onSend} aria-label="发送">
                  <I name="send" size={16} stroke={2}/>
                </button>
              ) : null}
            </div>

          </div>
          )}
        </div>
      </div>
    </>
  );
}

Object.assign(window, { DockPublisher, CloudPublisher: DockPublisher });
</script>
