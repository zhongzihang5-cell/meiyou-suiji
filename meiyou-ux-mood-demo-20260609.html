// voice-transcribe-recorder.jsx — 场景五 · 按住说话输入条
/* global React */

const { useState, useEffect, useRef } = React;

const VT_T = window.VT_T || {
  ink2: '#666666',
  pink: '#ff4d88',
  pinkDeep: '#e04378',
  pinkBorder: 'rgba(255,77,136,0.28)',
};
window.VT_T = VT_T;

function VoiceTranscribeBar({
  onStart, onEnd, onCancel, recording, elapsed = 0, variant = 'live-drop',
  cancelHover = false, onCancelHoverChange,
}) {
  const startYRef = useRef(0);
  const [localCancel, setLocalCancel] = useState(false);
  const cancelHoverActive = onCancelHoverChange ? cancelHover : localCancel;
  const setCancelHover = (v) => {
    if(onCancelHoverChange) onCancelHoverChange(v);
    else setLocalCancel(v);
  };

  const handleDown = (e) => {
    e.preventDefault();
    startYRef.current = (e.touches?.[0]?.clientY ?? e.clientY) || 0;
    onStart && onStart();
  };
  const handleMove = (e) => {
    if(!recording) return;
    const y = (e.touches?.[0]?.clientY ?? e.clientY) || 0;
    setCancelHover(startYRef.current - y > 80);
  };
  const handleUp = () => {
    if(!recording) return;
    if(cancelHoverActive) onCancel && onCancel();
    else onEnd && onEnd();
    setCancelHover(false);
  };

  useEffect(() => {
    if(!recording) return;
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchend', handleUp);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove);
    return () => {
      window.removeEventListener('mouseup', handleUp);
      window.removeEventListener('touchend', handleUp);
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('touchmove', handleMove);
    };
  }, [recording, cancelHoverActive]);

  const [tick, setTick] = useState(0);
  useEffect(() => {
    if(!recording) return;
    let raf;
    const loop = (t) => { setTick(t); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [recording]);

  const heights = Array.from({ length: 7 }).map((_, i) => {
    const ph = tick / 220 + i * 0.55;
    const v = Math.sin(ph) * 0.55 + Math.sin(ph * 1.7 + i) * 0.35;
    return 5 + Math.abs(v) * 14;
  });

  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = Math.floor(elapsed % 60).toString().padStart(2, '0');
  const stroke = 'rgba(0,0,0,0.55)';

  const showRecHint = recording && (variant === 'live-float' ? cancelHoverActive : true);

  return (
    <>
      {showRecHint && (
        <div className={'vt-rec-hint' + (cancelHoverActive ? ' is-cancel' : '')}>
          {cancelHoverActive ? '松开取消 ✕' : `↑ 上滑取消 · ${mm}:${ss}`}
        </div>
      )}

      <div className="vt-input-bar">
        <button type="button" className="vt-chip-btn" aria-label="键盘">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="2.5" y="6.5" width="19" height="12" rx="2.5" stroke={stroke} strokeWidth="1.6"/>
            <path d="M6 11h.01M9 11h.01M12 11h.01M15 11h.01M18 11h.01M7 14.5h10" stroke={stroke} strokeWidth="1.6" strokeLinecap="round"/>
          </svg>
        </button>

        <button
          type="button"
          className={'vt-hold-btn' + (recording ? ' is-recording' : ' is-idle')}
          onMouseDown={handleDown}
          onTouchStart={handleDown}
        >
          {recording ? (
            <>
              <span className="vt-hold-waves" aria-hidden="true">
                {heights.map((h, i) => (
                  <span key={i} className="vt-hold-wave" style={{ height: h }} />
                ))}
              </span>
              <span className="vt-hold-label is-recording">
                {cancelHoverActive ? '松开取消' : <>松开&nbsp;结束<span className="vt-hold-sub">· 上滑取消</span></>}
              </span>
            </>
          ) : (
            <span className="vt-hold-label">按住&nbsp;说话</span>
          )}
        </button>

        <button type="button" className="vt-chip-btn" aria-label="相机">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="2.5" y="6.5" width="19" height="13" rx="2.5" stroke={stroke} strokeWidth="1.6"/>
            <circle cx="12" cy="13" r="3.5" stroke={stroke} strokeWidth="1.6"/>
            <path d="M8 6.5l1.2-2h5.6L16 6.5" stroke={stroke} strokeWidth="1.6"/>
          </svg>
        </button>
      </div>
    </>
  );
}

function VoiceTranscribeAtmosphere({ active }) {
  if(!active) return null;
  return (
    <div className="vt-atmosphere" aria-hidden="true">
      <div className="vt-atmosphere-glow" />
      <div className="vt-atmosphere-halo" />
      {Array.from({ length: 12 }).map((_, i) => (

function VoiceTranscribeDockBar({ onCancel }){

          <circle cx="12" cy="13" r="3.5" stroke={stroke} strokeWidth="1.6"/>
          <path d="M8 6.5l1.2-2h5.6L16 6.5" stroke={stroke} strokeWidth="1.6"/>
        </svg>
      </button>
    </div>
  );
}

Object.assign(window, {

  VoiceTranscribeAtmosphere,

      animation: "orbSpin 3s linear infinite",

}

function ThinkingDots() {
  return (
    <span style={{ display: "inline-flex", gap: 3, alignItems: "center", marginLeft: 4 }}>

}

// ─────────────────────────────────────────────────────────────
// V2 · LIVE-BUBBLE  — speech bubble above the bar
// ─────────────────────────────────────────────────────────────
function LiveBubble({ text, active, exiting = false }) {

// ─────────────────────────────────────────────────────────────
// V3 · LIVE-GROW — docked panel growing upward from the bar

function LiveGrowPanel({ text, active, exiting = false }) {

function LiveFloat({ text, active, exiting = false }) {
  const anim = active
    ? 'bloomUp 0.32s cubic-bezier(.2,.7,.3,1)'
    : exiting
      ? 'floatAway 0.3s cubic-bezier(0.22,1,0.36,1) forwards'

// ── 异步方案 · 按住录音可视化（与松手后转写风格匹配）──
const barFill = (cancel) => cancel ? '#cdc4c0' : 'linear-gradient(180deg, #ff8bb3 0%, #ff4d88 100%)';

function WaveBars({ cancel, blur = false, profile }) {
  return (
    <div className="vt-recwave-field" style={{ filter: blur ? 'blur(2.4px)' : 'none' }}>
      {profile.map((p, i) => (
        <span key={i} className="recwave-bar" style={{
          flex: 1, height: p.base, minWidth: 2, borderRadius: 2,
          background: barFill(cancel), opacity: cancel ? 0.7 : 0.88,
          animation: cancel ? 'none' : `liveBar ${p.dur}s ease-in-out ${p.delay}s infinite`,
        }} />
      ))}
    </div>
  );
}

function CalmPulse({ cancel, profile }) {
  return (
    <div className="vt-recwave-field vt-recwave-field--calm">
      {profile.slice(0, 22).map((p, i) => (
        <span key={i} style={{
          width: 3, height: 4 + (i % 3), borderRadius: 2,
          background: cancel ? '#cdc4c0' : VT_T.pink, opacity: cancel ? 0.6 : 0.55,
          animation: cancel ? 'none' : `aiThinkPulse ${1 + (i % 4) * 0.18}s ease-in-out ${(i % 6) * 0.1}s infinite`,
        }} />
      ))}
    </div>
  );
}

function GlowOrb({ cancel }) {
  return (
    <div className="vt-rec-glow-orb">
      {!cancel && [0, 1].map((i) => (
        <span key={i} className="vt-rec-glow-ring" style={{ animationDelay: `${i * 0.9}s` }} />
      ))}
      <div className={'vt-rec-glow-core' + (cancel ? ' is-cancel' : '')} />
    </div>
  );
}

function InkStroke({ cancel }) {
  return (
    <div className="vt-rec-ink">
      <div className={'vt-rec-ink-line' + (cancel ? ' is-cancel' : '')} />
      {!cancel && <div className="vt-rec-ink-nib" />}
    </div>
  );
}

function ListenRings({ cancel }) {
  return (
    <div className="vt-rec-listen">
      {!cancel && [0, 1, 2].map((i) => (
        <span key={i} className="vt-rec-glow-ring" style={{ animationDelay: `${i * 0.7}s` }} />
      ))}
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <AIOrb size={24} />
        {!cancel && <ThinkingDots />}
      </div>
    </div>
  );
}

function RecordingWave({ active, elapsed = 0, cancel = false, variant = 'wave' }) {
  const profileRef = useRef(null);
  if(!profileRef.current){
    profileRef.current = Array.from({ length: 34 }).map((_, i) => ({
      base: 8 + ((i * 37) % 22),
      dur: 0.55 + ((i * 13) % 9) * 0.06,
      delay: ((i * 17) % 11) * 0.06,
    }));
  }
  const profile = profileRef.current;

  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = Math.floor(elapsed % 60).toString().padStart(2, '0');
  const accent = cancel ? VT_T.ink2 : VT_T.pink;
  const listening = variant === 'glow' || variant === 'stream';
  const statusLabel = cancel ? '松开取消' : (listening ? '正在聆听' : '正在录音');

  let visual;
  if(variant === 'glow') visual = <GlowOrb cancel={cancel} />;
  else if(variant === 'stream') visual = <ListenRings cancel={cancel} />;
  else if(variant === 'calm' || variant === 'bar-transcribing') visual = <CalmPulse cancel={cancel} profile={profile} />;
  else if(variant === 'focus') visual = (
    <div className="vt-rec-focus-wrap">
      <WaveBars cancel={cancel} blur profile={profile} />
      {!cancel && <div className="vt-rec-frost-sweep" />}
    </div>
  );
  else visual = <WaveBars cancel={cancel} profile={profile} />;

  return (
    <div
      className={'vt-recording-wave' + (active ? ' is-active' : '') + (cancel ? ' is-cancel' : '')}
      style={{ animation: active ? 'bloomUp 0.32s cubic-bezier(.2,.7,.3,1) both' : 'floatAway 0.4s forwards' }}
    >
      <div className="vt-recording-wave-card">
        <div className="vt-recording-wave-head">
          <div className="vt-recording-wave-status">
            <span className="proc-dot" style={{ background: accent }} />
            <span style={{ color: cancel ? VT_T.ink2 : VT_T.pinkDeep }}>{statusLabel}</span>
          </div>
          <span className="vt-recording-wave-time" style={{ color: accent }}>{mm}:{ss}</span>
        </div>
        {visual}
      </div>
    </div>
  );
}

Object.assign(window, { LiveBubble, LiveGrowPanel, LiveFloat, RecordingWave });

</script>
<script type="text/babel">
/* === voice-transcribe-async.jsx === */
// voice-transcribe-async.jsx — 场景五 · 异步转写（对齐点滴 v2：顶栏语音条 → 句尾胶囊）
/* global React, VT_T, V3v2Header, TLChart, TLTag */

const TL_PRIMARY = '#ff4d88';
const TL_TEXT = 'rgba(0,0,0,0.8)';
const TL_MUTED = 'rgba(0,0,0,0.6)';
const TL_LINE = 'rgba(0,0,0,0.08)';
const TL_HAIR = 'rgba(0,0,0,0.06)';
const TL_SOFT = 'rgba(255,77,136,0.08)';
const TL_PINK_SOFT = 'rgba(255,77,136,0.08)';
const TL_PINK_BORDER = 'rgba(255,77,136,0.28)';

const { useState, useEffect, useRef, useLayoutEffect } = React;

/** 时间轴转写动效 variant（不含 bar-transcribing，该方案仅影响底栏） */
const VT_ASYNC_VARIANTS = ['calm', 'wave', 'glow', 'focus', 'stream'];
const VT_DOCK_TRANSCRIBING = 'bar-transcribing';

const PROC_MS = { calm: 600, wave: 750, glow: 950, stream: 1300, focus: 820 };
const PER_MS = { calm: 44, wave: 52, glow: 74, stream: 36, focus: 26 };

function isAsyncVoiceVariant(v){
  return VT_ASYNC_VARIANTS.includes(v) || v === VT_DOCK_TRANSCRIBING;
}

function timelineVariantFor(v){
  return v === VT_DOCK_TRANSCRIBING ? 'calm' : v;
}

function VtThinkingDots(){
  return (
    <span style={{ display: 'inline-flex', gap: 3, alignItems: 'center', marginLeft: 4 }}>
      {[0, 1, 2].map((i) => (
        <span key={i} style={{
          width: 4, height: 4, borderRadius: 2, background: VT_T.pink, display: 'inline-block',
          animation: 'aiThinkPulse 1.2s ease-in-out infinite', animationDelay: `${i * 0.15}s`,
        }} />
      ))}
    </span>
  );
}

function VtThinkingHalo(){
  return (
    <div className="vt-thinking-halo">
      <div className="vt-thinking-halo-ring" />
      <div className="vt-thinking-halo-core" />
    </div>
  );
}

function VtProcessingHeader({ variant, duration }){
  const v = timelineVariantFor(variant);
  if(v === 'calm'){
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
        <span className="proc-dot" />
        <span style={{ fontSize: 12.5, fontWeight: 500, color: TL_MUTED }}>转写中</span>
        <VtThinkingDots />
      </div>
    );
  }
  const title = v === 'wave' ? '正在把声音转成文字'
    : v === 'focus' ? 'AI 正在显影文字'
    : v === 'stream' ? 'AI 正在理解你的语音'
    : 'AI 正在转写';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
      {v === 'stream' ? (
        <div style={{
          width: 22, height: 22, borderRadius: '50%',
          background: 'conic-gradient(from 0deg, #ff4d88, #ff8bb3, #ffd9e6, #ff4d88)',
          animation: 'orbSpin 3s linear infinite',
        }} />
      ) : <VtThinkingHalo />}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 12.5, fontWeight: 500, color: TL_TEXT, display: 'flex', alignItems: 'center' }}>
          <span className="ai-text-shimmer">{title}</span><VtThinkingDots />
        </div>
        <div style={{ fontSize: 10.5, color: TL_MUTED, marginTop: 1 }}>
          语音 {duration}″ · 提取要点 · 关联周期
        </div>
      </div>
    </div>
  );
}

function VtPlayBtn(){
  return (
    <button type="button" className="vt-voice-msg-play" aria-label="播放">
      <svg width="9" height="9" viewBox="0 0 12 12"><path d="M3 1.5l7 4.5-7 4.5V1.5z" fill="#fff" /></svg>
    </button>
  );
}

function VtVoiceMessageBar({ duration, live = false, morph = null, compact = false, exiting = false }){
  const N = 30;
  const bars = Array.from({ length: N }).map((_, i) => 6 + ((i * 53) % 16) + (i % 4 === 0 ? 7 : 0));
  return (
    <div className={'vt-voice-msg-bar' + (exiting ? ' is-exiting' : '') + (compact ? ' is-compact' : '')}>
      <VtPlayBtn />
      <div className="vt-voice-msg-waves">
        {bars.map((h, i) => {
          const consumed = morph != null && i / N < morph;
          return (
            <span
              key={i}
              className={live ? 'live-bar' : ''}
              style={{
                flex: 1, minWidth: 2, height: h, borderRadius: 2,
                background: consumed ? TL_PINK_BORDER : VT_T.pink,
                opacity: consumed ? 0.5 : 0.78 + ((i % 4) * 0.06),
                transform: consumed ? 'scaleY(0.45)' : undefined,
                transition: 'background 0.3s, opacity 0.3s, transform 0.3s',
                animationDelay: `${(i % 7) * 0.07}s`,
              }}
            />
          );
        })}
      </div>
      <span className="vt-voice-msg-dur">0:{String(duration).padStart(2, '0')}</span>
    </div>
  );
}

function VtInlineVoicePill({ duration, innerRef }){
  const bars = [6, 11, 7, 13, 8, 5];
  return (
    <span ref={innerRef} className="vt-inline-voice-pill">
      <span className="vt-inline-voice-play" aria-hidden="true">
        <svg width="8" height="8" viewBox="0 0 12 12"><path d="M3 1.5l7 4.5-7 4.5V1.5z" fill="#fff" /></svg>
      </span>
      <span className="vt-inline-voice-bars" aria-hidden="true">
        {bars.map((h, i) => (
          <span key={i} className="live-bar" style={{
            width: 2, height: h, borderRadius: 1, background: VT_T.pink, opacity: 0.9,
            animationDelay: `${(i % 5) * 0.08}s`,
          }} />
        ))}
      </span>
      <span className="vt-inline-voice-dur">0:{String(duration).padStart(2, '0')}</span>
    </span>
  );
}

function VtAsyncTranscriptionBody({ primary, variant, isNew, onDone, onPhaseChange }){
  const chars = primary.chars || [...(primary.text || '')];
  const duration = primary.durationSec || 2;
  const rawVariant = variant || primary.vtVariant || 'calm';
  const isDockMode = rawVariant === VT_DOCK_TRANSCRIBING;
  const v = timelineVariantFor(rawVariant);
  const motion = 'inline';

  const [phase, setPhase] = useState(() => (isDockMode ? 'typing' : 'processing'));
  const [n, setN] = useState(0);
  const [barExiting, setBarExiting] = useState(false);
  const doneRef = useRef(false);
  const voiceBarRef = useRef(null);
  const pillRef = useRef(null);
  const flipFromRef = useRef(null);

  useEffect(() => {
    onPhaseChange?.(phase);
    if(typeof window.__vtOnTranscribePhase === 'function'){
      window.__vtOnTranscribePhase(phase);
    }
  }, [phase, onPhaseChange]);

  useEffect(() => {
    doneRef.current = false;
    flipFromRef.current = null;
    setBarExiting(false);
    setN(0);
    if(isDockMode){
      setPhase('typing');
      return undefined;
    }
    setPhase('processing');
    const t = setTimeout(() => setPhase('typing'), PROC_MS[v] || 900);
    return () => clearTimeout(t);
  }, [primary.id, v, isDockMode]);

  const goDone = () => {
    if(isDockMode){
      setPhase('done');
      return;
    }
    if(voiceBarRef.current){
      flipFromRef.current = voiceBarRef.current.getBoundingClientRect();
    }
    setBarExiting(true);
    setTimeout(() => {
      setPhase('done');
    }, 180);
  };

  useEffect(() => {
    if(phase !== 'typing') return;
    if(n >= chars.length){
      goDone();
      return;
    }
    const base = PER_MS[v] || 50;
    const last = chars[n - 1];
    const punct = '，。、；！？…'.includes(last) ? 220 : 0;
    const jitter = v === 'stream' ? Math.random() * 38 : 0;
    const id = setTimeout(() => setN((k) => k + 1), base + punct + jitter);
    return () => clearTimeout(id);
  }, [phase, n, chars.length, v]);

  useLayoutEffect(() => {
    if(phase !== 'done' || isDockMode) return;
    const from = flipFromRef.current;
    const pill = pillRef.current;
    flipFromRef.current = null;
    if(!from || !pill) return;
    const to = pill.getBoundingClientRect();
    const dx = (from.left + from.width / 2) - (to.left + to.width / 2);
    const dy = (from.top + from.height / 2) - (to.top + to.height / 2);
    const sx = Math.min(2.6, Math.max(1, from.width / Math.max(to.width, 1)));
    pill.style.transformOrigin = 'center';
    pill.style.transition = 'none';
    pill.style.transform = `translate(${dx}px, ${dy}px) scale(${sx})`;
    pill.style.opacity = '0.45';
    void pill.offsetWidth;
    requestAnimationFrame(() => {
      pill.style.transition = 'transform 0.55s cubic-bezier(.34,.86,.28,1), opacity 0.45s ease';
      pill.style.transform = 'translate(0,0) scale(1)';
      pill.style.opacity = '1';
    });
  }, [phase]);

  useEffect(() => {
    if(phase === 'done' && !doneRef.current){
      doneRef.current = true;
      onDone?.();
    }
  }, [phase, onDone]);

  const working = phase !== 'done';
  const typing = phase === 'typing';
  const barAtTop = !isDockMode && working && !barExiting;
  const morphProgress = !isDockMode && v === 'wave' && typing && chars.length ? n / chars.length : null;
  const showProcessingChrome = !isDockMode && working;

  const Caret = () => {
    if(v === 'glow') return <span className="caret-dot" />;
    if(v === 'stream') return <span className="caret-stream" />;
    if(v === 'focus') return <span className="caret-scan" />;
    return <span className="caret-bar" />;
  };

  const renderText = () => {
    if(v === 'focus'){
      return chars.map((c, i) => (
        <React.Fragment key={i}>
          {typing && i === n && <span className="caret-scan" />}
          <span className={`tw-char ${i < n ? 'tw-focus-on' : 'tw-focus-off'}`}>{c}</span>
        </React.Fragment>
      ));
    }
    const charClass = v === 'glow' ? 'tw-glow'
      : v === 'stream' ? 'tw-stream'
      : 'tw-plain';
    return (
      <>
        {chars.slice(0, n).map((c, i) => (
          <span key={i} className={`tw-char ${charClass}`}>{c}</span>
        ))}
        {phase === 'done' && motion === 'inline' && (
          <VtInlineVoicePill duration={duration} innerRef={pillRef} />
        )}
        {typing && <Caret />}
      </>
    );
  };

  return (
    <div className={'vt-async-card' + (isNew ? ' v3-card-enter' : '') + (showProcessingChrome ? ' is-working' : '') + (isDockMode ? ' is-dock-typewriter' : '')}>
      {showProcessingChrome && (
        <>
          <div className="vt-async-orb vt-async-orb-a" aria-hidden="true" />
          <div className="vt-async-orb vt-async-orb-b" aria-hidden="true" />
        </>
      )}

      {showProcessingChrome && (
        <div style={{ marginBottom: 10, position: 'relative' }}>
          <VtProcessingHeader variant={v} duration={duration} />
        </div>
      )}

      {barAtTop && (
        <div ref={voiceBarRef} className="vt-voice-msg-wrap">
          <VtVoiceMessageBar
            duration={duration}
            live={phase === 'processing'}
            morph={morphProgress}
            compact={false}
            exiting={barExiting}
          />
        </div>
      )}

      {(isDockMode || phase !== 'processing') && (
        <div className="vt-async-text">
          {renderText()}
        </div>
      )}
    </div>
  );
}

function VtAsyncRecordGroupCard({ group, isNew, onTranscribePhase }){
  const [showTags, setShowTags] = useState(false);
  const [showAi, setShowAi] = useState(false);
  const [open, setOpen] = useState(false);
  const p = group.primary || {};
  const a = group.ai;
  const variant = group.vtVariant || p.vtVariant || 'calm';
  const tags = p.tags || [];

  const handleDone = () => {
    setShowTags(true);
    setTimeout(() => {
      setShowAi(true);
      setOpen(!!group.aiDefaultOpen);
      requestAnimationFrame(() => {
        if(typeof window.scrollTimelineToBottom === 'function'){
          window.scrollTimelineToBottom('smooth');
        }
      });
    }, 120);
  };

  return (
    <div style={{
      background: '#fff', borderRadius: 14, border: `0.5px solid ${TL_LINE}`,
      padding: '11px 12px 4px', overflow: 'hidden',
    }}>
      <V3v2Header time={p.time} />
      <div style={{ marginTop: 8, paddingBottom: showAi ? 10 : 8 }}>

            aria-expanded={open}

              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <span style={{ fontSize: 10, color: TL_PRIMARY, fontWeight: 500 }}>AI</span>
            </div>
            <span style={{ fontSize: 12.5, color: TL_TEXT, fontWeight: 500, flex: 1, textAlign: 'left' }}>{a.title}</span>
            <span style={{ fontSize: 11, color: TL_MUTED }}>{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div className="v3-ai-panel-in" style={{ paddingBottom: 12 }}>
              {a.chartType && <TLChart type={a.chartType} data={a.chartData} />}
              {a.note && (
                <div style={{ fontSize: 13, color: TL_TEXT, lineHeight: 1.55, marginTop: a.chartType ? 8 : 0 }}>
                  {a.note}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

Object.assign(window, {
  VT_ASYNC_VARIANTS,
  VT_DOCK_TRANSCRIBING,
  timelineVariantFor,
  isAsyncVoiceVariant,
  VtAsyncRecordGroupCard,
  VtAsyncTranscriptionBody,
  VtInlineVoicePill,
});

<script type="text/babel">
/* === voice-transcribe-demo.jsx === */
// voice-transcribe-demo.jsx — 场景五 · 语音转写输入层（时间轴沿用场景一）
/* global React, VoiceTranscribeBar, VoiceTranscribeAtmosphere, VoiceTranscribeDockBar,
   LiveBubble, LiveGrowPanel, LiveFloat, RecordingWave, isAsyncVoiceVariant,
   VT_DOCK_TRANSCRIBING, removeTimelineEntry */

const { useState, useRef, useCallback, useEffect } = React;

const VT_TRANSCRIPTS = [
  {
    text: '今天下午突然觉得有点累，可能是昨晚睡得不太好。胃里也有点闷闷的感觉，午饭只吃了一半。',

  },
  {

    tags: [
      { kind: 'category', category: '运动', label: '跑步' },
      { kind: 'category', category: '心情', label: '放松' },
    ],
    aiTitle: '本周情绪走势',
    chartType: 'moodWeek',
    aiInsight: '今日 △ 高于上周均值 · 卵泡期 · 运动带来状态回升',
  },
  {
    text: '今天小腹隐隐有点胀，下午两点左右开始的，喝了热水之后稍微好一些。',
    tags: [{ kind: 'category', category: '症状', label: '腹胀' }],
    aiTitle: '本周情绪走势',
    chartType: 'moodWeek',
    aiInsight: '今日 ▽ 低于上周均值 · 卵泡期 · 留意水分摄入',
  },
];

const VT_CAT_ICON = {
  心情: 'mood',
  情绪: 'mood',
  饮食: 'food',
  运动: 'run',
  体征: 'sym',
  症状: 'sym',
};

let vtPromptIdx = 0;

function mapVtTagsV3(tags){
  return (tags || []).map((t) => ({
    cat: t.category || t.cat,
    val: t.label || t.val,
    icon: VT_CAT_ICON[t.category || t.cat] || 'sym',
  }));
}

function patchTimelineEntry(blocks, entryId, patch){
  return blocks.map((b) => {
    if(b.type !== 'day') return b;
    const items = b.items || b.entries || [];
    if(!items.some((it) => it.id === entryId)) return b;
    return {
      ...b,
      items: items.map((it) => (it.id === entryId ? { ...it, ...patch } : it)),
      entries: undefined,
    };
  });
}

function removeTimelineEntry(blocks, entryId){
  return blocks.map((b) => {
    if(b.type !== 'day') return b;
    return {
      ...b,
      items: (b.items || b.entries || []).filter((it) => it.id !== entryId),
      entries: undefined,
    };
  });
}

function replaceTimelineEntry(blocks, entryId, nextItem){
  return blocks.map((b) => {
    if(b.type !== 'day') return b;
    const items = b.items || b.entries || [];
    if(!items.some((it) => it.id === entryId)) return b;
    return {
      ...b,
      items: items.map((it) => (it.id === entryId ? { ...nextItem, isNew: true } : it)),
      entries: undefined,
    };
  });
}

function buildVtLiveEntry(id){
  return {
    id,
    kind: 'voice-card',
    time: window.formatNowTime(),
    isNew: true,
    vtLive: true,
    liveText: '',
    voiceText: '',
    voice: { duration: '0:00' },
    tagLayout: 't5',
  };
}

function buildVtFinalGroup(tpl, finalText, durationSec, primaryId){
  const pid = primaryId || ('vt-' + Date.now());
  return {
    kind: 'record-group',
    id: pid + '-g',
    isNew: true,
    staggerReveal: true,
    primary: {
      id: pid,
      time: window.formatNowTime(),
      kind: 'voice',
      duration: window.formatVoiceDur(durationSec),
      text: finalText,
      tags: mapVtTagsV3(tpl.tags),
    },
    ai: {
      id: pid + '-ai',
      time: window.formatNowTime(),
      kind: 'chart',
      chartType: tpl.chartType || 'moodWeek',
      title: tpl.aiTitle || '本周情绪走势',
      note: tpl.aiInsight,
    },
    aiDefaultOpen: true,
  };
}

function buildVtAsyncGroup(tpl, finalText, durationSec, variant){
  const pid = 'vt-' + Date.now();
  return {
    kind: 'record-group',
    id: pid + '-g',
    isNew: true,
    vtAsync: true,
    vtVariant: variant,
    primary: {
      id: pid,
      time: window.formatNowTime(),
      kind: 'voice',
      text: finalText,
      chars: [...finalText],
      durationSec,
      vtVariant: variant,
      tags: mapVtTagsV3(tpl.tags),
    },
    ai: {
      id: pid + '-ai',
      time: window.formatNowTime(),
      kind: 'chart',
      chartType: tpl.chartType || 'moodWeek',
      title: tpl.aiTitle || '本周情绪走势',
      note: tpl.aiInsight,
    },
    aiDefaultOpen: true,
  };
}

function resolveVoiceAppendDayId(timeline){
  const days = (timeline || []).filter((b) => b.type === 'day');
  const todayDays = days.filter((d) => d.isToday);
  if(todayDays.length) return todayDays[todayDays.length - 1].id;
  return days[days.length - 1]?.id || window.resolveEntryDayId('', timeline);
}

const VT_CHAR_MS = 34;
const VT_CHAR_JITTER = 10;
const VT_LIVE_EXIT_MS = 300;

function VoiceTranscribeInputLayer({
  variant = 'live-drop',
  timeline,
  setTimeline,
  onScrollEnd,
  onRecorded,
}){
  const [recording, setRecording] = useState(false);
  const [cancelHover, setCancelHover] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [liveText, setLiveText] = useState('');
  const [liveExiting, setLiveExiting] = useState(false);
  const [dockTranscribing, setDockTranscribing] = useState(false);

  const liveEntryIdRef = useRef(null);
  const lastAsyncGroupIdRef = useRef(null);
  const liveTplRef = useRef(null);
  const streamRef = useRef(null);
  const elapsedRef = useRef(null);
  const startTsRef = useRef(0);
  const variantRef = useRef(variant);

  variantRef.current = variant;

  useEffect(() => {
    window.__vtOnTranscribePhase = (phase) => {
      /* 底栏保持「正在转录」，等时间轴打字完成后再恢复「按住说话」 */
      if(phase === 'done'){
        setDockTranscribing(false);
      }
    };
    return () => { delete window.__vtOnTranscribePhase; };
  }, []);

  useEffect(() => {
    vtPromptIdx = 0;
    liveEntryIdRef.current = null;
    lastAsyncGroupIdRef.current = null;
    liveTplRef.current = null;
    setLiveText('');
    setLiveExiting(false);
    setDockTranscribing(false);
    setRecording(false);
    setCancelHover(false);
    setElapsed(0);
    if(streamRef.current) clearTimeout(streamRef.current);
    if(elapsedRef.current) clearInterval(elapsedRef.current);
    streamRef.current = null;
    elapsedRef.current = null;
  }, [variant]);

  const startStream = useCallback((tpl, variantAtStart) => {
    const chars = Array.from(tpl.text);
    let i = 0;
    const tick = () => {
      i += 1;
      if(i > chars.length){
        streamRef.current = null;
        return;
      }
      const slice = chars.slice(0, i).join('');
      setLiveText(slice);
      if(variantAtStart === 'live-drop' && liveEntryIdRef.current){
        const dur = (performance.now() - startTsRef.current) / 1000;
        const id = liveEntryIdRef.current;
        setTimeline((blocks) => patchTimelineEntry(blocks, id, {
          liveText: slice,
          voice: { duration: window.formatVoiceDur(Math.max(0, Math.ceil(dur))) },
        }));
        if(i === 1 || i % 2 === 0) onScrollEnd?.();
      }
      streamRef.current = setTimeout(
        tick,
        VT_CHAR_MS + Math.random() * VT_CHAR_JITTER,
      );
    };
    streamRef.current = setTimeout(tick, 70);
  }, [setTimeline, onScrollEnd]);

  const stopStream = () => {
    if(streamRef.current){
      clearTimeout(streamRef.current);
      streamRef.current = null;
    }
    if(elapsedRef.current){
      clearInterval(elapsedRef.current);
      elapsedRef.current = null;
    }
  };

  const handleStart = useCallback(() => {
    const v = variantRef.current;
    const tpl = VT_TRANSCRIPTS[vtPromptIdx % VT_TRANSCRIPTS.length];
    vtPromptIdx += 1;
    liveTplRef.current = tpl;
    setLiveText('');
    setLiveExiting(false);
    setCancelHover(false);
    setRecording(true);
    setElapsed(0);
    startTsRef.current = performance.now();
    elapsedRef.current = setInterval(() => {
      setElapsed((performance.now() - startTsRef.current) / 1000);
    }, 100);

    if(typeof isAsyncVoiceVariant === 'function' && isAsyncVoiceVariant(v)){
      return;
    }

    if(v === 'live-drop'){
      const id = 'vt-' + Date.now();
      liveEntryIdRef.current = id;
      setTimeline((blocks) => {
        const dayId = resolveVoiceAppendDayId(blocks);
        return window.appendTimelineEntry(blocks, buildVtLiveEntry(id), { dayId });
      });
      requestAnimationFrame(() => onScrollEnd?.());
    }
    startStream(tpl, v);
  }, [setTimeline, onScrollEnd, startStream]);

  const handleEnd = useCallback(() => {
    const v = variantRef.current;
    if(v === VT_DOCK_TRANSCRIBING){
      setDockTranscribing(true);
    }
    setRecording(false);
    setCancelHover(false);
    stopStream();
    const tpl = liveTplRef.current;
    if(!tpl) return;
    const finalText = liveText || tpl.text;
    const finalDuration = Math.max(2, Math.ceil(elapsed));
    onRecorded?.();

    if(typeof isAsyncVoiceVariant === 'function' && isAsyncVoiceVariant(v)){
      const entry = buildVtAsyncGroup(tpl, finalText, finalDuration, v);
      lastAsyncGroupIdRef.current = entry.id;
      setTimeline((blocks) => {
        const dayId = resolveVoiceAppendDayId(blocks);
        return window.appendTimelineEntry(blocks, entry, { dayId });
      });
      liveTplRef.current = null;
      requestAnimationFrame(() => onScrollEnd?.());
      return;
    }

    if(v === 'live-drop' && liveEntryIdRef.current){
      const id = liveEntryIdRef.current;
      const finalized = buildVtFinalGroup(tpl, finalText, finalDuration, id);
      setTimeline((blocks) => replaceTimelineEntry(blocks, id, finalized));
      liveEntryIdRef.current = null;
      setLiveText('');
      liveTplRef.current = null;
      requestAnimationFrame(() => onScrollEnd?.());
      return;
    }

    setLiveExiting(true);
    setTimeout(() => {
      setTimeline((blocks) => {
        const dayId = resolveVoiceAppendDayId(blocks);
        const entry = buildVtFinalGroup(tpl, finalText, finalDuration);
        return window.appendTimelineEntry(blocks, entry, { dayId });
      });
      setLiveExiting(false);
      setLiveText('');
      liveTplRef.current = null;
      requestAnimationFrame(() => onScrollEnd?.());
    }, VT_LIVE_EXIT_MS);
  }, [liveText, elapsed, setTimeline, onScrollEnd, onRecorded]);

  const handleCancel = useCallback(() => {
    const v = variantRef.current;
    setRecording(false);
    setCancelHover(false);
    stopStream();
    if(v === 'live-drop' && liveEntryIdRef.current){
      const id = liveEntryIdRef.current;
      setTimeline((blocks) => removeTimelineEntry(blocks, id));
      liveEntryIdRef.current = null;
    }
    setLiveText('');
    setLiveExiting(false);
    liveTplRef.current = null;
  }, [setTimeline]);

  const liveActive = recording && !liveExiting;
  const isAsync = typeof isAsyncVoiceVariant === 'function' && isAsyncVoiceVariant(variant);
  const showLiveBubble = !isAsync && (recording || liveExiting) && variant === 'live-bubble';
  const showLiveGrow = !isAsync && (recording || liveExiting) && variant === 'live-grow';
  const showLiveFloat = !isAsync && (recording || liveExiting) && variant === 'live-float';
  const showRecordingWave = isAsync && recording && variant !== VT_DOCK_TRANSCRIBING;
  const showDockBar = dockTranscribing && variant === VT_DOCK_TRANSCRIBING;

  const handleDockCancel = useCallback(() => {
    setDockTranscribing(false);
    const gid = lastAsyncGroupIdRef.current;
    if(gid){
      setTimeline((blocks) => removeTimelineEntry(blocks, gid));
      lastAsyncGroupIdRef.current = null;
    }
    liveTplRef.current = null;
  }, [setTimeline]);

  return (
    <>
      <div className="vt-overlay-root" aria-hidden={false}>
        <VoiceTranscribeAtmosphere active={recording} />
        {showRecordingWave && RecordingWave && (
          <RecordingWave
            active={recording}
            elapsed={elapsed}
            cancel={cancelHover}
            variant={variant}
          />
        )}
        {showLiveBubble && <LiveBubble text={liveText} active={liveActive} exiting={liveExiting} />}
        {showLiveGrow && <LiveGrowPanel text={liveText} active={liveActive} exiting={liveExiting} />}
      </div>
      <div className="vt-bar-wrap">
        {showLiveFloat && (
          <LiveFloat text={liveText} active={liveActive} exiting={liveExiting} />
        )}
        {showDockBar && VoiceTranscribeDockBar ? (
          <VoiceTranscribeDockBar onCancel={handleDockCancel} />
        ) : (
          <VoiceTranscribeBar
            recording={recording}
            elapsed={elapsed}
            variant={variant}
            cancelHover={cancelHover}
            onCancelHoverChange={setCancelHover}
            onStart={handleStart}
            onEnd={handleEnd}
            onCancel={handleCancel}
          />
        )}
      </div>
    </>
  );
}

Object.assign(window, {
  VoiceTranscribeInputLayer,
  patchTimelineEntry,
  removeTimelineEntry,
});

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
/* === app.jsx === */
const { useState, useEffect, useRef } = React;

function shouldShowAnalysis(hits, analysis){
  if(!analysis || !hits.length) return false;
  if(analysis.tone === 'warn') return true;
  if(hits.some(h=>h.kind==='period')) return true;
  return false;
}

function buildTimelineEntry(text, hits, opts={}){
  const analysis = hits.length ? window.chooseAnalysis(hits) : null;
  const toneMap = { warn:'yellow', brand:'brand', good:'green' };
  const tags = window.buildT5TagsFromText(text, hits);
  const entry = {
    id:'e-'+Date.now(),
    kind: opts.voice ? 'voice-card' : 'rec',
    time: window.formatNowTime(),
    isNew: true,
    tags,
    tagLayout: 't5',
  };
  if(opts.voice){
    entry.voice = opts.voice;
    entry.voiceText = text;
  } else {
    entry.body = text;
  }
  if(shouldShowAnalysis(hits, analysis)){
    entry.aiNote = {
      tone: toneMap[analysis.tone] || 'green',
      icon: analysis.points?.[0]?.icon || '💡',
      text: analysis.points?.map(p=>p.text).join(' ') || analysis.title,
    };
  }
  if(opts.quickTag){
    entry.tags = [{ label: opts.quickTag.label, cat:'symptom', emoji: opts.quickTag.emoji }, ...entry.tags];
  }
  return entry;
}

function App(){
  const [t, setTweak] = window.useTweaks({...window.__TWEAK_DEFAULTS});
  const scene = window.getDemoScene(t.demoScene);
  const voiceTranscribe = !!scene.record?.voiceTranscribe;
  const ctx = window.SCENE_CONTEXT[scene.identity] || window.SCENE_CONTEXT.period;

  const initial = window.getSceneInitialState(t.demoScene);
  const [draft, setDraft] = useState(initial.draft);
  const [timeline, setTimeline] = useState(initial.timeline);
  const [toasts, setToasts] = useState([]);
  const [showPhoto, setShowPhoto] = useState(false);
  const [activeTab, setActiveTab] = useState(initial.activeTab);
  const [showAnalysisNotice, setShowAnalysisNotice] = useState(initial.showAnalysisNotice);
  const [sisterPlayAnimation, setSisterPlayAnimation] = useState(initial.sisterPlayAnimation);
  const [sisterCycleDone, setSisterCycleDone] = useState(initial.sisterCycleDone);
  const [hideTodayGuide, setHideTodayGuide] = useState(initial.hideTodayGuide);
  const [dockExpanded, setDockExpanded] = useState(false);
  const [showSearchPage, setShowSearchPage] = useState(false);
  const scheme3FirstVisitRef = useRef(null);
  const streamRef = useRef(null);
  const timelineEndRef = useRef(null);
  const recordEnterModeRef = useRef('idle');
  const firstRecordAnimDoneRef = useRef(false);
  const moodGuideQueueRef = useRef(null);
  const dropLandRevealRef = useRef(false);
  const [firstDropAnim, setFirstDropAnim] = useState(null);

  const recordFeedback = !!scene.record.recordFeedback;

  React.useEffect(()=>{
    const handler = ()=>{
      const fn = moodGuideQueueRef.current;
      moodGuideQueueRef.current = null;
      fn?.();
    };
    window.addEventListener('moodCardStreamDone', handler);
    return ()=>window.removeEventListener('moodCardStreamDone', handler);
  }, []);

  const resetSceneState = (demoSceneId)=>{
    const next = window.getSceneInitialState(demoSceneId);
    setDraft(next.draft);
    setTimeline(next.timeline);
    setShowAnalysisNotice(next.showAnalysisNotice);
    setSisterPlayAnimation(next.sisterPlayAnimation);
    setSisterCycleDone(next.sisterCycleDone);
    setHideTodayGuide(next.hideTodayGuide);
    setActiveTab(next.activeTab);
    setShowPhoto(false);
    setShowSearchPage(false);
    scheme3FirstVisitRef.current = null;
    setFirstDropAnim(null);
    firstRecordAnimDoneRef.current = false;
    moodGuideQueueRef.current = null;
    dropLandRevealRef.current = false;
  };

  useEffect(()=>{
    resetSceneState(t.demoScene);
  }, [t.demoScene]);

  const scrollToSisterAnalysis = ()=>{
    requestAnimationFrame(()=>{
      setTimeout(()=>{
        const stream = streamRef.current;
        const el = document.getElementById('sister-analysis-anchor');
        if(stream && el){
          const top = el.getBoundingClientRect().top - stream.getBoundingClientRect().top + stream.scrollTop - 32;
          stream.scrollTo({ top: Math.max(0, top), behavior:'smooth' });
        } else if(el){
          el.scrollIntoView({ behavior:'smooth', block:'center' });
        }
      }, 180);
    });
  };

  const openSisterAnalysis = ()=>{
    if(scene.record.sisterAnalysis.trigger !== 'float-notice') return;
    recordEnterModeRef.current = 'analysis';
    setShowAnalysisNotice(false);
    setSisterCycleDone(false);
    setSisterPlayAnimation(n=>n + 1);
    setActiveTab('note');
    scrollToSisterAnalysis();
  };

  const handleSisterCycleComplete = React.useCallback(()=>{
    setSisterCycleDone(true);
    requestAnimationFrame(()=>{
      setTimeout(()=>scrollTimelineToLastItem('smooth'), 120);
    });
  }, []);

  useEffect(()=>{
    if(sisterPlayAnimation > 0){
      setSisterCycleDone(false);
      setHideTodayGuide(false);
    }
  }, [sisterPlayAnimation]);

  const scrollTimelineToLastItem = (behavior='smooth')=>{
    requestAnimationFrame(()=>{
      setTimeout(()=>{
        const el = streamRef.current;
        if(!el) return;
        const anchor = el.querySelector('.tl-rail-node.is-feed-last') || timelineEndRef.current;
        if(anchor){
          const top = anchor.getBoundingClientRect().top - el.getBoundingClientRect().top + el.scrollTop - 28;
          if(behavior === 'auto') el.scrollTop = Math.max(0, top);
          else el.scrollTo({ top: Math.max(0, top), behavior });
          return;
        }
        if(behavior === 'auto') el.scrollTop = el.scrollHeight;
        else el.scrollTo({ top: el.scrollHeight, behavior });
      }, 80);
    });
  };

  const scrollTimelineToBottom = (behavior='auto')=>{
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const el = streamRef.current;
        if(!el) return;
        const top = Math.max(0, el.scrollHeight - el.clientHeight);
        if(behavior === 'auto') el.scrollTop = top;
        else el.scrollTo({ top, behavior });
      });
    });
  };

  useEffect(()=>{
    window.scrollTimelineToBottom = scrollTimelineToBottom;
    return ()=>{ delete window.scrollTimelineToBottom; };
  });

  const scrollTimelineToEnd = (behavior='smooth')=>{
    if(voiceTranscribe) scrollTimelineToBottom(behavior === 'smooth' ? 'smooth' : 'auto');
    else scrollTimelineToLastItem(behavior);
  };

  const handleTabChange = (tab)=>{
    if(tab === 'note' && activeTab !== 'note'){
      recordEnterModeRef.current = 'manual';
    }
    if(tab !== 'note'){
      recordEnterModeRef.current = 'idle';
    }
    setActiveTab(tab);
  };

  const showRecordEmpty = !!(scene.record.emptyState && window.isTimelineEmpty(timeline));
  const showRecordBlank = !!scene.record.blankState;
  const showBlankEmpty = showRecordBlank && window.isTimelineEmpty(timeline);

  useEffect(()=>{
    if(activeTab !== 'note') return;
    if(showRecordEmpty || showBlankEmpty) return;
    if(voiceTranscribe){
      const tm = setTimeout(()=>scrollTimelineToBottom('auto'), 80);
      return ()=>clearTimeout(tm);
    }
    if(recordEnterModeRef.current === 'analysis'){
      recordEnterModeRef.current = 'idle';
      return;
    }
    const tm = setTimeout(()=>scrollTimelineToLastItem('smooth'), 220);
    recordEnterModeRef.current = 'idle';
    return ()=>clearTimeout(tm);
  }, [activeTab, showRecordEmpty, showBlankEmpty]);

  useEffect(()=>{
    if(showRecordEmpty || showBlankEmpty) return;
    if(voiceTranscribe){
      const t1 = setTimeout(()=>scrollTimelineToBottom('auto'), 50);
      const t2 = setTimeout(()=>scrollTimelineToBottom('auto'), 240);
      return ()=>{ clearTimeout(t1); clearTimeout(t2); };
    }
    const tm = setTimeout(()=>scrollTimelineToEnd('auto'), 120);
    return ()=>clearTimeout(tm);
  }, [t.demoScene, showRecordEmpty, showBlankEmpty, voiceTranscribe]);

  useEffect(()=>{
    if(showRecordEmpty || showBlankEmpty) return;
    if(voiceTranscribe) return;
    scrollTimelineToEnd('smooth');
  }, [timeline, showRecordEmpty, showBlankEmpty, voiceTranscribe]);

  const pushToast = (opts)=>{
    const id = Math.random().toString(36).slice(2);
    setToasts(ts=>[...ts, {id, ...opts}]);
    setTimeout(()=>{
      setToasts(ts=>ts.map(x=>x.id===id?{...x,bye:true}:x));
      setTimeout(()=>setToasts(ts=>ts.filter(x=>x.id!==id)), 220);
    }, 2400);
  };

  const markUserRecorded = ()=>{
    if(scene.record.todayGuide) setHideTodayGuide(true);
  };

  const isScheme3 = scene.record.blankScheme === 3;
  const isScheme1 = scene.record.blankScheme === 1;
  const showScheme1Hints = isScheme1 && showBlankEmpty;
  if(isScheme3 && scheme3FirstVisitRef.current === null){
    scheme3FirstVisitRef.current = !!window.shouldShowScheme3Bubble?.();
  }

  const pushToTimeline = (entry, text)=>{
    const dayId = window.resolveEntryDayId(text || entry.body || '', timeline);
    setTimeline(blocks=>window.appendTimelineEntry(blocks, entry, { dayId }));
  };

  const revealFirstDropEntry = React.useCallback(()=>{
    if(dropLandRevealRef.current) return;
    dropLandRevealRef.current = true;
    setTimeline(blocks=>blocks.map(b=>{
      if(b.type !== 'day') return b;
      const items = (b.items || b.entries || []).map(it=>{
        if(it.id !== firstDropAnim?.entryId) return it;
        const next = { ...it };
        delete next.hideBodyUntilDrop;
        delete next.pendingDrop;
        if(it.kind === 'mood-insight' || it.kind === 'record-group') next.isNew = true;
        return next;
      });
      return { ...b, items, entries: undefined };
    }));
    requestAnimationFrame(()=>{
      setTimeout(()=>scrollTimelineToLastItem('smooth'), 80);
    });
  }, [firstDropAnim]);

  const handleFirstDropLand = React.useCallback(()=>{
    revealFirstDropEntry();
  }, [revealFirstDropEntry]);

  const handleFirstDropComplete = React.useCallback(()=>{
    setFirstDropAnim(null);
    dropLandRevealRef.current = false;
  }, []);

  const tryStartFirstDrop = (entry, text)=>{
    if(!recordFeedback || firstRecordAnimDoneRef.current) return false;
    firstRecordAnimDoneRef.current = true;

    const dayId = timeline.find(b=>b.type==='day' && b.isToday)?.id
      || window.resolveEntryDayId(text || entry.body || '', timeline);

    const pending = (entry.kind === 'mood-insight' || entry.kind === 'record-group')
      ? { ...entry, pendingDrop: true, isNew: false }
      : { ...entry, hideBodyUntilDrop: true, isNew: true };

    setFirstDropAnim({ entryId: pending.id });
    setTimeline(blocks=>window.appendTimelineEntry(blocks, pending, { dayId }));
    return true;
  };

  const submitText = (textOverride, opts={})=>{
    const text = (textOverride || draft).trim();
    if(!text) return;

    const hits = window.extractKeywords(text);
    setDraft('');
    markUserRecorded();
    const entry = buildTimelineEntry(text, hits, opts);
    if(recordFeedback && tryStartFirstDrop(entry, text)) return;
    pushToTimeline(entry, text);
  };

  const submitVoice = (transcript, durSec)=>{
    markUserRecorded();
    if(scene.id === 'record-direct' && window.buildScene2VoiceEntry){
      const entry = window.buildScene2VoiceEntry(durSec);
      pushToTimeline(entry, entry.voiceText);
      return;
    }
    const text = transcript.trim();
    if(!text) return;
    const hits = window.extractKeywords(text);
    const entry = buildTimelineEntry(text, hits, {
      voice: { duration: window.formatVoiceDur(durSec) },
    });
    if(recordFeedback && tryStartFirstDrop(entry, text)) return;
    pushToTimeline(entry, text);
  };

  const submitQuickMark = (mark)=>{
    submitText(mark.text, { quickTag: { emoji: mark.emoji, label: mark.label } });
  };

  const collectTodayQuickMoodHistory = ()=>{
    const today = timeline.find(b=>b.type==='day' && b.isToday);
    if(!today) return [];
    const items = today.items || today.entries || [];
    return items
      .filter(it=>it && it.quickMood)
      .map(it=>it.quickMood);
  };

  const appendMoodGuide = (guideText, dayId)=>{
    moodGuideQueueRef.current = ()=>{
      const guide = {
        id: 'e-mood-guide-' + Date.now(),
        kind: 'guide',
        isNew: true,
        alwaysShow: true,
        text: guideText,
      };
      setTimeline(blocks=>window.appendTimelineEntry(blocks, guide, { dayId }));
      requestAnimationFrame(()=>{
        setTimeout(()=>{
          window.scrollFeedContentIntoView?.(
            document.querySelector('.tl-rail-node.is-feed-last .tl-rail-guide-text')
          );
        }, 80);
      });
    };
  };

  const submitMoodRecord = (moods)=>{
    markUserRecorded();
    if(recordFeedback){
      const history = collectTodayQuickMoodHistory();
      const isFirst = history.length === 0;
      if(!isFirst) moodGuideQueueRef.current = null;
      const entry = isFirst
        ? window.createMoodRecordEntry(moods)
        : window.createMoodQuickEntry(moods, history);
      const dayId = timeline.find(b=>b.type==='day' && b.isToday)?.id
        || window.resolveEntryDayId('', timeline);
      if(tryStartFirstDrop(entry, '')){
        if(isFirst && entry.guideText) appendMoodGuide(entry.guideText, dayId);
        return;
      }
      setTimeline(blocks=>{
        const cleaned = !isFirst ? blocks.map(b=>{
          if(b.type !== 'day') return b;
          const items = (b.items || b.entries || []).filter(it=>!(it.kind === 'guide' && it.alwaysShow));
          return { ...b, items, entries: undefined };
        }) : blocks;
        return window.appendTimelineEntry(cleaned, entry, { dayId });
      });
      if(isFirst && entry.guideText) appendMoodGuide(entry.guideText, dayId);
      return;
    }
    const entry = window.createMoodRecordEntryLegacy(moods);
    const dayId = timeline.find(b=>b.type==='day' && b.isToday)?.id
      || window.resolveEntryDayId('', timeline);
    setTimeline(blocks=>window.appendTimelineEntry(blocks, entry, { dayId }));
  };

  const submitSymptomRecord = (symptoms)=>{
    markUserRecorded();
    const entry = window.createSymptomRecordEntry(symptoms);
    if(recordFeedback && tryStartFirstDrop(entry, entry.body || '')) return;
    const dayId = timeline.find(b=>b.type==='day' && b.isToday)?.id
      || window.resolveEntryDayId('', timeline);
    setTimeline(blocks=>window.appendTimelineEntry(blocks, entry, { dayId }));
  };

  const submitWeightRecord = (payload)=>{
    markUserRecorded();
    const entry = window.createWeightRecordEntry(payload);
    if(recordFeedback && tryStartFirstDrop(entry, entry.body || '')) return;
    const dayId = timeline.find(b=>b.type==='day' && b.isToday)?.id
      || window.resolveEntryDayId('', timeline);
    setTimeline(blocks=>window.appendTimelineEntry(blocks, entry, { dayId }));
  };

  const submitFoodRecord = (foods)=>{
    markUserRecorded();
    const entry = window.createFoodRecordEntry(foods);
    if(recordFeedback && tryStartFirstDrop(entry, entry.body || '')) return;
    const dayId = timeline.find(b=>b.type==='day' && b.isToday)?.id
      || window.resolveEntryDayId('', timeline);
    setTimeline(blocks=>window.appendTimelineEntry(blocks, entry, { dayId }));
  };

  const submitPhoto = ()=>{
    setShowPhoto(false);
    markUserRecorded();
    const entry = {
      id:'e-'+Date.now(),
      time: window.formatNowTime(),
      body:'',
      photo:true, photoTone:'warm', photoEmoji:'🌸',
      isNew: true,
      tags:[{ emoji:'📷', label:'照片' }],
    };
    pushToTimeline(entry, '');
  };

  const sceneForHealth = {
    status: ctx.status,
    healthTitle: ctx.healthTitle,
    healthDesc: ctx.healthDesc,
    phaseLabel: ctx.cycle.label,
    phaseKind: ctx.cycle.kind,
    dayNum: ctx.cycle.dayNum,
    dayLbl: '今日',
  };

  const showCalendar = scene.calendar.enabled && activeTab === 'cal';
  const showFloatNotice = scene.floatNotice.enabled && showAnalysisNotice && activeTab === 'cal';
  const showRecordShell = activeTab === 'note';
  const showTodayGuide = scene.record.todayGuide && !hideTodayGuide;

  const I = window.Icon;
  const DemoSceneBar = window.DemoSceneBar;
  const RecordEmptyScreen = window.RecordEmptyScreen;
  const RecordBlankStream = window.RecordBlankStream;
  const SearchPage = window.SearchPage;
  const VoiceTranscribeInputLayer = window.VoiceTranscribeInputLayer;

  const openSearchPage = ()=>setShowSearchPage(true);
  const closeSearchPage = ()=>setShowSearchPage(false);
  const showScheme3Bubble = isScheme3 && showBlankEmpty
    && window.shouldShowScheme3Bubble?.();
  const highlightScheme3Input = isScheme3 && showBlankEmpty
    && scheme3FirstVisitRef.current;

  return (
    <>
      <div className="phone">
        <StatusBar/>

      {showCalendar && (
        <CalendarPage
          key={scene.id}
          periodFlowEnabled={scene.calendar.periodFlow}
          onAnalysisReady={()=>setShowAnalysisNotice(true)}
          onPeriodReset={()=>setShowAnalysisNotice(false)}
        />
      )}

      {scene.floatNotice.enabled && (
        <FloatNotice
          show={showFloatNotice}
          onOpen={openSisterAnalysis}
          onClose={()=>setShowAnalysisNotice(false)}
        />
      )}

      <div
        className={'suiji-shell suiji-shell--scene'+(showRecordEmpty ? ' suiji-shell--empty' : '')+(showRecordBlank ? ' suiji-shell--blank' : '')+(voiceTranscribe ? ' suiji-shell--voice' : '')+(showRecordShell ? '' : ' app-view-hidden')+(dockExpanded?' is-mood-expanded':'')}
        aria-hidden={!showRecordShell}
      >
        {showRecordEmpty ? (
          <RecordEmptyScreen onVoiceDone={submitVoice}/>
        ) : showRecordBlank ? (
        <>
        <RecordBlankStream
          streamRef={streamRef}
          timelineEndRef={timelineEndRef}
          timeline={timeline}
          scene={scene}
          onOpenCalendar={()=>setActiveTab('cal')}
          onOpenSearch={openSearchPage}
          sisterPlayAnimation={sisterPlayAnimation}
          sisterCycleDone={sisterCycleDone}
          hideTodayGuide={!showTodayGuide}
          onSisterCycleComplete={handleSisterCycleComplete}
        />
        {showScheme1Hints ? (
          <div className="rb-s1-curly-arrow" aria-hidden="true">
            <img src="assets/curly-arrow-pink.png" alt=""/>
          </div>
        ) : null}
        <DockPublisher
          draft={draft}
          onDraft={setDraft}
          onSend={()=>submitText()}
          onQuickMark={submitQuickMark}
          onMoodConfirm={submitMoodRecord}
          onSymptomConfirm={submitSymptomRecord}
          onWeightConfirm={submitWeightRecord}
          onFoodConfirm={submitFoodRecord}
          onVoiceDone={submitVoice}
          onPhoto={()=>setShowPhoto(true)}
          onDockExpandedChange={setDockExpanded}
          activeTab={activeTab}
          defaultInputMode={showScheme1Hints ? 'voice' : 'text'}
          showScheme3Bubble={showScheme3Bubble}
          highlightScheme3Input={highlightScheme3Input}
        />
        </>
        ) : (
        <>
        <div className="stream-header">
          <div className="stream-header-side"/>
          <h1 className="stream-title">点滴</h1>
          <div className="stream-actions">
            <button
              className="stream-action"
              aria-label="搜索"
              type="button"
              onClick={openSearchPage}
            >
              <I name="search" size={20} stroke={1.7}/>
            </button>
          </div>
        </div>
        <div className="suiji-stream" ref={streamRef}>

          {scene.record.showHealthCard && (
            <div className="stream-health">
              <HealthCard scene={sceneForHealth}/>
            </div>
          )}

          <TimelineStream
            blocks={timeline}
            endRef={timelineEndRef}
            sisterPlayAnimation={sisterPlayAnimation}
            sisterCycleDone={sisterCycleDone}
            hideTodayGuide={!showTodayGuide}
            onSisterCycleComplete={handleSisterCycleComplete}
            firstDropAnim={recordFeedback ? firstDropAnim : null}
            onFirstDropLand={recordFeedback ? handleFirstDropLand : undefined}
            onFirstDropComplete={recordFeedback ? handleFirstDropComplete : undefined}
          />
        </div>

        {!voiceTranscribe && (
        <DockPublisher
          draft={draft}
          onDraft={setDraft}
          onSend={()=>submitText()}
          onQuickMark={submitQuickMark}
          onMoodConfirm={submitMoodRecord}
          onSymptomConfirm={submitSymptomRecord}
          onWeightConfirm={submitWeightRecord}
          onFoodConfirm={submitFoodRecord}
          onVoiceDone={submitVoice}
          onPhoto={()=>setShowPhoto(true)}
          onDockExpandedChange={setDockExpanded}
          activeTab={activeTab}
        />
        )}
        </>
        )}
      </div>

      {voiceTranscribe && showRecordShell && !showRecordEmpty && !showRecordBlank && VoiceTranscribeInputLayer && (
        <VoiceTranscribeInputLayer
          variant={scene.voiceVariant}
          timeline={timeline}
          setTimeline={setTimeline}
          onScrollEnd={()=>scrollTimelineToBottom('smooth')}
          onRecorded={markUserRecorded}
        />
      )}

      {showSearchPage && (
        <SearchPage timeline={timeline} onClose={closeSearchPage}/>
      )}

      {showPhoto && <PhotoSheet onCancel={()=>setShowPhoto(false)} onPick={submitPhoto}/>}

      <Toast toasts={toasts}/>
      {!showSearchPage && <TabBar active={activeTab} onChange={handleTabChange}/>}
      </div>

      {!window.__STANDALONE_LOCKED_SCENE && (
        <DemoSceneBar
          value={t.demoScene}
          onChange={(v)=>setTweak('demoScene', v)}
          description={scene.description}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
