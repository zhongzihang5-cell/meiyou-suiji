<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美柚 · 场景导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','SF Pro Text',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#f2f2f5;min-height:100vh;padding:32px 16px 24px;color:rgba(0,0,0,0.8);-webkit-font-smoothing:antialiased}
.wrap{max-width:520px;margin:0 auto}
.head{margin-bottom:20px}
.head h1{font-size:28px;font-weight:500;margin-bottom:6px;color:#323232}
.head p{font-size:13px;color:#999}
.card{
  display:block;background:#fff;border-radius:12px;padding:14px 16px;
  margin-bottom:8px;text-decoration:none;color:inherit;
  box-shadow:0 2px 10px rgba(50,50,50,0.06);
  transition:transform 0.15s;
}
.card:active{transform:scale(0.985)}
.row{display:flex;align-items:center;gap:12px}
.emoji{
  width:44px;height:44px;border-radius:10px;
  background:rgba(255,77,136,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.info{flex:1;min-width:0}
.title{font-size:15px;font-weight:500;color:#323232;margin-bottom:3px}
.desc{font-size:12px;color:#999;line-height:1.4}
.arrow{color:#c8c8cc;font-size:20px;flex-shrink:0}
.tag{
  display:inline-block;font-size:10px;padding:1px 6px;border-radius:999px;
  background:rgba(255,77,136,0.08);color:#ff4d88;margin-left:6px;
}
.empty{text-align:center;color:#999;padding:40px 0;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>场景导航</h1>
    <p>选择要预览的功能演示</p>
  </div>
  <div id="scene-list"></div>
</div>

<script>
fetch('./scenes.json?v=' + Date.now())
  .then(r => r.json())
  .then(scenes => {
    const list = document.getElementById('scene-list');
    if (!scenes.length) {
      list.innerHTML = '<div class="empty">暂无场景</div>';
      return;
    }
    list.innerHTML = scenes.map(s => `
      <a href="${s.url}" class="card">
        <div class="row">
          <div class="emoji">${s.emoji || '✨'}</div>
          <div class="info">
            <div class="title">${s.name}${s.tag ? `<span class="tag">${s.tag}</span>` : ''}</div>
            <div class="desc">${s.desc || ''}</div>
          </div>
          <span class="arrow">›</span>
        </div>
      </a>
    `).join('');
  })
  .catch(e => {
    document.getElementById('scene-list').innerHTML = '<div class="empty">加载失败：' + e.message + '</div>';
  });
</script>
</body>
</html>
