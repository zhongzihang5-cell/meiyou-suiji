const TYPEWRITER_MS = 68;

function segmentsFullText(segments){
  return (segments || []).map(s => s.text).join('');
}

function renderTypedSegments(segments, len){
  let left = len;
  const out = [];
  (segments || []).forEach((seg, i) => {
    if(left <= 0) return;
    const take = Math.min(left, seg.text.length);
    if(take <= 0) return;
    const chunk = seg.text.slice(0, take);
    left -= take;
    if(seg.bold) out.push(<b key={i}>{chunk}</b>);
    else out.push(<React.Fragment key={i}>{chunk}</React.Fragment>);
  });
  return out;
}

function TypewriterText({text, segments, active, charMs = TYPEWRITER_MS, onComplete, className}){
  const full = segments ? segmentsFullText(segments) : (text || '');
  const [len, setLen] = React.useState(active ? 0 : full.length);
  const doneRef = React.useRef(!active);
  const onCompleteRef = React.useRef(onComplete);
  onCompleteRef.current = onComplete;

  React.useEffect(()=>{
    if(!active){
      setLen(full.length);
      if(!doneRef.current){
        doneRef.current = true;
        onCompleteRef.current?.();
      }
      return;
    }
    doneRef.current = false;
    setLen(0);
    if(!full.length){
      doneRef.current = true;
      onCompleteRef.current?.();
      return;
    }
    let i = 0;
    let timer = null;
    const tick = ()=>{
      i += 1;
      setLen(i);
      if(i >= full.length){
        doneRef.current = true;
        onCompleteRef.current?.();
        return;
      }
      timer = setTimeout(tick, charMs);
    };
    timer = setTimeout(tick, charMs);
    return ()=>{ if(timer) clearTimeout(timer); };
  }, [text, segments, active, charMs, full]);

  const showCursor = active && len < full.length;
  const content = segments ? renderTypedSegments(segments, len) : full.slice(0, len);

  return (
    <span className={className}>
      {content}
      {showCursor && <span className="tl-typewriter-cursor" aria-hidden="true"/>}
    </span>
  );
}

function TypewriterBody({text, active, onComplete, className}){
  if(!text) return null;
  if(!active){
    return <div className={className}>{text}</div>;
  }
  return (
    <div className={className}>
      <TypewriterText text={text} active onComplete={onComplete}/>
    </div>
  );
}

// ============ 记录标签体系 ============
// 分类 tone：period/flow→brand  symptom/care→coral  mood→lavender
//              sleep→sky  fitness/appetite/weight/diet→mint  care→sun

const TAG_TONES = {
  period:'brand', flow:'brand',
  symptom:'neutral', care:'neutral',
  mood:'neutral',
  sleep:'neutral',
  fitness:'neutral', appetite:'neutral', weight:'neutral', diet:'neutral',
};

const TAG_CAT_EMOJI = {
  period:'🩸', flow:'💧', symptom:'🤕', mood:'💭',
  sleep:'😴', fitness:'🏃', appetite:'🍽️',
  weight:'⚖️', diet:'🥗', care:'💆',
};

const TAG_REGISTRY = {
  '跑步':       { cat:'fitness', emoji:'🏃' },
  '愉快':       { cat:'mood',    emoji:'😊' },
  '食欲旺盛':   { cat:'appetite',emoji:'🍽️' },
  '食欲变化':   { cat:'appetite',emoji:'🍽️' },
  '腹胀':       { cat:'symptom', emoji:'😣' },
  '低落':       { cat:'mood',    emoji:'😔' },
  '心情 平静':  { cat:'mood',    emoji:'😌' },
  '腰酸':       { cat:'symptom', emoji:'🦴' },
  '疲惫':       { cat:'symptom', emoji:'😮‍💨' },
  '睡眠':       { cat:'sleep',   emoji:'😴' },
  '睡眠偏少':   { cat:'sleep',   emoji:'😴' },
  '月经来了':   { cat:'period',  emoji:'🩸' },
  '经量 偏少':  { cat:'flow',    emoji:'💧' },
  '经量正常':   { cat:'flow',    emoji:'💧' },
  '热敷':       { cat:'care',    emoji:'♨️' },
  '缓解':       { cat:'care',    emoji:'😌' },
  '体重':       { cat:'weight',  emoji:'⚖️' },
  '饮食':       { cat:'diet',    emoji:'🥗' },
  '卡路里':     { cat:'diet',    emoji:'🔥' },
  '经前':       { cat:'care',    emoji:'📅' },
  '经前提醒':   { cat:'care',    emoji:'📅' },
};

function inferTagCat(label){
  const s = label || '';
  if(/月经|经期/.test(s)) return 'period';
  if(/经量/.test(s)) return 'flow';
  if(/跑步|运动/.test(s)) return 'fitness';
  if(/食欲/.test(s)) return 'appetite';
  if(/腹胀|腰酸|疲惫|痛|不适/.test(s)) return 'symptom';
  if(/心情|愉快|低落|情绪|平静/.test(s)) return 'mood';
  if(/睡眠/.test(s)) return 'sleep';
  if(/体重/.test(s)) return 'weight';
  if(/饮食|卡路里/.test(s)) return 'diet';
  if(/热敷|缓解|经前/.test(s)) return 'care';
  return 'symptom';
}

function resolveTag(tag){
  const label = tag.label || '';
  const preset = TAG_REGISTRY[label] || {};
  const cat = tag.cat || preset.cat || inferTagCat(label);
  const emoji = tag.emoji || preset.emoji || TAG_CAT_EMOJI[cat] || '·';
  const tone = tag.tone || TAG_TONES[cat] || 'neutral';
  return { label, emoji, cat, tone };
}

function inferTagTone(label){
  return TAG_TONES[inferTagCat(label)] || 'neutral';
}

function tagLabel(t){
  const r = resolveTag(t);
  return r.emoji ? (r.emoji + ' ' + r.label) : r.label;
}

function RecordedTags({tags, layout}){
  const visible = (tags || []).filter(t => resolveTag(t).cat !== 'care');

  const isRows = layout === 'rows';

  return (
    <div className={'tl-tags'+(isRows ? ' tl-tags-rows' : '')+(isT5 ? ' tl-tags-t5' : '')}>
      {visible.map((t, i) => {
        const r = resolveTag(t);
        return (
          <span key={i} className={'tl-tag tone-'+r.tone+(isRows ? ' is-row':'')+(isT5 ? ' is-t5':'')}>
            {isT5 ? (
              tagLabel(t)
            ) : (
              <>
                <span className="tl-tag-ico" aria-hidden="true">{r.emoji}</span>
                {r.label}
              </>
            )}
          </span>
        );
      })}
    </div>
  );
}

function SisterSignalCard({animated}){
  const lights = [
    {color:'green', label:'稳定', range:'21–35天'},
    {color:'yellow', label:'轻度波动', range:['18–20天','36–45天']},
    {color:'orange', label:'明显波动', range:['15–17天','46–90天']},
    {color:'purple', label:'建议关注', range:['<15天','>90天']},
  ];
  const done = !animated;
  const [activeColor, setActiveColor] = React.useState(done ? 'green' : null);
  const [isFinal, setIsFinal] = React.useState(done);

  React.useEffect(()=>{
    if(!animated) return;
    setActiveColor(null);
    setIsFinal(false);
    const sequence = ['green', 'yellow', 'orange', 'purple', 'green'];
    const STEP_MS = 380;
    let step = 0;
    let timer = null;

    function tick(){
      if(step >= sequence.length){
        setActiveColor('green');
        setIsFinal(true);
        return;
      }
      setActiveColor(sequence[step]);
      step += 1;
      timer = setTimeout(tick, STEP_MS);
    }
    tick();
    return ()=>{ if(timer) clearTimeout(timer); };
  }, [animated]);

  return (
    <div className="chart-block" style={{background:'transparent', border:'none', padding:0}}>
      <div className={'signal-card'+(animated && !isFinal?' sc-animating':'')}>
        <div className="sc-head">
          <span className="sc-title">
            <img className="sc-icon" src={SC_ICON} width="18" height="18" alt="" aria-hidden="true"/>
            周期天数评估
          </span>
        </div>
        <div className="sc-lights">
          {lights.map((l, i) => (
            <div
              key={i}
              className={'sc-light'+(l.color === 'green' && isFinal ? ' sc-final' : '')}
              data-light={l.color}
            >
              <div
                className={'sc-bulb'+(activeColor === l.color ? ' sc-on' : '')}
                data-color={l.color}
              />
              <div className="sc-label">{l.label}</div>
              <div className="sc-range">
                {Array.isArray(l.range)
                  ? l.range.map((line, j) => (
                      <React.Fragment key={j}>
                        {j > 0 && <br/>}
                        {line}
                      </React.Fragment>
                    ))
                  : l.range}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const SISTER_LEAD = '以下是本次月经情况的分析。先看一下你最近3个周期的情况：';

const SISTER_PARA1 = [
  { text:'你最近三次周期分别是' },

];

const SISTER_CLOSING = [
  { text:'这次周期天数落在' },
  { text:'21–35天的理想范围', bold:true },
  { text:'内。很棒哦，继续保持现在的健康生活节奏就可以。' },
];

function SisterAnalysisContent({playAnimation, onCycleComplete, animateText}){
  const [animated, setAnimated] = React.useState(false);
  const [leadDone, setLeadDone] = React.useState(!animateText);
  const [chartDone, setChartDone] = React.useState(!animateText);
  const [para1Done, setPara1Done] = React.useState(!animateText);
  const [showSignal, setShowSignal] = React.useState(!playAnimation && !animateText);
  const [showClosing, setShowClosing] = React.useState(!playAnimation && !animateText);
  const [closingDone, setClosingDone] = React.useState(!animateText);
  const prevPlayRef = React.useRef(playAnimation);
  const onCycleCompleteRef = React.useRef(onCycleComplete);
  onCycleCompleteRef.current = onCycleComplete;

  React.useEffect(()=>{
    if(!animateText){
      setLeadDone(true);
      setChartDone(true);
      setPara1Done(true);
      setClosingDone(true);
      onCycleCompleteRef.current?.();
      return;
    }
    if(playAnimation > prevPlayRef.current){
      setLeadDone(false);
      setChartDone(false);
      setPara1Done(false);
      setClosingDone(false);
      setShowSignal(false);
      setShowClosing(false);
      setAnimated(false);
    }
    prevPlayRef.current = playAnimation;
  }, [animateText, playAnimation]);

  React.useEffect(()=>{
    if(!playAnimation) return;
    if(animateText && !leadDone) return;
    setAnimated(true);
    setShowSignal(false);
    setShowClosing(false);
  }, [playAnimation, animateText, leadDone]);

  React.useEffect(()=>{
    if(!animateText || !para1Done) return;
    const delay = playAnimation ? 480 : 320;
    const t = setTimeout(()=>setShowSignal(true), delay);
    return ()=>clearTimeout(t);
  }, [animateText, para1Done, playAnimation]);

  React.useEffect(()=>{
    if(!animateText || !showSignal) return;
    const delay = playAnimation ? 2400 : 880;
    const t = setTimeout(()=>setShowClosing(true), delay);
    return ()=>clearTimeout(t);
  }, [animateText, showSignal, playAnimation]);

  React.useEffect(()=>{
    if(!animateText || !showClosing || !closingDone) return;
    onCycleCompleteRef.current?.();
  }, [animateText, showClosing, closingDone]);

  const showChart = !animateText || leadDone;
  const showPara1 = !animateText || (leadDone && chartDone);

  return (
    <div className="tl-t5-analysis-body">
      <p className="tl-t5-analysis-lead">
        {animateText && !leadDone ? (
          <TypewriterText text={SISTER_LEAD} active onComplete={()=>setLeadDone(true)}/>
        ) : SISTER_LEAD}
      </p>
      {showChart && (
        <SisterCycleChart
          animated={animated}
          onComplete={()=>setChartDone(true)}
        />
      )}
      {showPara1 && (
        <p className="tl-t5-analysis-text">
          {animateText && !para1Done ? (
            <TypewriterText
              segments={SISTER_PARA1}
              active
              onComplete={()=>setPara1Done(true)}
            />
          ) : (
            renderTypedSegments(SISTER_PARA1, segmentsFullText(SISTER_PARA1).length)
          )}
        </p>
      )}
      {showSignal && (!animateText || para1Done) && (
        <>
          <div className="tl-t5-chart-divider" role="separator"/>
          <SisterSignalCard animated={animated}/>
        </>
      )}
      {showClosing && (!animateText || para1Done) && (
        <p className="tl-t5-analysis-text">
          {animateText && !closingDone ? (
            <TypewriterText
              segments={SISTER_CLOSING}
              active
              onComplete={()=>setClosingDone(true)}
            />
          ) : (
            renderTypedSegments(SISTER_CLOSING, segmentsFullText(SISTER_CLOSING).length)
          )}
        </p>
      )}
    </div>
  );
}

function SisterAnalysisCard({playAnimation, onCycleComplete}){
  return (
    <div className="sister-bubble" id="sister-analysis-anchor">
      <SisterAnalysisContent
        playAnimation={playAnimation}
        onCycleComplete={onCycleComplete}
      />
    </div>
  );
}

Object.assign(window, {
  TlCardTime, TypewriterText, TypewriterBody, TlVoiceBar, TlVoicePlayBtn, TlVoiceInline, RecordedTags, AiNoteSection, RecordPhoto, resolveTag,
  SegmentedRecordCard, VoiceRecordCard, SisterAnalysisCard, SisterAnalysisContent,
});

</script>

      { id:'weak', label:'浑身无力', emoji:'😮‍💨', bg:'#ffe8f0' },
      { id:'cold', label:'身体冷', emoji:'🥶', bg:'#ffe8f0' },
      { id:'tired', label:'疲惫', emoji:'😩', bg:'#ffe8f0' },
      { id:'urine', label:'尿频', emoji:'🚽', bg:'#ffe8f0' },
      { id:'constipation', label:'便秘', emoji:'😣', bg:'#ffe8f0' },
      { id:'back', label:'腰酸', emoji:'🦴', bg:'#ffe8f0' },
      { id:'dizzy', label:'眩晕', emoji:'😵', bg:'#ffe8f0' },
    ],

  {
    title:'阴道分泌物',
    items:[
      { id:'dry', label:'干燥', emoji:'🏜️', bg:'#ffe8f0' },
      { id:'sticky', label:'粘稠', emoji:'🍯', bg:'#ffe8f0' },
      { id:'creamy', label:'乳液状', emoji:'🥛', bg:'#ffe8f0' },
      { id:'eggwhite', label:'蛋清状', emoji:'🥚', bg:'#ffe8f0' },
    ],
  },
];

const SYMPTOM_OPTIONS = SYMPTOM_SECTIONS.flatMap(s=>s.items);

const WEIGHT_KEYS = ['1','2','3','4','5','6','7','8','9','.','0','⌫'];

function DockSheetFoot({disabled, onSubmit, label}){
  return (
    <div className="dock-sheet-foot">
      <button
        type="button"
        className="dock-sheet-submit"
        disabled={disabled}
        onClick={onSubmit}
      >
        {label || '发送'}
      </button>
    </div>
  );
}

function DockSheetClose({onCancel}){
  const I = window.Icon;
  return (
    <button type="button" className="dock-sheet-close" onClick={onCancel} aria-label="关闭">
      <I name="close" size={18} stroke={2}/>
    </button>
  );
}

function SymptomCheck(){
  return (
    <span className="dock-picker-check" aria-hidden="true">
      <svg viewBox="0 0 12 12" width="8" height="8">
        <path d="M2.5 6.2 4.8 8.5 9.5 3.5" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </span>
  );
}

function DockSymptomPicker({onConfirm, onCancel}){
  const [selectedIds, setSelectedIds] = React.useState([]);
  const selected = SYMPTOM_OPTIONS.filter(s=>selectedIds.includes(s.id));

  const toggle = (id)=>{
    setSelectedIds(prev=>(
      prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]
    ));
  };

  return (
    <div className="dock-sheet dock-symptom-sheet">
      <div className="dock-sheet-hd">
        <h2 className="dock-sheet-title">症状</h2>
        <DockSheetClose onCancel={onCancel}/>
      </div>
      <div className="dock-symptom-scroll">
        {SYMPTOM_SECTIONS.map((section)=>(
          <div key={section.title} className="dock-symptom-group">
            <h3 className="dock-symptom-group-title">{section.title}</h3>
            <div className="dock-symptom-grid">
              {section.items.map((item)=>{
                const isSelected = selectedIds.includes(item.id);
                return (
                  <button
                    key={item.id}
                    type="button"
                    className={'dock-symptom-cell'+(isSelected?' is-selected':'')}
                    onClick={()=>toggle(item.id)}
                    aria-pressed={isSelected}
                  >
                    <span className="dock-symptom-ico-wrap">
                      <span className="dock-symptom-ico" style={{'--sym-bg': item.bg}}>
                        {item.emoji}
                      </span>
                      {isSelected && <SymptomCheck/>}
                    </span>
                    <span className="dock-symptom-lbl">{item.label}</span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <DockSheetFoot
        disabled={selected.length === 0}
        onSubmit={()=>selected.length > 0 && onConfirm?.(selected)}
      />
    </div>
  );
}

function DockWeightPicker({onConfirm, onCancel}){
  const [value, setValue] = React.useState('');
  const [unit, setUnit] = React.useState('kg');

  const pressKey = (key)=>{
    if(key === '⌫'){
      setValue(v=>v.slice(0, -1));
      return;
    }
    if(key === '.'){
      if(value.includes('.')) return;
      setValue(v=>(v || '0') + '.');
      return;
    }
    setValue(v=>{
      if(v === '0') return key;
      if(v.includes('.') && v.split('.')[1]?.length >= 1) return v;
      if(!v.includes('.') && v.replace('.','').length >= 3) return v;
      return v + key;
    });
  };

  const num = parseFloat(value);
  const canSubmit = Number.isFinite(num) && num > 0;
  const display = value || '0';
  const unitLabel = unit === 'kg' ? '公斤' : '斤';

  return (
    <div className="dock-sheet dock-weight-sheet">
      <div className="dock-weight-top">
        <p className="dock-sheet-lead">今天体重多少？</p>
        <DockSheetClose onCancel={onCancel}/>
      </div>
      <div className="dock-weight-display-wrap">
        <button
          type="button"
          className="dock-weight-unit-toggle"
          onClick={()=>setUnit(u=>(u === 'kg' ? 'jin' : 'kg'))}
        >
          切换为{unit === 'kg' ? '斤' : '公斤'}
        </button>
        <div className="dock-weight-display">
          <span className="dock-weight-num">{display}</span>
          <span className="dock-weight-unit">{unitLabel}</span>
        </div>
      </div>
      <div className="dock-weight-keypad">
        {WEIGHT_KEYS.map((key)=>(
          <button
            key={key}
            type="button"
            className={'dock-weight-key'+(key === '⌫' ? ' is-fn' : '')}
            onClick={()=>pressKey(key)}
            aria-label={key === '⌫' ? '删除' : key}
          >
            {key === '⌫' ? (
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
                <path d="M18 8H8a2 2 0 0 0-1.7 1l-3.3 5a1 1 0 0 0 0 1l3.3 5A2 2 0 0 0 8 20h10a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2z"/>
                <path d="m14 11-2 2 2 2M12 13h0"/>
              </svg>
            ) : key}
          </button>
        ))}
      </div>
      <DockSheetFoot
        disabled={!canSubmit}
        onSubmit={()=>canSubmit && onConfirm?.({ value: num, unit })}
      />
    </div>
  );
}

function createSymptomRecordEntry(symptoms){
  const list = Array.isArray(symptoms) ? symptoms : [symptoms];
  return {
    id:'e-'+Date.now(),
    kind:'rec',
    time: window.formatNowTime(),
    body:'',
    tags:list.map(s=>({ label:s.label, cat:'symptom', emoji:s.emoji || '🤒' })),
    tagLayout:'t5',
    isNew: true,
  };
}

function createWeightRecordEntry({value, unit}){
  const unitLabel = unit === 'jin' ? '斤' : 'kg';
  const text = unit === 'jin'
    ? `${value}斤`
    : `${value}kg`;
  return {
    id:'e-'+Date.now(),
    kind:'rec',
    time: window.formatNowTime(),
    body:'',
    tags:[{ label:'体重 '+text, cat:'weight', emoji:'⚖️' }],
    tagLayout:'t5',
    isNew: true,
  };
}

Object.assign(window, {
  SYMPTOM_SECTIONS,
  SYMPTOM_OPTIONS,
  DockSymptomPicker,
  DockWeightPicker,
  createSymptomRecordEntry,
  createWeightRecordEntry,
});

</script>

<!-- timeline-modules.jsx -->
<script type="text/babel">
// ============ 时间轴模块占位 & 场景卡片 ============

function parseDayParts(dateStr){
  const [m, d] = (dateStr || '').split('/');
  return { month: m || '', day: d || '' };
}

function CycleDayHeader({day}){
  const { month, day: dayNum } = parseDayParts(day.date);
  const phaseCls = day.phaseKind || '';

  return (
    <div className="tl-day-banner">
      <div className="tl-day-banner-top">
        <div className="tl-day-banner-left">
          <span className="tl-day-big">{dayNum}</span>
          <div className="tl-day-meta">
            <span className="tl-day-month">{month}月</span>
            <span className="tl-day-week">
              {day.weekday}{day.isToday ? ' · 今天' : ''}
            </span>
          </div>
        </div>
        {day.phaseTag && (
          <span className={'tl-cycle-chip '+phaseCls}>{day.phaseTag}</span>
        )}
      </div>
    </div>
  );
}

function TimelineRailNode({phaseKind, railDot, isFeedLast, nodeKind, children}){
  const dotCls = railDot === 'ai'
    ? ' ai'
    : (phaseKind ? ' '+phaseKind : '');
  return (
    <div className={'tl-rail-node'+(isFeedLast?' is-feed-last':'')+(nodeKind==='guide'?' is-guide':'')}>
      <div className="tl-rail-marker" aria-hidden="true">
        <span className={'tl-rail-dot'+dotCls}/>
      </div>
      <div className="tl-rail-body">{children}</div>
    </div>
  );
}

function ModulePlaceholder({mod, cycleDay}){
  const icons = {
    'cycle-card':'🔄',
    'wellness':'⚖️',
    'calorie':'🍽',
  };
  const dLabel = cycleDay ? 'D'+cycleDay : 'D1';
  return (
    <div className={'tl-module ph-'+mod.type}>
      <div className="tl-module-head">
        <span className="tl-module-icon">{icons[mod.type] || '📦'}</span>
        <div className="tl-module-meta">
          <span className="tl-module-title">{mod.title}</span>
          <span className="tl-module-badge">模块占位</span>
        </div>
      </div>
      <div className="tl-module-body">
        <div className="tl-module-sk">
          {mod.sketch === 'cycle' && (
            <div className="sk-cycle">
              <div className="sk-cycle-ring"/>
              <span>{dLabel}</span>
            </div>
          )}
          {mod.sketch === 'wellness' && (
            <div className="sk-wellness">
              <div className="sk-row"><span>⚖️ 52.4 kg</span><span className="sk-delta">↓0.3</span></div>
              <div className="sk-row"><span>😴 6h 40m</span><span className="sk-tag">偏少</span></div>
            </div>
          )}
          {mod.sketch === 'calorie' && (
            <div className="sk-calorie">
              <div className="sk-cal-num">≈ 480 <em>kcal</em></div>
              <div className="sk-cal-tags"><span>午餐</span><span>蛋白质</span></div>
            </div>
          )}
          {!mod.sketch && <div className="tl-module-empty"/>}
        </div>
        <p className="tl-module-desc">{mod.desc}</p>
      </div>
    </div>
  );
}

const GUIDE_REVEAL_DELAY_MS = 1800;
const GUIDE_TYPEWRITER_MS = 84;

function TodayGuideCard({item, isNew, animate}){
  const [ready, setReady] = React.useState(!animate);

  React.useEffect(()=>{
    if(!animate){
      setReady(true);
      return;
    }
    setReady(false);
    const t = setTimeout(()=>setReady(true), GUIDE_REVEAL_DELAY_MS);
    return ()=>clearTimeout(t);
  }, [animate, item.text]);

  React.useEffect(()=>{
    if(!ready || !animate) return;
    requestAnimationFrame(()=>{
      setTimeout(()=>{
        const end = document.querySelector('.tl-feed-end');
        end?.scrollIntoView({ behavior:'smooth', block:'end' });
      }, 80);
    });
  }, [ready, animate]);

  if(!ready) return null;

  return (
    <div className={'tl-rail-guide'+(isNew?' fade-in':'')}>
      <p className="tl-rail-guide-text">
        {animate ? (
          <TypewriterText text={item.text} active charMs={GUIDE_TYPEWRITER_MS}/>
        ) : item.text}
      </p>
    </div>
  );
}

function buildWeeklyPanels(item){
  const panels = [];
  if(item.moodTrend?.length){
    panels.push({
      id:'mood', type:'mood', icon:'💜', title:'心情趋势',
      moodTrend: item.moodTrend,
      summary: item.moodSummary || '',
    });
  }
  if(item.weightTrend?.length){
    panels.push({
      id:'weight', type:'weight', icon:'⚖️', title:'体重变化',
      weightTrend: item.weightTrend,
      weightDelta: item.weightDelta,
      summary: item.weightSummary || '',
    });
  }
  if(panels.length === 1 && item.summary){
    panels[0].summary = item.summary;
  }
  return panels;
}

function WeeklyMoodChart({data}){
  const maxM = Math.max(...data.map(d=>d.v), 1);
  return (
    <div className="tl-trend-chart mood">
      {data.map((d,i)=>(
        <div key={i} className="tl-trend-col">
          <div
            className="tl-trend-bar"
            style={{height: Math.round((d.v / maxM) * 48)+'px'}}
          />
          <span className="tl-trend-day">{d.d}</span>
        </div>
      ))}
    </div>
  );
}

function WeeklyWeightChart({data, delta}){
  const wVals = data.map(d=>d.v);
  const minW = Math.min(...wVals);
  const maxW = Math.max(...wVals);
  const wRange = maxW - minW || 1;
  return (
    <>
      <div className="tl-trend-chart weight">
        {data.map((d,i)=>(
          <div key={i} className="tl-trend-col">
            <div
              className="tl-trend-dot"
              style={{bottom: Math.round(((d.v - minW) / wRange) * 40)+'px'}}
            />
            <span className="tl-trend-day">{d.d}</span>
          </div>
        ))}
        <svg className="tl-trend-line" viewBox="0 0 200 48" preserveAspectRatio="none">
          <polyline
            fill="none"
            stroke="rgba(255,77,136,0.5)"
            strokeWidth="2"
            points={data.map((d,i)=>{
              const x = (i / Math.max(data.length - 1, 1)) * 200;
              const y = 44 - ((d.v - minW) / wRange) * 36;
              return x+','+y;
            }).join(' ')}
          />
        </svg>
      </div>
      {delta && <div className="tl-weekly-panel-delta">{delta}</div>}
    </>
  );
}

function WeeklySleepChart({data}){
  const maxH = Math.max(...data.map(d=>d.v), 1);
  const minH = Math.min(...data.map(d=>d.v));
  return (
    <div className="tl-trend-chart sleep">
      {data.map((d,i)=>(
        <div key={i} className="tl-trend-col">
          <div
            className="tl-trend-bar sleep-bar"
            style={{height: Math.round(((d.v - minH * 0.85) / (maxH - minH * 0.85 || 1)) * 44)+'px'}}
          />
          <span className="tl-trend-day">{d.d}</span>
        </div>
      ))}
    </div>
  );
}

function panelStat(panel){
  if(panel.type === 'weight') return panel.weightDelta || null;
  if(panel.type === 'sleep') return panel.sleepDelta || null;
  return null;
}

function WeeklyPanel({panel, variant}){
  const statOnly = variant === 'wellness-stat';
  const showChart = variant === 'weekly-mood' || variant === 'weekly-trend';
  const stat = panelStat(panel);
  let chart = null;

  if(showChart){
    if(panel.type === 'mood'){
      chart = <WeeklyMoodChart data={panel.moodTrend || []}/>;
    } else if(panel.type === 'weight'){
      chart = <WeeklyWeightChart data={panel.weightTrend || []} delta={panel.weightDelta}/>;
    } else if(panel.type === 'sleep'){
      chart = <WeeklySleepChart data={panel.sleepTrend || []}/>;
    }
  }

  return (
    <article className={'tl-weekly-panel tone-'+panel.type+(showChart ? ' has-chart' : ' is-stat-only')}>
      <div className="tl-weekly-panel-head">
        <span className="tl-weekly-panel-icon">{panel.icon || '📊'}</span>
        <span className="tl-weekly-panel-title">{panel.title}</span>
      </div>
      {statOnly && stat && (
        <div className="tl-weekly-panel-stat">{stat}</div>
      )}
      {showChart && chart && (
        <div className="tl-weekly-panel-chart">{chart}</div>
      )}
      {panel.summary && (
        <p className="tl-weekly-panel-summary">{panel.summary}</p>
      )}
    </article>
  );
}

function WeeklyTrendCard({item}){
  const panels = item.panels?.length ? item.panels : buildWeeklyPanels(item);
  const overview = item.overview || item.analysis || '';
  const isWellness = item.kind === 'wellness';
  const [open, setOpen] = React.useState(false);

  if(isWellness){
    return (
      <div className="tl-weekly-bubble is-wellness">
        <div className="tl-weekly-surface">
          {overview && <p className="tl-weekly-overview">{overview}</p>}
          {panels.length > 0 && (
            <div className="tl-weekly-stack-inline">
              {panels.map(p=>(
                <WeeklyPanel key={p.id || p.type} panel={p} variant="wellness-stat"/>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  const moodPanel = panels.find(p => p.type === 'mood');
  const trendPanels = panels.filter(p => p.type !== 'mood');
  const hasExpand = trendPanels.length > 0;

  return (
    <div className={'tl-weekly-bubble'+(open ? ' is-open' : '')}>
      <div className="tl-weekly-surface">
        {overview && <p className="tl-weekly-overview">{overview}</p>}
        {moodPanel && (
          <div className="tl-weekly-stack-inline">
            <WeeklyPanel panel={moodPanel} variant="weekly-mood"/>
          </div>
        )}
      </div>
      {hasExpand && (
        <>
          <div className="tl-weekly-detail">
            {trendPanels.map(p=>(
              <WeeklyPanel key={p.id || p.type} panel={p} variant="weekly-trend"/>
            ))}
          </div>
          <button
            type="button"
            className="tl-weekly-toggle"
            onClick={()=>setOpen(v=>!v)}
            aria-expanded={open}
          >
            <span className="tl-weekly-toggle-label">{open ? '收起' : '展开'}</span>
            <span className="tl-weekly-chev" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d={open ? 'M6 15l6-6 6 6' : 'M6 9l6 6 6-6'}/>
              </svg>
            </span>
          </button>
        </>
      )}
    </div>
  );
}

function TlNodeCaption({time, label, labelKind}){
  if(!time && !label) return null;
  return (
    <div className="tl-node-caption">
      {time && <span className="tl-node-time">{time}</span>}
      {time && label && <span className="tl-node-sep" aria-hidden="true">·</span>}
      {label && (
        <span className={'tl-node-label'+(labelKind ? ' kind-'+labelKind : '')}>{label}</span>
      )}
    </div>
  );
}

function getNodeCaption(item, sisterItem){
  if(item.cardLabel || item.cardLabelKind){
    return {
      label: item.cardLabel,
      kind: item.cardLabelKind,
    };
  }
  if(sisterItem){
    return { label:'本次周期分析', kind:'ai' };
  }
  if(item.kind === 'sister-card'){
    return { label:'本次周期分析', kind:'ai' };
  }
  if(item.kind === 'weekly'){
    const range = item.range ? ' · '+item.range : '';
    return { label:'周报'+range, kind:'weekly' };
  }
  return null;
}

function TimelineItemWrap({item, sisterItem, children}){
  const cap = getNodeCaption(item, sisterItem);
  const showCaption = item.kind !== 'guide';
  return (
    <div className="tl-node-stack">
      {showCaption && (
        <TlNodeCaption
          time={item.time}
          label={cap?.label}
          labelKind={cap?.kind}
        />
      )}
      {children}
    </div>
  );
}

function TimelineItem({item, sisterItem, isNew, phaseKind, isFeedLast, sisterPlayAnimation, onSisterCycleComplete}){
  const cycleDay = item.cycleDay;
  const guideAnimate = item.kind === 'guide' && (
    isNew || item.hiddenUntilSisterDone
  );

  let body = null;
  if(item.kind === 'guide'){
    body = <TodayGuideCard item={item} isNew={isNew} animate={guideAnimate}/>;
  } else if(item.kind === 'weekly' || item.kind === 'wellness'){
    body = <WeeklyTrendCard item={item}/>;
  } else if(item.kind === 'voice-card'){
    body = (
      <VoiceRecordCard
        entry={item}
        isNew={isNew}
        animateAnalysis={isFeedLast}
        analysisProps={sisterItem ? {
          playAnimation: sisterPlayAnimation,
          onCycleComplete: onSisterCycleComplete,
        } : null}
      />
    );
  } else if(item.kind === 'sister-card'){
    body = (
      <SisterAnalysisCard
        item={item}
        playAnimation={sisterPlayAnimation}
        onCycleComplete={onSisterCycleComplete}
      />
    );
  } else if(item.module) {
    body = (
      <div className="tl-rec-group">
        <RecordCard entry={item} isNew={isNew} typewriterAiNote={!!(isNew && item.aiNote)}/>
        <ModulePlaceholder mod={item.module} cycleDay={cycleDay || item.module.cycleDay}/>
      </div>
    );
  } else {
    body = (
      <RecordCard
        entry={item}
        isNew={isNew}
        typewriterAiNote={!!(isNew && item.aiNote)}
      />
    );
  }

  return (
    <TimelineRailNode
      phaseKind={phaseKind}
      railDot={item.railDot || sisterItem?.railDot || (item.kind === 'sister-card' ? 'ai' : undefined)}
      isFeedLast={isFeedLast}
      nodeKind={sisterItem ? 'voice-card' : item.kind}
    >
      <TimelineItemWrap item={item} sisterItem={sisterItem}>{body}</TimelineItemWrap>
    </TimelineRailNode>
  );
}

Object.assign(window, {
  CycleDayHeader, TimelineRailNode, TlNodeCaption,
  ModulePlaceholder, TodayGuideCard, WeeklyTrendCard, TimelineItem,
});

</script>

    </div>
  );
}

function filterDayItems(items, sisterCycleDone, hideTodayGuide){
  return (items || []).filter(it=>{
    if(it.kind === 'guide' && hideTodayGuide) return false;
    if(!it.hiddenUntilSisterDone) return true;
    return sisterCycleDone;
  });
}

function resolveTimelineLastItemId(blocks, sisterCycleDone, hideTodayGuide){
  const ids = [];
  blocks.forEach(block=>{
    if(block.type !== 'day') return;
    const items = filterDayItems(block.items || block.entries, sisterCycleDone, hideTodayGuide);
    items.forEach(it=>ids.push(it.id));
  });
  return ids[ids.length - 1];
}

function TimelineDateSection({day, sisterPlayAnimation, sisterCycleDone, hideTodayGuide, onSisterCycleComplete, lastItemId}){
  const items = filterDayItems(day.items || day.entries, sisterCycleDone, hideTodayGuide);
  const phaseCls = day.phaseKind || '';
  return (
    <>
      <div className={'tl-day-section-head tl-rail-break'+(day.isToday?' is-today':'')+(phaseCls?' phase-'+phaseCls:'')}>
        <CycleDayHeader day={day}/>
      </div>
      {items.map((it, idx)=>{
        if(it.kind === 'sister-card' && items[idx - 1]?.kind === 'voice-card') return null;
        const sisterItem = it.kind === 'voice-card' && items[idx + 1]?.kind === 'sister-card'
          ? items[idx + 1]
          : null;
        return (
        <TimelineItem
          key={it.id}
          item={it}
          sisterItem={sisterItem}
          isNew={it.isNew || (it.hiddenUntilSisterDone && sisterCycleDone && sisterPlayAnimation > 0)}
          phaseKind={day.phaseKind}
          isFeedLast={it.id === lastItemId || sisterItem?.id === lastItemId}
          sisterPlayAnimation={sisterPlayAnimation}
          onSisterCycleComplete={onSisterCycleComplete}
        />
        );
      })}
    </>
  );
}

function CycleStartMarker({block}){
  return (
    <div className="tl-cycle-start">
      <div className="tl-cycle-start-marker" aria-hidden="true">
        <span className="tl-cycle-start-dot"/>
      </div>
      <div className="tl-cycle-start-body">
        <span className="tl-cycle-start-icon">🩸</span>
        <span className="tl-cycle-start-text">{block.label || '本次周期开始'}</span>
        {block.sub && <span className="tl-cycle-start-sub">{block.sub}</span>}
      </div>
    </div>
  );
}

function TimelineStream({blocks, endRef, sisterPlayAnimation, sisterCycleDone, hideTodayGuide, onSisterCycleComplete}){
  const lastItemId = resolveTimelineLastItemId(blocks, sisterCycleDone, hideTodayGuide);

  return (
    <div className="tl-feed">
      <div className="tl-rail-continuous">
        {blocks.map((block, i)=>{
          if(block.type === 'day'){
            return (
              <TimelineDateSection
                key={block.id}
                day={block}
                sisterPlayAnimation={sisterPlayAnimation}
                sisterCycleDone={sisterCycleDone}
                hideTodayGuide={hideTodayGuide}
                onSisterCycleComplete={onSisterCycleComplete}
                lastItemId={lastItemId}
              />
            );
          }
          if(block.type === 'cycle-start'){
            return (
              <div key={block.id} className="tl-rail-break">
                <CycleStartMarker block={block}/>
              </div>
            );
          }
          if(block.type === 'gap'){
            return (
              <div key={block.id || ('gap-'+i)} className="tl-gap-divider tl-rail-break">
                · · ·  {block.label}  · · ·
              </div>
            );
          }
          if(block.type === 'cycle-sum'){
            return (
              <div key={block.id} className="tl-rail-break">
                <CycleSumCard item={block}/>
              </div>
            );
          }
          if(block.type === 'weekly'){
            return (
              <div key={block.id} className="tl-rail-break">
                <WeeklyCard item={block}/>
              </div>
            );
          }
          return null;
        })}
      </div>
      <div ref={endRef} className="tl-feed-end" aria-hidden="true"/>
    </div>
  );
}

function formatNowTime(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function formatVoiceDur(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m+':'+String(s).padStart(2,'0');
}

function resolveEntryDayId(text, blocks){
  const days = blocks.filter(b=>b.type==='day');
  const todayIdx = days.findIndex(d=>d.isToday);
  if(/前天/.test(text) && todayIdx > 1) return days[todayIdx - 2].id;
  if(/昨天|昨晚/.test(text) && todayIdx > 0) return days[todayIdx - 1].id;
  return days.find(d=>d.isToday)?.id || days[days.length - 1]?.id;
}

function resolveDayHint(text, blocks, dayId){
  const day = blocks.find(b=>b.type==='day' && b.id===dayId);
  if(!day || day.isToday) return '';
  if(/昨天|昨晚|前天/.test(text)) return day.date;
  return '';
}

function appendTimelineEntry(blocks, entry, opts={}){
  const dayId = opts.dayId || resolveEntryDayId(entry.body || '', blocks);
  return blocks.map(b=>{
    if(b.type !== 'day' || b.id !== dayId) return b;
    const list = b.items || b.entries || [];
    return {
      ...b,
      items: [...list, entry],
      entries: undefined,
    };
  });
}

function appendTodayEntry(blocks, entry){
  return appendTimelineEntry(blocks, entry);
}

function isTimelineEmpty(blocks){
  return !(blocks || []).some(b=>{
    if(b.type !== 'day') return true;
    return (b.items || b.entries || []).length > 0;
  });
}

Object.assign(window, {
  VoiceBar, RecordCard, CycleSumCard, WeeklyCard,
  TimelineDateSection, TimelineStream, CycleStartMarker,
  formatNowTime, formatVoiceDur,
  appendTodayEntry, appendTimelineEntry,
  resolveEntryDayId, resolveDayHint, resolveTimelineLastItemId,
  isTimelineEmpty,
});

</script>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const EMPTY_LOOP_SEC = 4.6;
const EMPTY_DEMO_ACTIVE_SEC = 3.6;

function useLoopTime(duration = EMPTY_LOOP_SEC, speed = 1) {
  const [t, setT] = useState(0);
  const startRef = useRef(performance.now());
  const speedRef = useRef(speed);
  useEffect(() => { speedRef.current = speed; }, [speed]);

  useEffect(() => {
    let raf;
    const tick = () => {
      const now = performance.now();
      const elapsed = ((now - startRef.current) / 1000) * speedRef.current;
      setT(elapsed % duration);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [duration]);
  return t;
}

const clamp01 = (v) => Math.max(0, Math.min(1, v));
const range = (t, a, b) => clamp01((t - a) / (b - a));
const easeOut = (t) => 1 - Math.pow(1 - t, 3);

<script type="text/babel">
// ============ 记录搜索页 ============

const SEARCH_TAGS = [
  { id: 'cat-period', label: '月经', cat: 'period', emoji: '🩸' },
  { id: 'cat-symptom', label: '症状', cat: 'symptom', emoji: '🤕' },
  { id: 'cat-mood', label: '心情', cat: 'mood', emoji: '💭' },
  { id: 'cat-sleep', label: '睡眠', cat: 'sleep', emoji: '😴' },
  { id: 'cat-diet', label: '饮食', cat: 'diet', emoji: '🥗' },
  { id: 'cat-weight', label: '体重', cat: 'weight', emoji: '⚖️' },
];

const SEARCH_TAG_MAP = {};
SEARCH_TAGS.forEach(t => { SEARCH_TAG_MAP[t.id] = t; });

function flattenSearchableItems(blocks){
  const out = [];
  (blocks || []).forEach(block=>{
    if(block.type !== 'day') return;
    const dayMeta = {
      date: block.date,
      weekday: block.weekday || '',
      phaseTag: block.phaseTag || '',
    };
    (block.items || []).forEach(item=>{
      if(item.kind !== 'rec' && item.kind !== 'voice-card') return;
      const text = (item.body || item.voiceText || '').trim();
      if(!text && !item.photo) return;
      out.push({
        id: item.id,
        dayMeta,
        time: item.time,
        text,
        tags: item.tags || [],
        voice: item.voice,
        photo: item.photo,
      });
    });
  });
  return out;
}

function itemMatchesFilters(item, query, activeTags){
  const q = query.trim().toLowerCase();
  const hasTags = activeTags.length > 0;

  let matchQuery = !q;
  if(q){
    const tagText = (item.tags || []).map(t=>t.label).join(' ');
    const haystack = (item.text + ' ' + tagText).toLowerCase();
    matchQuery = haystack.includes(q);
  }

  let matchTags = !hasTags;
  if(hasTags){
    matchTags = activeTags.some(filter=>{
      const tagHit = (item.tags || []).some(tag=>{
        const r = window.resolveTag(tag);
        if(filter.cat && !filter.matchLabel) return r.cat === filter.cat;
        if(filter.matchLabel){
          if(r.label.includes(filter.matchLabel) || filter.matchLabel.includes(r.label)) return true;
          if(filter.cat && r.cat === filter.cat) return true;
        }
        return false;
      });
      if(tagHit) return true;
      if(filter.matchLabel && item.text.includes(filter.matchLabel)) return true;
      if(filter.cat === 'period' && /月经|经期/.test(item.text)) return true;
      if(filter.cat === 'symptom' && /腹胀|腰酸|疲惫|痛|不适/.test(item.text)) return true;
      if(filter.cat === 'mood' && /心情|情绪|愉快|低落|平静/.test(item.text)) return true;
      if(filter.cat === 'sleep' && /睡/.test(item.text)) return true;
      if(filter.cat === 'weight' && /体重|kg|公斤|斤/.test(item.text)) return true;
      if(filter.cat === 'diet' && /吃|餐|饮食|午饭|晚饭|早餐/.test(item.text)) return true;
      if(filter.cat === 'fitness' && /跑|运动|健身/.test(item.text)) return true;
      return false;
    });
  }

  return matchQuery && matchTags;
}

function highlightQuery(text, query){
  const q = query.trim();
  if(!q || !text) return text;
  const lower = text.toLowerCase();
  const idx = lower.indexOf(q.toLowerCase());
  if(idx < 0) return text;
  return (
    <>
      {text.slice(0, idx)}
      <mark className="search-hl">{text.slice(idx, idx + q.length)}</mark>
      {text.slice(idx + q.length)}
    </>
  );
}

function SearchResultCard({item, query}){
  const RecordedTags = window.RecordedTags;
  const excerpt = item.text.length > 72 ? item.text.slice(0, 72) + '…' : item.text;
  const dayLine = [item.dayMeta.date, item.dayMeta.weekday].filter(Boolean).join(' · ');

  return (
    <article className="search-result-card">
      <div className="search-result-meta-row">
        <span className="search-result-date">{dayLine}</span>
        {item.time && <span className="search-result-time">{item.time}</span>}
        {item.voice && (
          <span className="search-result-voice">
            <span aria-hidden="true">🎙</span>
            {item.voice.duration || '语音'}
          </span>
        )}
      </div>
      {item.text && (
        <p className="search-result-body">{highlightQuery(excerpt, query)}</p>
      )}
      {item.tags.length > 0 && (
        <RecordedTags tags={item.tags} layout="t5"/>
      )}
    </article>
  );
}

function SearchPage({timeline, onClose}){
  const [query, setQuery] = React.useState('');
  const [selectedIds, setSelectedIds] = React.useState([]);
  const inputRef = React.useRef(null);

  const allItems = React.useMemo(()=>flattenSearchableItems(timeline), [timeline]);
  const activeTags = React.useMemo(
    ()=>selectedIds.map(id=>SEARCH_TAG_MAP[id]).filter(Boolean),
    [selectedIds]
  );
  const hasFilter = !!(query.trim() || selectedIds.length);

  const results = React.useMemo(()=>{
    if(!hasFilter) return [];
    return allItems
      .filter(item=>itemMatchesFilters(item, query, activeTags))
      .slice()
      .reverse();
  }, [allItems, query, activeTags, hasFilter]);

  React.useEffect(()=>{
    const tm = setTimeout(()=>inputRef.current?.focus(), 120);
    return ()=>clearTimeout(tm);
  }, []);

  const toggleTag = (id)=>{
    setSelectedIds(prev=>prev.includes(id) ? prev.filter(x=>x !== id) : [...prev, id]);
  };

  const clearFilters = ()=>{
    setQuery('');
    setSelectedIds([]);
    inputRef.current?.focus();
  };

  const I = window.Icon;

  return (
    <div className="search-page" role="dialog" aria-modal="true" aria-label="搜索">
      <div className="search-nav">
        <button type="button" className="search-back" aria-label="返回" onClick={onClose}>
          <I name="arrow-left" size={22} stroke={2}/>
        </button>
        <h1 className="search-nav-title">搜索</h1>
        {hasFilter && (
          <button type="button" className="search-reset" onClick={clearFilters}>清除</button>
        )}
      </div>

      <div className="search-field-wrap">
        <span className="search-field-ico" aria-hidden="true">
          <I name="search" size={18} stroke={1.8}/>
        </span>
        <input
          ref={inputRef}
          className="search-field"
          type="search"
          enterKeyHint="search"
          placeholder="输入关键字检索"
          value={query}
          onChange={e=>setQuery(e.target.value)}
        />
        {query && (
          <button type="button" className="search-field-clear" aria-label="清空" onClick={()=>setQuery('')}>
            <I name="close" size={14} stroke={2}/>
          </button>
        )}
      </div>

      <div className="search-scroll">
        <section className="search-tags-section" aria-label="标签筛选">
          <div className="search-tags">
            {SEARCH_TAGS.map(tag=>{
              const active = selectedIds.includes(tag.id);
              return (
                <button
                  key={tag.id}
                  type="button"
                  className={'search-tag'+(active ? ' is-active' : '')}
                  aria-pressed={active}
                  onClick={()=>toggleTag(tag.id)}
                >
                  {tag.emoji && <span className="search-tag-emoji" aria-hidden="true">{tag.emoji}</span>}
                  {tag.label}
                </button>
              );
            })}
          </div>
        </section>

        <section className="search-results" aria-live="polite">
          {!hasFilter && (
            <div className="search-empty search-empty--idle">
              <p className="search-empty-desc">输入关键字，或点选标签筛选</p>
            </div>
          )}

          {hasFilter && (
            <div className="search-results-head">
              <h2 className="search-results-title">搜索结果</h2>
              <span className="search-results-count">{results.length} 条</span>
            </div>
          )}

          {hasFilter && results.length === 0 && (
            <div className="search-empty">
              <p className="search-empty-title">没有找到相关记录</p>
              <p className="search-empty-desc">换个关键字或标签试试</p>
            </div>
          )}

          <div className="search-result-list">
            {results.map(item=>(
              <SearchResultCard key={item.id} item={item} query={query}/>
            ))}
          </div>
        </section>
      </div>
    </div>
  );
}

Object.assign(window, { SearchPage, flattenSearchableItems });

</script>

<script type="text/babel">
// ============ 底部 Dock — 输入栏 + 右下悬浮快捷发布 ============

/** 右下角 + — 5 项快捷发布 */
const QUICK_PUBLISH = [
  { id:'mood', emoji:'💛', label:'情绪', text:'今天情绪有点低落' },
  { id:'symptom', emoji:'🤒', label:'症状', text:'有点不舒服' },
  { id:'food', emoji:'🍽️', label:'饮食', text:'午餐吃了鸡胸肉和青菜' },
  { id:'weight', emoji:'⚖️', label:'体重', text:'今天体重 52.3kg' },
  { id:'sleep', emoji:'😴', label:'睡眠', text:'昨晚睡了 7 小时' },
];

const DEMO_VOICE_LINE = '哎，昨天月经来了，昨天肚子不太舒服';

const DOCK_SELLING_POINTS = [
  '记点什么…',
  '记录今天的心情…',
  '身体有什么变化…',
  '刚才吃了什么…',
  '睡眠怎么样…',
];
const DOCK_PH_CHAR_STAGGER = 72;
const DOCK_PH_CHAR_ENTER = 440;
const DOCK_PH_DWELL = 2600;
const DOCK_PH_LEAVE = 360;

function DockWavePlaceholder({show, focused}){
  const [index, setIndex] = React.useState(0);
  const [phase, setPhase] = React.useState('enter');
  const timersRef = React.useRef([]);
  const runIdRef = React.useRef(0);

  const clearTimers = ()=>{
    timersRef.current.forEach(t=>window.clearTimeout(t));
    timersRef.current = [];
  };

  const pushTimer = (fn, ms)=>{
    const id = window.setTimeout(fn, ms);
    timersRef.current.push(id);
    return id;
  };

  React.useEffect(()=>{
    if(!show || focused){
      clearTimers();
      runIdRef.current += 1;
      return;
    }

    const runId = ++runIdRef.current;
    const startCycle = (pointIndex)=>{
      if(runId !== runIdRef.current) return;
      const text = DOCK_SELLING_POINTS[pointIndex];
      const enterMs = Math.max(0, text.length - 1) * DOCK_PH_CHAR_STAGGER + DOCK_PH_CHAR_ENTER;

      setIndex(pointIndex);
      setPhase('enter');

      pushTimer(()=>{
        if(runId !== runIdRef.current) return;
        setPhase('idle');
        pushTimer(()=>{
          if(runId !== runIdRef.current) return;
          setPhase('leave');
          pushTimer(()=>{
            if(runId !== runIdRef.current) return;
            startCycle((pointIndex + 1) % DOCK_SELLING_POINTS.length);
          }, DOCK_PH_LEAVE);
        }, DOCK_PH_DWELL);
      }, enterMs);
    };

    startCycle(0);
    return ()=>{
      runIdRef.current += 1;
      clearTimers();
    };
  }, [show, focused]);

  if(!show) return null;

  const text = DOCK_SELLING_POINTS[index];
  const chars = Array.from(text);
  const charPhase = phase === 'enter' ? 'enter' : 'idle';

  return (
    <span
      className={'dock-float-ph'
        +(focused ? ' is-focused' : '')
        +(phase === 'leave' ? ' is-leaving' : '')}
      aria-hidden="true"
    >
      {chars.map((ch, i)=>(
        <span
          key={index+'-'+i}
          className={'dock-float-ph-char is-'+charPhase}
          style={{'--i': i}}
        >
          {ch}
        </span>
      ))}
    </span>
  );
}

/** 左半圆：从 + 向左侧展开（90° 上 → 180° 左 → 270° 下），不往右伸 */
function fanArcPos(index, total, radius){
  const startDeg = 90;
  const endDeg = 270;
  const t = total <= 1 ? 0.5 : index / (total - 1);
  const deg = startDeg + (endDeg - startDeg) * t;
  const rad = (deg * Math.PI) / 180;
  return {
    x: Math.round(radius * Math.cos(rad)),
    y: Math.round(-radius * Math.sin(rad)),
  };
}

function QuickFan({items, open, closing, onToggle, onPick, renderFab}){
  /* 180° 左半圆 / 5 项 / 50px 圆：R ≥ 50/(2·sin22.5°) ≈ 66 */
  const r = items.length >= 5 ? 76 : 64;
  const fabTapLock = React.useRef(false);

  const handleFabTap = (e)=>{
    e.preventDefault();
    if(fabTapLock.current) return;
    fabTapLock.current = true;
    onToggle(!open);
    window.setTimeout(()=>{ fabTapLock.current = false; }, 360);
  };

  return (
    <div className={'dock-fan dock-fan-corner'+(open?' open':'')+(closing?' closing':'')}>
      {open && (
        <button
          type="button"
          className="dock-fan-scrim"
          onClick={()=>onToggle(false)}
          aria-label="关闭"
        />
      )}
      <div className={'dock-fan-stage'+(open?' open':'')+(closing?' closing':'')}>
        {items.map((item,i)=>{
          const {x,y} = fanArcPos(i, items.length, r);
          return (
            <button
              key={item.id}
              type="button"
              className="dock-fan-node"
              style={{
                '--fx': x+'px',
                '--fy': y+'px',
                '--zi': i,
                '--delay': (0.02 + i * 0.045)+'s',
                '--close-delay': ((items.length - 1 - i) * 0.028)+'s',
              }}
              onClick={()=> onPick(item)}
              aria-label={item.label}
            >
              <span className="dock-fan-node-ico dock-fan-node-ico--stack">
                <span className="dock-fan-node-em" aria-hidden="true">{item.emoji}</span>
                <span className="dock-fan-node-lbl">{item.label}</span>
              </span>
            </button>
          );
        })}
        <button
          type="button"
          className={'dock-fab dock-fab-media'+(open?' open':'')}
          onPointerUp={handleFabTap}
          aria-expanded={open}
          aria-label={open ? '收起' : '快捷发布'}
        >
          {renderFab(open)}
        </button>
      </div>
    </div>
  );
}

function DockPublisher({
  draft, onDraft, onSend, onQuickMark, onMoodConfirm, onSymptomConfirm, onWeightConfirm,
  onVoiceDone, onPhoto, onDockExpandedChange, activeTab,
}){
  const I = window.Icon;
  const DockMoodPicker = window.DockMoodPicker;
  const DockSymptomPicker = window.DockSymptomPicker;
  const DockWeightPicker = window.DockWeightPicker;
  const [inputMode, setInputMode] = React.useState('text');
  const [quickOpen, setQuickOpen] = React.useState(false);
  const [quickClosing, setQuickClosing] = React.useState(false);
  const [dockSheet, setDockSheet] = React.useState(null);
  const [recording, setRecording] = React.useState(false);
  const [recSec, setRecSec] = React.useState(0);
  const [inputFocused, setInputFocused] = React.useState(false);
  const recTimer = React.useRef(null);

  const quickOpenedAt = React.useRef(0);
  const prevTabRef = React.useRef(activeTab);

  React.useEffect(()=>{
    if(activeTab === 'note' && prevTabRef.current !== 'note'){
      setQuickOpen(false);
      setQuickClosing(false);
      setDockSheet(null);
    }
    prevTabRef.current = activeTab;
  }, [activeTab]);

  const toggleQuick = (next)=>{
    if(next === undefined) next = !quickOpen;
    if(next){
      if(quickOpen || quickClosing) return;
      quickOpenedAt.current = Date.now();
      setQuickClosing(false);
      setQuickOpen(true);
      return;
    }
    if(!quickOpen || quickClosing) return;
    if(Date.now() - quickOpenedAt.current < 380) return;
    setQuickClosing(true);
    setTimeout(()=>{
      setQuickOpen(false);
      setQuickClosing(false);
    }, 340);
  };


  React.useEffect(()=>{
    if(recording){
      recTimer.current = setInterval(()=>setRecSec(s=>s+1), 1000);
    } else {
      clearInterval(recTimer.current);
      setRecSec(0);
    }
    return ()=>clearInterval(recTimer.current);
  }, [recording]);

  const startRec = ()=> setRecording(true);
  const stopRec = ()=>{
    if(!recording) return;
    setRecording(false);
    onVoiceDone(DEMO_VOICE_LINE, Math.max(recSec, 3));
  };

  const toggleMode = ()=>{
    setInputMode(m=>m==='text' ? 'voice' : 'text');
    toggleQuick(false);
  };

  const closeDockSheet = ()=> setDockSheet(null);

  const handleQuick = (item)=>{
    toggleQuick(false);
    if(item?.id === 'mood'){
      setDockSheet('mood');
      return;
    }
    if(item?.id === 'symptom'){
      setDockSheet('symptom');
      return;
    }
    if(item?.id === 'weight'){
      setDockSheet('weight');
      return;
    }
    setDockSheet(null);
    if(item) onQuickMark?.(item);
  };

  const handleMoodConfirm = (moods)=>{
    setDockSheet(null);
    onMoodConfirm?.(moods);
  };

  const handleSymptomConfirm = (symptoms)=>{
    setDockSheet(null);
    onSymptomConfirm?.(symptoms);
  };

  const handleWeightConfirm = (payload)=>{
    setDockSheet(null);
    onWeightConfirm?.(payload);
  };

  React.useEffect(()=>{
    onDockExpandedChange?.(!!dockSheet);
  }, [dockSheet, onDockExpandedChange]);

  const isDockExpanded = !!dockSheet;

  return (
    <>
      <div className={'quick-float-wrap'+(isDockExpanded?' is-covered':'')}>
        <QuickFan
          items={QUICK_PUBLISH}
          open={quickOpen}
          closing={quickClosing}
          onToggle={toggleQuick}
          onPick={handleQuick}
          renderFab={(open)=>(
            open
              ? <I name="close" size={20} stroke={2.2}/>
              : <I name="plus" size={24} stroke={2.2}/>
          )}
        />
      </div>

      <div className={'dock-wrap'+(isDockExpanded?' is-mood-expanded':'')}>
        <div className={'dock-panel'+(isDockExpanded?' is-mood-expanded':'')}>
          {dockSheet === 'mood' ? (
            <DockMoodPicker
              onConfirm={handleMoodConfirm}
              onCancel={closeDockSheet}
            />
          ) : dockSheet === 'symptom' ? (
            <DockSymptomPicker
              onConfirm={handleSymptomConfirm}
              onCancel={closeDockSheet}
            />
          ) : dockSheet === 'weight' ? (
            <DockWeightPicker
              onConfirm={handleWeightConfirm}
              onCancel={closeDockSheet}
            />
          ) : (
          <div className="dock-bar">
            <div className="dock-input-row">
              <button
                type="button"
                className="dock-mode-btn"
                onClick={toggleMode}
                aria-label={inputMode==='text'?'切换语音':'切换键盘'}
              >
                {inputMode==='text'
                  ? <I name="mic" size={22} stroke={1.6}/>
                  : <span className="dock-kbd-ico">⌨</span>}
              </button>

              {inputMode==='text' ? (
                <div className={'dock-text-field'+(inputFocused?' is-focused':'')}>
                  <DockWavePlaceholder
                    show={!draft.trim()}
                    focused={inputFocused}
                  />
                  <textarea
                    rows="1"
                    placeholder=""
                    aria-label={DOCK_SELLING_POINTS[0]}
                    value={draft}
                    onChange={(e)=>{
                      onDraft(e.target.value);
                      e.target.style.height='auto';
                      e.target.style.height = Math.min(e.target.scrollHeight, 72)+'px';
                    }}
                    onFocus={()=>setInputFocused(true)}
                    onBlur={()=>setInputFocused(false)}
                    onKeyDown={(e)=>{
                      if(e.key==='Enter' && !e.shiftKey && draft.trim()){
                        e.preventDefault();
                        onSend();
                      }
                    }}
                  />
                </div>
              ) : (
                <div className={'dock-voice-wrap'+(recording?' is-recording':'')}>
                  <div className="dock-voice-stage" aria-hidden="true">
                    <span className="dock-voice-shimmer"/>
                  </div>
                  <button
                    type="button"
                    className={'dock-voice-btn'+(recording?' recording':'')}
                    onPointerDown={(e)=>{ e.preventDefault(); startRec(); }}
                    onPointerUp={stopRec}
                    onPointerLeave={recording ? stopRec : undefined}
                  >
                    {recording ? (
                      <>
                        <span className="dock-voice-waves" aria-hidden="true">
                          {[4,8,12,8,6,10,7].map((h,j)=><span key={j} style={{height:h+'px'}}/>)}
                        </span>
                        <span>松开 结束{recSec > 0 ? ' '+recSec+'s' : ''}</span>
                      </>
                    ) : (
                      <span className="dock-voice-label">按住 说话</span>
                    )}
                  </button>
                </div>
              )}

              {inputMode==='text' && draft.trim() ? (
                <button type="button" className="dock-send-btn" onClick={onSend} aria-label="发送">
                  <I name="send" size={16} stroke={2}/>
                </button>
              ) : null}
            </div>

            <button
              type="button"
              className="dock-camera-btn"
              onClick={onPhoto}
              aria-label="拍照上传"
            >
              <I name="camera" size={22} stroke={1.6}/>
            </button>
          </div>
          )}
        </div>
      </div>
    </>
  );
}

Object.assign(window, { DockPublisher, CloudPublisher: DockPublisher });
</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
