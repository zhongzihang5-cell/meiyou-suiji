<script type="text/babel">
// ============ 记录 Tab · 新用户空值页（_Tab__standalone.html） ============

const { useState, useEffect, useRef } = React;

const EMPTY_LOOP_SEC = 4.6;
const EMPTY_DEMO_ACTIVE_SEC = 3.6;

function useLoopTime(duration = EMPTY_LOOP_SEC, speed = 1) {
  const [t, setT] = useState(0);
  const startRef = useRef(performance.now());
  const speedRef = useRef(speed);
  useEffect(() => { speedRef.current = speed; }, [speed]);

  useEffect(() => {
    let raf;
    const tick = () => {
      const now = performance.now();
      const elapsed = ((now - startRef.current) / 1000) * speedRef.current;
      setT(elapsed % duration);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [duration]);
  return t;
}

const clamp01 = (v) => Math.max(0, Math.min(1, v));
const range = (t, a, b) => clamp01((t - a) / (b - a));
const easeOut = (t) => 1 - Math.pow(1 - t, 3);

const EMPTY_PALETTE = {
  bg1: '#FFFFFF',
  bg2: '#F2F2F5',
  primary: '#FF4D88',
  primarySoft: '#FFE0EC',
  accent: '#FF7AA8',
  ring: 'rgba(255,77,136,0.18)',
};

const EMPTY_DEMO_TRANSCRIPT = '今天有点累，肚子胀，午饭吃了三明治';

const SCENE2_RECORD_TEXT = '今天有点累，肚子也有点胀，午饭吃了三明治，下午还一直有点犯困。';

const SCENE2_VOICE_TAGS = [
  { cat:'情绪', val:'疲惫', icon:'mood' },
  { cat:'症状', val:'腹胀', icon:'sym' },
  { cat:'饮食', val:'三明治', icon:'food' },
];

function buildScene2VoiceEntry(durSec){
  return {
    id:'e-'+Date.now(),
    kind:'voice-card',
    time: window.formatNowTime(),
    isNew: true,
    tagLayout: 'v3',
    voiceText: SCENE2_RECORD_TEXT,
    voice: { duration: window.formatVoiceDur(Math.max(durSec || 0, 18)) },
    tags: SCENE2_VOICE_TAGS.map(t=>({...t})),
  };
}

function RecordEmptyTagIcon({ name, color }) {
  if(name === 'mood'){
    return (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="9" stroke={color} strokeWidth="1.6"/>
        <circle cx="9" cy="10" r="1" fill={color}/>
        <circle cx="15" cy="10" r="1" fill={color}/>
        <path d="M9 15c1-0.5 5-0.5 6 0" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>
      </svg>

  }
  if(name === 'sym'){

      <path d="M8 8V5a4 4 0 018 0v3" stroke={color} strokeWidth="1.6"/>
    </svg>
  );
}

function RecordEmptyScreen({ onVoiceDone }) {
  const P = EMPTY_PALETTE;
  const t = useLoopTime(EMPTY_LOOP_SEC, 1);
  const [pressed, setPressed] = useState(false);
  const [recSec, setRecSec] = useState(0);
  const recTimer = useRef(null);

  useEffect(() => {
    if(pressed){
      recTimer.current = setInterval(()=>setRecSec(s=>s+1), 1000);
    } else {
      clearInterval(recTimer.current);
      setRecSec(0);
    }
    return ()=>clearInterval(recTimer.current);
  }, [pressed]);

  const handleRelease = ()=>{
    if(!pressed) return;
    setPressed(false);
    onVoiceDone?.(EMPTY_DEMO_TRANSCRIPT, Math.max(recSec, 3));
  };

  return (
    <div className="record-empty-root">
      <div
        className="record-empty-blob record-empty-blob--tr"
        style={{ background: `radial-gradient(circle, ${P.primarySoft} 0%, transparent 70%)` }}
        aria-hidden="true"
      />
      <div
        className="record-empty-blob record-empty-blob--bl"
        style={{ background: `radial-gradient(circle, ${P.primarySoft} 0%, transparent 70%)` }}
        aria-hidden="true"
      />

      <div className="record-empty-hero">
        <h1 className="record-empty-hero-title">
          <span className="record-empty-hero-line">在美柚，</span>
          <span className="record-empty-hero-line record-empty-accent">记录生活点滴</span>
        </h1>
        <p className="record-empty-hero-sub">说一句话，情绪 · 症状 · 饮食 自动整理</p>
      </div>

      <div className="record-empty-demo">
        <RecordEmptyDemoCard t={t} P={P}/>

      <div className="record-empty-voice-wrap">

          P={P}
          pressed={pressed}
          onPress={()=>setPressed(true)}

          {pressed ? '松开发送' : '按住说话  或  点击长录'}
        </p>
      </div>
    </div>
  );
}

function RecordEmptyDemoCard({ t, P }) {
  const pCard = easeOut(range(t, 0.0, 0.4));
  const pVoice = easeOut(range(t, 0.5, 1.0));
  const pText = range(t, 1.1, 2.0);
  const pTags = [range(t, 2.0, 2.25), range(t, 2.2, 2.45), range(t, 2.4, 2.65)];
  const pChart = easeOut(range(t, 2.7, 3.3));
  const shown = EMPTY_DEMO_TRANSCRIPT.slice(0, Math.floor(pText * EMPTY_DEMO_TRANSCRIPT.length));
  const pct = Math.floor((Math.min(t, EMPTY_DEMO_ACTIVE_SEC) / EMPTY_DEMO_ACTIVE_SEC) * 100);

  return (

      className="record-empty-card"
      style={{
        opacity: pCard,

        <span className="record-empty-card-pct">{pct}%</span>
      </div>

      <RecordEmptyVoiceBubble pIn={pVoice} pText={pText} text={shown} P={P} t={t}/>
      <RecordEmptyTagsRow progress={pTags} P={P}/>
      <RecordEmptyMiniChart progress={pChart} P={P}/>
    </div>

<script type="text/babel">
// ============ 记录 Tab · 空置页（场景三 — 空态 + 第一滴仪式） ============

const { useState, useEffect, useRef } = React;

function RecordBlankDroplet({ className, size = 'md', animateFloat = false, style }) {

        </filter>

        d="M11 2 C11 2, 2 14, 2 18 C2 23, 6 27, 11 27 C16 27, 20 23, 20 18 C20 14, 11 2, 11 2Z"

        filter={`url(#rbShadow${uid})`}
      />
      <path
        d="M11 2 C11 2, 2 14, 2 18 C2 23, 6 27, 11 27 C16 27, 20 23, 20 18 C20 14, 11 2, 11 2Z"
        fill={`url(#${shineId})`}
        opacity="0.85"
      />
      <ellipse
        cx="8"
        cy="14"
        rx="2.2"
        ry="3.2"
        fill="#fff"
        fillOpacity="0.38"
        transform="rotate(-22 8 14)"
      />
      <ellipse
        cx="13.2"
        cy="19"
        rx="1"
        ry="1.4"
        fill="#fff"
        fillOpacity="0.18"
      />
    </svg>
  );
}

const AXIS_FALL_MS = 540;
const AXIS_SPLASH_MS = 480;
const AXIS_SHRINK_MS = 160;
const AXIS_LAND_MS = AXIS_FALL_MS;
const AXIS_SETTLE_MS = AXIS_FALL_MS + AXIS_SPLASH_MS;
const AXIS_DONE_MS = AXIS_SETTLE_MS + AXIS_SHRINK_MS;
const SPLASH_ANGLES = [0, 60, 120, 180, 240, 300];

function easeInQuad(t){
  return t * t;
}

function easeOutCubic(t){
  return 1 - Math.pow(1 - t, 3);
}

function easeOutQuart(t){
  return 1 - Math.pow(1 - t, 4);
}

function computeAxisFall(t, distance){
  const p = Math.min(1, t / AXIS_FALL_MS);
  const gravity = easeInQuad(p);
  let y = -distance + gravity * distance;
  let sx = 1;
  let sy = 1;

  const speed = p < 1 ? Math.min(1, p * 1.35) : 0;
  const stretch = speed * (1 - p * 0.45);
  sy = 1 + stretch * 0.16;
  sx = 1 - stretch * 0.06;

  if(p >= 0.78){
    const u = (p - 0.78) / 0.22;
    const bounce = Math.sin(u * Math.PI);
    sy = 1 - bounce * 0.24;
    sx = 1 + bounce * 0.16;
    y -= bounce * 4;
  }

  const fadeTail = p > 0.94 ? (p - 0.94) / 0.06 : 0;
  return {
    y,
    sx,
    sy,
    opacity: 1 - fadeTail * 0.85,
  };
}

function RecordBlankAxisSplash({ elapsed, shrinkElapsed = 0 }) {
  const uid = React.useId().replace(/:/g, '');
  const gradId = 'rbAxisGrad' + uid;
  const p = Math.min(1, elapsed / AXIS_SPLASH_MS);
  const burst = easeOutCubic(Math.min(1, p / 0.36));
  const fade = p > 0.5 ? easeOutQuart((p - 0.5) / 0.5) : 0;
  const shrinkT = Math.min(1, shrinkElapsed / AXIS_SHRINK_MS);
  const shrinkEase = easeOutCubic(shrinkT);
  const dropScale = (1 - fade * 0.18) * (1 - shrinkEase * 0.86);
  const ringScale = 0.4 + burst * 1.05;
  const ringOp = 0.38 * (1 - easeOutQuart(p));

  return (
    <div className="record-blank-axis-splash" aria-hidden="true">
      <span
        className="record-blank-axis-splash-ring is-outer"
        style={{
          transform: `scale(${ringScale})`,
          opacity: ringOp * (1 - shrinkEase),
        }}
      />
      <span
        className="record-blank-axis-splash-ring is-inner"
        style={{
          transform: `scale(${0.35 + burst * 0.72})`,
          opacity: ringOp * 0.82 * (1 - shrinkEase),
        }}
      />
      <svg
        className="record-blank-axis-splash-svg"
        width="48"
        height="48"
        viewBox="0 0 48 48"
        fill="none"
        style={{ transform: `scale(${dropScale})` }}
      >
        <defs>
          <linearGradient id={gradId} x1="24" y1="10" x2="24" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stopColor="#ffb8d0" stopOpacity="0.55"/>
            <stop offset="38%" stopColor="#ff8fb4" stopOpacity="0.78"/>
            <stop offset="100%" stopColor="#ff4d88" stopOpacity="0.92"/>
          </linearGradient>
        </defs>
        {SPLASH_ANGLES.map((deg, i) => {
          const delay = i * 32;
          const local = Math.max(0, elapsed - delay);
          const lp = Math.min(1, local / (AXIS_SPLASH_MS * 0.72));
          const expand = easeOutCubic(lp);
          const particleFade = lp > 0.58 ? easeOutQuart((lp - 0.58) / 0.42) : 0;
          const orbit = 2 + expand * 15 - particleFade * 4;
          const dotOp = 0.58 * (1 - particleFade) * (1 - shrinkEase * 0.9);
          const rad = (deg - 90) * Math.PI / 180;
          const r = 3.4 - particleFade * 1.4;
          if(dotOp <= 0.02) return null;
          return (
            <circle
              key={deg}
              cx={24 + Math.cos(rad) * orbit}
              cy={24 + Math.sin(rad) * orbit}
              r={r}
              fill="#ff4d88"
              fillOpacity={dotOp}
            />
          );
        })}
        <path
          d="M24 11 C24 11, 17 20, 17 23.5 C17 27.2, 20.1 30, 24 30 C27.9 30, 31 27.2, 31 23.5 C31 20, 24 11, 24 11Z"
          fill={`url(#${gradId})`}
          fillOpacity={1 - shrinkEase * 0.15}
        />
        <ellipse
          cx="21.5"
          cy="21"
          rx="1.6"
          ry="2.2"
          fill="#fff"
          fillOpacity={0.42 * (1 - shrinkEase)}
          transform="rotate(-18 21.5 21)"
        />
      </svg>
      {shrinkEase > 0.08 && (
        <span
          className="record-blank-axis-settle-dot"
          style={{
            transform: `scale(${0.18 + shrinkEase * 0.12})`,
            opacity: shrinkEase,
          }}
        />
      )}
    </div>
  );
}

function RecordBlankAxisLand({ t, variant = 'ceremony' }) {
  const distance = variant === 'timeline' ? 76 : 128;
  const landClass = 'record-blank-axis-land' + (variant === 'timeline' ? ' is-timeline' : '');
  const fallT = Math.min(t, AXIS_LAND_MS);
  const fall = computeAxisFall(fallT, distance);
  const splashElapsed = Math.max(0, t - AXIS_LAND_MS);
  const shrinkElapsed = Math.max(0, t - AXIS_SETTLE_MS);
  const inFall = t < AXIS_LAND_MS;
  const inSplash = t >= AXIS_LAND_MS && t < AXIS_DONE_MS;
  const preSplash = t >= AXIS_LAND_MS - 64 && t < AXIS_LAND_MS;
  const preSplashMix = preSplash ? (t - (AXIS_LAND_MS - 64)) / 64 : 0;
  const showFallDroplet = inFall && fall.opacity > 0.08;
  const showSplash = inSplash || preSplashMix > 0.12;
  const showCeremonyDot = variant !== 'timeline' && t >= AXIS_DONE_MS;

  const innerTransform = inFall
    ? `translateY(${fall.y}px) scale(${fall.sx}, ${fall.sy})`
    : 'translateY(0) scale(1, 1)';

  return (
    <div className={landClass} aria-hidden="true">
      <div
        className="record-blank-axis-land-inner"
        style={{ transform: innerTransform }}
      >
        {showFallDroplet && (
          <RecordBlankDroplet
            className="is-axis-fall"
            style={{ opacity: fall.opacity * (1 - preSplashMix * 0.75) }}
          />
        )}
        {showSplash && (
          <div
            className="record-blank-axis-splash-wrap"
            style={{ opacity: inSplash ? 1 : preSplashMix * 0.55 }}
          >
            <RecordBlankAxisSplash
              elapsed={inSplash ? splashElapsed : 0}
              shrinkElapsed={variant === 'timeline' ? shrinkElapsed : 0}
            />
          </div>
        )}
        {showCeremonyDot && <span className="record-blank-node-dot is-landed"/>}
      </div>
    </div>
  );
}

function RecordBlankAxisDropAnim({ onLand, onComplete }) {
  const [t, setT] = useState(0);
  const landRef = useRef(false);
  const completeRef = useRef(false);
  const startRef = useRef(performance.now());

  useEffect(() => {
    landRef.current = false;
    completeRef.current = false;
    startRef.current = performance.now();
    setT(0);
    let raf;
    const tick = () => {
      const elapsed = performance.now() - startRef.current;
      setT(elapsed);
      if(elapsed < AXIS_DONE_MS + 40) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  useEffect(() => {
    if(t >= AXIS_LAND_MS && !landRef.current){
      landRef.current = true;
      onLand?.();
    }
  }, [t, onLand]);

  useEffect(() => {
    if(t >= AXIS_DONE_MS && !completeRef.current){
      completeRef.current = true;
      onComplete?.();
    }
  }, [t, onComplete]);

  return <RecordBlankAxisLand t={t} variant="timeline"/>;
}

function RecordBlankRipples({ className, variant = 'wait' }) {
  return (
    <div className={'record-blank-ripples' + (className ? ' ' + className : '') + (variant === 'splash' ? ' is-splash' : '')} aria-hidden="true">
      <span className="record-blank-ripple"/>
      <span className="record-blank-ripple"/>
      <span className="record-blank-ripple"/>
    </div>
  );
}

function RecordBlankGuideCard({ showArrow }) {
  return (
    <div className="record-blank-guide-card">
      <p className="record-blank-guide-title">
        你的点滴，<br/>
        从第一句话开始
      </p>
      <p className="record-blank-guide-sub">
        说说今天吃了什么、心情怎么样<br/>
        每一条都会变成时间轴上的一滴
      </p>
      <div className={'record-blank-guide-arrow-row' + (showArrow ? ' is-visible' : '')}>
        <span className="record-blank-guide-arrow-btn" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 2v8m0 0l-3-3m3 3l3-3" stroke="#ff4d88" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </span>
        <span className="record-blank-guide-arrow-text">在下方输入框说点什么</span>
      </div>
    </div>
  );
}

function RecordBlankGhostCards({ visible }) {
  return (
    <div className={'record-blank-ghost-stack' + (visible ? ' is-visible' : '')} aria-hidden="true">
      <div className="record-blank-ghost">
        <span className="record-blank-ghost-dot"/>
        <div className="record-blank-ghost-body is-tall"/>
      </div>
      <div className="record-blank-ghost">
        <span className="record-blank-ghost-dot"/>
        <div className="record-blank-ghost-body is-short"/>
      </div>
    </div>
  );
}

function RecordBlankEmptyState() {
  const [phase, setPhase] = useState(0);

  useEffect(() => {
    const timers = [
      setTimeout(() => setPhase(1), 400),
      setTimeout(() => setPhase(2), 1200),
      setTimeout(() => setPhase(3), 2000),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div className="record-blank-empty" aria-label="记录页空态">
      <div className="record-blank-axis-line"/>

      <div className={'record-blank-droplet-hanger' + (phase >= 1 ? ' is-visible' : '')}>
        <RecordBlankDroplet animateFloat={phase >= 1}/>
      </div>

      <div className={'record-blank-ripple-field' + (phase >= 2 ? ' is-visible' : '')}>
        <div className="record-blank-ripple-core" aria-hidden="true">
          {[0, 1, 2].map(i => (
            <span key={'c' + i} className="record-blank-ripple-pulse" style={{ '--rb-pulse-i': i }}/>
          ))}
        </div>
        {[0, 1, 2, 3, 4].map(i => (
          <span key={i} className="record-blank-ripple-ring" style={{ '--rb-ring-i': i }}/>
        ))}
      </div>

      <div className={'record-blank-content' + (phase >= 2 ? ' is-visible' : '')}>
        <RecordBlankGuideCard showArrow={phase >= 3}/>
        <RecordBlankGhostCards visible={phase >= 3}/>
      </div>
    </div>
  );
}

function RecordBlankScheme1Empty({ exiting }){
  return (
    <RecordBlankScheme1 ceremonyEntry={null}/>
  );
}

function RecordBlankScheme2Stack({ previewBlocks }) {
  const TimelineStream = window.TimelineStream;
  return (
    <div className="record-blank-scheme2-stack" aria-label="示例数据预览">
      <div className="record-blank-scheme2-preview" aria-hidden="true">
        <TimelineStream
          blocks={previewBlocks}
          sisterPlayAnimation={0}
          sisterCycleDone={true}
          hideTodayGuide={true}
          hideGapDivider={true}
          hideDayHeader={true}
        />
      </div>
      <div className="record-blank-scheme2-mask" aria-hidden="true"/>
    </div>
  );
}

function RecordBlankStream({
  streamRef,
  timelineEndRef,
  timeline,
  scene,
  onOpenCalendar,
  onOpenSearch,
  sisterPlayAnimation,
  sisterCycleDone,
  hideTodayGuide,
  onSisterCycleComplete,
}){
  const I = window.Icon;
  const TimelineStream = window.TimelineStream;
  const showBlank = window.isTimelineEmpty(timeline);
  const scheme = scene.record.blankScheme || 1;
  const previewBlocks = scheme === 2 && showBlank ? window.getBlankScheme2PreviewTimeline() : null;

  const renderBlankBody = ()=>{
    if(scheme === 2 && previewBlocks){
      return <RecordBlankScheme2Stack previewBlocks={previewBlocks}/>;
    }
    if(scheme === 3){
      return (
        <RecordBlankScheme3Guide exiting={false}/>
      );
    }
    if(scheme === 1){
      return (
        <RecordBlankScheme1 ceremonyEntry={null}/>
      );
    }
    return <div className="record-blank-plain" aria-hidden="true"/>;
  };

  const schemeCls = scheme === 1 && showBlank ? ' is-scheme1'
    : (scheme === 2 && showBlank ? ' is-scheme2'
    : (scheme === 3 && showBlank ? ' is-scheme3' : ''));

  return (
    <div className={'suiji-stream record-blank-stream' + schemeCls} ref={streamRef}>
      <div className="stream-header">
        <div>
          <h1 className="stream-title">点滴</h1>
        </div>
        <div className="stream-actions">
          {scene.calendar.enabled && (
            <button
              className="stream-action"
              aria-label="日历"
              type="button"
              onClick={onOpenCalendar}
            >
              <I name="calendar" size={20} stroke={1.7}/>
            </button>
          )}
          <button
            className="stream-action"
            aria-label="搜索"
            type="button"
            onClick={onOpenSearch}
          >
            <I name="search" size={20} stroke={1.7}/>
          </button>
        </div>
      </div>

      {showBlank ? renderBlankBody() : (
        <TimelineStream
          blocks={timeline}
          endRef={timelineEndRef}
          sisterPlayAnimation={sisterPlayAnimation}
          sisterCycleDone={sisterCycleDone}
          hideTodayGuide={hideTodayGuide}
          onSisterCycleComplete={onSisterCycleComplete}
        />
      )}
    </div>
  );
}

Object.assign(window, {
  RecordBlankStream,
  RecordBlankEmptyState,
  RecordBlankAxisDropAnim,
});

</script>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const AXIS_GROW_PX = 340;

const CAPABILITY_CARDS = [

function shouldShowScheme3Bubble(){

    return !localStorage.getItem(SCHEME3_BUBBLE_KEY);

}

function markScheme3BubbleSeen(){

    localStorage.setItem(SCHEME3_BUBBLE_KEY, '1');

}

function formatCeremonyDayTitle(day){
  if(!day) return '今天 · 1条';
  return `${day.date} ${day.weekday} · 1条`;
}

const AXIS_STEP_MS = 900;
const SUBCOPY_AT = 2400;
const FIRST_CARD_AT = SUBCOPY_AT + AXIS_STEP_MS;
const SECOND_CARD_AT = FIRST_CARD_AT + AXIS_STEP_MS;
const THIRD_CARD_AT = SECOND_CARD_AT + AXIS_STEP_MS;

function RecordBlankScheme3Guide({ exiting }){
  const [headlinePhase, setHeadlinePhase] = useState('idle');
  const [axisPhase, setAxisPhase] = useState(0);
  const [showSubcopy, setShowSubcopy] = useState(false);
  const [visibleCardCount, setVisibleCardCount] = useState(0);

  useEffect(()=>{
    const timers = [
      setTimeout(()=>{
        setHeadlinePhase('in');
        setAxisPhase(1);
      }, 200),
      setTimeout(()=>setHeadlinePhase('out'), 1600),
      setTimeout(()=>setHeadlinePhase('gone'), 2100),
      setTimeout(()=>{
        setShowSubcopy(true);
        setAxisPhase(2);
      }, SUBCOPY_AT),
      setTimeout(()=>{
        setVisibleCardCount(1);
        setAxisPhase(3);
      }, FIRST_CARD_AT),
      setTimeout(()=>{
        setVisibleCardCount(2);
        setAxisPhase(4);
      }, SECOND_CARD_AT),
      setTimeout(()=>{
        setVisibleCardCount(3);
        setAxisPhase(5);
      }, THIRD_CARD_AT),
    ];
    return ()=>timers.forEach(clearTimeout);
  }, []);

  const headlineCls = headlinePhase === 'in' ? ' is-visible'
    : headlinePhase === 'out' ? ' is-visible is-exiting'
    : headlinePhase === 'gone' ? ' is-gone' : '';

  return (
    <div

        <h2 className={'rb-s3-headline'+headlineCls}>

              <div className="rb-s3-card-text">
                <span className="rb-s3-card-title">{card.title}</span>
                <span className="rb-s3-card-desc">{card.desc}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function RecordBlankScheme3Ceremony({ entry, dayBlock, onComplete }){

              <div className="rb-s3-ai-avatar" aria-hidden="true">AI</div>
              <div className="rb-s3-ai-body">
                <p className="rb-s3-ai-title">小柚收到啦</p>
                <p className="rb-s3-ai-text">
                  已经帮你记下来了～记满 7 天，我就能告诉你这周的变化趋势

              </svg>
              <span>已自动同步到「记录」日历</span>
            </div>

            <div className={'rb-s3-celebrate'+(phase >= 5 ? ' is-visible' : '')}>
              <RecordBlankScheme3Ripple/>
              <p className="rb-s3-celebrate-title">时间轴长出了第一节 🌱</p>
              <p className="rb-s3-celebrate-sub">它会随你的记录一直延伸</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {
  RecordBlankScheme3Guide,
  RecordBlankScheme3Ceremony,
  shouldShowScheme3Bubble,
  markScheme3BubbleSeen,
  SCHEME3_BUBBLE_KEY,
});

</script>

<script type="text/babel">
// ============ 记录搜索页 ============

const SEARCH_TAGS = [
  { id: 'cat-period', label: '月经', cat: 'period', emoji: '🩸' },
  { id: 'cat-symptom', label: '症状', cat: 'symptom', emoji: '🤕' },
  { id: 'cat-mood', label: '心情', cat: 'mood', emoji: '💭' },
  { id: 'cat-sleep', label: '睡眠', cat: 'sleep', emoji: '😴' },
  { id: 'cat-diet', label: '饮食', cat: 'diet', emoji: '🥗' },
  { id: 'cat-weight', label: '体重', cat: 'weight', emoji: '⚖️' },
];

const SEARCH_TAG_MAP = {};
SEARCH_TAGS.forEach(t => { SEARCH_TAG_MAP[t.id] = t; });

function flattenSearchableItems(blocks){
  const out = [];
  (blocks || []).forEach(block=>{
    if(block.type !== 'day') return;
    const dayMeta = {
      date: block.date,
      weekday: block.weekday || '',
      phaseTag: block.phaseTag || '',
    };
    (block.items || []).forEach(item=>{
      if(item.kind !== 'rec' && item.kind !== 'voice-card') return;
      const text = (item.body || item.voiceText || '').trim();
      if(!text && !item.photo) return;
      out.push({
        id: item.id,
        dayMeta,
        time: item.time,
        text,
        tags: item.tags || [],
        voice: item.voice,
        photo: item.photo,
      });
    });
  });
  return out;
}

function itemMatchesFilters(item, query, activeTags){
  const q = query.trim().toLowerCase();
  const hasTags = activeTags.length > 0;

  let matchQuery = !q;
  if(q){
    const tagText = (item.tags || []).map(t=>t.label).join(' ');
    const haystack = (item.text + ' ' + tagText).toLowerCase();
    matchQuery = haystack.includes(q);
  }

  let matchTags = !hasTags;
  if(hasTags){
    matchTags = activeTags.some(filter=>{
      const tagHit = (item.tags || []).some(tag=>{
        const r = window.resolveTag(tag);
        if(filter.cat && !filter.matchLabel) return r.cat === filter.cat;
        if(filter.matchLabel){
          if(r.label.includes(filter.matchLabel) || filter.matchLabel.includes(r.label)) return true;
          if(filter.cat && r.cat === filter.cat) return true;
        }
        return false;
      });
      if(tagHit) return true;
      if(filter.matchLabel && item.text.includes(filter.matchLabel)) return true;
      if(filter.cat === 'period' && /月经|经期/.test(item.text)) return true;
      if(filter.cat === 'symptom' && /腹胀|腰酸|疲惫|痛|不适/.test(item.text)) return true;
      if(filter.cat === 'mood' && /心情|情绪|愉快|低落|平静/.test(item.text)) return true;
      if(filter.cat === 'sleep' && /睡/.test(item.text)) return true;
      if(filter.cat === 'weight' && /体重|kg|公斤|斤/.test(item.text)) return true;
      if(filter.cat === 'diet' && /吃|餐|饮食|午饭|晚饭|早餐/.test(item.text)) return true;
      if(filter.cat === 'fitness' && /跑|运动|健身/.test(item.text)) return true;
      return false;
    });
  }

  return matchQuery && matchTags;
}

function highlightQuery(text, query){
  const q = query.trim();
  if(!q || !text) return text;
  const lower = text.toLowerCase();
  const idx = lower.indexOf(q.toLowerCase());
  if(idx < 0) return text;
  return (
    <>
      {text.slice(0, idx)}
      <mark className="search-hl">{text.slice(idx, idx + q.length)}</mark>
      {text.slice(idx + q.length)}
    </>
  );
}

function SearchResultCard({item, query}){
  const RecordedTags = window.RecordedTags;
  const excerpt = item.text.length > 72 ? item.text.slice(0, 72) + '…' : item.text;
  const dayLine = [item.dayMeta.date, item.dayMeta.weekday].filter(Boolean).join(' · ');

  return (
    <article className="search-result-card">
      <div className="search-result-meta-row">
        <span className="search-result-date">{dayLine}</span>
        {item.time && <span className="search-result-time">{item.time}</span>}
        {item.voice && (
          <span className="search-result-voice">
            <span aria-hidden="true">🎙</span>
            {item.voice.duration || '语音'}
          </span>
        )}
      </div>
      {item.text && (
        <p className="search-result-body">{highlightQuery(excerpt, query)}</p>
      )}
      {item.tags.length > 0 && (
        <RecordedTags tags={item.tags} layout="t5"/>
      )}
    </article>
  );
}

function SearchPage({timeline, onClose}){
  const [query, setQuery] = React.useState('');
  const [selectedIds, setSelectedIds] = React.useState([]);
  const inputRef = React.useRef(null);

  const allItems = React.useMemo(()=>flattenSearchableItems(timeline), [timeline]);
  const activeTags = React.useMemo(
    ()=>selectedIds.map(id=>SEARCH_TAG_MAP[id]).filter(Boolean),
    [selectedIds]
  );
  const hasFilter = !!(query.trim() || selectedIds.length);

  const results = React.useMemo(()=>{
    if(!hasFilter) return [];
    return allItems
      .filter(item=>itemMatchesFilters(item, query, activeTags))
      .slice()
      .reverse();
  }, [allItems, query, activeTags, hasFilter]);

  React.useEffect(()=>{
    const tm = setTimeout(()=>inputRef.current?.focus(), 120);
    return ()=>clearTimeout(tm);
  }, []);

  const toggleTag = (id)=>{
    setSelectedIds(prev=>prev.includes(id) ? prev.filter(x=>x !== id) : [...prev, id]);
  };

  const clearFilters = ()=>{
    setQuery('');
    setSelectedIds([]);
    inputRef.current?.focus();
  };

  const I = window.Icon;

  return (
    <div className="search-page" role="dialog" aria-modal="true" aria-label="搜索">
      <div className="search-nav">
        <button type="button" className="search-back" aria-label="返回" onClick={onClose}>
          <I name="arrow-left" size={22} stroke={2}/>
        </button>
        <h1 className="search-nav-title">搜索</h1>
        {hasFilter && (
          <button type="button" className="search-reset" onClick={clearFilters}>清除</button>
        )}
      </div>

      <div className="search-field-wrap">
        <span className="search-field-ico" aria-hidden="true">
          <I name="search" size={18} stroke={1.8}/>
        </span>
        <input
          ref={inputRef}
          className="search-field"
          type="search"
          enterKeyHint="search"
          placeholder="输入关键字检索"
          value={query}
          onChange={e=>setQuery(e.target.value)}
        />
        {query && (
          <button type="button" className="search-field-clear" aria-label="清空" onClick={()=>setQuery('')}>
            <I name="close" size={14} stroke={2}/>
          </button>
        )}
      </div>

      <div className="search-scroll">
        <section className="search-tags-section" aria-label="标签筛选">
          <div className="search-tags">
            {SEARCH_TAGS.map(tag=>{
              const active = selectedIds.includes(tag.id);
              return (
                <button
                  key={tag.id}
                  type="button"
                  className={'search-tag'+(active ? ' is-active' : '')}
                  aria-pressed={active}
                  onClick={()=>toggleTag(tag.id)}
                >
                  {tag.emoji && <span className="search-tag-emoji" aria-hidden="true">{tag.emoji}</span>}
                  {tag.label}
                </button>
              );
            })}
          </div>
        </section>

        <section className="search-results" aria-live="polite">
          {!hasFilter && (
            <div className="search-empty search-empty--idle">
              <p className="search-empty-desc">输入关键字，或点选标签筛选</p>
            </div>
          )}

          {hasFilter && (
            <div className="search-results-head">
              <h2 className="search-results-title">搜索结果</h2>
              <span className="search-results-count">{results.length} 条</span>
            </div>
          )}

          {hasFilter && results.length === 0 && (
            <div className="search-empty">
              <p className="search-empty-title">没有找到相关记录</p>
              <p className="search-empty-desc">换个关键字或标签试试</p>
            </div>
          )}

          <div className="search-result-list">
            {results.map(item=>(
              <SearchResultCard key={item.id} item={item} query={query}/>
            ))}
          </div>
        </section>
      </div>
    </div>
  );
}

Object.assign(window, { SearchPage, flattenSearchableItems });

</script>

            <div className="quick-card-fan-panel" aria-hidden={!isSel}>
              <div className="quick-card-fan-panel-hd">
                <span className="quick-card-fan-panel-title">{card.title}</span>
                <button type="button" className="quick-card-fan-panel-close" onClick={onClose} aria-label="关闭">
                  ×
                </button>
              </div>
              <div className="quick-card-fan-panel-body">
                {card.id === 'mood' ? (
                  <QuickMoodPicker onSubmit={onMoodSubmit}/>
                ) : card.id === 'symptom' ? (
                  <QuickSymptomPicker onSubmit={onSymptomSubmit}/>
                ) : card.id === 'diet' ? (
                  <QuickFoodPicker onSubmit={onFoodSubmit}/>
                ) : (
                  <QuickWeightPicker onSubmit={onWeightSubmit}/>
                )}
              </div>
            </div>
          </div>
        );
      })}

      <button
        type="button"
        className={'quick-card-fab'+(open ? ' is-open' : '')+(selected ? ' is-covered' : '')}
        onClick={onFabTap}
        aria-expanded={open}
        aria-label={open ? '收起快捷记录' : '快捷记录'}
      >
        {open
          ? <I name="close" size={20} stroke={2.2}/>
          : <I name="plus" size={24} stroke={2.2}/>}
      </button>
    </div>
  );
}

function DockPublisher({
  draft, onDraft, onSend, onQuickMark, onMoodConfirm, onSymptomConfirm, onWeightConfirm,
  onFoodConfirm,
  onVoiceDone, onPhoto, onDockExpandedChange, activeTab, showScheme3Bubble,
  highlightScheme3Input, dockPlaceholder, defaultInputMode = 'text',
}){
  const I = window.Icon;
  const DockMoodPicker = window.DockMoodPicker;
  const DockSymptomPicker = window.DockSymptomPicker;
  const DockWeightPicker = window.DockWeightPicker;
  const [inputMode, setInputMode] = React.useState(defaultInputMode);
  const [quickOpen, setQuickOpen] = React.useState(false);
  const [quickSelected, setQuickSelected] = React.useState(null);
  const [dockSheet, setDockSheet] = React.useState(null);
  const [recording, setRecording] = React.useState(false);
  const [recSec, setRecSec] = React.useState(0);
  const [inputFocused, setInputFocused] = React.useState(false);
  const recTimer = React.useRef(null);
  const prevTabRef = React.useRef(activeTab);

  React.useEffect(()=>{
    setInputMode(defaultInputMode);
  }, [defaultInputMode]);

  React.useEffect(()=>{
    if(activeTab === 'note' && prevTabRef.current !== 'note'){
      setQuickOpen(false);
      setQuickSelected(null);
      setDockSheet(null);
    }
    prevTabRef.current = activeTab;
  }, [activeTab]);

  React.useEffect(()=>{
    if(!showScheme3Bubble) return;
    const tm = setTimeout(()=>window.markScheme3BubbleSeen?.(), 2400);
    return ()=>clearTimeout(tm);
  }, [showScheme3Bubble]);

  const closeQuick = ()=>{
    setQuickSelected(null);
    setQuickOpen(false);
  };

  const handleFabTap = ()=>{
    if(quickOpen) closeQuick();
    else setQuickOpen(true);
  };


  React.useEffect(()=>{
    if(recording){
      recTimer.current = setInterval(()=>setRecSec(s=>s+1), 1000);
    } else {
      clearInterval(recTimer.current);
      setRecSec(0);
    }
    return ()=>clearInterval(recTimer.current);
  }, [recording]);

  const startRec = ()=> setRecording(true);
  const stopRec = ()=>{
    if(!recording) return;
    setRecording(false);
    onVoiceDone(DEMO_VOICE_LINE, Math.max(recSec, 3));
  };

  const toggleMode = ()=>{
    setInputMode(m=>m==='text' ? 'voice' : 'text');
    closeQuick();
  };

  const closeDockSheet = ()=> setDockSheet(null);

  const handleQuickMoodSubmit = (moods)=>{
    closeQuick();
    onMoodConfirm?.(moods);
  };

  const handleQuickSymptomSubmit = (symptoms)=>{
    closeQuick();
    onSymptomConfirm?.(symptoms);
  };

  const handleQuickWeightSubmit = (payload)=>{
    closeQuick();
    onWeightConfirm?.(payload);
  };

  const handleQuickFoodSubmit = (foods)=>{
    closeQuick();
    onFoodConfirm?.(foods);
  };

  const handleMoodConfirm = (moods)=>{
    setDockSheet(null);
    onMoodConfirm?.(moods);
  };

  const handleSymptomConfirm = (symptoms)=>{
    setDockSheet(null);
    onSymptomConfirm?.(symptoms);
  };

  const handleWeightConfirm = (payload)=>{
    setDockSheet(null);
    onWeightConfirm?.(payload);
  };

  React.useEffect(()=>{
    onDockExpandedChange?.(!!dockSheet || !!quickSelected);
  }, [dockSheet, quickSelected, onDockExpandedChange]);

  const isDockExpanded = !!dockSheet;
  const isQuickActive = quickOpen || !!quickSelected;
  const inputPlaceholder = dockPlaceholder || DOCK_PLACEHOLDER;

  return (
    <>
      <div className={'quick-float-wrap'+(isDockExpanded ? ' is-covered' : '')+(isQuickActive ? ' is-quick-active' : '')}>
        {isQuickActive ? (
          <div
            className="quick-card-fan-scrim"
            onClick={closeQuick}
            aria-hidden="false"
          />
        ) : null}
        <QuickCardFan
          open={quickOpen}
          selected={quickSelected}
          onFabTap={handleFabTap}
          onSelectCard={setQuickSelected}
          onClose={closeQuick}
          onMoodSubmit={handleQuickMoodSubmit}
          onSymptomSubmit={handleQuickSymptomSubmit}
          onWeightSubmit={handleQuickWeightSubmit}
          onFoodSubmit={handleQuickFoodSubmit}
        />
      </div>

      <div className={'dock-wrap'+(isDockExpanded?' is-mood-expanded':'')}>
        <div className={'dock-panel'+(isDockExpanded?' is-mood-expanded':'')}>
          {dockSheet === 'mood' ? (
            <DockMoodPicker
              onConfirm={handleMoodConfirm}
              onCancel={closeDockSheet}
            />
          ) : dockSheet === 'symptom' ? (
            <DockSymptomPicker
              onConfirm={handleSymptomConfirm}
              onCancel={closeDockSheet}
            />
          ) : dockSheet === 'weight' ? (
            <DockWeightPicker
              onConfirm={handleWeightConfirm}
              onCancel={closeDockSheet}
            />
          ) : (
          <div className="dock-bar">
            <div className="dock-input-row">
              <button
                type="button"
                className="dock-mode-btn"
                onClick={toggleMode}
                aria-label={inputMode==='text'?'切换语音':'切换键盘'}
              >
                {inputMode==='text'
                  ? <I name="mic" size={22} stroke={1.6}/>
                  : <span className="dock-kbd-ico">⌨</span>}
              </button>

              {inputMode==='text' ? (
                <div className={'dock-text-field'
                  +(inputFocused?' is-focused':'')
                  +(highlightScheme3Input?' is-scheme3-highlight':'')}>
                  {showScheme3Bubble && !draft.trim() && !inputFocused ? (
                    <span className="dock-scheme3-bubble" aria-hidden="true">
                      ✏️ 记下第一刻
                    </span>
                  ) : null}
                  <DockWavePlaceholder
                    show={inputMode === 'text' && !draft.trim() && !showScheme3Bubble}
                    focused={inputFocused}
                  />
                  <textarea
                    rows="1"
                    placeholder=""
                    aria-label={inputPlaceholder}
                    value={draft}
                    onChange={(e)=>{
                      onDraft(e.target.value);
                      e.target.style.height='auto';
                      e.target.style.height = Math.min(e.target.scrollHeight, 72)+'px';
                    }}
                    onFocus={()=>setInputFocused(true)}
                    onBlur={()=>setInputFocused(false)}
                    onKeyDown={(e)=>{
                      if(e.key==='Enter' && !e.shiftKey && draft.trim()){
                        e.preventDefault();
                        onSend();
                      }
                    }}
                  />
                </div>
              ) : (
                <div className={'dock-voice-wrap'+(recording?' is-recording':'')}>
                  <div className="dock-voice-stage" aria-hidden="true">
                    <span className="dock-voice-shimmer"/>
                  </div>
                  <button
                    type="button"
                    className={'dock-voice-btn'+(recording?' recording':'')}
                    onPointerDown={(e)=>{ e.preventDefault(); startRec(); }}
                    onPointerUp={stopRec}
                    onPointerLeave={recording ? stopRec : undefined}
                  >
                    {recording ? (
                      <>
                        <span className="dock-voice-waves" aria-hidden="true">
                          {[4,8,12,8,6,10,7].map((h,j)=><span key={j} style={{height:h+'px'}}/>)}
                        </span>
                        <span>松开 结束{recSec > 0 ? ' '+recSec+'s' : ''}</span>
                      </>
                    ) : (
                      <span className="dock-voice-label">按住 说话</span>
                    )}
                  </button>
                </div>
              )}

              {inputMode==='text' && draft.trim() ? (
                <button type="button" className="dock-send-btn" onClick={onSend} aria-label="发送">
                  <I name="send" size={16} stroke={2}/>
                </button>
              ) : null}
            </div>

            <button
              type="button"
              className="dock-camera-btn"
              onClick={onPhoto}
              aria-label="拍照上传"
            >
              <I name="camera" size={22} stroke={1.6}/>
            </button>
          </div>
          )}
        </div>
      </div>
    </>
  );
}

Object.assign(window, { DockPublisher, CloudPublisher: DockPublisher });
</script>

<script type="text/babel">
// voice-transcribe-recorder.jsx — 场景五 · 按住说话输入条
/* global React */

const { useState, useEffect, useRef } = React;

const VT_T = window.VT_T || {
  ink2: '#666666',
  pink: '#ff4d88',
  pinkDeep: '#e04378',
  pinkBorder: 'rgba(255,77,136,0.28)',
};
window.VT_T = VT_T;

function VoiceTranscribeBar({
  onStart, onEnd, onCancel, recording, elapsed = 0, variant = 'live-drop',
  cancelHover = false, onCancelHoverChange,
}) {
  const startYRef = useRef(0);
  const [localCancel, setLocalCancel] = useState(false);
  const cancelHoverActive = onCancelHoverChange ? cancelHover : localCancel;
  const setCancelHover = (v) => {
    if(onCancelHoverChange) onCancelHoverChange(v);
    else setLocalCancel(v);
  };

  const handleDown = (e) => {
    e.preventDefault();
    startYRef.current = (e.touches?.[0]?.clientY ?? e.clientY) || 0;
    onStart && onStart();
  };
  const handleMove = (e) => {
    if(!recording) return;
    const y = (e.touches?.[0]?.clientY ?? e.clientY) || 0;
    setCancelHover(startYRef.current - y > 80);
  };
  const handleUp = () => {
    if(!recording) return;
    if(cancelHoverActive) onCancel && onCancel();
    else onEnd && onEnd();
    setCancelHover(false);
  };

  useEffect(() => {
    if(!recording) return;
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchend', handleUp);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove);
    return () => {
      window.removeEventListener('mouseup', handleUp);
      window.removeEventListener('touchend', handleUp);
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('touchmove', handleMove);
    };
  }, [recording, cancelHoverActive]);

  const [tick, setTick] = useState(0);
  useEffect(() => {
    if(!recording) return;
    let raf;
    const loop = (t) => { setTick(t); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [recording]);

  const heights = Array.from({ length: 7 }).map((_, i) => {
    const ph = tick / 220 + i * 0.55;
    const v = Math.sin(ph) * 0.55 + Math.sin(ph * 1.7 + i) * 0.35;
    return 5 + Math.abs(v) * 14;
  });

  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = Math.floor(elapsed % 60).toString().padStart(2, '0');
  const stroke = 'rgba(0,0,0,0.55)';

  const showRecHint = recording && (variant === 'live-float' ? cancelHoverActive : true);

  return (
    <>
      {showRecHint && (
        <div className={'vt-rec-hint' + (cancelHoverActive ? ' is-cancel' : '')}>
          {cancelHoverActive ? '松开取消 ✕' : `↑ 上滑取消 · ${mm}:${ss}`}
        </div>
      )}

      <div className="vt-input-bar">
        <button type="button" className="vt-chip-btn" aria-label="键盘">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="2.5" y="6.5" width="19" height="12" rx="2.5" stroke={stroke} strokeWidth="1.6"/>
            <path d="M6 11h.01M9 11h.01M12 11h.01M15 11h.01M18 11h.01M7 14.5h10" stroke={stroke} strokeWidth="1.6" strokeLinecap="round"/>
          </svg>
        </button>

        <button
          type="button"
          className={'vt-hold-btn' + (recording ? ' is-recording' : ' is-idle')}
          onMouseDown={handleDown}
          onTouchStart={handleDown}
        >
          {recording ? (
            <>
              <span className="vt-hold-waves" aria-hidden="true">
                {heights.map((h, i) => (
                  <span key={i} className="vt-hold-wave" style={{ height: h }} />
                ))}
              </span>
              <span className="vt-hold-label is-recording">
                {cancelHoverActive ? '松开取消' : <>松开&nbsp;结束<span className="vt-hold-sub">· 上滑取消</span></>}
              </span>
            </>
          ) : (
            <span className="vt-hold-label">按住&nbsp;说话</span>
          )}
        </button>

        <button type="button" className="vt-chip-btn" aria-label="相机">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="2.5" y="6.5" width="19" height="13" rx="2.5" stroke={stroke} strokeWidth="1.6"/>
            <circle cx="12" cy="13" r="3.5" stroke={stroke} strokeWidth="1.6"/>
            <path d="M8 6.5l1.2-2h5.6L16 6.5" stroke={stroke} strokeWidth="1.6"/>
          </svg>
        </button>
      </div>
    </>
  );
}

function VoiceTranscribeAtmosphere({ active }) {
  if(!active) return null;
  return (
    <div className="vt-atmosphere" aria-hidden="true">
      <div className="vt-atmosphere-glow" />
      <div className="vt-atmosphere-halo" />
      {Array.from({ length: 12 }).map((_, i) => (
        <span
          key={i}
          style={{
            position: 'absolute',
            left: `${10 + ((i * 73) % 78)}%`,
            bottom: 70,
            width: 4 + (i % 4) * 2,
            height: 4 + (i % 4) * 2,
            borderRadius: '50%',
            background: i % 2
              ? 'radial-gradient(circle, #ffd9e6 0%, rgba(255,217,230,0) 70%)'
              : 'radial-gradient(circle, #fff 0%, rgba(255,255,255,0) 70%)',
            animation: `floatUp ${3.2 + (i % 4) * 0.4}s ease-out infinite`,
            animationDelay: `${(i * 0.17) % 2.4}s`,
            opacity: 0,
          }}
        />
      ))}
    </div>
  );
}

function VoiceTranscribeDockBar({ onCancel }){
  const stroke = 'rgba(0,0,0,0.55)';
  return (
    <div className="vt-input-bar vt-dock-transcribe">
      <button type="button" className="vt-dock-transcribe-cancel" onClick={onCancel} aria-label="取消">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6L6 18" stroke="rgba(0,0,0,0.75)" strokeWidth="2" strokeLinecap="round"/>
        </svg>
      </button>
      <div className="vt-dock-transcribe-pill">
        <span className="vt-dock-transcribe-spinner" aria-hidden="true">
          {[0, 1, 2, 3, 4, 5, 6, 7].map((i) => (
            <span key={i} className="vt-dock-spinner-dot" style={{ animationDelay: `${i * 0.08}s` }} />
          ))}
        </span>
        <span className="vt-dock-transcribe-label">正在转录</span>
      </div>
      <button type="button" className="vt-chip-btn" aria-label="相机">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="2.5" y="6.5" width="19" height="13" rx="2.5" stroke={stroke} strokeWidth="1.6"/>
          <circle cx="12" cy="13" r="3.5" stroke={stroke} strokeWidth="1.6"/>
          <path d="M8 6.5l1.2-2h5.6L16 6.5" stroke={stroke} strokeWidth="1.6"/>
        </svg>
      </button>
    </div>
  );
}

Object.assign(window, {
  VoiceTranscribeBar,
  VoiceTranscribeAtmosphere,
  VoiceTranscribeDockBar,
});

</script>

<script type="text/babel">
// voice-transcribe-interludes.jsx — 场景五 · 实时转写浮层（气泡 / 顶起 / 悬浮）
// Three variants of "where does the live text appear during press-and-hold":
//   live-drop   — text streams directly into a timeline card (no overlay)
//   live-bubble — speech bubble above the bar with live text + tail
//   live-grow   — panel grows upward from the bar (no bubble shape)
//   live-float  — bare floating text drifts above the bar, unboxed
/* global React, VT_T */

const { useState, useEffect, useRef } = React;

if(!window.VT_T){
  window.VT_T = {
    ink: '#323232',
    ink2: '#666666',
    ink3: '#999999',
    pink: '#ff4d88',
    pinkDeep: '#e04378',
    pinkBorder: 'rgba(255,77,136,0.28)',
    pinkSoft: 'rgba(255,77,136,0.08)',
  };
}
const VT_T = window.VT_T;

function Sparkle({ size = 12 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <path d="M12 2l2.2 6.8L21 11l-6.8 2.2L12 20l-2.2-6.8L3 11l6.8-2.2L12 2z" fill={VT_T.pink} />
    </svg>
  );
}

function AIOrb({ size = 22 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: "conic-gradient(from 0deg, #f43f7c, #ff8bb3, #ffd9e6, #f43f7c)",
      animation: "orbSpin 3s linear infinite",
      display: "grid", placeItems: "center", flexShrink: 0,
    }}>
      <span style={{
        width: size - 8, height: size - 8, borderRadius: "50%",
        background: "radial-gradient(circle at 35% 30%, #fff 0%, #ffd9e6 60%, #f43f7c 100%)",
      }} />
    </div>
  );
}

function ThinkingDots() {
  return (
    <span style={{ display: "inline-flex", gap: 3, alignItems: "center", marginLeft: 4 }}>
      {[0,1,2].map(i => (
        <span key={i} style={{
          width: 4, height: 4, borderRadius: 2, background: VT_T.pink, display: "inline-block",
          animation: `aiThinkPulse 1.2s ease-in-out infinite`, animationDelay: `${i * 0.15}s`,
        }} />
      ))}
    </span>
  );
}

// ─────────────────────────────────────────────────────────────
// V2 · LIVE-BUBBLE  — speech bubble above the bar
// ─────────────────────────────────────────────────────────────
function LiveBubble({ text, active, exiting = false }) {
  const anim = active
    ? 'bloomUp 0.32s cubic-bezier(.2,.7,.3,1)'
    : exiting
      ? 'bubbleFly 0.3s cubic-bezier(0.22,1,0.36,1) forwards'
      : undefined;
  return (
    <div
      className="vt-live-bubble"
      style={{
        animation: anim,
        ['--fly-x']: '-20px',
        ['--fly-y']: '-200px',
      }}
    >
      <div style={{
        maxWidth: "88%", minWidth: 120,
        background: "linear-gradient(135deg, #fff 0%, #fff5f8 100%)",
        border: `1px solid ${VT_T.pinkBorder}`,
        borderRadius: 18, padding: "12px 14px 12px 40px",
        position: "relative",
        boxShadow: "0 16px 36px -10px rgba(244,63,124,0.32), 0 2px 8px rgba(0,0,0,0.06)",
      }}>
        <div style={{ position: "absolute", left: 10, top: 10 }}>
          <AIOrb size={22} />
        </div>
        <div style={{ fontSize: 13.5, color: VT_T.ink, lineHeight: 1.65, minHeight: 22 }}>
          {text ? (
            <>{text}<span className="ai-caret" /></>
          ) : (
            <span style={{ color: VT_T.ink3, display: "inline-flex", alignItems: "center" }}>
              正在听<ThinkingDots />
            </span>
          )}
        </div>
        <div style={{
          position: "absolute", bottom: -7, left: 64,
          width: 14, height: 14, transform: "rotate(45deg)",
          background: "#fff",
          borderRight: `1px solid ${VT_T.pinkBorder}`,
          borderBottom: `1px solid ${VT_T.pinkBorder}`,
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// V3 · LIVE-GROW — docked panel growing upward from the bar
// ─────────────────────────────────────────────────────────────
function LiveGrowPanel({ text, active, exiting = false }) {
  const anim = active
    ? 'growUp 0.32s cubic-bezier(.2,.7,.3,1)'
    : exiting
      ? 'growUpExit 0.3s cubic-bezier(0.22,1,0.36,1) forwards'
      : undefined;
  return (
    <div
      className="vt-live-grow"
      style={{ animation: anim }}
    >
      <div style={{
        background: "rgba(255,255,255,0.96)",
        backdropFilter: "blur(14px)",
        border: `1px solid ${VT_T.pinkBorder}`,
        borderRadius: 20, padding: "14px 16px",
        boxShadow: "0 -10px 32px -10px rgba(244,63,124,0.35)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <AIOrb size={20} />
          <span className="ai-text-shimmer" style={{ fontSize: 12, fontWeight: 700 }}>
            AI 正在实时转写
          </span>
          <ThinkingDots />
        </div>
        <div style={{ fontSize: 14, color: VT_T.ink, lineHeight: 1.7, minHeight: 24 }}>
          {text ? (
            <>{text}<span className="ai-caret" /></>
          ) : (
            <span style={{ color: VT_T.ink3 }}>正在听…</span>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// V4 · LIVE-FLOAT — bare floating text above the bar, no chrome.
// Text uses layered white-halo shadows for legibility on any bg.
// The recorder bar hides its overlapping cancel-hint chip for this variant.
// ─────────────────────────────────────────────────────────────
function LiveFloat({ text, active, exiting = false }) {
  const anim = active
    ? 'bloomUp 0.32s cubic-bezier(.2,.7,.3,1)'
    : exiting
      ? 'floatAway 0.3s cubic-bezier(0.22,1,0.36,1) forwards'
      : undefined;
  return (
    <div
      className="vt-live-float"
      style={{ animation: anim }}
    >
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
        <div style={{
          flexShrink: 0,
          filter: "drop-shadow(0 2px 8px rgba(255,255,255,0.95)) drop-shadow(0 0 6px rgba(255,255,255,0.8))",
        }}>
          <AIOrb size={20} />
        </div>
        <div style={{ flex: 1, paddingTop: 0, minWidth: 0 }}>
          <div style={{
            fontSize: 13,
            lineHeight: 1.7,
            fontWeight: 500,
            color: VT_T.pinkDeep,
            letterSpacing: "0.01em",
            // soft white halo for legibility, no hard shadow
            textShadow: [
              "0 0 6px rgba(255,255,255,0.95)",
              "0 0 12px rgba(255,255,255,0.85)",
              "0 0 20px rgba(255,255,255,0.6)",
              "0 1px 0 rgba(255,255,255,0.9)",
            ].join(", "),
            minHeight: 22,
          }}>
            {text ? (
              <>{text}<span className="ai-caret" /></>
            ) : (
              <span style={{ color: VT_T.pink, opacity: 0.65, fontSize: 12 }}>
                正在听…
              </span>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 异步方案 · 按住录音可视化（与松手后转写风格匹配）──
const barFill = (cancel) => cancel ? '#cdc4c0' : 'linear-gradient(180deg, #ff8bb3 0%, #ff4d88 100%)';

function WaveBars({ cancel, blur = false, profile }) {
  return (
    <div className="vt-recwave-field" style={{ filter: blur ? 'blur(2.4px)' : 'none' }}>
      {profile.map((p, i) => (
        <span key={i} className="recwave-bar" style={{
          flex: 1, height: p.base, minWidth: 2, borderRadius: 2,
          background: barFill(cancel), opacity: cancel ? 0.7 : 0.88,
          animation: cancel ? 'none' : `liveBar ${p.dur}s ease-in-out ${p.delay}s infinite`,
        }} />
      ))}
    </div>
  );
}

function CalmPulse({ cancel, profile }) {
  return (
    <div className="vt-recwave-field vt-recwave-field--calm">
      {profile.slice(0, 22).map((p, i) => (
        <span key={i} style={{
          width: 3, height: 4 + (i % 3), borderRadius: 2,
          background: cancel ? '#cdc4c0' : VT_T.pink, opacity: cancel ? 0.6 : 0.55,
          animation: cancel ? 'none' : `aiThinkPulse ${1 + (i % 4) * 0.18}s ease-in-out ${(i % 6) * 0.1}s infinite`,
        }} />
      ))}
    </div>
  );
}

function GlowOrb({ cancel }) {
  return (
    <div className="vt-rec-glow-orb">
      {!cancel && [0, 1].map((i) => (
        <span key={i} className="vt-rec-glow-ring" style={{ animationDelay: `${i * 0.9}s` }} />
      ))}
      <div className={'vt-rec-glow-core' + (cancel ? ' is-cancel' : '')} />
    </div>
  );
}

function InkStroke({ cancel }) {
  return (
    <div className="vt-rec-ink">
      <div className={'vt-rec-ink-line' + (cancel ? ' is-cancel' : '')} />
      {!cancel && <div className="vt-rec-ink-nib" />}
    </div>
  );
}

function ListenRings({ cancel }) {
  return (
    <div className="vt-rec-listen">
      {!cancel && [0, 1, 2].map((i) => (
        <span key={i} className="vt-rec-glow-ring" style={{ animationDelay: `${i * 0.7}s` }} />
      ))}
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <AIOrb size={24} />
        {!cancel && <ThinkingDots />}
      </div>
    </div>
  );
}

function RecordingWave({ active, elapsed = 0, cancel = false, variant = 'wave' }) {
  const profileRef = useRef(null);
  if(!profileRef.current){
    profileRef.current = Array.from({ length: 34 }).map((_, i) => ({
      base: 8 + ((i * 37) % 22),
      dur: 0.55 + ((i * 13) % 9) * 0.06,
      delay: ((i * 17) % 11) * 0.06,
    }));
  }
  const profile = profileRef.current;

  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = Math.floor(elapsed % 60).toString().padStart(2, '0');
  const accent = cancel ? VT_T.ink2 : VT_T.pink;
  const listening = variant === 'glow' || variant === 'stream';
  const statusLabel = cancel ? '松开取消' : (listening ? '正在聆听' : '正在录音');

  let visual;
  if(variant === 'glow') visual = <GlowOrb cancel={cancel} />;
  else if(variant === 'stream') visual = <ListenRings cancel={cancel} />;
  else if(variant === 'calm' || variant === 'bar-transcribing') visual = <CalmPulse cancel={cancel} profile={profile} />;
  else if(variant === 'focus') visual = (
    <div className="vt-rec-focus-wrap">
      <WaveBars cancel={cancel} blur profile={profile} />
      {!cancel && <div className="vt-rec-frost-sweep" />}
    </div>
  );
  else visual = <WaveBars cancel={cancel} profile={profile} />;

  return (
    <div
      className={'vt-recording-wave' + (active ? ' is-active' : '') + (cancel ? ' is-cancel' : '')}
      style={{ animation: active ? 'bloomUp 0.32s cubic-bezier(.2,.7,.3,1) both' : 'floatAway 0.4s forwards' }}
    >
      <div className="vt-recording-wave-card">
        <div className="vt-recording-wave-head">
          <div className="vt-recording-wave-status">
            <span className="proc-dot" style={{ background: accent }} />
            <span style={{ color: cancel ? VT_T.ink2 : VT_T.pinkDeep }}>{statusLabel}</span>
          </div>
          <span className="vt-recording-wave-time" style={{ color: accent }}>{mm}:{ss}</span>
        </div>
        {visual}
      </div>
    </div>
  );
}

Object.assign(window, { LiveBubble, LiveGrowPanel, LiveFloat, RecordingWave });

</script>

<script type="text/babel">
// voice-transcribe-async.jsx — 场景五 · 异步转写（对齐点滴 v2：顶栏语音条 → 句尾胶囊）
/* global React, VT_T, V3v2Header, TLChart, TLTag */

const TL_PRIMARY = '#ff4d88';
const TL_TEXT = 'rgba(0,0,0,0.8)';
const TL_MUTED = 'rgba(0,0,0,0.6)';
const TL_LINE = 'rgba(0,0,0,0.08)';
const TL_HAIR = 'rgba(0,0,0,0.06)';
const TL_SOFT = 'rgba(255,77,136,0.08)';
const TL_PINK_SOFT = 'rgba(255,77,136,0.08)';
const TL_PINK_BORDER = 'rgba(255,77,136,0.28)';

const { useState, useEffect, useRef, useLayoutEffect } = React;

/** 时间轴转写动效 variant（不含 bar-transcribing，该方案仅影响底栏） */
const VT_ASYNC_VARIANTS = ['calm', 'wave', 'glow', 'focus', 'stream'];
const VT_DOCK_TRANSCRIBING = 'bar-transcribing';

const PROC_MS = { calm: 600, wave: 750, glow: 950, stream: 1300, focus: 820 };
const PER_MS = { calm: 44, wave: 52, glow: 74, stream: 36, focus: 26 };

function isAsyncVoiceVariant(v){
  return VT_ASYNC_VARIANTS.includes(v) || v === VT_DOCK_TRANSCRIBING;
}

function timelineVariantFor(v){
  return v === VT_DOCK_TRANSCRIBING ? 'calm' : v;
}

function VtThinkingDots(){
  return (
    <span style={{ display: 'inline-flex', gap: 3, alignItems: 'center', marginLeft: 4 }}>
      {[0, 1, 2].map((i) => (
        <span key={i} style={{
          width: 4, height: 4, borderRadius: 2, background: VT_T.pink, display: 'inline-block',
          animation: 'aiThinkPulse 1.2s ease-in-out infinite', animationDelay: `${i * 0.15}s`,
        }} />
      ))}
    </span>
  );
}

function VtThinkingHalo(){
  return (
    <div className="vt-thinking-halo">
      <div className="vt-thinking-halo-ring" />
      <div className="vt-thinking-halo-core" />
    </div>
  );
}

function VtProcessingHeader({ variant, duration }){
  const v = timelineVariantFor(variant);
  if(v === 'calm'){
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
        <span className="proc-dot" />
        <span style={{ fontSize: 12.5, fontWeight: 500, color: TL_MUTED }}>转写中</span>
        <VtThinkingDots />
      </div>
    );
  }
  const title = v === 'wave' ? '正在把声音转成文字'
    : v === 'focus' ? 'AI 正在显影文字'
    : v === 'stream' ? 'AI 正在理解你的语音'
    : 'AI 正在转写';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
      {v === 'stream' ? (
        <div style={{
          width: 22, height: 22, borderRadius: '50%',
          background: 'conic-gradient(from 0deg, #ff4d88, #ff8bb3, #ffd9e6, #ff4d88)',
          animation: 'orbSpin 3s linear infinite',
        }} />
      ) : <VtThinkingHalo />}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 12.5, fontWeight: 500, color: TL_TEXT, display: 'flex', alignItems: 'center' }}>
          <span className="ai-text-shimmer">{title}</span><VtThinkingDots />
        </div>
        <div style={{ fontSize: 10.5, color: TL_MUTED, marginTop: 1 }}>
          语音 {duration}″ · 提取要点 · 关联周期
        </div>
      </div>
    </div>
  );
}

function VtPlayBtn(){
  return (
    <button type="button" className="vt-voice-msg-play" aria-label="播放">
      <svg width="9" height="9" viewBox="0 0 12 12"><path d="M3 1.5l7 4.5-7 4.5V1.5z" fill="#fff" /></svg>
    </button>
  );
}

function VtVoiceMessageBar({ duration, live = false, morph = null, compact = false, exiting = false }){
  const N = 30;
  const bars = Array.from({ length: N }).map((_, i) => 6 + ((i * 53) % 16) + (i % 4 === 0 ? 7 : 0));
  return (
    <div className={'vt-voice-msg-bar' + (exiting ? ' is-exiting' : '') + (compact ? ' is-compact' : '')}>
      <VtPlayBtn />
      <div className="vt-voice-msg-waves">
        {bars.map((h, i) => {
          const consumed = morph != null && i / N < morph;
          return (
            <span
              key={i}
              className={live ? 'live-bar' : ''}
              style={{
                flex: 1, minWidth: 2, height: h, borderRadius: 2,
                background: consumed ? TL_PINK_BORDER : VT_T.pink,
                opacity: consumed ? 0.5 : 0.78 + ((i % 4) * 0.06),
                transform: consumed ? 'scaleY(0.45)' : undefined,
                transition: 'background 0.3s, opacity 0.3s, transform 0.3s',
                animationDelay: `${(i % 7) * 0.07}s`,
              }}
            />
          );
        })}
      </div>
      <span className="vt-voice-msg-dur">0:{String(duration).padStart(2, '0')}</span>
    </div>
  );
}

function VtInlineVoicePill({ duration, innerRef }){
  const bars = [6, 11, 7, 13, 8, 5];
  return (
    <span ref={innerRef} className="vt-inline-voice-pill">
      <span className="vt-inline-voice-play" aria-hidden="true">
        <svg width="8" height="8" viewBox="0 0 12 12"><path d="M3 1.5l7 4.5-7 4.5V1.5z" fill="#fff" /></svg>
      </span>
      <span className="vt-inline-voice-bars" aria-hidden="true">
        {bars.map((h, i) => (
          <span key={i} className="live-bar" style={{
            width: 2, height: h, borderRadius: 1, background: VT_T.pink, opacity: 0.9,
            animationDelay: `${(i % 5) * 0.08}s`,
          }} />
        ))}
      </span>
      <span className="vt-inline-voice-dur">0:{String(duration).padStart(2, '0')}</span>
    </span>
  );
}

function VtAsyncTranscriptionBody({ primary, variant, isNew, onDone, onPhaseChange }){
  const chars = primary.chars || [...(primary.text || '')];
  const duration = primary.durationSec || 2;
  const rawVariant = variant || primary.vtVariant || 'calm';
  const isDockMode = rawVariant === VT_DOCK_TRANSCRIBING;
  const v = timelineVariantFor(rawVariant);
  const motion = 'inline';

  const [phase, setPhase] = useState(() => (isDockMode ? 'typing' : 'processing'));
  const [n, setN] = useState(0);
  const [barExiting, setBarExiting] = useState(false);
  const doneRef = useRef(false);
  const voiceBarRef = useRef(null);
  const pillRef = useRef(null);
  const flipFromRef = useRef(null);

  useEffect(() => {
    onPhaseChange?.(phase);
    if(typeof window.__vtOnTranscribePhase === 'function'){
      window.__vtOnTranscribePhase(phase);
    }
  }, [phase, onPhaseChange]);

  useEffect(() => {
    doneRef.current = false;
    flipFromRef.current = null;
    setBarExiting(false);
    setN(0);
    if(isDockMode){
      setPhase('typing');
      return undefined;
    }
    setPhase('processing');
    const t = setTimeout(() => setPhase('typing'), PROC_MS[v] || 900);
    return () => clearTimeout(t);
  }, [primary.id, v, isDockMode]);

  const goDone = () => {
    if(isDockMode){
      setPhase('done');
      return;
    }
    if(voiceBarRef.current){
      flipFromRef.current = voiceBarRef.current.getBoundingClientRect();
    }
    setBarExiting(true);
    setTimeout(() => {
      setPhase('done');
    }, 180);
  };

  useEffect(() => {
    if(phase !== 'typing') return;
    if(n >= chars.length){
      goDone();
      return;
    }
    const base = PER_MS[v] || 50;
    const last = chars[n - 1];
    const punct = '，。、；！？…'.includes(last) ? 220 : 0;
    const jitter = v === 'stream' ? Math.random() * 38 : 0;
    const id = setTimeout(() => setN((k) => k + 1), base + punct + jitter);
    return () => clearTimeout(id);
  }, [phase, n, chars.length, v]);

  useLayoutEffect(() => {
    if(phase !== 'done' || isDockMode) return;
    const from = flipFromRef.current;
    const pill = pillRef.current;
    flipFromRef.current = null;
    if(!from || !pill) return;
    const to = pill.getBoundingClientRect();
    const dx = (from.left + from.width / 2) - (to.left + to.width / 2);
    const dy = (from.top + from.height / 2) - (to.top + to.height / 2);
    const sx = Math.min(2.6, Math.max(1, from.width / Math.max(to.width, 1)));
    pill.style.transformOrigin = 'center';
    pill.style.transition = 'none';
    pill.style.transform = `translate(${dx}px, ${dy}px) scale(${sx})`;
    pill.style.opacity = '0.45';
    void pill.offsetWidth;
    requestAnimationFrame(() => {
      pill.style.transition = 'transform 0.55s cubic-bezier(.34,.86,.28,1), opacity 0.45s ease';
      pill.style.transform = 'translate(0,0) scale(1)';
      pill.style.opacity = '1';
    });
  }, [phase]);

  useEffect(() => {
    if(phase === 'done' && !doneRef.current){
      doneRef.current = true;
      onDone?.();
    }
  }, [phase, onDone]);

  const working = phase !== 'done';
  const typing = phase === 'typing';
  const barAtTop = !isDockMode && working && !barExiting;
  const morphProgress = !isDockMode && v === 'wave' && typing && chars.length ? n / chars.length : null;
  const showProcessingChrome = !isDockMode && working;

  const Caret = () => {
    if(v === 'glow') return <span className="caret-dot" />;
    if(v === 'stream') return <span className="caret-stream" />;
    if(v === 'focus') return <span className="caret-scan" />;
    return <span className="caret-bar" />;
  };

  const renderText = () => {
    if(v === 'focus'){
      return chars.map((c, i) => (
        <React.Fragment key={i}>
          {typing && i === n && <span className="caret-scan" />}
          <span className={`tw-char ${i < n ? 'tw-focus-on' : 'tw-focus-off'}`}>{c}</span>
        </React.Fragment>
      ));
    }
    const charClass = v === 'glow' ? 'tw-glow'
      : v === 'stream' ? 'tw-stream'
      : 'tw-plain';
    return (
      <>
        {chars.slice(0, n).map((c, i) => (
          <span key={i} className={`tw-char ${charClass}`}>{c}</span>
        ))}
        {phase === 'done' && motion === 'inline' && (
          <VtInlineVoicePill duration={duration} innerRef={pillRef} />
        )}
        {typing && <Caret />}
      </>
    );
  };

  return (
    <div className={'vt-async-card' + (isNew ? ' v3-card-enter' : '') + (showProcessingChrome ? ' is-working' : '') + (isDockMode ? ' is-dock-typewriter' : '')}>
      {showProcessingChrome && (
        <>
          <div className="vt-async-orb vt-async-orb-a" aria-hidden="true" />
          <div className="vt-async-orb vt-async-orb-b" aria-hidden="true" />
        </>
      )}

      {showProcessingChrome && (
        <div style={{ marginBottom: 10, position: 'relative' }}>
          <VtProcessingHeader variant={v} duration={duration} />
        </div>
      )}

      {barAtTop && (
        <div ref={voiceBarRef} className="vt-voice-msg-wrap">
          <VtVoiceMessageBar
            duration={duration}
            live={phase === 'processing'}
            morph={morphProgress}
            compact={false}
            exiting={barExiting}
          />
        </div>
      )}

      {(isDockMode || phase !== 'processing') && (
        <div className="vt-async-text">
          {renderText()}
        </div>
      )}
    </div>
  );
}

function VtAsyncRecordGroupCard({ group, isNew, onTranscribePhase }){
  const [showTags, setShowTags] = useState(false);
  const [showAi, setShowAi] = useState(false);
  const [open, setOpen] = useState(false);
  const p = group.primary || {};
  const a = group.ai;
  const variant = group.vtVariant || p.vtVariant || 'calm';
  const tags = p.tags || [];

  const handleDone = () => {
    setShowTags(true);
    setTimeout(() => {
      setShowAi(true);
      setOpen(!!group.aiDefaultOpen);
      requestAnimationFrame(() => {
        if(typeof window.scrollTimelineToBottom === 'function'){
          window.scrollTimelineToBottom('smooth');
        }
      });
    }, 120);
  };

  return (
    <div style={{
      background: '#fff', borderRadius: 14, border: `0.5px solid ${TL_LINE}`,
      padding: '11px 12px 4px', overflow: 'hidden',
    }}>
      <V3v2Header time={p.time} />
      <div style={{ marginTop: 8, paddingBottom: showAi ? 10 : 8 }}>
        <VtAsyncTranscriptionBody
          primary={p}
          variant={variant}
          isNew={isNew}
          onDone={handleDone}
          onPhaseChange={onTranscribePhase}
        />
        {showTags && tags.length > 0 && (
          <div className="vt-async-tags v3-ai-stagger-in">
            {tags.map((t, i) => (
              <span key={i} className="tl-tags-reveal" style={{ animationDelay: `${i * 90}ms` }}>
                <TLTag tag={t} />
              </span>
            ))}
          </div>
        )}
      </div>
      {showAi && a && (
        <div className="v3-ai-stagger-in">
          <div style={{ borderTop: `0.5px dashed ${TL_HAIR}`, marginInline: -12 }} />
          <button
            type="button"
            onClick={() => setOpen((x) => !x)}
            style={{
              width: '100%', background: 'transparent', border: 0,
              display: 'flex', alignItems: 'center', gap: 6,
              padding: '10px 0', cursor: 'pointer', fontFamily: 'inherit',
            }}
            aria-expanded={open}
          >
            <div style={{
              width: 18, height: 18, borderRadius: 9, background: TL_SOFT,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <span style={{ fontSize: 10, color: TL_PRIMARY, fontWeight: 500 }}>AI</span>
            </div>
            <span style={{ fontSize: 12.5, color: TL_TEXT, fontWeight: 500, flex: 1, textAlign: 'left' }}>{a.title}</span>
            <span style={{ fontSize: 11, color: TL_MUTED }}>{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div className="v3-ai-panel-in" style={{ paddingBottom: 12 }}>
              {a.chartType && <TLChart type={a.chartType} data={a.chartData} />}
              {a.note && (
                <div style={{ fontSize: 13, color: TL_TEXT, lineHeight: 1.55, marginTop: a.chartType ? 8 : 0 }}>
                  {a.note}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

Object.assign(window, {
  VT_ASYNC_VARIANTS,
  VT_DOCK_TRANSCRIBING,
  timelineVariantFor,
  isAsyncVoiceVariant,
  VtAsyncRecordGroupCard,
  VtAsyncTranscriptionBody,
  VtInlineVoicePill,
});

</script>

<script type="text/babel">

   LiveBubble, LiveGrowPanel, LiveFloat, RecordingWave, isAsyncVoiceVariant,
   VT_DOCK_TRANSCRIBING, removeTimelineEntry */

const { useState, useRef, useCallback, useEffect } = React;

const VT_TRANSCRIPTS = [
