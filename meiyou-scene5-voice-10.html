<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>美柚 · 场景五 · 方案十 · 思考流</title>
<!--
  异步转写：按住聆听环，松手流式吐字 + 句尾语音条
  生成日期: 2026-06-01

  手机演示：
  1. 把此 HTML 发到手机（AirDrop / 微信 / iCloud / GitHub Pages）
  2. 用 Safari / Chrome 打开（需联网加载 React CDN）
  3. 可选：Safari「添加到主屏幕」→ 全屏演示

  重新打包 → 项目根目录运行: node scripts/build-standalone.js
-->
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;letter-spacing:0}

:root{
  /* ===== Meiyou tokens ===== */
  --my-brand-red:#ff4d88;
  --my-brand-soft:rgba(255,77,136,0.08);
  --my-brand-soft-2:rgba(255,77,136,0.14);
  --my-bg:#f2f2f5;
  --my-bg-2:#fafafb;
  --my-surface:#ffffff;
  --my-text-primary:#323232;
  --my-text-secondary:#666666;
  --my-text-tertiary:#999999;
  --my-text-quat:#c8c8cc;
  --my-line:rgba(0,0,0,0.08);
  --my-success:#00cc99;
  --my-success-soft:rgba(0,204,153,0.10);
  --my-warning:#ff9500;
  --my-warning-soft:rgba(255,149,0,0.10);
  --my-danger:#ff4d4d;
  --my-link:#4f7cae;
  --my-link-soft:rgba(79,124,174,0.10);
  --my-purple:#8d54ff;
  --my-purple-soft:rgba(141,84,255,0.10);

  /* phase colors */
  --phase-period:#ff4d88;
  --phase-period-soft:rgba(255,77,136,0.10);
  --phase-foll:#4f7cae;
  --phase-foll-soft:rgba(79,124,174,0.10);
  --phase-ov:#8d54ff;
  --phase-ov-soft:rgba(141,84,255,0.10);
  --phase-lut:#ff9500;
  --phase-lut-soft:rgba(255,149,0,0.10);

  --r-xs:4px;
  --r-sm:8px;
  --r-md:12px;
  --r-pill:999px;

  --shadow-1:0 2px 10px rgba(50,50,50,0.06);
  --shadow-2:0 8px 24px rgba(0,0,0,0.14);

  /* 底部 Tab + 安全区（iPhone 横条） */
  --my-safe-bottom:env(safe-area-inset-bottom, 0px);
  --my-tabbar-h:calc(58px + var(--my-safe-bottom));
  --my-dock-float-b:calc(180px + var(--my-safe-bottom));

  font-family:'PingFang SC','SF Pro Text','Helvetica Neue',Arial,sans-serif;
}

html,body{
  background:#0e0e10;
  color:var(--my-text-primary);
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"palt";
}

#root{
  min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
}

.phone{
  width:390px;
  min-height:100vh;
  background:var(--my-bg);
  position:relative;
  overflow:hidden;
}
@media(min-width:431px){.phone{box-shadow:0 0 40px rgba(0,0,0,0.25)}}

/* ============ STATUS BAR ============ */
.statusbar{
  height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  font-size:15px;font-weight:600;color:var(--my-text-primary);
}
.sb-r{display:flex;align-items:center;gap:5px}
.sb-bars{display:inline-flex;gap:1.5px;align-items:flex-end}
.sb-bars i{display:block;width:3px;background:var(--my-text-primary);border-radius:1px}
.sb-bars i:nth-child(1){height:4px}
.sb-bars i:nth-child(2){height:6px}
.sb-bars i:nth-child(3){height:8px}
.sb-bars i:nth-child(4){height:10px}
.sb-batt{width:24px;height:11px;border:1.2px solid var(--my-text-primary);border-radius:3px;position:relative;padding:1px}
.sb-batt::after{content:'';position:absolute;right:-3px;top:3px;width:1.5px;height:4px;background:var(--my-text-primary);border-radius:0 1px 1px 0}
.sb-batt i{display:block;height:100%;width:75%;background:var(--my-text-primary);border-radius:1px}

.app{padding-bottom:160px}

/* ============ TOP NAV ============ */
.nav{
  height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:var(--my-bg);
}
.nav-title{font-size:17px;font-weight:500;color:var(--my-text-primary)}
.nav-actions{display:flex;gap:14px}
.nav-icon{
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  color:var(--my-text-primary);cursor:pointer;
}

/* ============ COMPACT HEALTH STATUS BAR ============ */
.health{
  margin:4px 16px 12px;
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:12px 14px;
  box-shadow:var(--shadow-1);
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
}
.health-light{
  width:8px;height:8px;border-radius:50%;
  background:var(--my-success);
  box-shadow:0 0 8px var(--my-success);
  flex-shrink:0;
}
.health-light.warn{background:var(--my-warning);box-shadow:0 0 8px var(--my-warning)}
.health-light.alert{background:var(--my-danger);box-shadow:0 0 8px var(--my-danger)}
.health-text{flex:1;min-width:0}
.health-title{
  font-size:14px;font-weight:500;color:var(--my-text-primary);
  display:flex;align-items:center;gap:6px;
}
.health-phase{
  font-size:11px;color:var(--my-brand-red);
  background:var(--my-brand-soft);
  padding:2px 8px;border-radius:var(--r-pill);
  font-weight:500;
}
.health-phase.foll{color:var(--phase-foll);background:var(--phase-foll-soft)}
.health-phase.ov{color:var(--phase-ov);background:var(--phase-ov-soft)}
.health-phase.lut{color:var(--phase-lut);background:var(--phase-lut-soft)}
.health-desc{
  font-size:12px;color:var(--my-text-secondary);margin-top:3px;line-height:1.4;
}
.health-day{
  flex-shrink:0;
  text-align:center;
  padding-left:10px;border-left:0.5px solid var(--my-line);
}
.health-day-num{
  font-size:18px;font-weight:600;color:var(--my-text-primary);
  line-height:1;font-variant-numeric:tabular-nums;
}
.health-day-lbl{
  font-size:10px;color:var(--my-text-tertiary);margin-top:3px;
}

/* ============ TIMELINE ============ */
.timeline{
  position:relative;
  padding-left:44px;
  padding-right:16px;
}
.timeline::before{
  content:'';
  position:absolute;
  left:20px;top:6px;bottom:0;
  width:1.5px;
  background:linear-gradient(180deg,
    var(--my-text-quat) 0%,
    var(--my-text-quat) 40%,
    var(--my-line) 100%);
}

/* day section header */
.tl-section{margin-bottom:20px;position:relative}
.tl-day-row{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:0 0 10px 0;
  position:relative;
}
.tl-day-row::before{
  content:'';
  position:absolute;
  left:-30px;top:8px;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--my-surface);
  border:2px solid var(--my-brand-red);
  box-shadow:0 0 0 3px var(--my-bg);
}
.tl-section.today .tl-day-row::before{
  background:var(--my-brand-red);
  box-shadow:0 0 0 3px var(--my-bg), 0 0 0 6px rgba(255,77,136,0.15);
}
.tl-section.dim .tl-day-row::before{
  border-color:var(--my-text-quat);
  width:8px;height:8px;
  left:-29px;
}
.tl-day-num{
  font-size:22px;font-weight:600;
  color:var(--my-text-primary);
  line-height:1.1;
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.5px;
}
.tl-day-num::after{
  content:'';display:block;
  width:24px;height:2px;
  background:var(--my-brand-red);
  border-radius:1px;margin-top:4px;
}
.tl-section.dim .tl-day-num{color:var(--my-text-secondary);font-weight:500;font-size:18px}
.tl-section.dim .tl-day-num::after{display:none}
.tl-day-meta{
  font-size:12px;color:var(--my-text-tertiary);
  font-variant-numeric:tabular-nums;
}
.tl-day-meta b{font-weight:500;color:var(--my-text-secondary)}

/* phase marker on timeline */
.tl-phase{
  position:relative;
  margin:6px 0 14px;
  padding:0;
  display:flex;align-items:center;
}
.tl-phase::before{
  content:'';
  position:absolute;
  left:-30px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;
  border-radius:50%;
  background:var(--phase-period);
  border:2px solid var(--my-bg);
  box-shadow:0 0 0 2px var(--my-bg);
}
.tl-phase.foll::before{background:var(--phase-foll)}
.tl-phase.ov::before{background:var(--phase-ov)}
.tl-phase.lut::before{background:var(--phase-lut)}
.tl-phase-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;
  border-radius:var(--r-pill);
  background:var(--phase-period-soft);
  color:var(--phase-period);
  font-size:11px;font-weight:500;
}
.tl-phase.foll .tl-phase-pill{background:var(--phase-foll-soft);color:var(--phase-foll)}
.tl-phase.ov .tl-phase-pill{background:var(--phase-ov-soft);color:var(--phase-ov)}
.tl-phase.lut .tl-phase-pill{background:var(--phase-lut-soft);color:var(--phase-lut)}
.tl-phase-pill::before{
  content:'';width:5px;height:5px;border-radius:50%;background:currentColor;
}

/* gap marker (X days) */
.tl-gap{
  position:relative;
  height:32px;
  display:flex;align-items:center;
  margin:2px 0;
}
.tl-gap::before{
  content:'';position:absolute;
  left:-26px;top:50%;transform:translateY(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--my-text-quat);
}
.tl-gap-lbl{
  font-size:10px;
  color:var(--my-text-tertiary);
  padding:1px 8px;
  border-radius:var(--r-pill);
  background:var(--my-bg-2);
  border:0.5px solid var(--my-line);
}

/* cycle boundary / month report */
.tl-cycle-report{
  position:relative;
  margin:18px 0;
}
.tl-cycle-report::before{
  content:'';
  position:absolute;
  left:-30px;top:18px;
  width:14px;height:14px;
  border-radius:3px;
  background:var(--my-success);
  transform:rotate(45deg);
  box-shadow:0 0 0 3px var(--my-bg);
}
.tl-cycle-report.warn::before{background:var(--my-warning)}
.tl-cycle-report.alert::before{background:var(--my-danger)}
.cycle-card{
  background:linear-gradient(135deg, rgba(0,204,153,0.06) 0%, rgba(0,204,153,0.02) 100%);
  border:0.5px solid rgba(0,204,153,0.20);
  border-radius:var(--r-md);
  padding:14px 16px;
  cursor:pointer;
}
.tl-cycle-report.warn .cycle-card{
  background:linear-gradient(135deg, rgba(255,149,0,0.07) 0%, rgba(255,149,0,0.02) 100%);
  border-color:rgba(255,149,0,0.22);
}
.tl-cycle-report.alert .cycle-card{
  background:linear-gradient(135deg, rgba(255,77,77,0.07) 0%, rgba(255,77,77,0.02) 100%);
  border-color:rgba(255,77,77,0.22);
}
.cycle-card-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.cycle-card-lbl{
  font-size:11px;
  color:var(--my-success);
  font-weight:600;
  letter-spacing:1px;
}
.tl-cycle-report.warn .cycle-card-lbl{color:var(--my-warning)}
.tl-cycle-report.alert .cycle-card-lbl{color:var(--my-danger)}
.cycle-card-arrow{color:var(--my-text-tertiary);font-size:14px}
.cycle-card-title{
  font-size:15px;
  font-weight:600;
  color:var(--my-text-primary);
  margin-bottom:4px;
}
.cycle-card-range{
  font-size:11px;
  color:var(--my-text-tertiary);
  margin-bottom:12px;
  font-variant-numeric:tabular-nums;
}
.cycle-card-stats{
  display:flex;gap:0;
  background:rgba(255,255,255,0.6);
  border-radius:var(--r-sm);
  padding:10px 4px;
  margin-bottom:10px;
}
.cycle-card-stat{
  flex:1;
  text-align:center;
  position:relative;
}
.cycle-card-stat+.cycle-card-stat::before{
  content:'';position:absolute;left:0;top:20%;height:60%;width:0.5px;
  background:var(--my-line);
}
.cc-num{
  font-size:18px;
  font-weight:600;
  color:var(--my-text-primary);
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.cc-num.brand{color:var(--my-brand-red)}
.cc-num.warn{color:var(--my-warning)}
.cc-num.good{color:var(--my-success)}
.cc-lbl{
  font-size:10px;color:var(--my-text-tertiary);
  margin-top:4px;
}
.cycle-card-summary{
  font-size:12.5px;
  color:var(--my-text-secondary);
  line-height:1.55;
}

/* ============ GUIDE CARD (today) ============ */
.guide{
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:14px 16px;
  box-shadow:var(--shadow-1);
  display:flex;gap:10px;
  margin-bottom:12px;
}
.guide-avatar{width:32px;height:32px;flex-shrink:0;position:relative}
.guide-content{flex:1;min-width:0}
.guide-name{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--my-text-secondary);
  margin-bottom:3px;
}
.guide-name b{font-weight:500;color:var(--my-text-primary)}
.guide-name .ai-badge{
  background:var(--my-brand-soft);color:var(--my-brand-red);
  font-size:10px;padding:1px 5px;border-radius:var(--r-xs);font-weight:500;
}
.guide-text{
  font-size:14px;color:var(--my-text-primary);line-height:1.55;margin-bottom:10px;
}
.guide-text em{font-style:normal;color:var(--my-brand-red);font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  padding:5px 11px;
  background:var(--my-bg);border:none;border-radius:var(--r-pill);
  font-size:12px;color:var(--my-text-primary);
  cursor:pointer;font-family:inherit;white-space:nowrap;
  transition:background 0.15s;
}
.chip:active{background:var(--my-brand-soft);color:var(--my-brand-red)}

/* ============ ENTRY ============ */
.entry{
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:14px 16px;
  margin-bottom:8px;
  box-shadow:var(--shadow-1);
}
.entry-meta{
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--my-text-tertiary);
  margin-bottom:8px;font-variant-numeric:tabular-nums;
}
.entry-meta .more-btn{color:var(--my-text-tertiary);cursor:pointer;padding:2px 4px}
.entry-title{
  font-size:15px;font-weight:500;color:var(--my-text-primary);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.entry-title-emoji{font-size:14px}
.entry-body{
  font-size:14px;line-height:1.65;color:var(--my-text-primary);
  margin-bottom:10px;word-break:break-word;
}

/* photo */
.entry-photo{
  width:100%;aspect-ratio:4/3;
  border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden;
  background:
    repeating-linear-gradient(135deg,
      rgba(255,77,136,0.04) 0 14px,
      rgba(255,77,136,0.10) 14px 28px),
    var(--my-brand-soft);
  display:flex;align-items:center;justify-content:center;
  color:var(--my-brand-red);font-size:11px;
}

/* voice */
.voice{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;background:var(--my-brand-soft);
  border-radius:var(--r-sm);margin-bottom:10px;cursor:pointer;
}
.voice .voice-ico{color:var(--my-brand-red);flex-shrink:0;display:flex}
.voice-wave{flex:1;display:flex;align-items:center;gap:2px;height:20px}
.voice-wave span{width:2px;background:var(--my-brand-red);border-radius:1px;opacity:0.55}
.voice-dur{font-size:11px;color:var(--my-brand-red);font-variant-numeric:tabular-nums}

/* tags */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;padding:3px 8px;border-radius:var(--r-pill);
  background:var(--my-bg);color:var(--my-text-secondary);line-height:1.4;
}
.tag.auto{background:var(--my-brand-soft);color:var(--my-brand-red)}
.tag.auto::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--my-brand-red);margin-right:2px;
}

/* AI insight — tucked under like a folded note */
.ai-insight{
  background:var(--my-surface);
  border:0.5px solid rgba(79,124,174,0.20);
  border-left:3px solid var(--my-link);
  border-radius:var(--r-sm);
  padding:10px 12px;
  margin:-2px 8px 0;
  position:relative;
}
.ai-insight.good{
  border-color:rgba(0,204,153,0.22);border-left-color:var(--my-success);
}
.ai-insight.warn{
  border-color:rgba(255,149,0,0.22);border-left-color:var(--my-warning);
}
.ai-insight.brand{
  border-color:rgba(255,77,136,0.22);border-left-color:var(--my-brand-red);
}
.ai-ins-head{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--my-link);
  margin-bottom:6px;font-weight:500;
}
.ai-insight.good .ai-ins-head{color:var(--my-success)}
.ai-insight.warn .ai-ins-head{color:var(--my-warning)}
.ai-insight.brand .ai-ins-head{color:var(--my-brand-red)}
.ai-ins-head .mini-mascot{
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffd0e2, #ffa3c4 60%, var(--my-brand-red));
  flex-shrink:0;
}
.ai-ins-points{
  display:flex;flex-direction:column;gap:4px;
  font-size:12px;color:var(--my-text-primary);line-height:1.55;
}
.ai-ins-points li{list-style:none;display:flex;gap:6px}
.ai-ins-points li .ico{flex-shrink:0;width:14px;text-align:center}

/* ============ INPUT BAR ============ */
.input-wrap{
  position:fixed;bottom:60px;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  padding:8px 12px 10px;
  background:linear-gradient(180deg, rgba(242,242,245,0) 0%, var(--my-bg) 35%);
  z-index:90;
  display:flex;flex-direction:column;
}
.input-bar{
  background:var(--my-surface);border-radius:var(--r-pill);
  padding:6px;
  box-shadow:var(--shadow-1);
  display:flex;align-items:center;gap:4px;
  border:0.5px solid var(--my-line);
  transition:box-shadow 0.18s, border-color 0.18s;
  position:relative;
}
.input-bar.focused{
  border-color:rgba(255,77,136,0.35);
  box-shadow:0 4px 16px rgba(255,77,136,0.16);
}
.ib-icon{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--my-text-secondary);flex-shrink:0;
}
.ib-icon:active{background:var(--my-bg)}
.ib-input{
  flex:1;min-height:36px;display:flex;align-items:center;
  font-size:14px;color:var(--my-text-primary);padding:0 2px;
}
.ib-input textarea{
  width:100%;border:none;outline:none;background:transparent;
  font:inherit;color:inherit;resize:none;
  padding:9px 0;line-height:1.4;font-family:inherit;
}
.ib-input textarea::placeholder{color:var(--my-text-tertiary)}
.ib-send{
  width:36px;height:36px;border-radius:50%;
  background:var(--my-text-quat);border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.2s;
}
.ib-send.on{background:var(--my-brand-red)}
.ib-send svg{width:16px;height:16px}

.extract-preview{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px 6px 8px;
  background:var(--my-surface);border-radius:var(--r-pill);
  border:0.5px solid var(--my-line);
  box-shadow:0 4px 12px rgba(255,77,136,0.18);
  font-size:11px;color:var(--my-text-secondary);
  margin:0 0 8px 14px;align-self:flex-start;white-space:nowrap;
}
.extract-preview .ico{
  width:14px;height:14px;border-radius:50%;
  background:var(--my-brand-red);
  display:inline-flex;align-items:center;justify-content:center;
}
.extract-preview .ico::before{
  content:'';width:5px;height:5px;border-radius:50%;background:#fff;
  animation:dotPulse 1.2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{transform:scale(0.6);opacity:0.7}
  50%{transform:scale(1);opacity:1}
}
.extract-preview .tag-pill{
  background:var(--my-brand-soft);color:var(--my-brand-red);
  padding:1px 7px;border-radius:var(--r-pill);
  font-size:11px;font-weight:500;
}

/* ============ TOAST ============ */
.toast-stack{
  position:fixed;top:60px;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  z-index:300;pointer-events:none;padding:0 16px;
}
.toast{
  background:rgba(50,50,50,0.92);backdrop-filter:blur(12px);
  color:#fff;padding:8px 14px 8px 10px;border-radius:var(--r-pill);
  font-size:13px;display:flex;align-items:center;gap:6px;
  box-shadow:var(--shadow-2);
  animation:toastIn 0.25s ease-out;max-width:100%;
}
.toast.bye{animation:toastOut 0.18s forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}
.toast .check{
  width:18px;height:18px;border-radius:50%;background:var(--my-brand-red);
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
}
.toast .check svg{width:11px;height:11px;color:#fff}
.toast .toast-tag{
  background:rgba(255,255,255,0.16);padding:1px 7px;border-radius:var(--r-pill);font-size:11px;
}

/* ============ SHEETS ============ */
.sheet-mask{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;
  animation:fadeIn 0.18s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  position:fixed;bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  background:var(--my-surface);
  border-radius:16px 16px 0 0;
  padding:12px 16px 32px;z-index:401;
  animation:sheetUp 0.28s cubic-bezier(0.2,0,0,1);
}
@keyframes sheetUp{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--my-text-quat);margin:0 auto 12px}
.sheet-title{font-size:17px;font-weight:500;text-align:center;margin-bottom:4px;color:var(--my-text-primary)}
.sheet-sub{font-size:12px;text-align:center;color:var(--my-text-secondary);margin-bottom:20px}
.voice-stage{display:flex;flex-direction:column;align-items:center;padding:8px 0 0}
.voice-circle{
  width:120px;height:120px;border-radius:50%;
  background:var(--my-brand-red);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(255,77,136,0.30);
  position:relative;cursor:pointer;
}
.voice-circle::before,.voice-circle::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--my-brand-red);opacity:0;
  animation:pulse 2s ease-out infinite;
}
.voice-circle::after{animation-delay:1s}
@keyframes pulse{0%{transform:scale(1);opacity:0.5}100%{transform:scale(1.35);opacity:0}}
.voice-wf{display:flex;align-items:center;gap:3px;height:32px}
.voice-wf span{width:3px;background:#fff;border-radius:2px;animation:wf 0.8s ease-in-out infinite}
.voice-wf span:nth-child(1){animation-delay:0s}
.voice-wf span:nth-child(2){animation-delay:0.1s}
.voice-wf span:nth-child(3){animation-delay:0.2s}
.voice-wf span:nth-child(4){animation-delay:0.3s}
.voice-wf span:nth-child(5){animation-delay:0.2s}
.voice-wf span:nth-child(6){animation-delay:0.1s}
.voice-wf span:nth-child(7){animation-delay:0s}
@keyframes wf{0%,100%{height:6px}50%{height:28px}}
.voice-time{margin-top:20px;font-size:26px;font-weight:500;color:var(--my-text-primary);font-variant-numeric:tabular-nums}
.voice-hint{font-size:12px;color:var(--my-text-tertiary);margin-top:6px}
.voice-actions{display:flex;gap:8px;margin-top:24px}
.va-btn{flex:1;height:44px;border-radius:var(--r-pill);border:none;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer}
.va-btn.cancel{background:var(--my-bg);color:var(--my-text-primary)}
.va-btn.done{background:var(--my-brand-red);color:#fff}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-opt{
  background:var(--my-bg);border-radius:var(--r-sm);padding:18px 12px;
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
}
.photo-opt:active{background:var(--my-brand-soft)}
.photo-opt svg{color:var(--my-brand-red);width:24px;height:24px}
.photo-opt-title{font-size:14px;color:var(--my-text-primary);font-weight:500}
.photo-opt-desc{font-size:11px;color:var(--my-text-tertiary);text-align:center}

/* ============ DEMO SCENE DOCK（手机外 · 右下角） ============ */
.demo-scene-dock{
  position:fixed;
  right:16px;
  bottom:16px;
  z-index:9999;
  width:220px;
  padding:10px 12px 12px;
  border-radius:12px;
  background:rgba(24,24,28,0.92);
  border:0.5px solid rgba(255,255,255,0.10);
  box-shadow:0 8px 32px rgba(0,0,0,0.45);
  -webkit-backdrop-filter:blur(16px);
  backdrop-filter:blur(16px);
  font-family:'PingFang SC',-apple-system,sans-serif;
}
.demo-scene-dock-label{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.04em;
  color:rgba(255,255,255,0.45);
  margin-bottom:8px;
}
.demo-scene-dock-options{
  display:flex;
  flex-direction:column;
  gap:6px;
  max-height:min(52vh, 420px);
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.15) transparent;
}
.demo-scene-dock-btn{
  appearance:none;
  border:0;
  background:rgba(255,255,255,0.06);
  border-radius:8px;
  padding:8px 10px;
  font-size:12px;
  line-height:1.29;
  color:rgba(255,255,255,0.72);
  cursor:pointer;
  font-family:inherit;
  font-weight:400;
  text-align:left;
  transition:background .15s, color .15s;
}
.demo-scene-dock-btn:hover{
  background:rgba(255,255,255,0.10);
  color:rgba(255,255,255,0.88);
}
.demo-scene-dock-btn.active{
  background:rgba(255,77,136,0.22);
  color:#ff8cb3;
  font-weight:500;
  box-shadow:inset 0 0 0 0.5px rgba(255,77,136,0.35);
}
.demo-scene-dock-hint{
  margin:8px 0 0;
  font-size:11px;
  line-height:1.35;
  color:rgba(255,255,255,0.38);
}

/* ============ TAB BAR ============ */
.tabbar{
  position:fixed;bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  background:var(--my-surface);
  border-top:0.5px solid var(--my-line);
  display:flex;
  padding:6px 0 calc(env(safe-area-inset-bottom,8px) + 6px);
  z-index:100;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:4px 0;cursor:pointer;position:relative;
}
.tab-ico{
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  color:var(--my-text-tertiary);margin-bottom:1px;
}
.tab.active .tab-ico{color:var(--my-brand-red)}
.tab-lbl{font-size:10px;color:var(--my-text-tertiary)}
.tab.active .tab-lbl{color:var(--my-brand-red);font-weight:500}
.tile{
  width:24px;height:24px;border-radius:5px;
  background:transparent;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;position:relative;
}
.tile::before{
  content:'';position:absolute;top:-3px;left:3px;right:3px;height:2px;
  background:currentColor;border-radius:1px;
}
.tab.active .tile{background:var(--my-brand-red);color:#fff;border-color:var(--my-brand-red)}
.tab.active .tile::before{background:#fff}
.tab .notif{
  position:absolute;top:0;right:calc(50% - 18px);
  min-width:6px;height:6px;background:var(--my-danger);border-radius:50%;
}

/* ============ MASCOT 小柚 ============ */
.mascot{
  width:36px;height:36px;position:relative;
  animation:bob 4s ease-in-out infinite;
}
.mascot.sm{width:24px;height:24px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.mascot-body{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 35% 32%, #ffd0e2 0%, #ffa3c4 55%, var(--my-brand-red) 100%);
  box-shadow:inset -2px -3px 4px rgba(180,40,80,0.22), inset 2px 2px 3px rgba(255,240,245,0.5);
  position:relative;
}
.mascot-eye{position:absolute;width:4px;height:4px;border-radius:50%;background:#3a1f2a;top:42%}
.mascot.sm .mascot-eye{width:3px;height:3px}
.mascot-eye.l{left:28%}.mascot-eye.r{right:28%}
.mascot-eye::after{content:'';position:absolute;width:1.2px;height:1.2px;background:#fff;border-radius:50%;top:0.5px;right:0.5px}
.mascot-mouth{position:absolute;width:6px;height:3px;border-bottom:1.2px solid #3a1f2a;border-radius:0 0 6px 6px;left:50%;top:60%;transform:translateX(-50%)}
.mascot.sm .mascot-mouth{width:4px;height:2px}
.mascot-cheek{position:absolute;width:5px;height:3px;border-radius:50%;background:rgba(255,77,136,0.5);top:54%}
.mascot.sm .mascot-cheek{width:3px;height:2px}
.mascot-cheek.l{left:14%}.mascot-cheek.r{right:14%}

.fade-in{animation:fadeUp 0.32s cubic-bezier(0.2,0,0,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ============ TIMELINE FEED (日卡) ============ */
.feed{padding:0 16px 100px}
.feed-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:8px 0 16px;
}
.feed-title{font-size:22px;font-weight:500;color:var(--my-text-primary)}
.feed-sub{font-size:12px;color:var(--my-text-tertiary);margin-top:4px}
.feed-compose-btn{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  background:var(--my-brand-red);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(255,77,136,0.3);
}

.day-cards{display:flex;flex-direction:column;gap:12px}
.day-card{
  border-radius:16px;overflow:hidden;cursor:pointer;
  background:var(--my-surface);
  box-shadow:var(--shadow-1);
  border:0.5px solid rgba(255,255,255,0.8);
  transition:transform 0.18s, box-shadow 0.18s;
}
.day-card:active{transform:scale(0.985)}
.day-card.today{box-shadow:0 4px 20px rgba(255,77,136,0.12)}
.day-card-head{
  padding:14px 16px 10px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.dc-date{display:flex;align-items:baseline;gap:6px}
.dc-day{font-size:28px;font-weight:500;line-height:1;color:var(--my-text-primary);font-variant-numeric:tabular-nums}
.dc-month{font-size:13px;color:var(--my-text-secondary);font-weight:500}
.dc-weekday{font-size:11px;color:var(--my-text-tertiary);margin-top:2px}
.dc-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.dc-weather{font-size:11px;color:var(--my-text-tertiary)}
.dc-phase{
  font-size:10px;padding:2px 8px;border-radius:var(--r-pill);font-weight:500;
  background:var(--my-brand-soft);color:var(--my-brand-red);
}
.dc-phase.foll{background:var(--phase-foll-soft);color:var(--phase-foll)}
.dc-phase.lut{background:var(--phase-lut-soft);color:var(--phase-lut)}
.dc-phase.preg{background:var(--my-purple-soft);color:var(--my-purple)}
.dc-phase.baby{background:var(--my-success-soft);color:var(--my-success)}

.day-card-body{padding:0 16px 14px}
.dc-summary{
  font-size:14px;line-height:1.6;color:var(--my-text-primary);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:10px;
}
.dc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.dc-tag{
  font-size:10px;padding:3px 8px;border-radius:var(--r-pill);
  background:var(--my-bg);color:var(--my-text-secondary);
}
.dc-tag.auto{background:var(--my-brand-soft);color:var(--my-brand-red)}
.dc-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-top:0.5px solid var(--my-line);
  background:rgba(255,255,255,0.5);
}
.dc-insight{
  font-size:11px;color:var(--my-link);flex:1;
  display:flex;align-items:center;gap:4px;
}
.dc-count{font-size:10px;color:var(--my-text-tertiary);flex-shrink:0}
.dc-photo-dot{
  width:6px;height:6px;border-radius:50%;background:var(--my-brand-red);
  display:inline-block;margin-right:4px;
}

.day-card-accent{height:3px;width:100%}


/* ============ 主壳 + 底部 Dock ============ */
.suiji-shell{
  position:relative;
  min-height:calc(100vh - 44px);
  background:
    radial-gradient(ellipse 90% 40% at 50% -5%, rgba(255,200,220,0.22) 0%, transparent 55%),
    linear-gradient(180deg, #faf7f4 0%, #f5f3ef 18%, var(--my-bg) 100%);
}

/* 场景叙事 — 更有氛围感的背景 */
.suiji-shell--scene{
  background:
    radial-gradient(ellipse 120% 50% at 50% -8%, rgba(255,180,210,0.28) 0%, transparent 50%),
    radial-gradient(ellipse 80% 35% at 85% 25%, rgba(141,84,255,0.06) 0%, transparent 45%),
    radial-gradient(ellipse 70% 40% at 10% 60%, rgba(255,149,0,0.05) 0%, transparent 40%),
    radial-gradient(ellipse 100% 45% at 50% 100%, rgba(255,77,136,0.08) 0%, transparent 55%),
    linear-gradient(180deg, #fdf8f6 0%, #f8f4f1 12%, #f3f0ed 28%, var(--my-bg) 55%);
}
.suiji-shell--scene::before{
  content:'';
  position:fixed;
  left:50%;transform:translateX(-50%);
  bottom:100px;
  width:min(390px,100%);
  height:200px;
  pointer-events:none;
  z-index:0;
  background:radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255,77,136,0.06) 0%, transparent 70%);
}
.suiji-shell--scene .suiji-stream{position:relative;z-index:1}
.suiji-shell--scene .dock-wrap{z-index:90}
.suiji-shell--scene .dock-wrap.is-mood-expanded{z-index:100}
.suiji-shell--scene .quick-float-wrap{z-index:91}
.suiji-shell.is-mood-expanded .suiji-stream{
  padding-bottom:420px;
}
.suiji-stream{
  padding:0 16px calc(200px + var(--my-safe-bottom));
  padding-top:52px;
  max-height:calc(100vh - 44px);
  max-height:calc(100dvh - 44px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.stream-health{margin-bottom:14px}

/* ============ Dock 容器 ============ */
.dock-wrap{
  position:fixed;
  bottom:var(--my-tabbar-h);left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  z-index:90;
  pointer-events:none;
}
.dock-panel{
  pointer-events:auto;
  background:var(--my-surface);
  border-top:0.5px solid var(--my-line);
  box-shadow:0 -4px 24px rgba(0,0,0,0.06);
  border-radius:16px 16px 0 0;
  transition:box-shadow 0.32s ease, transform 0.32s cubic-bezier(0.34,1.2,0.64,1);
}
.dock-wrap.is-mood-expanded{
  bottom:var(--my-tabbar-h);
}
.dock-panel.is-mood-expanded{
  box-shadow:0 -8px 36px rgba(255,77,136,0.14);
  transform:translateY(0);
  overflow:hidden;
}

/* 反馈条 */
.dock-feedback{
  pointer-events:auto;
  margin:0 12px 8px;
  padding:10px 12px;
  background:rgba(255,255,255,0.96);
  border-radius:12px;
  border:0.5px solid var(--my-line);
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
}
.dock-sync-lite{
  display:flex;align-items:center;flex-wrap:wrap;gap:6px;
  margin-bottom:6px;
}
.dock-sync-mark{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:500;color:var(--my-success);
}
.dock-sync-tag{
  font-size:11px;font-weight:500;
  padding:3px 10px;border-radius:var(--r-pill);
  background:rgba(0,204,153,0.08);
  color:var(--my-text-primary);
  border:0.5px solid rgba(0,204,153,0.18);
}
.dock-sync-date{
  margin-left:auto;font-size:10px;color:var(--my-text-tertiary);
}
.dock-nudge{
  font-size:13px;color:var(--my-text-secondary);
  line-height:1.5;margin:0 0 8px;
}
.dock-suggest{
  display:flex;flex-wrap:wrap;gap:6px;
}
.dock-suggest-chip{
  padding:6px 12px;border-radius:var(--r-pill);border:none;
  background:var(--my-bg);font:inherit;font-size:12px;
  color:var(--my-text-primary);cursor:pointer;
}
.dock-suggest-chip:active{background:var(--my-brand-soft);color:var(--my-brand-red)}

.dock-live{
  pointer-events:none;
  margin:0 14px 6px;
  padding:5px 11px;
  font-size:11px;color:var(--my-brand-red);
  background:var(--my-brand-soft);
  border-radius:var(--r-pill);
  display:inline-flex;align-items:center;gap:6px;
}
.dock-live-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--my-brand-red);
  animation:livePulse 1.2s ease-in-out infinite;
}
.dock-live-date{
  margin-left:6px;color:var(--my-text-tertiary);
  background:rgba(255,255,255,0.7);
  padding:1px 6px;border-radius:var(--r-pill);
}
@keyframes livePulse{0%,100%{opacity:0.5}50%{opacity:1}}

/* ============ 输入框展开 · 心情选择（内嵌） ============ */
.dock-mood-sheet{
  display:flex;
  flex-direction:column;
  min-height:300px;
  max-height:min(52vh, 360px);
  animation:dockMoodIn 0.36s cubic-bezier(0.34,1.18,0.64,1) both;
}
@keyframes dockMoodIn{
  from{opacity:0.6;transform:translateY(12px) scale(0.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.dock-mood-top{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  align-items:center;
  padding:14px 8px 10px;
  flex-shrink:0;
}
.dock-mood-lead-cell{
  grid-column:1;
  min-width:0;
  padding:0 2px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.dock-mood-lead{
  margin:0;
  font-size:14px;
  font-weight:500;
  color:rgba(0,0,0,0.55);
  line-height:1.29;
  letter-spacing:0.02em;
  white-space:nowrap;
  text-align:left;
  /* 与下方居中「超开心」左缘对齐：右移 (lead宽 - label宽) / 2 */
  transform:translateX(calc((14px * 8 - 11px * 3) / 2));
}
.dock-mood-close{
  grid-column:5;
  justify-self:end;
  width:32px;
  height:32px;
  appearance:none;
  border:0;
  border-radius:8px;
  background:transparent;
  color:rgba(0,0,0,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font:inherit;
  transition:background 0.15s, color 0.15s, transform 0.15s;
}
.dock-mood-close:active{
  background:rgba(0,0,0,0.04);
  color:rgba(0,0,0,0.55);
  transform:scale(0.96);
}
.dock-mood-grid{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:2px 0;
  padding:0 8px 4px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.dock-mood-cell{
  appearance:none;
  border:0;
  background:transparent;
  cursor:pointer;
  font-family:inherit;
  padding:6px 2px 8px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  transition:background 0.15s, transform 0.15s;
}
.dock-mood-cell:active{transform:scale(0.96)}
.dock-mood-face-wrap{
  position:relative;
  width:40px;
  height:40px;
  flex-shrink:0;
}
.dock-mood-face{
  width:40px;
  height:40px;
  border-radius:50%;

/* ============ 右下悬浮快捷发布 ============ */
.quick-float-wrap{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:390px;
  bottom:var(--my-dock-float-b);
  height:0;
  z-index:91;
  pointer-events:none;
}
.quick-float-wrap .dock-fan-corner{
  position:absolute;
  right:12px;
  bottom:0;
  pointer-events:auto;
  transition:opacity 0.28s ease, transform 0.32s cubic-bezier(0.34,1.2,0.64,1);
}
.quick-float-wrap.is-covered{
  pointer-events:none;
}
.quick-float-wrap.is-covered .quick-card-fan{
  opacity:0;
  transform:scale(0.88) translateY(8px);
  pointer-events:none;
}
.quick-float-wrap.is-quick-active{
  z-index:100;
  top:0;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:390px;
  height:auto;
  pointer-events:none;
}

/* 快捷卡片扇打开时 — 禁用背景交互 */
.phone:has(.quick-float-wrap.is-quick-active) .suiji-stream,
.phone:has(.quick-float-wrap.is-quick-active) .statusbar,
.phone:has(.quick-float-wrap.is-quick-active) .nav,
.phone:has(.quick-float-wrap.is-quick-active) .dock-wrap,
.phone:has(.quick-float-wrap.is-quick-active) .tabbar,
.phone:has(.quick-float-wrap.is-quick-active) .calendar-page,
.phone:has(.quick-float-wrap.is-quick-active) .record-empty-root,
.phone:has(.quick-float-wrap.is-quick-active) .record-blank-root{
  pointer-events:none;
}

/* ============ 方案 I · 卡片扇 ============ */
.quick-card-fan-scrim{
  position:absolute;
  inset:0;
  z-index:0;
  background:rgba(20,18,22,0.54);
  backdrop-filter:blur(5px) saturate(90%);
  -webkit-backdrop-filter:blur(5px) saturate(90%);
  pointer-events:auto;
  animation:quickScrimIn 240ms ease both;
}
@keyframes quickScrimIn{
  from{opacity:0}
  to{opacity:1}
}

.quick-card-fan{
  position:absolute;
  right:12px;
  bottom:0;
  width:56px;
  height:56px;
  pointer-events:auto;
  z-index:1;
  overflow:visible;
}
.quick-card-fan.has-selected{
  right:0;
  left:0;
  width:auto;
  height:auto;
  top:auto;
}
.quick-float-wrap.is-quick-active .quick-card-fan{
  bottom:var(--my-dock-float-b);
}

.quick-card-fan-item{
  position:absolute;
  right:0;
  bottom:56px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:transparent;
  overflow:visible;
  box-shadow:none;
  transform:translate(0,0) rotate(0deg) scale(0.4);
  opacity:0;
  transform-origin:100% 100%;
  pointer-events:none;
  z-index:2;
  transition:
    transform 360ms cubic-bezier(0.32,0.94,0.38,1) var(--card-delay, 0ms),
    opacity 240ms ease var(--card-delay, 0ms);
}
.quick-card-fan-item::before{
  content:none;
}
.quick-card-fan-item::after{
  content:none;
}
.quick-card-fan-item.is-visible{
  pointer-events:auto;
}
.quick-card-fan-item.is-visible:not(.is-selected){
  transform:translate(var(--card-x), var(--card-y)) rotate(var(--card-angle)) scale(1);
  opacity:1;
  transition:
    transform 360ms cubic-bezier(0.32,0.94,0.38,1) var(--card-delay, 0ms),
    opacity 240ms ease var(--card-delay, 0ms);
}
.quick-card-fan-item.is-faded{
  opacity:0;
  pointer-events:none;
  transform:translate(var(--card-x), var(--card-y)) rotate(var(--card-angle)) scale(0.96);
  transition:
    transform 280ms cubic-bezier(0.32,0.94,0.38,1),
    opacity 260ms ease;
}
.quick-card-fan-item.is-selected{
  right:12px;
  bottom:0;
  width:calc(100% - 24px);
  max-width:366px;
  height:150px;
  border-radius:20px;
  background:#fff;
  box-shadow:0 14px 34px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transform:translate(0,0) rotate(0deg) scale(1);
  opacity:1;
  z-index:4;
  transform-origin:100% 100%;
  transition:
    right 360ms cubic-bezier(0.32,0.94,0.38,1),
    bottom 360ms cubic-bezier(0.32,0.94,0.38,1),
    width 360ms cubic-bezier(0.32,0.94,0.38,1),
    height 360ms cubic-bezier(0.32,0.94,0.38,1),
    transform 360ms cubic-bezier(0.32,0.94,0.38,1),
    opacity 200ms ease;
}
.quick-card-fan-item.is-selected[data-card="mood"]{
  height:186px;
}
.quick-card-fan-item.is-selected[data-card="symptom"]{
  height:260px;
}
.quick-card-fan-item.is-selected[data-card="weight"]{
  height:196px;
}
.quick-card-fan-item.is-selected[data-card="diet"]{
  height:224px;
}

.quick-card-fan-face{
  position:absolute;
  inset:0;
  border:0;
  background:#fff;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:50%;
  box-shadow:0 8px 20px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  cursor:pointer;
  padding:0;
  transition:opacity 200ms ease, transform 360ms cubic-bezier(0.32,0.94,0.38,1);
  z-index:1;
}
.quick-card-fan-item.is-selected .quick-card-fan-face{
  opacity:0;
  pointer-events:none;
  transform:scale(0.92);
  transition:opacity 180ms ease 60ms, transform 360ms cubic-bezier(0.32,0.94,0.38,1);
}
.quick-card-fan-ico{
  width:24px;
  height:20px;
  border-radius:50%;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
}
.quick-card-fan-meta{
  position:static;
  transform:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  text-align:center;
}
.quick-card-fan-lbl{
  font-size:9px;
  font-weight:500;
  color:var(--my-text-primary);
  line-height:1.1;
  white-space:nowrap;
  background:transparent;
  border:none;
  border-radius:0;
  padding:0;
  box-shadow:none;
}
.quick-card-fan-hint{
  display:none;
}

.quick-card-fan-panel{
  position:absolute;
  inset:0;
  padding:12px 14px 14px;
  display:flex;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:opacity 280ms ease 180ms;
}
.quick-card-fan-item.is-selected .quick-card-fan-panel{
  opacity:1;
  pointer-events:auto;
  transition:opacity 300ms ease 220ms;
}
.quick-card-fan-panel-hd{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
  flex-shrink:0;
}
.quick-card-fan-panel-title{
  font-size:14px;
  font-weight:500;
  color:var(--my-text-primary);
}
.quick-card-fan-panel-close{
  border:0;
  background:transparent;
  color:var(--my-text-tertiary);
  font-size:22px;
  line-height:1;
  width:24px;
  height:24px;
  padding:0;
  cursor:pointer;
}
.quick-card-fan-panel-body{
  flex:0 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  justify-content:center;
  overflow:visible;
}
.quick-card-fan-item.is-selected .quick-card-fan-panel-body{
  overflow:visible;
}

.quick-card-fab{
  position:absolute;
  right:0;
  bottom:0;
  width:56px;
  height:56px;
  border-radius:28px;
  border:none;
  background:radial-gradient(circle at 30% 25%, #ff7aa8 0%, var(--my-brand-red) 60%, var(--my-brand-red) 100%);
  color:#fff;
  box-shadow:0 8px 20px rgba(255,77,136,0.4), 0 2px 4px rgba(255,77,136,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:5;
  touch-action:manipulation;
  transform-origin:center center;
  transition:transform 220ms ease;
}
.quick-card-fab.is-open{
  transform:scale(0.92);
}
.quick-card-fab.is-covered{
  z-index:3;
}
.quick-card-fab:active{
  transform:scale(0.88);
}
.quick-card-fab.is-open:active{
  transform:scale(0.84);
}

  display:none!important;
  pointer-events:none!important;
  opacity:0!important;
  visibility:hidden!important;
}

.dock-fan-stage{
  position:relative;
  width:48px;
  height:48px;
  z-index:2;
}
.dock-fan-left .dock-fan-node{
  left:50%;
}

.dock-fab{
  width:48px;height:48px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  z-index:3;
  touch-action:manipulation;
  transition:transform 0.32s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.2s;
}
.dock-fab:active{transform:scale(0.92)}

.dock-fab-media{
  background:var(--my-brand-red);
  color:#fff;
  box-shadow:0 4px 16px rgba(255,77,136,0.42);
}
.dock-fab-media.open{
  transform:rotate(45deg);
  box-shadow:0 3px 12px rgba(255,77,136,0.32);
}
.dock-fab-media.open:active{transform:rotate(45deg) scale(0.92)}

.dock-fab-quick{
  background:var(--my-surface);
  color:var(--my-brand-red);
  border:1.5px solid rgba(255,77,136,0.35);
  box-shadow:0 4px 16px rgba(255,77,136,0.18);
  width:48px;
  height:48px;
}
.dock-fab-quick.open{
  background:var(--my-brand-soft);
  border-color:var(--my-brand-red);
}

.dock-fan-node{
  position:absolute;
  left:50%;bottom:50%;
  margin-left:-26px;margin-bottom:-26px;
  transform:translate(0,0) scale(0.15);
  opacity:0;
  visibility:hidden;
  border:none;background:transparent;
  cursor:pointer;padding:0;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  pointer-events:none;
  z-index:2;
  transition:
    transform 0.42s cubic-bezier(0.34,1.45,0.64,1),
    opacity 0.18s ease;
}
.dock-fan-stage.open .dock-fan-node{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  animation:fanPop 0.45s cubic-bezier(0.34,1.45,0.64,1) both;
  animation-delay:var(--delay);
}
.dock-fan-stage.closing .dock-fan-node{
  animation:none;
  transform:translate(0,0) scale(0.12);
  opacity:0;
  transition-delay:var(--close-delay);
  transition-timing-function:cubic-bezier(0.55,0.06,0.68,0.9);
  pointer-events:none;
}

.dock-fan-node-ico{
  width:48px;height:48px;border-radius:50%;
  background:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;
  transition:transform 0.15s ease;
  border:0.5px solid rgba(255,255,255,0.85);
}
.dock-fan-node:active .dock-fan-node-ico{transform:scale(0.9)}

.dock-fan-corner .dock-fan-node{
  margin-left:-25px;margin-bottom:-25px;
  gap:0;
  z-index:calc(10 + var(--zi, 0));
  width:50px;
}
.dock-fan-corner .dock-fan-node-ico--stack{
  width:50px;
  height:50px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  padding:5px 3px 6px;
  box-sizing:border-box;
}
.dock-fan-corner .dock-fan-node-em{
  font-size:16px;
  line-height:1;
  flex-shrink:0;
}
.dock-fan-corner .dock-fan-node-lbl{
  font-size:8px;
  line-height:1.15;
  font-weight:500;
  color:rgba(0,0,0,0.65);
  padding:0;
  background:none;
  box-shadow:none;
  max-width:40px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  margin-top:1px;
}

.dock-fan-node-lbl{
  font-size:10px;color:rgba(0,0,0,0.72);
  font-weight:500;
  white-space:nowrap;
}

@keyframes fanPop{
  0%{transform:translate(calc(var(--fx)*0.1), calc(var(--fy)*0.1)) scale(0.2);opacity:0}
  55%{transform:translate(calc(var(--fx)*1.06), calc(var(--fy)*1.06)) scale(1.06);opacity:1}
  100%{transform:translate(var(--fx), var(--fy)) scale(1);opacity:1}
}

.dock-fan-stage.closing .dock-fab{
  animation:magnetSnap 0.34s cubic-bezier(0.55,0.06,0.68,0.9) both;
}
@keyframes magnetSnap{
  0%{transform:scale(1)}
  40%{transform:scale(1.08)}
  100%{transform:scale(1)}
}
.dock-fan.closing .dock-fab-media.open{
  animation:magnetSnapRotate 0.34s cubic-bezier(0.55,0.06,0.68,0.9) both;
}

@keyframes magnetSnapRotate{
  0%{transform:rotate(45deg) scale(1)}
  40%{transform:rotate(45deg) scale(1.08)}
  100%{transform:rotate(0deg) scale(1)}
}

/* ============ 微信式输入行 ============ */
.dock-input-row{
  flex:1;
  min-width:0;
  display:flex;
  align-items:flex-end;
  gap:8px;
  padding:0;
  background:transparent;
}
.dock-mode-btn{
  width:36px;height:36px;flex-shrink:0;
  border:none;background:transparent;
  color:var(--my-text-secondary);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:8px;
}
.dock-mode-btn:active{background:var(--my-bg)}
.dock-kbd-ico{font-size:20px;line-height:1;color:var(--my-text-secondary)}

.dock-text-field{
  flex:1;min-height:36px;max-height:80px;
  background:var(--my-bg);
  border-radius:8px;
  border:0.5px solid transparent;
  padding:0 12px;
  display:flex;align-items:center;
  position:relative;
  transition:border-color 0.15s, background 0.15s;
}
.dock-text-field:focus-within,
.dock-text-field.is-focused{
  background:var(--my-surface);
  border-color:rgba(255,77,136,0.25);
}
.dock-float-ph{
  position:absolute;
  left:12px;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  display:inline-flex;
  align-items:baseline;
  pointer-events:none;
  font-size:15px;
  line-height:1.45;
  color:rgba(0,0,0,0.3);
  white-space:nowrap;
  overflow:hidden;
  transition:transform 200ms ease-out;
}
.dock-float-ph.is-focused{
  transform:translateY(calc(-50% - 2px));
}
.dock-float-ph.is-leaving{
  animation:dockPhLineLeave 360ms ease-in forwards;
}
.dock-float-ph-char{
  display:inline-block;
}
.dock-float-ph-char.is-enter{
  opacity:0;
  transform:translateY(7px);
  animation:dockPhCharIn 440ms cubic-bezier(0.22,1,0.36,1) forwards;
  animation-delay:calc(var(--i) * 72ms);
}
.dock-float-ph-char.is-idle{
  opacity:0.45;
  transform:translateY(0);
}
.dock-float-ph.is-focused .dock-float-ph-char{
  opacity:0.5;
  transform:translateY(0);
  animation:none;
}
@keyframes dockPhCharIn{
  to{
    opacity:0.45;
    transform:translateY(0);
  }
}
@keyframes dockPhLineLeave{
  from{
    opacity:1;
    transform:translateY(-50%);
  }
  to{
    opacity:0;
    transform:translateY(calc(-50% - 8px));
  }
}
.dock-text-field textarea{
  width:100%;border:none;outline:none;background:transparent;
  font:inherit;font-size:15px;line-height:1.45;
  color:var(--my-text-primary);resize:none;
  padding:8px 0;max-height:72px;
  position:relative;z-index:1;
}
.dock-text-field textarea::placeholder{color:var(--my-text-tertiary)}

.dock-voice-wrap{
  flex:1;
  position:relative;
  min-height:40px;
  border-radius:10px;
  overflow:hidden;
  background:linear-gradient(180deg, #f5f5f7 0%, #ececef 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 0 0 0 0.5px rgba(0,0,0,0.04);
}
.dock-voice-wrap.is-recording{
  background:linear-gradient(180deg, #efeff2 0%, #e8e8ec 100%);
}
.dock-voice-stage{
  position:absolute;
  inset:0;
  border-radius:10px;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}
.dock-voice-shimmer{
  position:absolute;
  top:-8%;bottom:-8%;
  width:62%;
  left:-68%;
  transform:skewX(-20deg);
  background:linear-gradient(
    108deg,
    transparent 0%,
    rgba(255,255,255,0.04) 18%,
    rgba(255,255,255,0.22) 36%,
    rgba(255,255,255,0.62) 48%,
    rgba(255,255,255,0.78) 50%,
    rgba(255,255,255,0.62) 52%,
    rgba(255,255,255,0.22) 64%,
    rgba(255,255,255,0.04) 82%,
    transparent 100%
  );
  filter:blur(0.4px);
  animation:dockVoiceShimmer 5s ease-in-out infinite;
}
.dock-voice-wrap.is-recording .dock-voice-shimmer{
  width:58%;
  background:linear-gradient(
    108deg,
    transparent 0%,
    rgba(255,255,255,0.06) 18%,
    rgba(255,255,255,0.28) 36%,
    rgba(255,255,255,0.68) 48%,
    rgba(255,255,255,0.85) 50%,
    rgba(255,255,255,0.68) 52%,
    rgba(255,255,255,0.28) 64%,
    rgba(255,255,255,0.06) 82%,
    transparent 100%
  );
  animation:dockVoiceShimmerRec 5s ease-in-out infinite;
}
@keyframes dockVoiceShimmer{
  0%,64%,100%{
    left:-68%;
    opacity:0;
  }
  68%{
    left:-38%;
    opacity:0.45;
  }
  76%{
    left:8%;
    opacity:0.72;
  }
  84%{
    left:52%;
    opacity:0.78;
  }
  92%{
    left:108%;
    opacity:0.35;
  }
  96%{
    opacity:0;
  }
}
@keyframes dockVoiceShimmerRec{
  0%,62%,100%{
    left:-66%;
    opacity:0;
  }
  67%{
    left:-34%;
    opacity:0.5;
  }
  75%{
    left:10%;
    opacity:0.8;
  }
  83%{
    left:54%;
    opacity:0.85;
  }
  91%{
    left:110%;
    opacity:0.4;
  }
  95%{
    opacity:0;
  }
}
.dock-voice-btn{
  position:relative;
  z-index:1;
  width:100%;
  height:40px;
  border:none;
  border-radius:10px;
  background:transparent;
  font:inherit;font-size:15px;font-weight:500;
  color:var(--my-text-primary);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
.dock-voice-label{
  position:relative;
  z-index:1;
}
.dock-voice-btn:active,
.dock-voice-btn.recording{
  color:var(--my-brand-red);
}
.dock-voice-btn.recording .dock-voice-label{
  font-weight:500;
}
.dock-voice-waves{
  display:flex;align-items:center;gap:2px;height:16px;
}
.dock-voice-waves span{
  width:2px;border-radius:1px;
  background:var(--my-brand-red);
  animation:voiceBar 0.7s ease-in-out infinite;
}
.dock-voice-waves span:nth-child(odd){animation-delay:0.05s}
.dock-voice-waves span:nth-child(3n){animation-delay:0.12s}
@keyframes voiceBar{
  0%,100%{transform:scaleY(0.45);opacity:0.5}
  50%{transform:scaleY(1);opacity:1}
}

.dock-send-btn{
  width:36px;height:36px;flex-shrink:0;
  border:none;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  background:var(--my-brand-red);
  color:#fff;
}

.dock-camera-btn{
  width:36px;height:36px;flex-shrink:0;
  border:none;background:transparent;
  color:var(--my-text-secondary);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:8px;
  margin-bottom:4px;
}
.dock-camera-btn:active{background:var(--my-bg)}

.fade-in{animation:fadeUp 0.28s cubic-bezier(0.2,0,0,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}


/* ============ 时间轴流 — Lifelog 式左侧时刻 + 竖线 ============ */

.tl-feed{
  display:flex;
  flex-direction:column;
  gap:0;
}
.tl-feed-end{
  height:1px;
  scroll-margin-bottom:140px;
}

/* 日期分区 — 不同天之间加大间距 */
.tl-day-section-head{
  margin-bottom:12px;
  padding-top:16px;
  position:relative;
}
.tl-gap-divider + .tl-day-section-head{
  padding-top:0;
}
/* 日总结卡片 — 两行紧凑排版 */
.tl-day-summary{
  display:flex;
  flex-direction:column;
  gap:5px;
  background:#fff5f8;
  border-radius:12px;
  padding:8px 14px;
  border:none;
  box-shadow:none;
  position:relative;
  z-index:3;
}

.tl-day-summary-top{
  display:flex;
  align-items:baseline;
  gap:8px;
  min-width:0;
}
.tl-day-summary-title{
  font-size:17px;
  font-weight:500;
  color:rgba(0,0,0,0.85);
  letter-spacing:-0.02em;
  line-height:1.19;
  flex-shrink:0;
}
.tl-day-summary-meta{
  font-size:12px;
  color:#b5889e;
  font-weight:400;
  line-height:1.29;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  min-width:0;
}

.tl-day-summary-stats{
  display:flex;
  align-items:baseline;
  flex-wrap:wrap;
  gap:4px 20px;
}
.tl-day-summary-stat{
  display:inline-flex;
  align-items:baseline;
  gap:2px;
  white-space:nowrap;
}
.tl-day-summary-stat-v{
  font-size:15px;
  font-weight:500;
  color:#ff4d88;
  font-variant-numeric:tabular-nums;
  line-height:1;
  letter-spacing:-0.02em;
}
.tl-day-summary-stat-l{
  font-size:12px;
  color:#ff4d88;
  line-height:1;
  font-weight:400;
}

/* 连续时间轴竖线 */
.tl-rail-continuous{
  position:relative;
}
.tl-rail-continuous::before{
  content:'';
  position:absolute;
  left:6px;
  top:0;
  bottom:0;
  width:1px;
  background:rgba(0,0,0,0.08);
  pointer-events:none;
  z-index:0;
}
.tl-rail-break{
  position:relative;
  z-index:1;
}
.tl-rail-break::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:14px;
  background:var(--my-bg);
  z-index:2;
  pointer-events:none;
}
.tl-day-section-head.tl-rail-break::before{
  left:5px;
  width:3px;
}

/* 日标题 — 大号日期 + 周期条 */
.tl-day-banner{
  margin-bottom:16px;
  padding:0 0 0 2px;
  position:relative;
  z-index:3;
}
.tl-day-banner-top{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.tl-day-banner-left{
  display:flex;
  align-items:flex-end;
  gap:10px;
}
.tl-day-big{
  font-size:32px;
  font-weight:500;
  color:var(--my-text-primary);
  letter-spacing:-1px;
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.tl-day-meta{
  display:flex;
  flex-direction:column;
  gap:2px;
  padding-bottom:3px;
}
.tl-day-month{
  font-size:13px;
  font-weight:500;
  color:var(--my-text-primary);
}
.tl-day-week{
  font-size:12px;
  color:var(--my-text-tertiary);
}
.tl-cycle-chip{
  font-size:11px;
  font-weight:500;
  color:var(--my-brand-red);
  background:var(--my-brand-soft);
  padding:4px 10px;
  border-radius:var(--r-pill);
  flex-shrink:0;
  margin-bottom:2px;
}
.tl-cycle-chip.foll{color:var(--phase-foll);background:var(--phase-foll-soft)}
.tl-cycle-chip.lut{color:var(--phase-lut);background:var(--phase-lut-soft)}
.tl-cycle-chip.preg{color:var(--my-purple);background:var(--my-purple-soft)}
.tl-cycle-chip.baby{color:var(--my-success);background:var(--my-success-soft)}

/* 左侧竖线 — 圆点 + 连续主轴 */
.tl-rail-node{
  display:flex;
  gap:6px;
  padding-bottom:14px;
  position:relative;
  z-index:1;
}
.tl-rail-node.is-feed-last{padding-bottom:4px}
.tl-rail-node.is-guide{
  padding-top:16px;
  align-items:flex-start;
}
.tl-rail-node.is-guide .tl-rail-marker{
  padding-top:6px;
}
.tl-rail-marker{
  width:14px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  padding-top:2px;
  z-index:1;
  overflow:visible;
}
.tl-rail-node.is-axis-drop .tl-rail-marker{
  z-index:3;
}
.tl-rail-marker .record-blank-axis-land.is-timeline{
  left:-17px;
  top:-6px;
}
.tl-rail-marker .record-blank-axis-land.is-timeline .record-blank-axis-land-inner{
  transform-origin:17px 42px;
}
.tl-t5-body--pending{
  min-height:1.47em;
}
.tl-rail-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(255,77,136,0.32);
  border:1.5px solid rgba(255,77,136,0.48);
  margin-top:0;
  z-index:1;
  flex-shrink:0;
  box-shadow:0 0 0 2px var(--my-bg);
}
.tl-rail-body{
  flex:1;
  min-width:0;
  padding-top:0;
}
.tl-rail-body .v3-card-wrap,
.tl-rail-body > .fade-in{
  width:100%;
}
.tl-node-stack{
  flex:1;
  min-width:0;
}
.tl-node-caption{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:7px;
  padding-left:1px;
  min-height:14px;
}
.tl-node-time{
  font-size:11px;
  font-weight:500;
  color:var(--my-text-tertiary);
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.02em;
  line-height:1;
}
.tl-node-sep{
  font-size:11px;
  color:var(--my-text-tertiary);
  opacity:0.45;
  line-height:1;
}
.tl-node-label{
  font-size:11px;
  font-weight:500;
  padding:3px 10px;
  border-radius:999px;
  line-height:1.29;
}
.tl-node-label.kind-ai{
  color:#fff;
  background:var(--my-brand-red);
}
.tl-node-label.kind-weekly{
  color:#fff;
  background:var(--my-link);
}
.tl-node-label.kind-corr{
  color:#00a378;
  background:rgba(0,204,153,0.10);
}

/* 周期开始标记 */
.tl-cycle-start{
  display:flex;
  gap:8px;
  padding:6px 0 18px;
  align-items:flex-start;
}
.tl-cycle-start-marker{
  width:34px;
  flex-shrink:0;
  display:flex;
  justify-content:center;
  padding-top:10px;
}
.tl-cycle-start-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--my-brand-red);
  box-shadow:0 0 0 3px rgba(255,77,136,0.15), 0 0 0 5px var(--my-bg);
}
.tl-cycle-start-body{
  flex:1;
  min-width:0;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  padding:8px 12px;
  background:var(--my-brand-soft);
  border-radius:8px;
  border:0.5px solid rgba(255,77,136,0.15);
}
.tl-cycle-start-icon{font-size:14px;line-height:1}
.tl-cycle-start-text{
  font-size:12px;
  font-weight:500;
  color:var(--my-brand-red);
}
.tl-cycle-start-sub{
  font-size:11px;
  color:var(--my-text-tertiary);
  width:100%;
  margin-left:22px;
}

/* 旧 date-head 保留兼容 */
.date-head{display:none}

/* 记录卡片 */
.rec{
  background:var(--my-surface);
  border-radius:14px;
  padding:16px 18px;
  margin-bottom:12px;
  box-shadow:0 2px 12px rgba(255,93,138,.06);
  border:0.5px solid rgba(0,0,0,0.03);
  transition:transform 0.15s, box-shadow 0.15s;
}
.rec:last-child{margin-bottom:0}
.rec:active{transform:scale(0.985)}
.rec-time{
  font-size:11px;
  color:var(--my-text-tertiary);
  margin-bottom:8px;
  font-variant-numeric:tabular-nums;
  letter-spacing:0.02em;
}
.rec-body{
  font-size:15px;
  line-height:1.7;
  color:var(--my-text-primary);
  margin-bottom:12px;
  word-break:break-word;
}

/* 照片 */
.rec-img{
  width:100%;
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
}
.rec-img-real{
  width:100%;
  height:auto;
  display:block;
  vertical-align:top;
}
.rec-body-photo{
  margin-bottom:10px;
}
.rec-img-ph{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
.rec-img-ph.warm{
  background:linear-gradient(135deg,#ffe4ec 0%,#ffd6e0 40%,#ffc8d6 100%);
}
.rec-img-ph.cool{
  background:linear-gradient(135deg,#e8f0fe 0%,#dce8f8 40%,#d0e0f2 100%);
}
.rec-img-ph.green{
  background:linear-gradient(135deg,#e4f7ec 0%,#d4f0e2 40%,#c8eada 100%);
}

/* 标签 */
.rec-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:0;
}
.rec-tag{
  display:inline-flex;
  align-items:center;
  gap:3px;
  font-size:12px;
  padding:4px 12px;
  border-radius:var(--r-pill);
  background:rgba(0,0,0,0.03);
  color:var(--my-text-secondary);
  line-height:1.35;
}
.rec-body-voice{
  font-size:14px;color:var(--my-text-secondary);
  margin-top:-4px;
}
.rec-voice{
  width:100%;
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin-bottom:10px;
  background:var(--my-bg);border-radius:var(--r-sm);
  border:0.5px solid var(--my-line);cursor:pointer;font:inherit;text-align:left;
}
.rec-voice-play{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:#4f7cae;color:#fff;
  display:flex;align-items:center;justify-content:center;
}
.rec-voice-bars{flex:1;display:flex;align-items:center;gap:2px;height:22px}
.rec-voice-bars span{width:2px;border-radius:1px;background:#6b8fc4;opacity:0.78}
.rec-voice-bars span:nth-child(odd){height:6px}
.rec-voice-bars span:nth-child(3n){height:10px}
.rec-voice-bars span:nth-child(4n){height:14px}
.rec-voice.playing .rec-voice-bars span{
  animation:voiceBar 0.8s ease-in-out infinite;
  animation-delay:calc(var(--i) * 0.04s);
}
@keyframes voiceBar{
  0%,100%{transform:scaleY(0.5);opacity:0.35}
  50%{transform:scaleY(1);opacity:0.85}
}
.rec-voice-dur{font-size:11px;color:var(--my-text-tertiary);font-variant-numeric:tabular-nums}

.rec-tag.content{
  background:rgba(255,77,136,0.06);
  color:var(--my-text-secondary);
}
.rec-tag.ai{
  background:rgba(79,124,174,0.06);
  color:var(--my-link);
}
.rec-tag .ai-badge{
  font-size:9px;
  background:rgba(79,124,174,0.12);
  padding:1px 4px;
  border-radius:4px;
  margin-left:1px;
  font-weight:500;
}

/* AI 批注 */
.ai-anno{
  margin-top:12px;
  padding:14px 16px;
  border-radius:12px;
  font-size:13px;
  line-height:1.65;
  color:var(--my-text-secondary);
}
.ai-anno.green-bg{background:rgba(46,189,110,0.07)}
.ai-anno.yellow-bg{background:rgba(240,160,32,0.07)}
.ai-anno.brand-bg{background:var(--my-brand-soft);color:var(--my-text-primary)}
.ai-anno .anno-icon{margin-right:4px}

/* 周期摘要 */
.cycle-sum{
  background:var(--my-surface);
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  box-shadow:0 1px 8px rgba(0,0,0,0.035);

  border-left:4px solid var(--my-success);
}
.cycle-sum.warn{border-left-color:var(--my-warning)}
.cs-head{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.cs-icon{font-size:18px;line-height:1}
.cs-title{
  font-size:15px;
  font-weight:500;
  color:var(--my-text-primary);
}
.cs-body{
  font-size:13px;
  color:var(--my-text-secondary);
  line-height:1.65;
  margin-bottom:10px;
}
.cs-link{
  font-size:12px;
  color:var(--my-brand-red);

  cursor:pointer;
}

/* 周报 */
.weekly-card{
  background:var(--my-surface);
  border-radius:16px;
  padding:16px 20px;
  margin-bottom:12px;

  align-items:center;

}

.wk-left{display:flex;align-items:center;gap:12px}
.wk-icon{

}
.wk-title{font-size:14px;font-weight:500;color:var(--my-text-primary)}
.wk-sub{font-size:11px;color:var(--my-text-tertiary);margin-top:2px}

/* 时间间隔 — 页面居中 */
.tl-gap-divider,
.tl-feed-more{

  padding:28px 16px 20px;

  width:100%;
  font-size:12px;
  font-weight:400;
  color:rgba(0,0,0,0.38);
  letter-spacing:0.02em;
  position:relative;
  z-index:3;
}
.tl-gap-divider.tl-rail-break::before{
  display:none;
}

/* 今日引导 */
.tl-today-guide{
  background:var(--my-surface);

  padding:20px;

  box-shadow:0 1px 8px rgba(0,0,0,0.035);

  align-items:flex-start;
  gap:12px;
}
.tl-today-guide-icon{

  border-radius:50%;

  flex-shrink:0;
}
.tl-today-guide-text{
  font-size:14px;
  color:var(--my-text-primary);

}

  font-style:normal;

/* 流头部 */
.stream-header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:4px 2px 18px;
}
.stream-title{

  color:var(--my-text-primary);

}
.stream-sub{
  font-size:12px;
  color:var(--my-text-tertiary);

}
.stream-actions{

}
.stream-action{

}

/* ============ 场景模块占位 ============ */
.tl-module{

}

  display:flex;align-items:center;gap:10px;

}

  width:36px;height:36px;border-radius:8px;

}

.tl-module-title{

}

}

}
.ph-cycle-card .tl-module-icon{background:rgba(255,77,136,0.12)}

.sk-cycle{

  color:var(--my-brand-red);font-size:13px;font-weight:500;
}
.sk-cycle-ring{

}

}

.sk-delta{font-size:11px;color:var(--my-success)}
.sk-tag{font-size:10px;color:var(--my-warning);background:var(--my-warning-soft);padding:2px 8px;border-radius:4px}
.sk-calorie{text-align:center}
.sk-cal-num{font-size:22px;font-weight:500;color:var(--my-text-primary)}

.sk-cal-tags{display:flex;gap:6px;justify-content:center;margin-top:6px}
.sk-cal-tags span{
  font-size:10px;padding:2px 8px;border-radius:4px;
  background:var(--my-bg);color:var(--my-text-secondary);
}

/* ============ 时间轴内联引导 ============ */
.tl-rail-guide{
  padding:0 0 4px;
}
.tl-rail-guide-text{
  margin:0;
  font-size:13px;
  line-height:1.55;
  color:var(--my-text-tertiary);
}

/* ============ 今日引导（旧卡片，保留兼容） ============ */
.tl-guide-card{
  margin-bottom:0;
  padding:14px 16px 16px;
  background:rgba(255,255,255,0.72);
  border-radius:14px;
  border:0.5px solid rgba(255,77,136,0.12);

}
.tl-guide-card .rec-time{margin-bottom:6px}

  font-size:14px;line-height:1.55;

  margin:0 0 12px;
}
.tl-guide-chips{display:flex;flex-wrap:wrap;gap:8px}
.tl-guide-chip{
  padding:7px 14px;border-radius:80px;border:none;

}

}

}
.tl-guide-card.is-soft .tl-guide-text{

}
.tl-guide-card.is-soft .tl-guide-chip{
  padding:6px 12px;
  font-size:12px;
  background:rgba(255,255,255,0.6);
  box-shadow:none;
  border:0.5px solid rgba(0,0,0,0.04);
}

/* ============ 周分析卡片 — 纵向折叠 ============ */
.tl-weekly-bubble{
  background:#ffffff;
  border-radius:14px;
  padding:0;
  margin-bottom:0;

  border:0.5px solid rgba(255,77,136,0.08);
  overflow:hidden;
}
.tl-weekly-surface{
  padding:12px 15px 12px;
}
.tl-weekly-surface .tl-rec-card-hd{
  margin-bottom:8px;
}
.tl-rec-card-hd + .tl-weekly-overview{
  margin-top:0;
}
.tl-weekly-overview{
  margin:0;
  font-size:14px;
  line-height:1.47;
  color:var(--my-text-secondary);
}
.tl-weekly-bubble.is-wellness .tl-weekly-overview{
  color:var(--my-text-primary);
}
.tl-weekly-stack-inline{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}
.tl-weekly-panel.is-stat-only{
  padding:10px 11px 8px;

}
.tl-weekly-panel-stat{
  margin:2px 0 6px;

}
.tl-weekly-panel.tone-weight .tl-weekly-panel-stat{

}
.tl-weekly-panel.tone-sleep .tl-weekly-panel-stat{

}
.tl-weekly-panel.is-stat-only .tl-weekly-panel-summary{
  margin-top:0;
}
.tl-weekly-toggle{
  width:100%;

  justify-content:center;
  gap:4px;
  padding:9px 15px 12px;
  background:transparent;
  border:none;
  border-top:0.5px solid rgba(0,0,0,0.05);

  font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.tl-weekly-toggle-label{
  font-size:12px;
  color:var(--my-link);
}
.tl-weekly-chev{

  color:var(--my-link);
}

.tl-weekly-detail{

}
.tl-weekly-bubble.is-open .tl-weekly-detail{
  max-height:1200px;
  opacity:1;
  padding:12px 15px 0;
  border-top-color:rgba(0,0,0,0.05);
}
.tl-weekly-detail .tl-weekly-panel{
  width:100%;
  max-width:none;
  margin-bottom:10px;
  min-height:0;
}
.tl-weekly-detail .tl-weekly-panel:last-child{margin-bottom:0}

/* 保留旧类名兼容 */
.tl-weekly-stack{
  max-height:0;
  opacity:0;
  overflow:hidden;
  transition:max-height .38s ease, opacity .28s ease, padding .28s ease;
  padding:0 15px;
}
.tl-weekly-bubble.is-open .tl-weekly-stack{
  max-height:1200px;
  opacity:1;
  padding:0 15px 14px;
}
.tl-weekly-stack .tl-weekly-panel{
  width:100%;
  max-width:none;
  margin-bottom:10px;
  min-height:0;
}
.tl-weekly-stack .tl-weekly-panel:last-child{margin-bottom:0}

/* 保留旧类名兼容 */
.tl-weekly-card{
  background:var(--my-surface);
  border-radius:14px;
  padding:14px 0 14px 14px;
  margin-bottom:0;
  box-shadow:0 2px 12px rgba(255,93,138,.06);
  border:0.5px solid rgba(0,0,0,0.03);
}
.tl-weekly-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
  padding-right:14px;
}
.tl-weekly-icon{
  width:36px;height:36px;border-radius:8px;
  background:var(--my-link-soft);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.tl-weekly-scroll{
  display:flex;
  gap:10px;
  overflow-x:auto;

}
.tl-weekly-scroll::-webkit-scrollbar{display:none}
.tl-weekly-panel{

  flex-direction:column;
}
.tl-weekly-panel.tone-mood{
  background:linear-gradient(180deg, rgba(141,84,255,0.08) 0%, rgba(255,255,255,0.95) 100%);
}
.tl-weekly-panel.tone-weight{
  background:linear-gradient(180deg, rgba(255,77,136,0.07) 0%, rgba(255,255,255,0.95) 100%);
}
.tl-weekly-panel.tone-sleep{
  background:linear-gradient(180deg, rgba(79,124,174,0.08) 0%, rgba(255,255,255,0.95) 100%);
}
.tl-weekly-panel-head{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:8px;
}
.tl-weekly-panel-icon{font-size:15px;line-height:1}
.tl-weekly-panel-title{
  font-size:13px;
  font-weight:500;
  color:var(--my-text-primary);
}
.tl-weekly-panel-chart{
  flex:1;
  min-height:72px;
}
.tl-weekly-panel-delta{
  font-size:11px;
  font-weight:500;
  color:var(--my-success);
  text-align:right;
  margin-top:-6px;
  margin-bottom:2px;
}
.tl-weekly-panel-summary{

  line-height:1.55;

}
.tl-weekly-dot{

.tl-trend-block{margin-bottom:14px}

}
.tl-trend-chart.mood .tl-trend-bar{

}

}

.tl-tags-reveal{
  animation:tlTagsReveal 0.28s cubic-bezier(0.2,0,0,1) both;

.tl-mood-insight-ai-label{

  color:var(--my-text-secondary);
  font-weight:500;
  padding-left:2px;
}
/* 情绪与周期行 */
.tl-mood-insight-phase-row{
  display:flex;
  align-items:flex-start;
  gap:8px;
  padding:9px 10px;
  background:rgba(79,124,174,0.06);
  border-radius:10px;
}
.tl-mood-insight-phase-pill{

  background:rgba(79,124,174,0.18);
  color:#3f6590;
  border-radius:999px;
  font-size:10px;
  font-weight:500;
  flex-shrink:0;
  margin-top:1px;
}
.tl-mood-insight-phase-text{
  font-size:13px;
  line-height:1.5;
  color:var(--my-text-primary);
}
/* 曲线图（共用） */
.tl-mood-curve{
  position:relative;
  width:100%;
}
.tl-mood-curve svg{
  display:block;
}
.tl-mood-curve-axis{
  margin-top:-14px;
  display:flex;
  justify-content:space-between;
  padding:0 6px;
}
.tl-mood-curve-day{
  font-size:10px;
  color:var(--my-text-tertiary);
}
.tl-mood-curve-day.is-today{
  color:var(--my-brand-red);
  font-weight:500;
}
.tl-mood-curve-reveal{
  overflow:hidden;
  width:100%;
}
.tl-mood-curve.is-anim .tl-mood-curve-reveal{
  width:0;
  opacity:0.35;
  animation:tlMoodCurveReveal var(--mood-reveal-ms, 920ms) cubic-bezier(0.22,1,0.36,1) forwards;
}
.tl-mood-curve.is-anim .tl-mood-curve-day.is-reveal{
  opacity:0;
  transform:translateY(3px);
  animation:tlMoodDayIn 0.34s ease forwards;
  animation-delay:calc(80ms + var(--day-i, 0) * 92ms);
}
@keyframes tlMoodCurveReveal{
  from{width:0;opacity:0.35}
  to{width:100%;opacity:1}
}
@keyframes tlMoodDayIn{
  from{opacity:0;transform:translateY(3px)}
  to{opacity:1;transform:translateY(0)}
}
/* 流式淡入：用 --mi-i 错峰 */
.tl-mood-insight.is-stream .tl-mood-insight-hd,
.tl-mood-insight.is-stream .tl-mood-insight-user,
.tl-mood-insight.is-stream .tl-mood-insight-ai-wrap{
  opacity:0;
  transform:translateY(5px);
  animation:miSlotIn 0.38s cubic-bezier(0.22,1,0.36,1) forwards;
  animation-delay:calc(60ms + var(--mi-i,0) * 260ms);
}
@keyframes miSlotIn{
  to{opacity:1;transform:translateY(0)}
}

/* 方案一 · 空态 + 首条记录（连续过渡） */
.record-blank-stream.is-scheme1 .rb-s1-flow{
  --rb-s1-top:max(8px, calc(10dvh - 4px));
  min-height:calc(100dvh - 44px - var(--my-dock-float-b, 180px) - 76px);
  box-sizing:border-box;
}

.rb-s1-flow{
  position:relative;
}

.rb-s1-axis{
  position:absolute;
  left:16px;
  top:var(--rb-s1-top);
  bottom:56px;
  width:14px;
  pointer-events:none;
  z-index:2;
}

.rb-s1-axis-rail{
  position:absolute;
  left:6px;
  top:10px;
  bottom:0;
  width:2px;
  border-radius:1px;
  background:linear-gradient(
    180deg,
    rgba(255,77,136,0.52) 0%,
    rgba(255,77,136,0.28) 16%,
    rgba(255,77,136,0.16) 32%,
    rgba(255,77,136,0.1) 50%,
    rgba(255,77,136,0.06) 72%,
    rgba(255,77,136,0.03) 100%
  );
  transition:background 0.85s cubic-bezier(0.4,0,0.2,1);
}

.rb-s1-flow.is-ceremony .rb-s1-axis-rail{
  top:0;
  background:linear-gradient(
    180deg,
    rgba(255,77,136,0.48) 0%,
    rgba(255,77,136,0.22) 6%,
    rgba(0,0,0,0.07) 14%,
    rgba(0,0,0,0.06) 100%
  );
}

.rb-s1-axis-dot{
  position:absolute;
  left:50%;
  top:0;
  width:10px;
  height:10px;
  border-radius:50%;
  box-sizing:border-box;
  background:#ff4d88;
  border:2px solid #fff;
  box-shadow:
    0 0 0 2px var(--my-bg),
    0 0 0 5px rgba(255,77,136,0.14);
  transform:translateX(-50%) scale(1);
  transform-origin:center center;
  transition:
    box-shadow 0.55s cubic-bezier(0.4,0,0.2,1),
    transform 0.55s cubic-bezier(0.4,0,0.2,1);
}

.rb-s1-axis-dot.is-settling{
  animation:rbS1DotSettle 0.72s cubic-bezier(0.34,1.15,0.64,1) forwards;
}

.rb-s1-axis-dot.is-settled{
  width:6px;
  height:6px;
  border-width:1.5px;
  box-shadow:0 0 0 2px var(--my-bg);
  transform:translateX(-50%) scale(1);
}

@keyframes rbS1DotSettle{
  0%{
    transform:translateX(-50%) scale(1);
    box-shadow:
      0 0 0 2px var(--my-bg),
      0 0 0 5px rgba(255,77,136,0.14);
  }
  38%{
    transform:translateX(-50%) scale(1.34);
    box-shadow:
      0 0 0 2px var(--my-bg),
      0 0 0 9px rgba(255,77,136,0.2);
  }
  62%{
    transform:translateX(-50%) scale(0.88);
  }
  82%{
    transform:translateX(-50%) scale(1.06);
  }
  100%{
    transform:translateX(-50%) scale(1);
    width:6px;
    height:6px;
    border-width:1.5px;
    box-shadow:0 0 0 2px var(--my-bg);
  }
}

.rb-s1-main{
  position:relative;
  z-index:1;
}

  left:0;
  right:0;
  top:0;
}

.rb-s1-timeline{

}

  animation:rbS1FadeUp 0.6s ease forwards;
}

  font-size:13px;
  font-weight:400;
  color:rgba(0,0,0,0.35);

}

.rb-s1-curly-arrow{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  width:100%;

  bottom:0;

  z-index:90;
}

.rb-s1-curly-arrow img{
  position:absolute;
  right:76px;

  width:92px;
  height:auto;
  opacity:0;
  transform:translate(-6px,-6px) scale(0.96);
  transform-origin:100% 100%;
  animation:rbS1CurlyArrowIn 0.55s ease 0.55s forwards;
}

.phone:has(.quick-float-wrap.is-quick-active) .rb-s1-curly-arrow,
.suiji-shell.is-mood-expanded .rb-s1-curly-arrow{
  opacity:0;
  visibility:hidden;
  transition:opacity 0.2s ease, visibility 0.2s ease;
}

@keyframes rbS1CurlyArrowIn{
  from{
    opacity:0;
    transform:translate(-6px,-6px) scale(0.96);
  }
  to{
    opacity:0.88;
    transform:none;
  }
}

@keyframes rbS1FadeUp{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.rb-s3-axis-wrap{
  position:absolute;
  left:16px;
  top:40px;
  width:14px;
  height:340px;
  pointer-events:none;
}

.rb-s3-axis{
  position:absolute;
  left:50%;
  top:0;
  width:1.5px;
  height:0;
  margin-left:-0.75px;
  border-radius:1px;
  overflow:visible;
  background:linear-gradient(
    180deg,
    rgba(255,77,136,0.15) 0%,
    rgba(255,77,136,0.55) 72%,

  );

.rb-s3-axis.is-phase-1{height:48px}
.rb-s3-axis.is-phase-2{height:85px}
.rb-s3-axis.is-phase-3{height:170px}
.rb-s3-axis.is-phase-4{height:255px}
.rb-s3-axis.is-phase-5{height:340px}

.rb-s3-axis.is-flowing{
  background:linear-gradient(
    180deg,
    rgba(255,77,136,0.1) 0%,
    rgba(255,77,136,0.35) 28%,
    rgba(255,77,136,0.62) 58%,
    rgba(255,77,136,0.28) 82%,
    rgba(255,77,136,0) 100%
  );
  background-size:100% 240%;
  animation:rbS3AxisDrift 2.6s ease-in-out infinite;
}

.rb-s3-axis-tip{
  position:absolute;
  left:50%;
  bottom:-2px;
  width:6px;
  height:6px;
  margin-left:-3px;
  border-radius:50%;
  background:#ff4d88;
  box-shadow:0 0 0 2px rgba(255,255,255,0.9), 0 0 8px rgba(255,77,136,0.35);

  transform:scale(0.6);

.rb-s3-axis.is-phase-1 .rb-s3-axis-tip,
.rb-s3-axis.is-phase-2 .rb-s3-axis-tip,
.rb-s3-axis.is-phase-3 .rb-s3-axis-tip,
.rb-s3-axis.is-phase-4 .rb-s3-axis-tip,
.rb-s3-axis.is-phase-5 .rb-s3-axis-tip{
  opacity:1;
  transform:scale(1);
  animation:rbS3AxisTipPulse 1.8s ease-in-out infinite;
}

@keyframes rbS3AxisDrift{
  0%,100%{background-position:0 0}
  50%{background-position:0 28%}
}

@keyframes rbS3AxisTipPulse{
  0%,100%{
    opacity:0.55;
    transform:scale(0.92);
    box-shadow:0 0 0 2px rgba(255,255,255,0.9), 0 0 6px rgba(255,77,136,0.22);
  }
  50%{
    opacity:1;
    transform:scale(1.08);
    box-shadow:0 0 0 2px rgba(255,255,255,0.9), 0 0 10px rgba(255,77,136,0.42);

  100%{

@keyframes shimmerSweep {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
@keyframes pulseDot {
  0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
  40%           { opacity: 1;    transform: translateY(-2px); }
}
@keyframes bloomUp {
  0%   { opacity: 0; transform: translateY(8px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0)   scale(1);    }
}
@keyframes floatUp {
  0%   { transform: translateY(0)    scale(0.6); opacity: 0; }
  20%  { opacity: 0.9; }
  80%  { opacity: 0.8; }
  100% { transform: translateY(-160px) scale(1.2); opacity: 0; }
}
@keyframes liveBar {
  0%, 100% { transform: scaleY(0.3); }
  50%      { transform: scaleY(1);   }
}
@keyframes haloBreathe {
  0%, 100% { transform: scale(1);   opacity: 0.55; }
  50%      { transform: scale(1.18); opacity: 0.85; }
}
@keyframes bubbleFly {
  0%   { transform: translate(0, 0) scale(1); opacity: 1; }
  40%  { transform: translate(0, -40px) scale(1.02); opacity: 1; }
  100% { transform: translate(var(--fly-x, -120px), var(--fly-y, -480px)) scale(0.4); opacity: 0; }
}
@keyframes growUp {
  0%   { opacity: 0; transform: translateY(20px) scaleY(0.6); }
  100% { opacity: 1; transform: translateY(0)    scaleY(1);   }
}
@keyframes growUpExit {
  0%   { opacity: 1; transform: translateY(0)     scaleY(1); }
  100% { opacity: 0; transform: translateY(-40px) scaleY(0.85); }
}
@keyframes floatAway {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); filter: blur(2px); }
}
@keyframes caretBlink {
  0%, 49%   { opacity: 1; }
  50%, 100% { opacity: 0; }
}
@keyframes orbSpin {
  0%   { transform: rotate(0deg);   }
  100% { transform: rotate(360deg); }
}
@keyframes aiThinkPulse {
  0%, 100% { transform: scale(1);   opacity: 0.9; }
  50%      { transform: scale(1.06); opacity: 1;   }
}
