<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美柚 · 记录 · 场景原型</title>
<!--
  美柚记录 Tab 场景原型 — 单文件版
  生成日期: 2026-05-19
  使用方式: 双击打开，或浏览器拖入此文件即可预览（需联网加载 React/Babel CDN）

  编辑指南:
  · 场景数据 → 搜索 TIMELINE_BLOCKS（约 data.jsx 段）
  · 样式 → 下方 <style> 内搜索 class 名
  · 重新打包多文件版 → 在项目根目录运行: node scripts/build-standalone.js
-->
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;letter-spacing:0}

:root{
  /* ===== Meiyou tokens ===== */
  --my-brand-red:#ff4d88;
  --my-brand-soft:rgba(255,77,136,0.08);
  --my-brand-soft-2:rgba(255,77,136,0.14);
  --my-bg:#f2f2f5;
  --my-bg-2:#fafafb;
  --my-surface:#ffffff;
  --my-text-primary:#323232;
  --my-text-secondary:#666666;
  --my-text-tertiary:#999999;
  --my-text-quat:#c8c8cc;
  --my-line:rgba(0,0,0,0.08);
  --my-success:#00cc99;
  --my-success-soft:rgba(0,204,153,0.10);
  --my-warning:#ff9500;
  --my-warning-soft:rgba(255,149,0,0.10);
  --my-danger:#ff4d4d;
  --my-link:#4f7cae;
  --my-link-soft:rgba(79,124,174,0.10);
  --my-purple:#8d54ff;
  --my-purple-soft:rgba(141,84,255,0.10);

  /* phase colors */
  --phase-period:#ff4d88;
  --phase-period-soft:rgba(255,77,136,0.10);
  --phase-foll:#4f7cae;
  --phase-foll-soft:rgba(79,124,174,0.10);
  --phase-ov:#8d54ff;
  --phase-ov-soft:rgba(141,84,255,0.10);
  --phase-lut:#ff9500;
  --phase-lut-soft:rgba(255,149,0,0.10);

  --r-xs:4px;
  --r-sm:8px;
  --r-md:12px;
  --r-pill:999px;

  --shadow-1:0 2px 10px rgba(50,50,50,0.06);
  --shadow-2:0 8px 24px rgba(0,0,0,0.14);

  font-family:'PingFang SC','SF Pro Text','Helvetica Neue',Arial,sans-serif;
}

html,body{
  background:#0e0e10;
  color:var(--my-text-primary);
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"palt";
}

#root{
  min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
}

.phone{
  width:390px;
  min-height:100vh;
  background:var(--my-bg);
  position:relative;
  overflow:hidden;
}
@media(min-width:431px){.phone{box-shadow:0 0 40px rgba(0,0,0,0.25)}}

/* ============ STATUS BAR ============ */
.statusbar{
  height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  font-size:15px;font-weight:600;color:var(--my-text-primary);
}
.sb-r{display:flex;align-items:center;gap:5px}
.sb-bars{display:inline-flex;gap:1.5px;align-items:flex-end}
.sb-bars i{display:block;width:3px;background:var(--my-text-primary);border-radius:1px}
.sb-bars i:nth-child(1){height:4px}
.sb-bars i:nth-child(2){height:6px}
.sb-bars i:nth-child(3){height:8px}
.sb-bars i:nth-child(4){height:10px}
.sb-batt{width:24px;height:11px;border:1.2px solid var(--my-text-primary);border-radius:3px;position:relative;padding:1px}
.sb-batt::after{content:'';position:absolute;right:-3px;top:3px;width:1.5px;height:4px;background:var(--my-text-primary);border-radius:0 1px 1px 0}
.sb-batt i{display:block;height:100%;width:75%;background:var(--my-text-primary);border-radius:1px}

.app{padding-bottom:160px}

/* ============ TOP NAV ============ */
.nav{
  height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:var(--my-bg);
}
.nav-title{font-size:17px;font-weight:500;color:var(--my-text-primary)}
.nav-actions{display:flex;gap:14px}
.nav-icon{
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  color:var(--my-text-primary);cursor:pointer;
}

/* ============ COMPACT HEALTH STATUS BAR ============ */
.health{
  margin:4px 16px 12px;
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:12px 14px;
  box-shadow:var(--shadow-1);
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
}
.health-light{
  width:8px;height:8px;border-radius:50%;
  background:var(--my-success);
  box-shadow:0 0 8px var(--my-success);
  flex-shrink:0;
}
.health-light.warn{background:var(--my-warning);box-shadow:0 0 8px var(--my-warning)}
.health-light.alert{background:var(--my-danger);box-shadow:0 0 8px var(--my-danger)}
.health-text{flex:1;min-width:0}
.health-title{
  font-size:14px;font-weight:500;color:var(--my-text-primary);
  display:flex;align-items:center;gap:6px;
}
.health-phase{
  font-size:11px;color:var(--my-brand-red);
  background:var(--my-brand-soft);
  padding:2px 8px;border-radius:var(--r-pill);
  font-weight:500;
}
.health-phase.foll{color:var(--phase-foll);background:var(--phase-foll-soft)}
.health-phase.ov{color:var(--phase-ov);background:var(--phase-ov-soft)}
.health-phase.lut{color:var(--phase-lut);background:var(--phase-lut-soft)}
.health-desc{
  font-size:12px;color:var(--my-text-secondary);margin-top:3px;line-height:1.4;
}
.health-day{
  flex-shrink:0;
  text-align:center;
  padding-left:10px;border-left:0.5px solid var(--my-line);
}
.health-day-num{
  font-size:18px;font-weight:600;color:var(--my-text-primary);
  line-height:1;font-variant-numeric:tabular-nums;
}
.health-day-lbl{
  font-size:10px;color:var(--my-text-tertiary);margin-top:3px;
}

/* ============ TIMELINE ============ */
.timeline{
  position:relative;
  padding-left:44px;
  padding-right:16px;
}
.timeline::before{
  content:'';
  position:absolute;
  left:20px;top:6px;bottom:0;
  width:1.5px;
  background:linear-gradient(180deg,
    var(--my-text-quat) 0%,
    var(--my-text-quat) 40%,
    var(--my-line) 100%);
}

/* day section header */
.tl-section{margin-bottom:20px;position:relative}
.tl-day-row{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:0 0 10px 0;
  position:relative;
}
.tl-day-row::before{
  content:'';
  position:absolute;
  left:-30px;top:8px;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--my-surface);
  border:2px solid var(--my-brand-red);
  box-shadow:0 0 0 3px var(--my-bg);
}
.tl-section.today .tl-day-row::before{
  background:var(--my-brand-red);
  box-shadow:0 0 0 3px var(--my-bg), 0 0 0 6px rgba(255,77,136,0.15);
}
.tl-section.dim .tl-day-row::before{
  border-color:var(--my-text-quat);
  width:8px;height:8px;
  left:-29px;
}
.tl-day-num{
  font-size:22px;font-weight:600;
  color:var(--my-text-primary);
  line-height:1.1;
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.5px;
}
.tl-day-num::after{
  content:'';display:block;
  width:24px;height:2px;
  background:var(--my-brand-red);
  border-radius:1px;margin-top:4px;
}
.tl-section.dim .tl-day-num{color:var(--my-text-secondary);font-weight:500;font-size:18px}
.tl-section.dim .tl-day-num::after{display:none}
.tl-day-meta{
  font-size:12px;color:var(--my-text-tertiary);
  font-variant-numeric:tabular-nums;
}
.tl-day-meta b{font-weight:500;color:var(--my-text-secondary)}

/* phase marker on timeline */
.tl-phase{
  position:relative;
  margin:6px 0 14px;
  padding:0;
  display:flex;align-items:center;
}
.tl-phase::before{
  content:'';
  position:absolute;
  left:-30px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;
  border-radius:50%;
  background:var(--phase-period);
  border:2px solid var(--my-bg);
  box-shadow:0 0 0 2px var(--my-bg);
}
.tl-phase.foll::before{background:var(--phase-foll)}
.tl-phase.ov::before{background:var(--phase-ov)}
.tl-phase.lut::before{background:var(--phase-lut)}
.tl-phase-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;
  border-radius:var(--r-pill);
  background:var(--phase-period-soft);
  color:var(--phase-period);
  font-size:11px;font-weight:500;
}
.tl-phase.foll .tl-phase-pill{background:var(--phase-foll-soft);color:var(--phase-foll)}
.tl-phase.ov .tl-phase-pill{background:var(--phase-ov-soft);color:var(--phase-ov)}
.tl-phase.lut .tl-phase-pill{background:var(--phase-lut-soft);color:var(--phase-lut)}
.tl-phase-pill::before{
  content:'';width:5px;height:5px;border-radius:50%;background:currentColor;
}

/* gap marker (X days) */
.tl-gap{
  position:relative;
  height:32px;
  display:flex;align-items:center;
  margin:2px 0;
}
.tl-gap::before{
  content:'';position:absolute;
  left:-26px;top:50%;transform:translateY(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--my-text-quat);
}
.tl-gap-lbl{
  font-size:10px;
  color:var(--my-text-tertiary);
  padding:1px 8px;
  border-radius:var(--r-pill);
  background:var(--my-bg-2);
  border:0.5px solid var(--my-line);
}

/* cycle boundary / month report */
.tl-cycle-report{
  position:relative;
  margin:18px 0;
}
.tl-cycle-report::before{
  content:'';
  position:absolute;
  left:-30px;top:18px;
  width:14px;height:14px;
  border-radius:3px;
  background:var(--my-success);
  transform:rotate(45deg);
  box-shadow:0 0 0 3px var(--my-bg);
}
.tl-cycle-report.warn::before{background:var(--my-warning)}
.tl-cycle-report.alert::before{background:var(--my-danger)}
.cycle-card{
  background:linear-gradient(135deg, rgba(0,204,153,0.06) 0%, rgba(0,204,153,0.02) 100%);
  border:0.5px solid rgba(0,204,153,0.20);
  border-radius:var(--r-md);
  padding:14px 16px;
  cursor:pointer;
}
.tl-cycle-report.warn .cycle-card{
  background:linear-gradient(135deg, rgba(255,149,0,0.07) 0%, rgba(255,149,0,0.02) 100%);
  border-color:rgba(255,149,0,0.22);
}
.tl-cycle-report.alert .cycle-card{
  background:linear-gradient(135deg, rgba(255,77,77,0.07) 0%, rgba(255,77,77,0.02) 100%);
  border-color:rgba(255,77,77,0.22);
}
.cycle-card-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.cycle-card-lbl{
  font-size:11px;
  color:var(--my-success);
  font-weight:600;
  letter-spacing:1px;
}
.tl-cycle-report.warn .cycle-card-lbl{color:var(--my-warning)}
.tl-cycle-report.alert .cycle-card-lbl{color:var(--my-danger)}
.cycle-card-arrow{color:var(--my-text-tertiary);font-size:14px}
.cycle-card-title{
  font-size:15px;
  font-weight:600;
  color:var(--my-text-primary);
  margin-bottom:4px;
}
.cycle-card-range{
  font-size:11px;
  color:var(--my-text-tertiary);
  margin-bottom:12px;
  font-variant-numeric:tabular-nums;
}
.cycle-card-stats{
  display:flex;gap:0;
  background:rgba(255,255,255,0.6);
  border-radius:var(--r-sm);
  padding:10px 4px;
  margin-bottom:10px;
}
.cycle-card-stat{
  flex:1;
  text-align:center;
  position:relative;
}
.cycle-card-stat+.cycle-card-stat::before{
  content:'';position:absolute;left:0;top:20%;height:60%;width:0.5px;
  background:var(--my-line);
}
.cc-num{
  font-size:18px;
  font-weight:600;
  color:var(--my-text-primary);
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.cc-num.brand{color:var(--my-brand-red)}
.cc-num.warn{color:var(--my-warning)}
.cc-num.good{color:var(--my-success)}
.cc-lbl{
  font-size:10px;color:var(--my-text-tertiary);
  margin-top:4px;
}
.cycle-card-summary{
  font-size:12.5px;
  color:var(--my-text-secondary);
  line-height:1.55;
}

/* ============ GUIDE CARD (today) ============ */
.guide{
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:14px 16px;
  box-shadow:var(--shadow-1);
  display:flex;gap:10px;
  margin-bottom:12px;
}
.guide-avatar{width:32px;height:32px;flex-shrink:0;position:relative}
.guide-content{flex:1;min-width:0}
.guide-name{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--my-text-secondary);
  margin-bottom:3px;
}
.guide-name b{font-weight:500;color:var(--my-text-primary)}
.guide-name .ai-badge{
  background:var(--my-brand-soft);color:var(--my-brand-red);
  font-size:10px;padding:1px 5px;border-radius:var(--r-xs);font-weight:500;
}
.guide-text{
  font-size:14px;color:var(--my-text-primary);line-height:1.55;margin-bottom:10px;
}
.guide-text em{font-style:normal;color:var(--my-brand-red);font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  padding:5px 11px;
  background:var(--my-bg);border:none;border-radius:var(--r-pill);
  font-size:12px;color:var(--my-text-primary);
  cursor:pointer;font-family:inherit;white-space:nowrap;
  transition:background 0.15s;
}
.chip:active{background:var(--my-brand-soft);color:var(--my-brand-red)}

/* ============ ENTRY ============ */
.entry{
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:14px 16px;
  margin-bottom:8px;
  box-shadow:var(--shadow-1);
}
.entry-meta{
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--my-text-tertiary);
  margin-bottom:8px;font-variant-numeric:tabular-nums;
}
.entry-meta .more-btn{color:var(--my-text-tertiary);cursor:pointer;padding:2px 4px}
.entry-title{
  font-size:15px;font-weight:500;color:var(--my-text-primary);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.entry-title-emoji{font-size:14px}
.entry-body{
  font-size:14px;line-height:1.65;color:var(--my-text-primary);
  margin-bottom:10px;word-break:break-word;
}

/* photo */
.entry-photo{
  width:100%;aspect-ratio:4/3;
  border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden;
  background:
    repeating-linear-gradient(135deg,
      rgba(255,77,136,0.04) 0 14px,
      rgba(255,77,136,0.10) 14px 28px),
    var(--my-brand-soft);
  display:flex;align-items:center;justify-content:center;
  color:var(--my-brand-red);font-size:11px;
}

/* voice */
.voice{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;background:var(--my-brand-soft);
  border-radius:var(--r-sm);margin-bottom:10px;cursor:pointer;
}
.voice .voice-ico{color:var(--my-brand-red);flex-shrink:0;display:flex}
.voice-wave{flex:1;display:flex;align-items:center;gap:2px;height:20px}
.voice-wave span{width:2px;background:var(--my-brand-red);border-radius:1px;opacity:0.55}
.voice-dur{font-size:11px;color:var(--my-brand-red);font-variant-numeric:tabular-nums}

/* tags */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;padding:3px 8px;border-radius:var(--r-pill);
  background:var(--my-bg);color:var(--my-text-secondary);line-height:1.4;
}
.tag.auto{background:var(--my-brand-soft);color:var(--my-brand-red)}
.tag.auto::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--my-brand-red);margin-right:2px;
}

/* AI insight — tucked under like a folded note */
.ai-insight{
  background:var(--my-surface);
  border:0.5px solid rgba(79,124,174,0.20);
  border-left:3px solid var(--my-link);
  border-radius:var(--r-sm);
  padding:10px 12px;
  margin:-2px 8px 0;
  position:relative;
}
.ai-insight.good{
  border-color:rgba(0,204,153,0.22);border-left-color:var(--my-success);
}
.ai-insight.warn{
  border-color:rgba(255,149,0,0.22);border-left-color:var(--my-warning);
}
.ai-insight.brand{
  border-color:rgba(255,77,136,0.22);border-left-color:var(--my-brand-red);
}
.ai-ins-head{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--my-link);
  margin-bottom:6px;font-weight:500;
}
.ai-insight.good .ai-ins-head{color:var(--my-success)}
.ai-insight.warn .ai-ins-head{color:var(--my-warning)}
.ai-insight.brand .ai-ins-head{color:var(--my-brand-red)}
.ai-ins-head .mini-mascot{
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffd0e2, #ffa3c4 60%, var(--my-brand-red));
  flex-shrink:0;
}
.ai-ins-points{
  display:flex;flex-direction:column;gap:4px;
  font-size:12px;color:var(--my-text-primary);line-height:1.55;
}
.ai-ins-points li{list-style:none;display:flex;gap:6px}
.ai-ins-points li .ico{flex-shrink:0;width:14px;text-align:center}

/* ============ INPUT BAR ============ */
.input-wrap{
  position:fixed;bottom:60px;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  padding:8px 12px 10px;
  background:linear-gradient(180deg, rgba(242,242,245,0) 0%, var(--my-bg) 35%);
  z-index:90;
  display:flex;flex-direction:column;
}
.input-bar{
  background:var(--my-surface);border-radius:var(--r-pill);
  padding:6px;
  box-shadow:var(--shadow-1);
  display:flex;align-items:center;gap:4px;
  border:0.5px solid var(--my-line);
  transition:box-shadow 0.18s, border-color 0.18s;
  position:relative;
}
.input-bar.focused{
  border-color:rgba(255,77,136,0.35);
  box-shadow:0 4px 16px rgba(255,77,136,0.16);
}
.ib-icon{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--my-text-secondary);flex-shrink:0;
}
.ib-icon:active{background:var(--my-bg)}
.ib-input{
  flex:1;min-height:36px;display:flex;align-items:center;
  font-size:14px;color:var(--my-text-primary);padding:0 2px;
}
.ib-input textarea{
  width:100%;border:none;outline:none;background:transparent;
  font:inherit;color:inherit;resize:none;
  padding:9px 0;line-height:1.4;font-family:inherit;
}
.ib-input textarea::placeholder{color:var(--my-text-tertiary)}
.ib-send{
  width:36px;height:36px;border-radius:50%;
  background:var(--my-text-quat);border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.2s;
}
.ib-send.on{background:var(--my-brand-red)}
.ib-send svg{width:16px;height:16px}

.extract-preview{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px 6px 8px;
  background:var(--my-surface);border-radius:var(--r-pill);
  border:0.5px solid var(--my-line);
  box-shadow:0 4px 12px rgba(255,77,136,0.18);
  font-size:11px;color:var(--my-text-secondary);
  margin:0 0 8px 14px;align-self:flex-start;white-space:nowrap;
}
.extract-preview .ico{
  width:14px;height:14px;border-radius:50%;
  background:var(--my-brand-red);
  display:inline-flex;align-items:center;justify-content:center;
}
.extract-preview .ico::before{
  content:'';width:5px;height:5px;border-radius:50%;background:#fff;
  animation:dotPulse 1.2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{transform:scale(0.6);opacity:0.7}
  50%{transform:scale(1);opacity:1}
}
.extract-preview .tag-pill{
  background:var(--my-brand-soft);color:var(--my-brand-red);
  padding:1px 7px;border-radius:var(--r-pill);
  font-size:11px;font-weight:500;
}

/* ============ TOAST ============ */
.toast-stack{
  position:fixed;top:60px;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  z-index:300;pointer-events:none;padding:0 16px;
}
.toast{
  background:rgba(50,50,50,0.92);backdrop-filter:blur(12px);
  color:#fff;padding:8px 14px 8px 10px;border-radius:var(--r-pill);
  font-size:13px;display:flex;align-items:center;gap:6px;
  box-shadow:var(--shadow-2);
  animation:toastIn 0.25s ease-out;max-width:100%;
}
.toast.bye{animation:toastOut 0.18s forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}
.toast .check{
  width:18px;height:18px;border-radius:50%;background:var(--my-brand-red);
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
}
.toast .check svg{width:11px;height:11px;color:#fff}
.toast .toast-tag{
  background:rgba(255,255,255,0.16);padding:1px 7px;border-radius:var(--r-pill);font-size:11px;
}

/* ============ SHEETS ============ */
.sheet-mask{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;
  animation:fadeIn 0.18s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  position:fixed;bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  background:var(--my-surface);
  border-radius:16px 16px 0 0;
  padding:12px 16px 32px;z-index:401;
  animation:sheetUp 0.28s cubic-bezier(0.2,0,0,1);
}
@keyframes sheetUp{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--my-text-quat);margin:0 auto 12px}
.sheet-title{font-size:17px;font-weight:500;text-align:center;margin-bottom:4px;color:var(--my-text-primary)}
.sheet-sub{font-size:12px;text-align:center;color:var(--my-text-secondary);margin-bottom:20px}
.voice-stage{display:flex;flex-direction:column;align-items:center;padding:8px 0 0}
.voice-circle{
  width:120px;height:120px;border-radius:50%;
  background:var(--my-brand-red);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(255,77,136,0.30);
  position:relative;cursor:pointer;
}
.voice-circle::before,.voice-circle::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid var(--my-brand-red);opacity:0;
  animation:pulse 2s ease-out infinite;
}
.voice-circle::after{animation-delay:1s}
@keyframes pulse{0%{transform:scale(1);opacity:0.5}100%{transform:scale(1.35);opacity:0}}
.voice-wf{display:flex;align-items:center;gap:3px;height:32px}
.voice-wf span{width:3px;background:#fff;border-radius:2px;animation:wf 0.8s ease-in-out infinite}
.voice-wf span:nth-child(1){animation-delay:0s}
.voice-wf span:nth-child(2){animation-delay:0.1s}
.voice-wf span:nth-child(3){animation-delay:0.2s}
.voice-wf span:nth-child(4){animation-delay:0.3s}
.voice-wf span:nth-child(5){animation-delay:0.2s}
.voice-wf span:nth-child(6){animation-delay:0.1s}
.voice-wf span:nth-child(7){animation-delay:0s}
@keyframes wf{0%,100%{height:6px}50%{height:28px}}
.voice-time{margin-top:20px;font-size:26px;font-weight:500;color:var(--my-text-primary);font-variant-numeric:tabular-nums}
.voice-hint{font-size:12px;color:var(--my-text-tertiary);margin-top:6px}
.voice-actions{display:flex;gap:8px;margin-top:24px}
.va-btn{flex:1;height:44px;border-radius:var(--r-pill);border:none;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer}
.va-btn.cancel{background:var(--my-bg);color:var(--my-text-primary)}
.va-btn.done{background:var(--my-brand-red);color:#fff}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-opt{
  background:var(--my-bg);border-radius:var(--r-sm);padding:18px 12px;
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
}
.photo-opt:active{background:var(--my-brand-soft)}
.photo-opt svg{color:var(--my-brand-red);width:24px;height:24px}
.photo-opt-title{font-size:14px;color:var(--my-text-primary);font-weight:500}
.photo-opt-desc{font-size:11px;color:var(--my-text-tertiary);text-align:center}

/* ============ TAB BAR ============ */
.tabbar{
  position:fixed;bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  background:var(--my-surface);
  border-top:0.5px solid var(--my-line);
  display:flex;
  padding:6px 0 calc(env(safe-area-inset-bottom,8px) + 6px);
  z-index:100;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:4px 0;cursor:pointer;position:relative;
}
.tab-ico{
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  color:var(--my-text-tertiary);margin-bottom:1px;
}
.tab.active .tab-ico{color:var(--my-brand-red)}
.tab-lbl{font-size:10px;color:var(--my-text-tertiary)}
.tab.active .tab-lbl{color:var(--my-brand-red);font-weight:500}
.tile{
  width:24px;height:24px;border-radius:5px;
  background:transparent;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;position:relative;
}
.tile::before{
  content:'';position:absolute;top:-3px;left:3px;right:3px;height:2px;
  background:currentColor;border-radius:1px;
}
.tab.active .tile{background:var(--my-brand-red);color:#fff;border-color:var(--my-brand-red)}
.tab.active .tile::before{background:#fff}
.tab .notif{
  position:absolute;top:0;right:calc(50% - 18px);
  min-width:6px;height:6px;background:var(--my-danger);border-radius:50%;
}

/* ============ MASCOT 小柚 ============ */
.mascot{
  width:36px;height:36px;position:relative;
  animation:bob 4s ease-in-out infinite;
}
.mascot.sm{width:24px;height:24px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.mascot-body{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 35% 32%, #ffd0e2 0%, #ffa3c4 55%, var(--my-brand-red) 100%);
  box-shadow:inset -2px -3px 4px rgba(180,40,80,0.22), inset 2px 2px 3px rgba(255,240,245,0.5);
  position:relative;
}
.mascot-eye{position:absolute;width:4px;height:4px;border-radius:50%;background:#3a1f2a;top:42%}
.mascot.sm .mascot-eye{width:3px;height:3px}
.mascot-eye.l{left:28%}.mascot-eye.r{right:28%}
.mascot-eye::after{content:'';position:absolute;width:1.2px;height:1.2px;background:#fff;border-radius:50%;top:0.5px;right:0.5px}
.mascot-mouth{position:absolute;width:6px;height:3px;border-bottom:1.2px solid #3a1f2a;border-radius:0 0 6px 6px;left:50%;top:60%;transform:translateX(-50%)}
.mascot.sm .mascot-mouth{width:4px;height:2px}
.mascot-cheek{position:absolute;width:5px;height:3px;border-radius:50%;background:rgba(255,77,136,0.5);top:54%}
.mascot.sm .mascot-cheek{width:3px;height:2px}
.mascot-cheek.l{left:14%}.mascot-cheek.r{right:14%}

.fade-in{animation:fadeUp 0.32s cubic-bezier(0.2,0,0,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ============ TIMELINE FEED (日卡) ============ */
.feed{padding:0 16px 100px}
.feed-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:8px 0 16px;
}
.feed-title{font-size:22px;font-weight:500;color:var(--my-text-primary)}
.feed-sub{font-size:12px;color:var(--my-text-tertiary);margin-top:4px}
.feed-compose-btn{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  background:var(--my-brand-red);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(255,77,136,0.3);
}

.day-cards{display:flex;flex-direction:column;gap:12px}
.day-card{
  border-radius:16px;overflow:hidden;cursor:pointer;
  background:var(--my-surface);
  box-shadow:var(--shadow-1);
  border:0.5px solid rgba(255,255,255,0.8);
  transition:transform 0.18s, box-shadow 0.18s;
}
.day-card:active{transform:scale(0.985)}
.day-card.today{box-shadow:0 4px 20px rgba(255,77,136,0.12)}
.day-card-head{
  padding:14px 16px 10px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.dc-date{display:flex;align-items:baseline;gap:6px}
.dc-day{font-size:28px;font-weight:500;line-height:1;color:var(--my-text-primary);font-variant-numeric:tabular-nums}
.dc-month{font-size:13px;color:var(--my-text-secondary);font-weight:500}
.dc-weekday{font-size:11px;color:var(--my-text-tertiary);margin-top:2px}
.dc-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.dc-weather{font-size:11px;color:var(--my-text-tertiary)}
.dc-phase{
  font-size:10px;padding:2px 8px;border-radius:var(--r-pill);font-weight:500;
  background:var(--my-brand-soft);color:var(--my-brand-red);
}
.dc-phase.foll{background:var(--phase-foll-soft);color:var(--phase-foll)}
.dc-phase.lut{background:var(--phase-lut-soft);color:var(--phase-lut)}
.dc-phase.preg{background:var(--my-purple-soft);color:var(--my-purple)}
.dc-phase.baby{background:var(--my-success-soft);color:var(--my-success)}

.day-card-body{padding:0 16px 14px}
.dc-summary{
  font-size:14px;line-height:1.6;color:var(--my-text-primary);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:10px;
}
.dc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.dc-tag{
  font-size:10px;padding:3px 8px;border-radius:var(--r-pill);
  background:var(--my-bg);color:var(--my-text-secondary);
}
.dc-tag.auto{background:var(--my-brand-soft);color:var(--my-brand-red)}
.dc-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-top:0.5px solid var(--my-line);
  background:rgba(255,255,255,0.5);
}
.dc-insight{
  font-size:11px;color:var(--my-link);flex:1;
  display:flex;align-items:center;gap:4px;
}
.dc-count{font-size:10px;color:var(--my-text-tertiary);flex-shrink:0}
.dc-photo-dot{
  width:6px;height:6px;border-radius:50%;background:var(--my-brand-red);
  display:inline-block;margin-right:4px;
}

.day-card-accent{height:3px;width:100%}


/* ============ 主壳 + 底部 Dock ============ */
.suiji-shell{
  position:relative;
  min-height:calc(100vh - 44px);
  background:
    radial-gradient(ellipse 90% 40% at 50% -5%, rgba(255,200,220,0.22) 0%, transparent 55%),
    linear-gradient(180deg, #faf7f4 0%, #f5f3ef 18%, var(--my-bg) 100%);
}

/* 场景叙事 — 更有氛围感的背景 */
.suiji-shell--scene{
  background:
    radial-gradient(ellipse 120% 50% at 50% -8%, rgba(255,180,210,0.28) 0%, transparent 50%),
    radial-gradient(ellipse 80% 35% at 85% 25%, rgba(141,84,255,0.06) 0%, transparent 45%),
    radial-gradient(ellipse 70% 40% at 10% 60%, rgba(255,149,0,0.05) 0%, transparent 40%),
    radial-gradient(ellipse 100% 45% at 50% 100%, rgba(255,77,136,0.08) 0%, transparent 55%),
    linear-gradient(180deg, #fdf8f6 0%, #f8f4f1 12%, #f3f0ed 28%, var(--my-bg) 55%);
}
.suiji-shell--scene::before{
  content:'';
  position:fixed;
  left:50%;transform:translateX(-50%);
  bottom:100px;
  width:min(390px,100%);
  height:200px;
  pointer-events:none;
  z-index:0;
  background:radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255,77,136,0.06) 0%, transparent 70%);
}
.suiji-shell--scene .suiji-stream{position:relative;z-index:1}
.suiji-shell--scene .dock-wrap{z-index:90}
.suiji-shell--scene .quick-float-wrap{z-index:91}
.suiji-stream{
  padding:0 16px 200px;
  padding-top:52px;
  max-height:calc(100vh - 44px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.stream-health{margin-bottom:14px}

/* ============ Dock 容器 ============ */
.dock-wrap{
  position:fixed;
  bottom:58px;left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  z-index:90;
  pointer-events:none;
}
.dock-panel{
  pointer-events:auto;
  background:var(--my-surface);
  border-top:0.5px solid var(--my-line);
  box-shadow:0 -4px 24px rgba(0,0,0,0.06);
  border-radius:16px 16px 0 0;
}

/* 反馈条 */
.dock-feedback{
  pointer-events:auto;
  margin:0 12px 8px;
  padding:10px 12px;
  background:rgba(255,255,255,0.96);
  border-radius:12px;
  border:0.5px solid var(--my-line);
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
}
.dock-sync-lite{
  display:flex;align-items:center;flex-wrap:wrap;gap:6px;
  margin-bottom:6px;
}
.dock-sync-mark{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:500;color:var(--my-success);
}
.dock-sync-tag{
  font-size:11px;font-weight:500;
  padding:3px 10px;border-radius:var(--r-pill);
  background:rgba(0,204,153,0.08);
  color:var(--my-text-primary);
  border:0.5px solid rgba(0,204,153,0.18);
}
.dock-sync-date{
  margin-left:auto;font-size:10px;color:var(--my-text-tertiary);
}
.dock-nudge{
  font-size:13px;color:var(--my-text-secondary);
  line-height:1.5;margin:0 0 8px;
}
.dock-suggest{
  display:flex;flex-wrap:wrap;gap:6px;
}
.dock-suggest-chip{
  padding:6px 12px;border-radius:var(--r-pill);border:none;
  background:var(--my-bg);font:inherit;font-size:12px;
  color:var(--my-text-primary);cursor:pointer;
}
.dock-suggest-chip:active{background:var(--my-brand-soft);color:var(--my-brand-red)}

.dock-live{
  pointer-events:none;
  margin:0 14px 6px;
  padding:5px 11px;
  font-size:11px;color:var(--my-brand-red);
  background:var(--my-brand-soft);
  border-radius:var(--r-pill);
  display:inline-flex;align-items:center;gap:6px;
}
.dock-live-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--my-brand-red);
  animation:livePulse 1.2s ease-in-out infinite;
}
.dock-live-date{
  margin-left:6px;color:var(--my-text-tertiary);
  background:rgba(255,255,255,0.7);
  padding:1px 6px;border-radius:var(--r-pill);
}
@keyframes livePulse{0%,100%{opacity:0.5}50%{opacity:1}}

/* ============ 右下悬浮快捷发布 ============ */
.quick-float-wrap{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:390px;
  bottom:180px;
  height:0;
  z-index:91;
  pointer-events:none;
}
.quick-float-wrap .dock-fan-corner{
  position:absolute;
  right:12px;
  bottom:0;
  pointer-events:auto;
}

/* ============ 底部栏：仅输入 + 相机 ============ */
.dock-panel{padding-bottom:0}

.dock-bar{
  display:flex;
  align-items:flex-end;
  gap:8px;
  padding:8px 12px 10px;
  position:relative;
}

.dock-fan{
  flex-shrink:0;
  position:relative;
  z-index:2;
}

.dock-fan-left{width:48px}
.dock-fan-corner{width:48px}

.dock-fan-scrim{
  position:fixed;
  inset:0;
  border:none;
  background:rgba(0,0,0,0.38);
  z-index:98;
  pointer-events:auto;
  animation:scrimIn 0.22s ease both;
}
@keyframes scrimIn{from{opacity:0}to{opacity:1}}

.dock-fan-stage{
  position:relative;
  width:48px;
  height:48px;
}
.dock-fan-left .dock-fan-node{
  left:50%;
}

.dock-fab{
  width:48px;height:48px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  z-index:3;
  transition:transform 0.32s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.2s;
}
.dock-fab:active{transform:scale(0.92)}

.dock-fab-media{
  background:var(--my-brand-red);
  color:#fff;
  box-shadow:0 4px 16px rgba(255,77,136,0.42);
}
.dock-fab-media.open{
  transform:rotate(45deg);
  box-shadow:0 3px 12px rgba(255,77,136,0.32);
}
.dock-fab-media.open:active{transform:rotate(45deg) scale(0.92)}

.dock-fab-quick{
  background:var(--my-surface);
  color:var(--my-brand-red);
  border:1.5px solid rgba(255,77,136,0.35);
  box-shadow:0 4px 16px rgba(255,77,136,0.18);
  width:48px;
  height:48px;
}
.dock-fab-quick.open{
  background:var(--my-brand-soft);
  border-color:var(--my-brand-red);
}

.dock-fan-node{
  position:absolute;
  left:50%;bottom:50%;
  margin-left:-26px;margin-bottom:-26px;
  transform:translate(0,0) scale(0.15);
  opacity:0;
  visibility:hidden;
  border:none;background:transparent;
  cursor:pointer;padding:0;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  pointer-events:none;
  z-index:2;
  transition:
    transform 0.42s cubic-bezier(0.34,1.45,0.64,1),
    opacity 0.18s ease;
}
.dock-fan-stage.open .dock-fan-node{
  transform:translate(var(--fx), var(--fy)) scale(1);
  opacity:1;
  visibility:visible;
  transition-delay:var(--delay);
  pointer-events:auto;
}
.dock-fan-stage.closing .dock-fan-node{
  transform:translate(0,0) scale(0.12);
  opacity:0;
  transition-delay:var(--close-delay);
  transition-timing-function:cubic-bezier(0.55,0.06,0.68,0.9);
  pointer-events:none;
}

.dock-fan-node-ico{
  width:48px;height:48px;border-radius:50%;
  background:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;
  transition:transform 0.15s ease;
}
.dock-fan-node:active .dock-fan-node-ico{transform:scale(0.9)}

.dock-fan-corner .dock-fan-node{
  margin-left:-25px;margin-bottom:-25px;
  gap:0;
  z-index:calc(10 + var(--zi, 0));
  width:50px;
}
.dock-fan-corner .dock-fan-node-ico--stack{
  width:50px;
  height:50px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  padding:5px 3px 6px;
  box-sizing:border-box;
}
.dock-fan-corner .dock-fan-node-em{
  font-size:16px;
  line-height:1;
  flex-shrink:0;
}
.dock-fan-corner .dock-fan-node-lbl{
  font-size:8px;
  line-height:1.15;
  font-weight:500;
  color:rgba(0,0,0,0.65);
  padding:0;
  background:none;
  box-shadow:none;
  max-width:40px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  margin-top:1px;
}

.dock-fan-node-lbl{
  font-size:10px;color:rgba(0,0,0,0.72);
  font-weight:500;
  white-space:nowrap;
}

.dock-fan-stage.open .dock-fan-node{
  animation:fanPop 0.45s cubic-bezier(0.34,1.45,0.64,1) both;
  animation-delay:var(--delay);
}
@keyframes fanPop{
  0%{transform:translate(calc(var(--fx)*0.1), calc(var(--fy)*0.1)) scale(0.2);opacity:0}
  55%{transform:translate(calc(var(--fx)*1.06), calc(var(--fy)*1.06)) scale(1.06);opacity:1}
  100%{transform:translate(var(--fx), var(--fy)) scale(1);opacity:1}
}
.dock-fan-stage.closing .dock-fab{
  animation:magnetSnap 0.34s cubic-bezier(0.55,0.06,0.68,0.9) both;
}
@keyframes magnetSnap{
  0%{transform:scale(1)}
  40%{transform:scale(1.08)}
  100%{transform:scale(1)}
}
.dock-fan.closing .dock-fab-media.open{
  animation:magnetSnapRotate 0.34s cubic-bezier(0.55,0.06,0.68,0.9) both;
}

@keyframes magnetSnapRotate{
  0%{transform:rotate(45deg) scale(1)}
  40%{transform:rotate(45deg) scale(1.08)}
  100%{transform:rotate(0deg) scale(1)}
}

/* ============ 微信式输入行 ============ */
.dock-input-row{
  flex:1;
  min-width:0;
  display:flex;
  align-items:flex-end;
  gap:8px;
  padding:0;
  background:transparent;
}
.dock-mode-btn{
  width:36px;height:36px;flex-shrink:0;
  border:none;background:transparent;
  color:var(--my-text-secondary);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:8px;
}
.dock-mode-btn:active{background:var(--my-bg)}
.dock-kbd-ico{font-size:20px;line-height:1;color:var(--my-text-secondary)}

.dock-text-field{
  flex:1;min-height:36px;max-height:80px;
  background:var(--my-bg);
  border-radius:8px;
  border:0.5px solid transparent;
  padding:0 12px;
  display:flex;align-items:center;
  transition:border-color 0.15s, background 0.15s;
}
.dock-text-field:focus-within{
  background:var(--my-surface);
  border-color:rgba(255,77,136,0.25);
}
.dock-text-field textarea{
  width:100%;border:none;outline:none;background:transparent;
  font:inherit;font-size:15px;line-height:1.45;
  color:var(--my-text-primary);resize:none;
  padding:8px 0;max-height:72px;
}
.dock-text-field textarea::placeholder{color:var(--my-text-tertiary)}

.dock-voice-btn{
  flex:1;height:40px;
  border:none;border-radius:8px;
  background:var(--my-bg);
  font:inherit;font-size:15px;font-weight:500;
  color:var(--my-text-primary);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
.dock-voice-btn:active,
.dock-voice-btn.recording{
  background:rgba(255,77,136,0.12);
  color:var(--my-brand-red);
}
.dock-voice-waves{
  display:flex;align-items:center;gap:2px;height:16px;
}
.dock-voice-waves span{
  width:2px;border-radius:1px;
  background:var(--my-brand-red);
  animation:voiceBar 0.7s ease-in-out infinite;
}
.dock-voice-waves span:nth-child(odd){animation-delay:0.05s}
.dock-voice-waves span:nth-child(3n){animation-delay:0.12s}
@keyframes voiceBar{
  0%,100%{transform:scaleY(0.45);opacity:0.5}
  50%{transform:scaleY(1);opacity:1}
}

.dock-send-btn{
  width:36px;height:36px;flex-shrink:0;
  border:none;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  background:var(--my-brand-red);
  color:#fff;
}

.dock-camera-btn{
  width:36px;height:36px;flex-shrink:0;
  border:none;background:transparent;
  color:var(--my-text-secondary);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:8px;
  margin-bottom:4px;
}
.dock-camera-btn:active{background:var(--my-bg)}

.fade-in{animation:fadeUp 0.28s cubic-bezier(0.2,0,0,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}


/* ============ 时间轴流 — Lifelog 式左侧时刻 + 竖线 ============ */

.tl-feed{
  display:flex;
  flex-direction:column;
  gap:0;
}
.tl-feed-end{
  height:1px;
  scroll-margin-bottom:140px;
}

/* 日期分区 — 不同天之间加大间距 */
.tl-day-section-head{
  margin-bottom:16px;
  padding-top:20px;
  position:relative;
}
.tl-gap-divider + .tl-day-section-head{
  padding-top:0;
}
.tl-day-section-head.is-today .tl-day-big{
  color:var(--my-brand-red);
}

/* 连续时间轴竖线 */
.tl-rail-continuous{
  position:relative;
}
.tl-rail-continuous::before{
  content:'';
  position:absolute;
  left:6px;
  top:0;
  bottom:0;
  width:1px;
  background:rgba(0,0,0,0.08);
  pointer-events:none;
  z-index:0;
}
.tl-rail-break{
  position:relative;
  z-index:1;
}
.tl-rail-break::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:14px;
  background:var(--my-bg);
  z-index:2;
  pointer-events:none;
}
.tl-day-section-head.tl-rail-break::before{
  left:5px;
  width:3px;
}

/* 日标题 — 大号日期 + 周期条 */
.tl-day-banner{
  margin-bottom:16px;
  padding:0 0 0 2px;
  position:relative;
  z-index:3;
}
.tl-day-banner-top{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.tl-day-banner-left{
  display:flex;
  align-items:flex-end;
  gap:10px;
}
.tl-day-big{
  font-size:32px;
  font-weight:500;
  color:var(--my-text-primary);
  letter-spacing:-1px;
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.tl-day-meta{
  display:flex;
  flex-direction:column;
  gap:2px;
  padding-bottom:3px;
}
.tl-day-month{
  font-size:13px;
  font-weight:500;
  color:var(--my-text-primary);
}
.tl-day-week{
  font-size:12px;
  color:var(--my-text-tertiary);
}
.tl-cycle-chip{
  font-size:11px;
  font-weight:500;
  color:var(--my-brand-red);
  background:var(--my-brand-soft);
  padding:4px 10px;
  border-radius:var(--r-pill);
  flex-shrink:0;
  margin-bottom:2px;
}
.tl-cycle-chip.foll{color:var(--phase-foll);background:var(--phase-foll-soft)}
.tl-cycle-chip.lut{color:var(--phase-lut);background:var(--phase-lut-soft)}
.tl-cycle-chip.preg{color:var(--my-purple);background:var(--my-purple-soft)}
.tl-cycle-chip.baby{color:var(--my-success);background:var(--my-success-soft)}

/* 左侧竖线 — 圆点 + 连续主轴 */
.tl-rail-node{
  display:flex;
  gap:6px;
  padding-bottom:14px;
  position:relative;
  z-index:1;
}
.tl-rail-node.is-feed-last{padding-bottom:4px}
.tl-rail-marker{
  width:14px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  padding-top:2px;
  z-index:1;
}
.tl-rail-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(255,77,136,0.32);
  border:1.5px solid rgba(255,77,136,0.48);
  margin-top:0;
  z-index:1;
  flex-shrink:0;
  box-shadow:0 0 0 2px var(--my-bg);
}
.tl-rail-body{
  flex:1;
  min-width:0;
  padding-top:0;
}
.tl-node-stack{
  flex:1;
  min-width:0;
}
.tl-node-caption{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:7px;
  padding-left:1px;
  min-height:14px;
}
.tl-node-time{
  font-size:11px;
  font-weight:500;
  color:var(--my-text-tertiary);
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.02em;
  line-height:1;
}
.tl-node-sep{
  font-size:11px;
  color:var(--my-text-tertiary);
  opacity:0.45;
  line-height:1;
}
.tl-node-label{
  font-size:10px;
  font-weight:500;
  padding:2px 7px;
  border-radius:999px;
  line-height:1.3;
}
.tl-node-label.kind-ai{
  color:#fff;
  background:var(--my-brand-red);
}
.tl-node-label.kind-weekly{
  color:#fff;
  background:var(--my-link);
  font-size:11px;
  font-weight:500;
  padding:3px 10px;
  box-shadow:0 1px 4px rgba(79,124,174,0.22);
}
.tl-node-label.kind-corr{
  color:#00a378;
  background:rgba(0,204,153,0.10);
}

/* 周期开始标记 */
.tl-cycle-start{
  display:flex;
  gap:8px;
  padding:6px 0 18px;
  align-items:flex-start;
}
.tl-cycle-start-marker{
  width:34px;
  flex-shrink:0;
  display:flex;
  justify-content:center;
  padding-top:10px;
}
.tl-cycle-start-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--my-brand-red);
  box-shadow:0 0 0 3px rgba(255,77,136,0.15), 0 0 0 5px var(--my-bg);
}
.tl-cycle-start-body{
  flex:1;
  min-width:0;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  padding:8px 12px;
  background:var(--my-brand-soft);
  border-radius:8px;
  border:0.5px solid rgba(255,77,136,0.15);
}
.tl-cycle-start-icon{font-size:14px;line-height:1}
.tl-cycle-start-text{
  font-size:12px;
  font-weight:500;
  color:var(--my-brand-red);
}
.tl-cycle-start-sub{
  font-size:11px;
  color:var(--my-text-tertiary);
  width:100%;
  margin-left:22px;
}

/* 旧 date-head 保留兼容 */
.date-head{display:none}

/* 记录卡片 */
.rec{
  background:var(--my-surface);
  border-radius:14px;
  padding:16px 18px;
  margin-bottom:12px;
  box-shadow:0 2px 12px rgba(255,93,138,.06);
  border:0.5px solid rgba(0,0,0,0.03);
  transition:transform 0.15s, box-shadow 0.15s;
}
.rec:last-child{margin-bottom:0}
.rec:active{transform:scale(0.985)}
.rec-time{
  font-size:11px;
  color:var(--my-text-tertiary);
  margin-bottom:8px;
  font-variant-numeric:tabular-nums;
  letter-spacing:0.02em;
}
.rec-body{
  font-size:15px;
  line-height:1.7;
  color:var(--my-text-primary);
  margin-bottom:12px;
  word-break:break-word;
}

/* 照片 */
.rec-img{
  width:100%;
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
}
.rec-img-real{
  width:100%;
  height:auto;
  display:block;
  vertical-align:top;
}
.rec-body-photo{
  margin-bottom:10px;
}
.rec-img-ph{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
.rec-img-ph.warm{
  background:linear-gradient(135deg,#ffe4ec 0%,#ffd6e0 40%,#ffc8d6 100%);
}
.rec-img-ph.cool{
  background:linear-gradient(135deg,#e8f0fe 0%,#dce8f8 40%,#d0e0f2 100%);
}
.rec-img-ph.green{
  background:linear-gradient(135deg,#e4f7ec 0%,#d4f0e2 40%,#c8eada 100%);
}

/* 标签 */
.rec-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:0;
}
.rec-tag{
  display:inline-flex;
  align-items:center;
  gap:3px;
  font-size:12px;
  padding:4px 12px;
  border-radius:var(--r-pill);
  background:rgba(0,0,0,0.03);
  color:var(--my-text-secondary);
  line-height:1.35;
}
.rec-body-voice{
  font-size:14px;color:var(--my-text-secondary);
  margin-top:-4px;
}
.rec-voice{
  width:100%;
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin-bottom:10px;
  background:var(--my-bg);border-radius:var(--r-sm);
  border:0.5px solid var(--my-line);cursor:pointer;font:inherit;text-align:left;
}
.rec-voice-play{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--my-brand-red);color:#fff;
  display:flex;align-items:center;justify-content:center;
}
.rec-voice-bars{flex:1;display:flex;align-items:center;gap:2px;height:22px}
.rec-voice-bars span{width:2px;border-radius:1px;background:var(--my-brand-red);opacity:0.45}
.rec-voice-bars span:nth-child(odd){height:6px}
.rec-voice-bars span:nth-child(3n){height:10px}
.rec-voice-bars span:nth-child(4n){height:14px}
.rec-voice.playing .rec-voice-bars span{
  animation:voiceBar 0.8s ease-in-out infinite;
  animation-delay:calc(var(--i) * 0.04s);
}
@keyframes voiceBar{
  0%,100%{transform:scaleY(0.5);opacity:0.35}
  50%{transform:scaleY(1);opacity:0.85}
}
.rec-voice-dur{font-size:11px;color:var(--my-text-tertiary);font-variant-numeric:tabular-nums}

.rec-tag.content{
  background:rgba(255,77,136,0.06);
  color:var(--my-text-secondary);
}
.rec-tag.ai{
  background:rgba(79,124,174,0.06);
  color:var(--my-link);
}
.rec-tag .ai-badge{
  font-size:9px;
  background:rgba(79,124,174,0.12);
  padding:1px 4px;
  border-radius:4px;
  margin-left:1px;
  font-weight:500;
}

/* AI 批注 */
.ai-anno{
  margin-top:12px;
  padding:14px 16px;
  border-radius:12px;
  font-size:13px;
  line-height:1.65;
  color:var(--my-text-secondary);
}
.ai-anno.green-bg{background:rgba(46,189,110,0.07)}
.ai-anno.yellow-bg{background:rgba(240,160,32,0.07)}
.ai-anno.brand-bg{background:var(--my-brand-soft);color:var(--my-text-primary)}
.ai-anno .anno-icon{margin-right:4px}

/* 周期摘要 */
.cycle-sum{
  background:var(--my-surface);
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  box-shadow:0 1px 8px rgba(0,0,0,0.035);
  border:0.5px solid rgba(0,0,0,0.03);
  border-left:4px solid var(--my-success);
}
.cycle-sum.warn{border-left-color:var(--my-warning)}
.cs-head{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.cs-icon{font-size:18px;line-height:1}
.cs-title{
  font-size:15px;
  font-weight:500;
  color:var(--my-text-primary);
}
.cs-body{
  font-size:13px;
  color:var(--my-text-secondary);
  line-height:1.65;
  margin-bottom:10px;
}
.cs-link{
  font-size:12px;
  color:var(--my-brand-red);
  font-weight:500;
  cursor:pointer;
}

/* 周报 */
.weekly-card{
  background:var(--my-surface);
  border-radius:16px;
  padding:16px 20px;
  margin-bottom:12px;
  box-shadow:0 1px 8px rgba(0,0,0,0.035);
  border:0.5px solid rgba(0,0,0,0.03);
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  transition:transform 0.15s;
}
.weekly-card:active{transform:scale(0.985)}
.wk-left{display:flex;align-items:center;gap:12px}
.wk-icon{
  width:40px;height:40px;border-radius:12px;
  background:var(--my-brand-soft);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.wk-title{font-size:14px;font-weight:500;color:var(--my-text-primary)}
.wk-sub{font-size:11px;color:var(--my-text-tertiary);margin-top:2px}
.wk-action{font-size:13px;color:var(--my-brand-red);font-weight:500}

/* 时间间隔 */
.tl-gap-divider{
  text-align:center;
  padding:18px 0 10px;
  margin-left:42px;
  font-size:11px;
  color:var(--my-text-tertiary);
  letter-spacing:1px;
  position:relative;
}

/* 今日引导 */
.tl-today-guide{
  background:var(--my-surface);
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  box-shadow:0 1px 8px rgba(0,0,0,0.035);
  border:0.5px solid rgba(0,0,0,0.03);
  display:flex;
  align-items:flex-start;
  gap:12px;
}
.tl-today-guide-icon{
  width:32px;height:32px;
  border-radius:50%;
  background:linear-gradient(135deg,#ffe4ec,#ffd6e0);
  color:var(--my-brand-red);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.tl-today-guide-text{
  font-size:14px;
  color:var(--my-text-primary);
  line-height:1.6;
  padding-top:4px;
}
.tl-today-guide-text em{
  font-style:normal;
  color:var(--my-brand-red);
  font-weight:500;
}

/* 流头部 */
.stream-header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:4px 2px 18px;
}
.stream-title{
  font-size:22px;
  font-weight:500;
  color:var(--my-text-primary);
  line-height:1.2;
  letter-spacing:-0.2px;
}
.stream-sub{
  font-size:12px;
  color:var(--my-text-tertiary);
  margin-top:4px;
}
.stream-actions{
  display:flex;
  gap:12px;
  align-items:center;
  padding-bottom:2px;
}
.stream-action{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  color:var(--my-text-secondary);
  cursor:pointer;
  border:none;background:transparent;
}

/* ============ 场景模块占位 ============ */
.tl-module{
  margin:-4px 0 12px;
  padding:14px 16px;
  background:linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(250,248,246,0.88) 100%);
  border-radius:12px;
  border:0.5px dashed rgba(255,77,136,0.22);
  box-shadow:0 1px 6px rgba(255,77,136,0.06);
}
.tl-rec-group .tl-module{
  margin:0;
  border-radius:0 0 14px 14px;
  border-top:0.5px dashed rgba(255,77,136,0.14);
  box-shadow:none;
}
.tl-module-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
}
.tl-module-icon{
  width:36px;height:36px;border-radius:8px;
  background:var(--my-brand-soft);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.tl-module-meta{flex:1;min-width:0}
.tl-module-title{
  font-size:14px;font-weight:500;color:var(--my-text-primary);
  display:block;
}
.tl-module-badge{
  font-size:10px;color:var(--my-text-tertiary);
  margin-top:2px;display:inline-block;
}
.tl-module-sk{
  min-height:56px;
  display:flex;align-items:center;justify-content:center;
  padding:8px 0;
}
.tl-module-desc{
  font-size:11px;color:var(--my-text-tertiary);
  line-height:1.45;margin:0;text-align:center;
}
.ph-cycle-card .tl-module-icon{background:rgba(255,77,136,0.12)}
.ph-wellness .tl-module-icon{background:rgba(79,124,174,0.10)}
.ph-calorie .tl-module-icon{background:rgba(255,149,0,0.10)}

.sk-cycle{
  display:flex;align-items:center;gap:12px;
  color:var(--my-brand-red);font-size:13px;font-weight:500;
}
.sk-cycle-ring{
  width:44px;height:44px;border-radius:50%;
  border:3px solid rgba(255,77,136,0.35);
  border-top-color:var(--my-brand-red);
  transform:rotate(-45deg);
}
.sk-wellness{
  width:100%;display:flex;flex-direction:column;gap:8px;
  font-size:13px;color:var(--my-text-primary);
}
.sk-row{display:flex;justify-content:space-between;align-items:center}
.sk-delta{font-size:11px;color:var(--my-success)}
.sk-tag{font-size:10px;color:var(--my-warning);background:var(--my-warning-soft);padding:2px 8px;border-radius:4px}
.sk-calorie{text-align:center}
.sk-cal-num{font-size:22px;font-weight:500;color:var(--my-text-primary)}
.sk-cal-num em{font-style:normal;font-size:12px;color:var(--my-text-tertiary);font-weight:400}
.sk-cal-tags{display:flex;gap:6px;justify-content:center;margin-top:6px}
.sk-cal-tags span{
  font-size:10px;padding:2px 8px;border-radius:4px;
  background:var(--my-bg);color:var(--my-text-secondary);
}

/* ============ 今日引导（浅提示 + 按钮） ============ */
.tl-guide-card{
  margin-bottom:0;
  padding:14px 16px 16px;
  background:rgba(255,255,255,0.72);
  border-radius:14px;
  border:0.5px solid rgba(255,77,136,0.12);
  backdrop-filter:blur(8px);
  box-shadow:0 1px 6px rgba(0,0,0,0.03);
}
.tl-guide-card .rec-time{margin-bottom:6px}
.tl-guide-text{
  font-size:14px;line-height:1.55;
  color:var(--my-text-secondary);
  margin:0 0 12px;
}
.tl-guide-chips{display:flex;flex-wrap:wrap;gap:8px}
.tl-guide-chip{
  padding:7px 14px;border-radius:80px;border:none;

/* 晨间浅引导 */
.tl-guide-card.is-soft{

}
.tl-guide-card.is-soft .tl-guide-text{
  font-size:13px;
  color:var(--my-text-tertiary);

}
.tl-guide-card.is-soft .tl-guide-chip{
  padding:6px 12px;

/* ============ 周分析卡片 — 纵向折叠 ============ */
.tl-weekly-bubble{
  background:#ffffff;
  border-radius:14px;
  padding:0;
  margin-bottom:0;
  box-shadow:0 2px 12px rgba(255,93,138,.08);
  border:0.5px solid rgba(255,77,136,0.08);
  overflow:hidden;
}
.tl-weekly-surface{
  padding:14px 15px 12px;
}
.tl-weekly-overview{
  margin:0;
  font-size:14px;
  line-height:1.47;
  color:var(--my-text-secondary);
}
.tl-weekly-bubble.is-wellness .tl-weekly-overview{
  color:var(--my-text-primary);
}
.tl-weekly-stack-inline{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}
.tl-weekly-panel.is-stat-only{
  padding:10px 11px 8px;
  background:rgba(0,0,0,0.02);
  border-radius:10px;
}
.tl-weekly-panel-stat{
  margin:2px 0 6px;
  font-size:20px;
  font-weight:500;
  line-height:1.2;
  font-variant-numeric:tabular-nums;
  color:var(--my-text-primary);
}
.tl-weekly-panel.tone-weight .tl-weekly-panel-stat{
  color:var(--my-brand-red);
}
.tl-weekly-panel.tone-sleep .tl-weekly-panel-stat{
  color:#4f7cae;
}
.tl-weekly-panel.is-stat-only .tl-weekly-panel-summary{
  margin-top:0;
}
.tl-weekly-toggle{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  padding:9px 15px 12px;
  background:transparent;
  border:none;
  border-top:0.5px solid rgba(0,0,0,0.05);
  cursor:pointer;
  font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.tl-weekly-toggle-label{
  font-size:12px;
  color:var(--my-link);
}
.tl-weekly-chev{
  flex-shrink:0;
  display:flex;
  align-items:center;
  color:var(--my-link);
}
.tl-weekly-chev svg{width:14px;height:14px}
.tl-weekly-detail{
  max-height:0;
  opacity:0;
  overflow:hidden;
  transition:max-height .38s ease, opacity .28s ease, padding .28s ease;
  padding:0 15px;
  border-top:0.5px solid transparent;
}
.tl-weekly-bubble.is-open .tl-weekly-detail{
  max-height:1200px;
  opacity:1;
  padding:12px 15px 0;
  border-top-color:rgba(0,0,0,0.05);
}
.tl-weekly-detail .tl-weekly-panel{
  width:100%;
  max-width:none;
  margin-bottom:10px;
  min-height:0;
}
.tl-weekly-detail .tl-weekly-panel:last-child{margin-bottom:0}

/* 保留旧类名兼容 */
.tl-weekly-stack{
  max-height:0;
  opacity:0;
  overflow:hidden;
  transition:max-height .38s ease, opacity .28s ease, padding .28s ease;
  padding:0 15px;
}
.tl-weekly-bubble.is-open .tl-weekly-stack{
  max-height:1200px;
  opacity:1;
  padding:0 15px 14px;
}
.tl-weekly-stack .tl-weekly-panel{
  width:100%;
  max-width:none;
  margin-bottom:10px;
  min-height:0;
}
.tl-weekly-stack .tl-weekly-panel:last-child{margin-bottom:0}

/* 保留旧类名兼容 */
.tl-weekly-card{
  background:var(--my-surface);
  border-radius:14px;
  padding:14px 0 14px 14px;
  margin-bottom:0;
  box-shadow:0 2px 12px rgba(255,93,138,.06);
  border:0.5px solid rgba(0,0,0,0.03);
}
.tl-weekly-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
  padding-right:14px;
}
.tl-weekly-icon{
  width:36px;height:36px;border-radius:8px;
  background:var(--my-link-soft);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.tl-weekly-scroll{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  padding:0 14px 2px 0;
  scrollbar-width:none;
}
.tl-weekly-scroll::-webkit-scrollbar{display:none}
.tl-weekly-panel{
  border-radius:12px;
  padding:12px 12px 11px;
  border:0.5px solid rgba(0,0,0,0.04);
  display:flex;
  flex-direction:column;
}
.tl-weekly-panel.tone-mood{
  background:linear-gradient(180deg, rgba(141,84,255,0.08) 0%, rgba(255,255,255,0.95) 100%);
}
.tl-weekly-panel.tone-weight{
  background:linear-gradient(180deg, rgba(255,77,136,0.07) 0%, rgba(255,255,255,0.95) 100%);
}
.tl-weekly-panel.tone-sleep{
  background:linear-gradient(180deg, rgba(79,124,174,0.08) 0%, rgba(255,255,255,0.95) 100%);
}
.tl-weekly-panel-head{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:8px;
}
.tl-weekly-panel-icon{font-size:15px;line-height:1}
.tl-weekly-panel-title{
  font-size:13px;
  font-weight:500;
  color:var(--my-text-primary);
}
.tl-weekly-panel-chart{
  flex:1;
  min-height:72px;
}
.tl-weekly-panel-delta{
  font-size:11px;
  font-weight:500;
  color:var(--my-success);
  text-align:right;
  margin-top:-6px;
  margin-bottom:2px;
}
.tl-weekly-panel-summary{
  font-size:11px;
  line-height:1.55;
  color:var(--my-text-secondary);
  margin:8px 0 0;
  padding-top:8px;
  border-top:0.5px solid rgba(0,0,0,0.05);
}
.tl-weekly-dots{
  display:flex;
  justify-content:center;
  gap:5px;
  padding:10px 14px 0 0;
}
.tl-weekly-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(0,0,0,0.12);
  transition:background 0.2s, transform 0.2s;
}
.tl-weekly-dot.is-active{
  background:var(--my-brand-red);
  transform:scale(1.15);
}
.tl-trend-block{margin-bottom:14px}
.tl-trend-block:last-of-type{margin-bottom:0}
.tl-trend-label{
  font-size:12px;color:var(--my-text-secondary);
  margin-bottom:8px;font-weight:500;
}
.tl-trend-label em{
  font-style:normal;font-weight:400;
  color:var(--my-success);margin-left:6px;
}
.tl-trend-chart{
  display:flex;align-items:flex-end;justify-content:space-between;
  height:56px;padding:0 2px;
  position:relative;
}
.tl-trend-chart.mood .tl-trend-bar{
  width:16px;border-radius:4px 4px 0 0;
  background:linear-gradient(180deg, rgba(141,84,255,0.55) 0%, rgba(141,84,255,0.25) 100%);
  min-height:4px;
}
.tl-trend-chart.sleep .tl-trend-bar.sleep-bar{
  width:16px;border-radius:4px 4px 0 0;
  background:linear-gradient(180deg, rgba(79,124,174,0.5) 0%, rgba(79,124,174,0.22) 100%);
  min-height:4px;
}
.tl-trend-col{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;height:100%;position:relative;z-index:1;
}
.tl-trend-day{
  font-size:10px;color:var(--my-text-tertiary);
  margin-top:4px;
}
.tl-trend-chart.weight{align-items:flex-end;padding-bottom:14px}
.tl-trend-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--my-brand-red);
  position:absolute;left:50%;transform:translateX(-50%);
  box-shadow:0 0 0 3px rgba(255,77,136,0.15);
}
.tl-trend-line{
  position:absolute;left:0;right:0;bottom:18px;
  height:48px;width:100%;pointer-events:none;
}

/* === 语音记录 & 美柚姐姐分析卡片 === */
.tl-card{
  background:#ffffff;
  border-radius:14px;
  padding:14px 15px;
  box-shadow:0 2px 12px rgba(255,93,138,.08);
}
.tl-combo-card{
  background:#ffffff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(255,93,138,.06);
  border:0.5px solid rgba(0,0,0,0.03);
}
.tl-combo-card:not(.has-ai){
  border-radius:14px;
}
.tl-rec-group .tl-combo-card:not(.has-ai){
  border-radius:14px 14px 0 0;
}
.tl-combo-body{
  padding:14px 15px;
}
.tl-combo-ai{
  display:flex;
  gap:6px;
  align-items:flex-start;
  padding:12px 15px;
  border-top:0.5px solid rgba(0,0,0,0.05);
  font-size:13px;
  line-height:1.65;
  color:var(--my-text-secondary);
}
.tl-combo-ai.green-bg{background:rgba(46,189,110,0.07)}
.tl-combo-ai.yellow-bg{background:rgba(240,160,32,0.07)}
.tl-combo-ai.brand-bg{background:var(--my-brand-soft);color:var(--my-text-primary)}
.tl-combo-ai-icon{
  flex-shrink:0;
  line-height:1.55;
  font-size:14px;
  margin-top:1px;
}
.tl-combo-ai-body{
  flex:1;
  min-width:0;
}
.tl-combo-ai-text{margin:0}
.tl-combo-ai-list{
  list-style:none;
  margin:0;
  padding:0;
  flex:1;
  min-width:0;
}
.tl-combo-ai-list li{
  font-size:13px;
  line-height:1.65;
  color:var(--my-text-secondary);
  padding:2px 0;
}
.tl-combo-ai-list li::before{
  content:'·';
  margin-right:6px;
  color:rgba(0,163,120,0.75);
  font-weight:500;
}
.tl-combo-ai-total{
  margin-top:8px;
  padding-top:8px;
  border-top:0.5px solid rgba(0,163,120,0.15);
  font-size:13px;
  font-weight:500;
  color:#00a378;
}
.tl-tags-rows{
  flex-direction:column;
  align-items:flex-start;
  gap:6px;
}
.tl-tags-rows .tl-tag.is-row{
  align-self:flex-start;
}
.tl-rec-group .tl-combo-card{
  margin-bottom:0;
  border-radius:14px 14px 0 0;
  border-bottom:none;
}
.tl-voice-bar{
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 11px;
  background:#fff5f8;
  border-radius:10px;
  margin-bottom:11px;
}
.tl-voice-play{
  width:28px;height:28px;
  border-radius:50%;
  background:var(--my-brand-red);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  border:none;
  padding:0;
  cursor:pointer;
  font:inherit;
}
.tl-voice-play svg{width:12px;height:12px}
.tl-voice-wave{
  flex:1;
  display:flex;
  align-items:center;
  gap:2px;
  height:20px;
}
.tl-voice-wave span{
  width:2.5px;
  border-radius:2px;
  background:#ff8db0;
  opacity:.55;
  transform-origin:center bottom;
}
.tl-voice-wave.is-playing span{
  animation:tlVoiceBar 0.8s ease-in-out infinite;
  animation-delay:calc(var(--i) * 0.04s);
}
@keyframes tlVoiceBar{
  0%,100%{transform:scaleY(0.55);opacity:0.4}
  50%{transform:scaleY(1);opacity:0.9}
}
.tl-voice-dur{
  font-size:11px;
  color:#b06b86;
  font-variant-numeric:tabular-nums;
  flex-shrink:0;
}
.tl-voice-text{
  font-size:14px;
  line-height:1.65;
  color:#4a4a4a;
}
.tl-extract-label{
  display:flex;
  align-items:center;
  gap:4px;
  margin:12px 0 7px;
  font-size:11px;
  font-weight:500;
  color:rgba(255,120,160,0.82);
}
.tl-extract-label::before{
  content:'';
  width:5px;height:5px;
  border-radius:50%;
  background:rgba(255,120,160,0.5);
}
.tl-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.tl-tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:12px;
  padding:4px 10px;
  border-radius:999px;
  line-height:1.3;
  font-weight:500;
}
.tl-tag-ico{
  font-size:12px;
  line-height:1;
  flex-shrink:0;
}
.tl-tag.tone-brand{
  background:rgba(255,77,136,0.10);
  color:#c2185b;
}
.tl-tag.tone-neutral{
  background:rgba(0,0,0,0.04);
  color:rgba(0,0,0,0.62);
}
.tl-tag.tone-coral{
  background:rgba(255,138,90,0.12);
  color:#b85c38;
}
.tl-tag.tone-mint{
  background:rgba(0,204,153,0.10);
  color:#008f6b;
}
.tl-tag.tone-sky{
  background:rgba(79,124,174,0.10);
  color:#4f7cae;
}
.tl-tag.tone-lavender{
  background:rgba(155,95,217,0.10);
  color:#7b4fbd;
}
.tl-tag.tone-sun{
  background:rgba(255,186,46,0.12);
  color:#a87800;
}
.sister-bubble{
  background:#ffffff;
  border-radius:14px;
  padding:14px 15px;
  box-shadow:0 2px 12px rgba(255,93,138,.08);
  font-size:14px;
  color:#3a3a3a;
  line-height:1.75;
}
.sister-bubble b,.sister-bubble strong{font-weight:500;color:rgba(0,0,0,0.85)}
.sister-bubble p{margin:6px 0}
.sister-bubble .chart-block{
  display:block;
  margin:10px 0 8px;
}
.sister-bubble .cycle-card{
  background:#fff7f9;
  border:0.5px solid rgba(255,77,136,0.10);
  border-radius:12px;
  padding:14px 14px 16px;
  margin:10px 0 8px;
}
.cycle-card .cc-seg{
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.32s ease-out, transform 0.32s ease-out;
}
.cycle-card .cc-seg.seen{
  opacity:1;
  transform:translateY(0);
}
.cycle-card.cycle-card--static .cc-seg{
  opacity:1;
  transform:none;
}
.cycle-card .cc-head{
  display:flex;
  align-items:center;
  margin-bottom:10px;
}
.cycle-card .cc-head .cc-title{
  display:inline-flex;
  align-items:center;
  font-size:16px;
  font-weight:500;
  color:rgba(0,0,0,0.85);
}
.cycle-card .cc-head .cc-icon{
  width:18px;height:18px;
  margin-right:6px;
  object-fit:contain;
  flex-shrink:0;
}
.cycle-card .cc-bars{margin-top:4px}
.cycle-card .cc-bar-row{
  display:flex;
  align-items:center;
  margin-bottom:14px;
  font-size:12px;
}
.cycle-card .cc-bar-row:last-child{margin-bottom:0}
.cycle-card .cc-bar-date{
  width:44px;
  color:rgba(0,0,0,0.45);
  flex-shrink:0;
}
.cycle-card .cc-bar-status{
  width:56px;
  color:rgba(0,0,0,0.78);
  flex-shrink:0;
}
.cycle-card .cc-bar-wrap{
  flex:1;
  height:22px;
  display:flex;
  align-items:center;
  overflow:hidden;
  border-radius:4px;
}
.cycle-card .cc-bar{
  height:22px;
  border-radius:4px;
  background:var(--my-brand-red);
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding-right:8px;
  color:#fff;
  font-size:12px;
  font-weight:500;
  white-space:nowrap;
  width:0;
  transition:width 1s cubic-bezier(0.22,0.61,0.36,1);
}
.cycle-card .cc-bar.grow{width:var(--cc-target,100%)}
.cycle-card.cycle-card--static .cc-bar.grow{
  width:var(--cc-target,100%);
  transition:none;
}
.cycle-card .cc-bar-label{
  display:inline-block;
  transform-origin:right center;
  will-change:transform;
}
.cycle-card .cc-bar-label.zoom-pop{
  animation:ccZoomPop 0.7s cubic-bezier(0.34,1.56,0.64,1) 1;
}
@keyframes ccZoomPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.55)}
  65%{transform:scale(1.55)}
  100%{transform:scale(1)}
}
.sister-bubble .signal-card{
  background:#fff7f9;
  border:0.5px solid rgba(255,77,136,0.10);
  border-radius:12px;
  padding:14px 14px 16px;
  margin:10px 0 8px;
}
.signal-card .sc-head{
  display:flex;
  align-items:center;
  margin-bottom:10px;
}
.signal-card .sc-title{
  display:inline-flex;
  align-items:center;
  font-size:16px;
  font-weight:500;
  color:rgba(0,0,0,0.85);
}
.signal-card .sc-icon{
  width:18px;height:18px;
  margin-right:6px;
  object-fit:contain;
  flex-shrink:0;
}
.signal-card .sc-lights{
  display:flex;
  justify-content:space-around;
  align-items:flex-start;
  gap:6px;
  background:linear-gradient(180deg,#f7f7f9 0%,#eef0f3 100%);
  border-radius:12px;
  padding:22px 8px 18px;
  position:relative;
}
.signal-card .sc-lights::before{
  content:'';
  position:absolute;
  top:1px;left:8px;right:8px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent);
  pointer-events:none;
}
.signal-card .sc-light{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.signal-card .sc-bulb{
  width:32px;height:32px;
  border-radius:50%;
  position:relative;
  background:radial-gradient(circle at 35% 30%,#bcbec3 0%,#8d9095 60%,#6b6e73 100%);
  box-shadow:
    inset 0 -2px 3px rgba(0,0,0,0.18),
    inset 0 2px 3px rgba(255,255,255,0.25),
    0 1px 2px rgba(0,0,0,0.12);
}
.signal-card .sc-bulb::after{
  content:'';
  position:absolute;
  top:6px;left:9px;
  width:9px;height:6px;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
  filter:blur(1px);
}
.signal-card .sc-bulb.sc-on[data-color="green"]{
  background:radial-gradient(circle at 35% 30%,#6efbb6 0%,#00cc99 55%,#009e76 100%);
  box-shadow:
    inset 0 -2px 4px rgba(0,90,60,0.35),
    inset 0 2px 3px rgba(255,255,255,0.5),
    0 0 6px rgba(0,204,153,0.9),
    0 0 14px rgba(0,204,153,0.7),
    0 0 28px rgba(0,204,153,0.45);
}
.signal-card .sc-bulb.sc-on[data-color="yellow"]{
  background:radial-gradient(circle at 35% 30%,#ffe57a 0%,#ffba2e 55%,#d18a00 100%);
  box-shadow:
    inset 0 -2px 4px rgba(140,80,0,0.35),
    inset 0 2px 3px rgba(255,255,255,0.55),
    0 0 6px rgba(255,186,46,0.9),
    0 0 14px rgba(255,186,46,0.7);
}
.signal-card .sc-bulb.sc-on[data-color="orange"]{
  background:radial-gradient(circle at 35% 30%,#ffb47a 0%,#ff8a3d 55%,#d96414 100%);
  box-shadow:
    inset 0 -2px 4px rgba(150,60,0,0.38),
    inset 0 2px 3px rgba(255,255,255,0.5),
    0 0 6px rgba(255,138,61,0.9);
}
.signal-card .sc-bulb.sc-on[data-color="purple"]{
  background:radial-gradient(circle at 35% 30%,#cda5f5 0%,#9b5fd9 55%,#6e3aa8 100%);
  box-shadow:
    inset 0 -2px 4px rgba(70,20,120,0.4),
    inset 0 2px 3px rgba(255,255,255,0.45),
    0 0 6px rgba(155,95,217,0.9);
}
.signal-card .sc-label{
  font-size:11px;
  font-weight:500;
  color:rgba(0,0,0,0.45);
  text-align:center;
}
.signal-card .sc-range{
  font-size:9px;
  line-height:1.3;
  color:rgba(0,0,0,0.35);
  margin-top:-3px;

<script type="text/babel">
// ---------- Keyword dictionary ----------
const KEYWORDS = [
  { match:['月经','姨妈','大姨妈','来了','来例假','MC'], label:'月经', kind:'period', syncLabel:'月经',

    analysis:{ tone:'good', title:'饮食记录',
      points:[{icon:'🍽️', text:'AI 正在估算热量与营养结构。'}]} },
];

// 内容类型 — 日记 / 心事 / 情绪 / 身体 / 人际（非社交标签）
const CONTENT_TYPES = [
  { match:['日记','今天想','记录一下','写下','备忘'], label:'日记', emoji:'📔', kind:'diary' },
  { match:['心事','心里','纠结','委屈','说不出口','想念','多想','放不下'], label:'心事', emoji:'💭', kind:'heart' },
  { match:['朋友','老公','男友','女朋友','爸妈','同事','吵架','婆婆','关系'], label:'人际', emoji:'🤝', kind:'relation' },
  { match:['烦','焦虑','低落','开心','哭','情绪','心情'], label:'情绪', emoji:'💛', kind:'emotion' },
  { match:['肚子','头','腰','皮肤','睡','疼','累','身体','经'], label:'身体', emoji:'🌿', kind:'body' },
];

function extractContentTypes(text){
  const hits = []; const seen = new Set();
  for(const c of CONTENT_TYPES){
    for(const m of c.match){
      if(new RegExp(m,'i').test(text) && !seen.has(c.kind)){
        hits.push(c); seen.add(c.kind); break;
      }
    }
  }
  return hits;
}

function extractKeywords(text){
  const hits = []; const seen = new Set();
  for(const k of KEYWORDS){
    for(const m of k.match){
      const re = new RegExp(m,'i');
      if(re.test(text) && !seen.has(k.kind)){
        hits.push(k); seen.add(k.kind); break;
      }
    }
  }
  return hits;
}
function chooseAnalysis(hits){
  if(!hits.length) return null;
  const warn = hits.find(h=>h.analysis.tone==='warn');
  return (warn||hits[0]).analysis;
}

function buildSyncDisplayLabel(hit, text){
  if(hit.kind==='period' && /来了|来例假|来姨妈|大姨妈来/.test(text)) return '月经来了';
  if(hit.kind==='period') return '经期开始';
  return hit.syncLabel || hit.label;
}

function pickFollowUp(hits, ctx){
  const kinds = new Set(hits.map(h=>h.kind));
  if(kinds.has('period') && kinds.has('pain')){
    return {
      text:'今天还疼吗？量怎么样？',
      chips:['好多了','还是有点疼','量挺多的'],
    };
  }
  if(kinds.has('period')){
    return {
      text:'量怎么样？有没有哪里不舒服？',
      chips:['量正常','有点疼','量挺多'],
    };
  }
  if(kinds.has('pain')){
    return {
      text:'是隐隐作痛，还是阵发性疼？',
      chips:['隐隐的','比较疼','吃了止痛药'],
    };
  }
  if(kinds.has('sleep')){
    return {
      text:'是入睡难，还是容易醒？',
      chips:['入睡难','容易醒','睡够了但累'],
    };
  }
  return { text: ctx.followUp, chips: ctx.chips.slice(0, 3) };
}

  },[]);
  const fmt = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  return (
    <React.Fragment>
      <div className="sheet-mask" onClick={onCancel}></div>
      <div className="sheet">
        <div className="sheet-handle"></div>
        <div className="sheet-title">正在录音</div>

          <button className="va-btn done" onClick={()=>onDone(fmt(sec))}>完成</button>

  );
}

  return (
    <div className={'day-card'+(card.isToday?' today':'')}>
      <div className="day-card-accent" style={{background:accentColors[phaseCls]||accentColors.period}}/>

        {card.tags && card.tags.length > 0 && (
          <div className="dc-tags">

          ) : <span/>}

      )}
    </div>
  );
}

function TimelineFeed({cards, onCompose}){

function CalDayCell({cell, periodLit}){
  if(!cell){

function CalendarPage({onAnalysisReady, onPeriodReset}){
  const [periodYes, setPeriodYes] = useState(false);
  const [litDays, setLitDays] = useState([]);
  const timersRef = useRef([]);

  const clearTimers = ()=>{
    timersRef.current.forEach(t=>clearTimeout(t));
    timersRef.current = [];
  };

  useEffect(()=>()=>clearTimers(), []);

  const resetPeriod = ()=>{
    clearTimers();
    setPeriodYes(false);
    setLitDays([]);
    onPeriodReset?.();
  };

  const runPeriodAnimation = ()=>{
    clearTimers();
    setLitDays([]);
    PERIOD_DAYS.forEach((d, i)=>{
      const t = setTimeout(()=>{
        setLitDays(prev=>{
          if(prev.includes(d)) return prev;
          return [...prev, d];
        });
      }, i * 280);
      timersRef.current.push(t);
    });
    const t2 = setTimeout(()=>{
      onAnalysisReady();
    }, PERIOD_DAYS.length * 280 + 200);
    timersRef.current.push(t2);
  };

  const handleToggle = (yes)=>{

// ============ 记录标签体系 ============
// 分类 tone：period/flow→brand  symptom/care→coral  mood→lavender
//              sleep→sky  fitness/appetite/weight/diet→mint  care→sun

const TAG_TONES = {
  period:'brand', flow:'brand',
  symptom:'neutral', care:'neutral',
  mood:'neutral',
  sleep:'neutral',
  fitness:'neutral', appetite:'neutral', weight:'neutral', diet:'neutral',
};

const TAG_CAT_EMOJI = {
  period:'🩸', flow:'💧', symptom:'🤕', mood:'💭',
  sleep:'😴', fitness:'🏃', appetite:'🍽️',
  weight:'⚖️', diet:'🥗', care:'💆',
};

const TAG_REGISTRY = {
  '跑步':       { cat:'fitness', emoji:'🏃' },
  '愉快':       { cat:'mood',    emoji:'😊' },
  '食欲旺盛':   { cat:'appetite',emoji:'🍽️' },
  '食欲变化':   { cat:'appetite',emoji:'🍽️' },
  '腹胀':       { cat:'symptom', emoji:'😣' },
  '低落':       { cat:'mood',    emoji:'😔' },
  '心情 平静':  { cat:'mood',    emoji:'😌' },
  '腰酸':       { cat:'symptom', emoji:'🦴' },
  '疲惫':       { cat:'symptom', emoji:'😮‍💨' },
  '睡眠':       { cat:'sleep',   emoji:'😴' },
  '睡眠偏少':   { cat:'sleep',   emoji:'😴' },
  '月经来了':   { cat:'period',  emoji:'🩸' },
  '经量 偏少':  { cat:'flow',    emoji:'💧' },
  '经量正常':   { cat:'flow',    emoji:'💧' },
  '热敷':       { cat:'care',    emoji:'♨️' },
  '缓解':       { cat:'care',    emoji:'😌' },
  '体重':       { cat:'weight',  emoji:'⚖️' },
  '饮食':       { cat:'diet',    emoji:'🥗' },
  '卡路里':     { cat:'diet',    emoji:'🔥' },
  '经前':       { cat:'care',    emoji:'📅' },
  '经前提醒':   { cat:'care',    emoji:'📅' },
};

function inferTagCat(label){
  const s = label || '';
  if(/月经|经期/.test(s)) return 'period';
  if(/经量/.test(s)) return 'flow';
  if(/跑步|运动/.test(s)) return 'fitness';
  if(/食欲/.test(s)) return 'appetite';
  if(/腹胀|腰酸|疲惫|痛|不适/.test(s)) return 'symptom';
  if(/心情|愉快|低落|情绪|平静/.test(s)) return 'mood';
  if(/睡眠/.test(s)) return 'sleep';
  if(/体重/.test(s)) return 'weight';
  if(/饮食|卡路里/.test(s)) return 'diet';
  if(/热敷|缓解|经前/.test(s)) return 'care';
  return 'symptom';
}

function resolveTag(tag){
  const label = tag.label || '';
  const preset = TAG_REGISTRY[label] || {};
  const cat = tag.cat || preset.cat || inferTagCat(label);
  const emoji = tag.emoji || preset.emoji || TAG_CAT_EMOJI[cat] || '·';
  const tone = tag.tone || TAG_TONES[cat] || 'neutral';
  return { label, emoji, cat, tone };
}

function inferTagTone(label){
  return TAG_TONES[inferTagCat(label)] || 'neutral';
}

function tagLabel(t){
  const r = resolveTag(t);
  return r.emoji ? (r.emoji + ' ' + r.label) : r.label;
}

function RecordedTags({tags, layout}){
  const visible = (tags || []).filter(t => resolveTag(t).cat !== 'care');
  if(visible.length === 0) return null;
  const isRows = layout === 'rows';
  return (
    <>
      <div className="tl-extract-label">已记录</div>
      <div className={'tl-tags'+(isRows ? ' tl-tags-rows' : '')}>
        {visible.map((t, i) => {
          const r = resolveTag(t);
          return (
            <span key={i} className={'tl-tag tone-'+r.tone+(isRows ? ' is-row':'')}>
              <span className="tl-tag-ico" aria-hidden="true">{r.emoji}</span>
              {r.label}
            </span>
          );
        })}
      </div>
    </>
  );
}

function TlVoiceBar({voice}){
  const [playing, setPlaying] = React.useState(false);
  const duration = voice?.duration || '0:00';
  return (
    <div className="tl-voice-bar">
      <button
        type="button"

function SisterCycleChart({animated}){
  const bars = [
    {date:'上上次', status:'准时', width:'96.8%', label:'30天'},
    {date:'上次', status:'准时', width:'100%', label:'31天'},
    {date:'本次', status:'推迟2天', width:'93.5%', label:'29天', zoom:true},
  ];
  const done = !animated;
  const [headSeen, setHeadSeen] = React.useState(done);
  const [seenBars, setSeenBars] = React.useState(done ? [0, 1, 2] : []);
  const [grownBars, setGrownBars] = React.useState(done ? [0, 1, 2] : []);
  const [zoomPop, setZoomPop] = React.useState(done);

  React.useEffect(()=>{
    if(!animated) return;
    setHeadSeen(false);
    setSeenBars([]);
    setGrownBars([]);
    setZoomPop(false);
    const timers = [
      setTimeout(()=>setHeadSeen(true), 60),
      setTimeout(()=>{ setSeenBars([0]); setGrownBars([0]); }, 320),
      setTimeout(()=>{ setSeenBars([0, 1]); setGrownBars([0, 1]); }, 1400),
      setTimeout(()=>{ setSeenBars([0, 1, 2]); setGrownBars([0, 1, 2]); }, 2480),
      setTimeout(()=>setZoomPop(true), 3580),
    ];
    return ()=>timers.forEach(clearTimeout);
  }, [animated]);

  return (
    <div className="chart-block" style={{background:'transparent', border:'none', padding:0}}>
      <div className={'cycle-card'+(!animated?' cycle-card--static':'')}>
        <div className={'cc-head cc-seg'+(headSeen?' seen':'')}>
          <span className="cc-title">
            <img className="cc-icon" src={CC_ICON} width="18" height="18" alt="" aria-hidden="true"/>
