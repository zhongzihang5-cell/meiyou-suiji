          </span>
        </div>
        <div className="cc-bars">
          {bars.map((b, i) => (
            <div key={i} className={'cc-bar-row cc-seg'+(seenBars.includes(i)?' seen':'')}>
              <span className="cc-bar-date">{b.date}</span>
              <span className="cc-bar-status">{b.status}</span>
              <div className="cc-bar-wrap">
                <div
                  className={'cc-bar'+(grownBars.includes(i)?' grow':'')}
                  style={{'--cc-target': b.width}}
                >
                  <span className={'cc-bar-label'+(b.zoom && zoomPop?' cc-zoom-target zoom-pop':'')}>{b.label}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SisterSignalCard({animated}){
  const lights = [
    {color:'green', label:'稳定', range:'21–35天'},
    {color:'yellow', label:'轻度波动', range:['18–20天','36–45天']},
    {color:'orange', label:'明显波动', range:['15–17天','46–90天']},
    {color:'purple', label:'建议关注', range:['<15天','>90天']},
  ];
  const done = !animated;
  const [activeColor, setActiveColor] = React.useState(done ? 'green' : null);
  const [isFinal, setIsFinal] = React.useState(done);

  React.useEffect(()=>{
    if(!animated) return;
    setActiveColor(null);
    setIsFinal(false);
    const sequence = ['green', 'yellow', 'orange', 'purple', 'green'];
    const STEP_MS = 380;
    let step = 0;
    let timer = null;

    function tick(){
      if(step >= sequence.length){
        setActiveColor('green');
        setIsFinal(true);
        return;
      }
      setActiveColor(sequence[step]);
      step += 1;
      timer = setTimeout(tick, STEP_MS);
    }
    tick();
    return ()=>{ if(timer) clearTimeout(timer); };
  }, [animated]);

  return (
    <div className="chart-block" style={{background:'transparent', border:'none', padding:0}}>
      <div className={'signal-card'+(animated && !isFinal?' sc-animating':'')}>
        <div className="sc-head">
          <span className="sc-title">
            <img className="sc-icon" src={SC_ICON} width="18" height="18" alt="" aria-hidden="true"/>
            周期天数评估
          </span>
        </div>
        <div className="sc-lights">
          {lights.map((l, i) => (
            <div
              key={i}
              className={'sc-light'+(l.color === 'green' && isFinal ? ' sc-final' : '')}
              data-light={l.color}
            >
              <div
                className={'sc-bulb'+(activeColor === l.color ? ' sc-on' : '')}
                data-color={l.color}
              />
              <div className="sc-label">{l.label}</div>
              <div className="sc-range">
                {Array.isArray(l.range)
                  ? l.range.map((line, j) => (
                      <React.Fragment key={j}>
                        {j > 0 && <br/>}
                        {line}
                      </React.Fragment>
                    ))
                  : l.range}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SisterAnalysisCard({playAnimation, onCycleComplete}){
  const [animated, setAnimated] = React.useState(false);
  const [showSignal, setShowSignal] = React.useState(!playAnimation);
  const [showClosing, setShowClosing] = React.useState(!playAnimation);

  React.useEffect(()=>{
    if(!playAnimation){
      onCycleComplete?.();
      return;
    }
    setAnimated(true);
    setShowSignal(false);
    setShowClosing(false);
    const t1 = setTimeout(()=>setShowSignal(true), 3600);
    const t2 = setTimeout(()=>setShowClosing(true), 5800);
    const t3 = setTimeout(()=>onCycleComplete?.(), 5800);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, [playAnimation, onCycleComplete]);

  return (
    <div className="sister-bubble" id="sister-analysis-anchor">
      <p>以下是本次月经情况的分析。先看一下你最近3个周期的情况：</p>
      <SisterCycleChart animated={animated}/>
      <p>你最近三次周期分别是<b>30天、31天、29天</b>，整体波动幅度很小，属于<b>非常规律</b>的状态。</p>
      {showSignal && <SisterSignalCard animated={animated}/>}
      {showClosing && (
        <p>这次周期天数落在<b>21–35天的理想范围</b>内。很棒哦，继续保持现在的健康生活节奏就可以。</p>
      )}
    </div>
  );
}

Object.assign(window, {
  TlCardTime, TlVoiceBar, RecordedTags, AiNoteSection, RecordPhoto, resolveTag,
  VoiceRecordCard, SisterAnalysisCard,
});

</script>

<script type="text/babel">
// ============ 时间轴模块占位 & 场景卡片 ============

}

function CycleDayHeader({day}){

function TimelineRailNode({phaseKind, railDot, isFeedLast, children}){

function ModulePlaceholder({mod, cycleDay}){
  const icons = {
    'cycle-card':'🔄',
    'wellness':'⚖️',
    'calorie':'🍽',
  };
  const dLabel = cycleDay ? 'D'+cycleDay : 'D1';
  return (
    <div className={'tl-module ph-'+mod.type}>
      <div className="tl-module-head">
        <span className="tl-module-icon">{icons[mod.type] || '📦'}</span>
        <div className="tl-module-meta">
          <span className="tl-module-title">{mod.title}</span>
          <span className="tl-module-badge">模块占位</span>
        </div>
      </div>
      <div className="tl-module-body">
        <div className="tl-module-sk">
          {mod.sketch === 'cycle' && (
            <div className="sk-cycle">
              <div className="sk-cycle-ring"/>
              <span>{dLabel}</span>

          {mod.sketch === 'wellness' && (

            </div>

              <div className="sk-cal-num">≈ 480 <em>kcal</em></div>

}

function TodayGuideCard({item, onChip, isNew}){
  const soft = item.tone === 'soft';
  return (
    <div className={'tl-guide-card'+(soft?' is-soft':'')+(isNew?' fade-in':'')}>
      <p className="tl-guide-text">{item.text}</p>
      {item.chips && item.chips.length > 0 && (
        <div className="tl-guide-chips">
          {item.chips.map((c,i)=>(
            <button key={i} className="tl-guide-chip" onClick={()=>onChip?.(c)}>{c}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function buildWeeklyPanels(item){
  const panels = [];
  if(item.moodTrend?.length){
    panels.push({
      id:'mood', type:'mood', icon:'💜', title:'心情趋势',
      moodTrend: item.moodTrend,
      summary: item.moodSummary || '',
    });
  }
  if(item.weightTrend?.length){
    panels.push({
      id:'weight', type:'weight', icon:'⚖️', title:'体重变化',
      weightTrend: item.weightTrend,
      weightDelta: item.weightDelta,
      summary: item.weightSummary || '',
    });
  }
  if(panels.length === 1 && item.summary){
    panels[0].summary = item.summary;
  }
  return panels;
}

function WeeklyMoodChart({data}){
  const maxM = Math.max(...data.map(d=>d.v), 1);
  return (
    <div className="tl-trend-chart mood">
      {data.map((d,i)=>(
        <div key={i} className="tl-trend-col">
          <div
            className="tl-trend-bar"
            style={{height: Math.round((d.v / maxM) * 48)+'px'}}
          />
          <span className="tl-trend-day">{d.d}</span>
        </div>
      ))}
    </div>
  );
}

function WeeklyWeightChart({data, delta}){
  const wVals = data.map(d=>d.v);
  const minW = Math.min(...wVals);
  const maxW = Math.max(...wVals);
  const wRange = maxW - minW || 1;
  return (
    <>
      <div className="tl-trend-chart weight">
        {data.map((d,i)=>(
          <div key={i} className="tl-trend-col">
            <div
              className="tl-trend-dot"
              style={{bottom: Math.round(((d.v - minW) / wRange) * 40)+'px'}}
            />
            <span className="tl-trend-day">{d.d}</span>
          </div>
        ))}
        <svg className="tl-trend-line" viewBox="0 0 200 48" preserveAspectRatio="none">
          <polyline
            fill="none"
            stroke="rgba(255,77,136,0.5)"
            strokeWidth="2"
            points={data.map((d,i)=>{
              const x = (i / Math.max(data.length - 1, 1)) * 200;
              const y = 44 - ((d.v - minW) / wRange) * 36;
              return x+','+y;
            }).join(' ')}
          />
        </svg>
      </div>
      {delta && <div className="tl-weekly-panel-delta">{delta}</div>}
    </>
  );
}

function WeeklySleepChart({data}){
  const maxH = Math.max(...data.map(d=>d.v), 1);
  const minH = Math.min(...data.map(d=>d.v));
  return (
    <div className="tl-trend-chart sleep">
      {data.map((d,i)=>(
        <div key={i} className="tl-trend-col">
          <div
            className="tl-trend-bar sleep-bar"
            style={{height: Math.round(((d.v - minH * 0.85) / (maxH - minH * 0.85 || 1)) * 44)+'px'}}
          />
          <span className="tl-trend-day">{d.d}</span>
        </div>
      ))}
    </div>
  );
}

function panelStat(panel){
  if(panel.type === 'weight') return panel.weightDelta || null;
  if(panel.type === 'sleep') return panel.sleepDelta || null;
  return null;
}

function WeeklyPanel({panel, variant}){
  const statOnly = variant === 'wellness-stat';
  const showChart = variant === 'weekly-mood' || variant === 'weekly-trend';
  const stat = panelStat(panel);
  let chart = null;

  if(showChart){
    if(panel.type === 'mood'){
      chart = <WeeklyMoodChart data={panel.moodTrend || []}/>;
    } else if(panel.type === 'weight'){
      chart = <WeeklyWeightChart data={panel.weightTrend || []} delta={panel.weightDelta}/>;
    } else if(panel.type === 'sleep'){
      chart = <WeeklySleepChart data={panel.sleepTrend || []}/>;
    }
  }

  return (
    <article className={'tl-weekly-panel tone-'+panel.type+(showChart ? ' has-chart' : ' is-stat-only')}>
      <div className="tl-weekly-panel-head">
        <span className="tl-weekly-panel-icon">{panel.icon || '📊'}</span>
        <span className="tl-weekly-panel-title">{panel.title}</span>
      </div>
      {statOnly && stat && (
        <div className="tl-weekly-panel-stat">{stat}</div>
      )}
      {showChart && chart && (
        <div className="tl-weekly-panel-chart">{chart}</div>
      )}
      {panel.summary && (
        <p className="tl-weekly-panel-summary">{panel.summary}</p>
      )}
    </article>
  );
}

function WeeklyTrendCard({item}){
  const panels = item.panels?.length ? item.panels : buildWeeklyPanels(item);
  const overview = item.overview || item.analysis || '';
  const isWellness = item.kind === 'wellness';
  const [open, setOpen] = React.useState(false);

  if(isWellness){
    return (
      <div className="tl-weekly-bubble is-wellness">
        <div className="tl-weekly-surface">
          {overview && <p className="tl-weekly-overview">{overview}</p>}
          {panels.length > 0 && (
            <div className="tl-weekly-stack-inline">
              {panels.map(p=>(
                <WeeklyPanel key={p.id || p.type} panel={p} variant="wellness-stat"/>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  const moodPanel = panels.find(p => p.type === 'mood');
  const trendPanels = panels.filter(p => p.type !== 'mood');
  const hasExpand = trendPanels.length > 0;

  return (
    <div className={'tl-weekly-bubble'+(open ? ' is-open' : '')}>
      <div className="tl-weekly-surface">
        {overview && <p className="tl-weekly-overview">{overview}</p>}
        {moodPanel && (
          <div className="tl-weekly-stack-inline">
            <WeeklyPanel panel={moodPanel} variant="weekly-mood"/>
          </div>
        )}
      </div>
      {hasExpand && (
        <>
          <div className="tl-weekly-detail">
            {trendPanels.map(p=>(
              <WeeklyPanel key={p.id || p.type} panel={p} variant="weekly-trend"/>
            ))}
          </div>
          <button
            type="button"
            className="tl-weekly-toggle"
            onClick={()=>setOpen(v=>!v)}
            aria-expanded={open}
          >
            <span className="tl-weekly-toggle-label">{open ? '收起' : '展开'}</span>
            <span className="tl-weekly-chev" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d={open ? 'M6 15l6-6 6 6' : 'M6 9l6 6 6-6'}/>
              </svg>
            </span>
          </button>
        </>
      )}
    </div>
  );
}

function TlNodeCaption({time, label, labelKind}){
  if(!time && !label) return null;
  return (
    <div className="tl-node-caption">
      {time && <span className="tl-node-time">{time}</span>}
      {time && label && <span className="tl-node-sep" aria-hidden="true">·</span>}
      {label && (
        <span className={'tl-node-label'+(labelKind ? ' kind-'+labelKind : '')}>{label}</span>
      )}
    </div>
  );
}

function getNodeCaption(item){
  if(item.cardLabel || item.cardLabelKind){
    return {
      label: item.cardLabel,
      kind: item.cardLabelKind,
    };
  }
  if(item.kind === 'sister-card'){
    return { label:'本次周期分析', kind:'ai' };
  }
  if(item.kind === 'weekly'){
    const range = item.range ? ' · '+item.range : '';
    return { label:'周报'+range, kind:'weekly' };
  }
  return null;
}

function TimelineItemWrap({item, children}){
  const cap = getNodeCaption(item);
  return (
    <div className="tl-node-stack">
      <TlNodeCaption
        time={item.time}
        label={cap?.label}
        labelKind={cap?.kind}
      />
      {children}
    </div>
  );
}

function TimelineItem({item, isNew, onGuideChip, phaseKind, isFeedLast, sisterPlayAnimation, onSisterCycleComplete}){
  const cycleDay = item.cycleDay;

  let body = null;
  if(item.kind === 'guide'){
    body = <TodayGuideCard item={item} onChip={onGuideChip} isNew={isNew}/>;
  } else if(item.kind === 'weekly' || item.kind === 'wellness'){
    body = <WeeklyTrendCard item={item}/>;
  } else if(item.kind === 'voice-card'){
    body = <VoiceRecordCard item={item}/>;
  } else if(item.kind === 'sister-card'){
    body = (
      <SisterAnalysisCard
        item={item}
        playAnimation={sisterPlayAnimation}
        onCycleComplete={onSisterCycleComplete}
      />
    );
  } else {
    body = (
      <div className="tl-rec-group">
        <RecordCard entry={item} isNew={isNew}/>
        {item.module && (
          <ModulePlaceholder mod={item.module} cycleDay={cycleDay || item.module.cycleDay}/>
        )}
      </div>
    );
  }

  return (
    <TimelineRailNode
      phaseKind={phaseKind}
      railDot={item.railDot || (item.kind === 'sister-card' ? 'ai' : undefined)}
      isFeedLast={isFeedLast}
    >
      <TimelineItemWrap item={item}>{body}</TimelineItemWrap>
    </TimelineRailNode>
  );
}

Object.assign(window, {
  CycleDayHeader, TimelineRailNode, TlNodeCaption,
  ModulePlaceholder, TodayGuideCard, WeeklyTrendCard, TimelineItem,
});

</script>

}

function TimelineStream({blocks, endRef, onGuideChip, sisterPlayAnimation, sisterCycleDone, onSisterCycleComplete}){
  const lastItemId = resolveTimelineLastItemId(blocks, sisterCycleDone);

  return (
    <div className="tl-feed">
      <div className="tl-rail-continuous">
        {blocks.map((block, i)=>{
          if(block.type === 'day'){
            return (
              <TimelineDateSection
                key={block.id}
                day={block}
                onGuideChip={onGuideChip}
                sisterPlayAnimation={sisterPlayAnimation}
                sisterCycleDone={sisterCycleDone}
                onSisterCycleComplete={onSisterCycleComplete}
                lastItemId={lastItemId}
              />
            );
          }
          if(block.type === 'cycle-start'){
            return (
              <div key={block.id} className="tl-rail-break">
                <CycleStartMarker block={block}/>
              </div>
            );
          }
          if(block.type === 'gap'){
            return (
              <div key={block.id || ('gap-'+i)} className="tl-gap-divider tl-rail-break">
                · · ·  {block.label}  · · ·
              </div>
            );
          }
          if(block.type === 'cycle-sum'){
            return (
              <div key={block.id} className="tl-rail-break">
                <CycleSumCard item={block}/>
              </div>
            );
          }
          if(block.type === 'weekly'){
            return (
              <div key={block.id} className="tl-rail-break">
                <WeeklyCard item={block}/>
              </div>
            );
          }
          return null;
        })}
      </div>
      <div ref={endRef} className="tl-feed-end" aria-hidden="true"/>
    </div>
  );
}

function formatNowTime(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function formatVoiceDur(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m+':'+String(s).padStart(2,'0');
}

function resolveEntryDayId(text, blocks){
  const days = blocks.filter(b=>b.type==='day');
  const todayIdx = days.findIndex(d=>d.isToday);
  if(/前天/.test(text) && todayIdx > 1) return days[todayIdx - 2].id;
  if(/昨天|昨晚/.test(text) && todayIdx > 0) return days[todayIdx - 1].id;
  return days.find(d=>d.isToday)?.id || days[days.length - 1]?.id;
}

function resolveDayHint(text, blocks, dayId){
  const day = blocks.find(b=>b.type==='day' && b.id===dayId);
  if(!day || day.isToday) return '';
  if(/昨天|昨晚|前天/.test(text)) return day.date;
  return '';
}

function appendTimelineEntry(blocks, entry, opts={}){
  const dayId = opts.dayId || resolveEntryDayId(entry.body || '', blocks);
  return blocks.map(b=>{
    if(b.type !== 'day' || b.id !== dayId) return b;
    const list = b.items || b.entries || [];
    return {
      ...b,
      items: [...list, entry],
      entries: undefined,
    };
  });
}

function appendTodayEntry(blocks, entry){
  return appendTimelineEntry(blocks, entry);
}

Object.assign(window, {
  VoiceBar, RecordCard, CycleSumCard, WeeklyCard,
  TimelineDateSection, TimelineStream, CycleStartMarker,
  formatNowTime, formatVoiceDur,
  appendTodayEntry, appendTimelineEntry,
  resolveEntryDayId, resolveDayHint, resolveTimelineLastItemId,
});

</script>

<script type="text/babel">
// ============ 底部 Dock — 输入栏 + 右下悬浮快捷发布 ============

/** 右下角 + — 5 项快捷发布 */
const QUICK_PUBLISH = [
  { id:'period', emoji:'🩸', label:'月经', text:'今天月经来了' },
  { id:'mood', emoji:'💛', label:'心情', text:'今天心情还行' },
  { id:'weight', emoji:'⚖️', label:'体重', text:'今天体重 52.3kg' },
  { id:'symptom', emoji:'🤒', label:'症状', text:'有点不舒服' },
  { id:'diary', emoji:'📔', label:'日记', text:'想记录一下今天…' },
];

const DEMO_VOICE_LINE = '哎，昨天月经来了，昨天肚子不太舒服';

/** 左半圆：从 + 向左侧展开（90° 上 → 180° 左 → 270° 下），不往右伸 */
function fanArcPos(index, total, radius){
  const startDeg = 90;
  const endDeg = 270;
  const t = total <= 1 ? 0.5 : index / (total - 1);
  const deg = startDeg + (endDeg - startDeg) * t;
  const rad = (deg * Math.PI) / 180;
  return {
    x: Math.round(radius * Math.cos(rad)),
    y: Math.round(-radius * Math.sin(rad)),
  };
}

function QuickFan({items, open, closing, onToggle, onPick, renderFab}){
  /* 180° 左半圆 / 5 项 / 50px 圆：R ≥ 50/(2·sin22.5°) ≈ 66 */
  const r = items.length >= 5 ? 76 : 64;

  return (
    <div className={'dock-fan dock-fan-corner'+(open?' open':'')+(closing?' closing':'')}>
      {open && (
        <button
          type="button"
          className="dock-fan-scrim"
          onClick={()=>onToggle(false)}
          aria-label="关闭"
        />
      )}
      <div className={'dock-fan-stage'+(open?' open':'')+(closing?' closing':'')}>
        {items.map((item,i)=>{
          const {x,y} = fanArcPos(i, items.length, r);
          return (
            <button
              key={item.id}
              type="button"
              className="dock-fan-node"
              style={{
                '--fx': x+'px',
                '--fy': y+'px',
                '--zi': i,
                '--delay': (0.02 + i * 0.045)+'s',
                '--close-delay': ((items.length - 1 - i) * 0.028)+'s',
              }}
              onClick={()=>{ onPick(item); onToggle(false); }}
              aria-label={item.label}
            >
              <span className="dock-fan-node-ico dock-fan-node-ico--stack">
                <span className="dock-fan-node-em" aria-hidden="true">{item.emoji}</span>
                <span className="dock-fan-node-lbl">{item.label}</span>
              </span>
            </button>
          );
        })}
        <button
          type="button"
          className={'dock-fab dock-fab-media'+(open?' open':'')}
          onClick={()=>onToggle(!open)}
          aria-expanded={open}
          aria-label={open ? '收起' : '快捷发布'}
        >
          {renderFab(open)}
        </button>
      </div>
    </div>
  );
}

function DockPublisher({
  draft, onDraft, onSend, onQuickMark, onVoiceDone,
  syncItems, nudge, suggestChips, onChip, livePreview,
  onPhoto,
}){
  const I = window.Icon;
  const [inputMode, setInputMode] = React.useState('text');
  const [quickOpen, setQuickOpen] = React.useState(false);
  const [quickClosing, setQuickClosing] = React.useState(false);
  const [recording, setRecording] = React.useState(false);
  const [recSec, setRecSec] = React.useState(0);
  const recTimer = React.useRef(null);

  const toggleQuick = (next)=>{
    if(next === undefined) next = !quickOpen;
    if(next){
      setQuickClosing(false);
      setQuickOpen(true);
      return;
    }
    if(!quickOpen) return;
    setQuickClosing(true);
    setTimeout(()=>{
      setQuickOpen(false);
      setQuickClosing(false);
    }, 340);
  };

  React.useEffect(()=>{
    if(recording){
      recTimer.current = setInterval(()=>setRecSec(s=>s+1), 1000);
    } else {
      clearInterval(recTimer.current);
      setRecSec(0);
    }
    return ()=>clearInterval(recTimer.current);
  }, [recording]);

  const startRec = ()=> setRecording(true);
  const stopRec = ()=>{
    if(!recording) return;
    setRecording(false);
    onVoiceDone(DEMO_VOICE_LINE, Math.max(recSec, 3));
  };

  const toggleMode = ()=>{
    setInputMode(m=>m==='text' ? 'voice' : 'text');
    toggleQuick(false);
  };

  const handleQuick = ()=>{
    toggleQuick(false);
  };

  const showFeedback = syncItems.length > 0
    || Boolean(nudge)
    || (suggestChips && suggestChips.length > 0);

  return (
    <>
      <div className="quick-float-wrap">
        <QuickFan
          items={QUICK_PUBLISH}
          open={quickOpen}
          closing={quickClosing}
          onToggle={toggleQuick}
          onPick={handleQuick}
          renderFab={(open)=>(
            open
              ? <I name="close" size={20} stroke={2.2}/>
              : <I name="plus" size={24} stroke={2.2}/>
          )}
        />
      </div>

      <div className="dock-wrap">
        {showFeedback && (
          <div className="dock-feedback fade-in">
            {syncItems.length > 0 ? (
              <div className="dock-sync-lite">
                <span className="dock-sync-mark"><I name="check" size={10} stroke={2.6}/> 已记录</span>
                {syncItems.map((s,i)=>(
                  <span key={i} className="dock-sync-tag">{s.label}</span>
                ))}
                {syncItems[0]?.dayHint ? <span className="dock-sync-date">{syncItems[0].dayHint}</span> : null}
              </div>
            ) : null}
            {nudge ? <p className="dock-nudge">{nudge}</p> : null}
            {suggestChips && suggestChips.length > 0 && (
              <div className="dock-suggest">
                {suggestChips.map((c,i)=>(
                  <button key={i} type="button" className="dock-suggest-chip" onClick={()=>onChip(c)}>{c}</button>
                ))}
              </div>
            )}
          </div>
        )}

        {livePreview && livePreview.labels?.length > 0 && (
          <div className="dock-live fade-in">
            <span className="dock-live-dot"/>
            识别到 · {livePreview.labels.join(' · ')}
            {livePreview.dayHint && <span className="dock-live-date">{livePreview.dayHint}</span>}
          </div>
        )}

        <div className="dock-panel">
          <div className="dock-bar">
            <div className="dock-input-row">
              <button
                type="button"
                className="dock-mode-btn"
                onClick={toggleMode}
                aria-label={inputMode==='text'?'切换语音':'切换键盘'}
              >
                {inputMode==='text'
                  ? <I name="mic" size={22} stroke={1.6}/>
                  : <span className="dock-kbd-ico">⌨</span>}
              </button>

              {inputMode==='text' ? (
                <div className="dock-text-field">
                  <textarea
                    rows="1"
                    placeholder="说点什么…"
                    value={draft}
                    onChange={(e)=>{
                      onDraft(e.target.value);
                      e.target.style.height='auto';
                      e.target.style.height = Math.min(e.target.scrollHeight, 72)+'px';
                    }}
                    onKeyDown={(e)=>{
                      if(e.key==='Enter' && !e.shiftKey && draft.trim()){
                        e.preventDefault();
                        onSend();
                      }
                    }}
                  />
                </div>
              ) : (
                <button
                  type="button"
                  className={'dock-voice-btn'+(recording?' recording':'')}
                  onPointerDown={(e)=>{ e.preventDefault(); startRec(); }}
                  onPointerUp={stopRec}
                  onPointerLeave={recording ? stopRec : undefined}
                >
                  {recording ? (
                    <>
                      <span className="dock-voice-waves" aria-hidden="true">
                        {[4,8,12,8,6,10,7].map((h,j)=><span key={j} style={{height:h+'px'}}/>)}
                      </span>
                      <span>松开 结束{recSec > 0 ? ' '+recSec+'s' : ''}</span>
                    </>
                  ) : (
                    <span>按住 说话</span>
                  )}
                </button>
              )}

              {inputMode==='text' && draft.trim() ? (
                <button type="button" className="dock-send-btn" onClick={onSend} aria-label="发送">
                  <I name="send" size={16} stroke={2}/>
                </button>
              ) : null}
            </div>

            <button
              type="button"
              className="dock-camera-btn"
              onClick={onPhoto}
              aria-label="拍照上传"
            >
              <I name="camera" size={22} stroke={1.6}/>
            </button>
          </div>
        </div>
      </div>
    </>
  );
}

Object.assign(window, { DockPublisher, CloudPublisher: DockPublisher });

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TAG_EMOJI = {
  period:'🩸', pain:'😖', flow:'🩸', 'flow-low':'💧',
  sleep:'😴', mood:'💛', med:'💊',
};

function shouldShowAnalysis(hits, analysis){
  if(!analysis || !hits.length) return false;
  if(analysis.tone === 'warn') return true;
  if(hits.some(h=>h.kind==='period')) return true;
  return false;
}

function buildTimelineEntry(text, hits, opts={}){
  const analysis = hits.length ? window.chooseAnalysis(hits) : null;
  const toneMap = { warn:'yellow', brand:'brand', good:'green' };
  const contentTypes = window.extractContentTypes(text);
  const topicTags = hits.map(h=>({
    emoji: TAG_EMOJI[h.kind] || '·',
    label: h.label,
  }));
  const contentTags = contentTypes.map(c=>({
    emoji: c.emoji,
    label: c.label,
    content: true,
  }));
  const entry = {
    id:'e-'+Date.now(),
    time: window.formatNowTime(),
    body: text,
    isNew: true,
    tags: [...contentTags, ...topicTags],
  };
  if(shouldShowAnalysis(hits, analysis)){
    entry.aiNote = {
      tone: toneMap[analysis.tone] || 'green',
      icon: analysis.points?.[0]?.icon || '💡',
      text: analysis.points?.map(p=>p.text).join(' ') || analysis.title,
    };
  }
  if(opts.voice) entry.voice = opts.voice;
  if(opts.quickTag) entry.tags = [{ emoji: opts.quickTag.emoji, label: opts.quickTag.label }, ...entry.tags];
  return entry;
}

function App(){
  const [t, setTweak] = window.useTweaks({...window.__TWEAK_DEFAULTS});
  const ctx = window.SCENE_CONTEXT[t.scene] || window.SCENE_CONTEXT.period;

  const [syncItems, setSyncItems] = useState([]);
  const [nudge, setNudge] = useState('');
  const [suggestChips, setSuggestChips] = useState([]);
  const [draft, setDraft] = useState('');
  const [livePreview, setLivePreview] = useState(null);
  const [timeline, setTimeline] = useState(window.TIMELINE_BLOCKS);
  const [toasts, setToasts] = useState([]);
  const [showPhoto, setShowPhoto] = useState(false);
  const [activeTab, setActiveTab] = useState('cal');
  const [showAnalysisNotice, setShowAnalysisNotice] = useState(false);
  const [sisterPlayAnimation, setSisterPlayAnimation] = useState(0);
  const [sisterCycleDone, setSisterCycleDone] = useState(true);
  const streamRef = useRef(null);
  const timelineEndRef = useRef(null);

  const scrollToSisterAnalysis = ()=>{
    requestAnimationFrame(()=>{
      setTimeout(()=>{
        const stream = streamRef.current;
        const el = document.getElementById('sister-analysis-anchor');
        if(stream && el){
          const top = el.getBoundingClientRect().top - stream.getBoundingClientRect().top + stream.scrollTop - 32;
          stream.scrollTo({ top: Math.max(0, top), behavior:'smooth' });
        } else if(el){
          el.scrollIntoView({ behavior:'smooth', block:'center' });
        }
      }, 180);
    });
  };

  const openSisterAnalysis = ()=>{
    setShowAnalysisNotice(false);
    setSisterCycleDone(false);
    setSisterPlayAnimation(n=>n + 1);
    setActiveTab('note');
    scrollToSisterAnalysis();
  };

  const handleSisterCycleComplete = React.useCallback(()=>{
    setSisterCycleDone(true);
    requestAnimationFrame(()=>{
      setTimeout(()=>scrollTimelineToEnd('smooth'), 120);
    });
  }, []);

  useEffect(()=>{
    if(sisterPlayAnimation > 0) setSisterCycleDone(false);
  }, [sisterPlayAnimation]);

  useEffect(()=>{
    setSyncItems([]);
    setNudge('');
    setSuggestChips([]);
    setDraft('');
    setLivePreview(null);
  }, [t.scene]);

  useEffect(()=>{
    if(!draft.trim()){ setLivePreview(null); return; }
    const tm = setTimeout(()=>{
      const hits = window.extractKeywords(draft);
      if(!hits.length){ setLivePreview(null); return; }
      const dayId = window.resolveEntryDayId(draft, timeline);
      const dayHint = window.resolveDayHint(draft, timeline, dayId);
      setLivePreview({
        labels: hits.map(h=>window.buildSyncDisplayLabel(h, draft)),
        dayHint,
      });
    }, 300);
    return ()=>clearTimeout(tm);
  }, [draft, timeline]);

  const scrollTimelineToEnd = (behavior='smooth')=>{
    requestAnimationFrame(()=>{
      const el = streamRef.current;
      if(!el) return;
      if(behavior === 'auto') el.scrollTop = el.scrollHeight;
      else el.scrollTo({ top: el.scrollHeight, behavior:'smooth' });
    });
  };

  useEffect(()=>{
    const tm = setTimeout(()=>scrollTimelineToEnd('auto'), 120);
    return ()=>clearTimeout(tm);
  }, []);

  useEffect(()=>{ scrollTimelineToEnd('smooth'); }, [timeline]);

  const pushToast = (opts)=>{
    const id = Math.random().toString(36).slice(2);
    setToasts(ts=>[...ts, {id, ...opts}]);
    setTimeout(()=>{
      setToasts(ts=>ts.map(x=>x.id===id?{...x,bye:true}:x));
      setTimeout(()=>setToasts(ts=>ts.filter(x=>x.id!==id)), 220);
    }, 2400);
  };

  const buildSyncItems = (text, hits)=>{
    const dayHint = window.resolveDayHint(text, timeline, window.resolveEntryDayId(text, timeline));
    return hits.map(h=>({
      label: window.buildSyncDisplayLabel(h, text),
      dayHint,
    }));
  };

  const showFollowUp = (hits)=>{
    const follow = window.pickFollowUp(hits, ctx);
    setTimeout(()=>{
      setNudge(follow.text);
      setSuggestChips(follow.chips);
    }, 380);
  };

  const clearFeedback = ()=>{
    setSyncItems([]);
    setNudge('');
    setSuggestChips([]);
  };

  const pushToTimeline = (entry, text)=>{
    const dayId = window.resolveEntryDayId(text || entry.body || '', timeline);
    setTimeline(blocks=>window.appendTimelineEntry(blocks, entry, { dayId }));
  };

  const submitText = (textOverride, opts={})=>{
    const text = (textOverride || draft).trim();
    if(!text) return;

    clearFeedback();
    const hits = window.extractKeywords(text);
    const syncBuilt = buildSyncItems(text, hits);

    setDraft('');
    setLivePreview(null);

    if(syncBuilt.length){
      setTimeout(()=>setSyncItems(syncBuilt), 60);
      showFollowUp(hits);
      pushToast({ text:'已记录', tags: syncBuilt.map(s=>s.label).slice(0,2) });
    } else {
      pushToast({ text:'已保存' });
    }

    pushToTimeline(buildTimelineEntry(text, hits, opts), text);
  };

  const submitVoice = (transcript, durSec)=>{
    const text = transcript.trim();
    clearFeedback();
    const hits = window.extractKeywords(text);
    const syncBuilt = buildSyncItems(text, hits);

    if(syncBuilt.length){
      setTimeout(()=>setSyncItems(syncBuilt), 60);
      showFollowUp(hits);
      pushToast({ text:'已记录', tags: syncBuilt.map(s=>s.label).slice(0,2) });
    } else {
      pushToast({ text:'语音已转写' });
    }

    pushToTimeline(buildTimelineEntry(text, hits, {
      voice: { duration: window.formatVoiceDur(durSec) },
    }), text);
  };

  const submitQuickMark = (mark)=>{
    submitText(mark.text, { quickTag: { emoji: mark.emoji, label: mark.label } });
  };

  const submitPhoto = ()=>{
    setShowPhoto(false);
    clearFeedback();
    pushToTimeline({
      id:'e-'+Date.now(),
      time: window.formatNowTime(),
      body:'',
      photo:true, photoTone:'warm', photoEmoji:'🌸',
      isNew: true,
      tags:[{ emoji:'📷', label:'照片' }],
    }, '');
    pushToast({ text:'照片已加入' });
  };

  const sceneForHealth = {
    status: ctx.status,
    healthTitle: ctx.healthTitle,
    healthDesc: ctx.healthDesc,
    phaseLabel: ctx.cycle.label,
    phaseKind: ctx.cycle.kind,
    dayNum: ctx.cycle.dayNum,
    dayLbl: '今日',
  };

  const TP = window.TweaksPanel;
  const TR = window.TweakRadio;
  const TS = window.TweakSection;
  const I = window.Icon;

  return (
    <div className="phone">
      <StatusBar/>

      {activeTab === 'cal' && (
        <CalendarPage
          onAnalysisReady={()=>setShowAnalysisNotice(true)}
          onPeriodReset={()=>setShowAnalysisNotice(false)}
        />
      )}

      <FloatNotice
        show={showAnalysisNotice && activeTab === 'cal'}
        onOpen={openSisterAnalysis}
        onClose={()=>setShowAnalysisNotice(false)}
      />

      <div
        className={'suiji-shell suiji-shell--scene'+(activeTab !== 'note' ? ' app-view-hidden' : '')}
        aria-hidden={activeTab !== 'note'}
      >
        <div className="suiji-stream" ref={streamRef}>
          <div className="stream-header">
            <div>
              <h1 className="stream-title">记录</h1>
              <p className="stream-sub">情绪 · 身体 · 体重</p>
            </div>
            <div className="stream-actions">
              <button
                className="stream-action"
                aria-label="日历"
                type="button"
                onClick={()=>setActiveTab('cal')}
              >
                <I name="calendar" size={20} stroke={1.7}/>
              </button>
              <button className="stream-action" aria-label="搜索" type="button">
                <I name="search" size={20} stroke={1.7}/>
              </button>
            </div>
          </div>

          {t.entry === 'analysis' && (
            <div className="stream-health">
              <HealthCard scene={sceneForHealth}/>
            </div>
          )}

          <TimelineStream
            blocks={timeline}
            endRef={timelineEndRef}
            onGuideChip={(c)=>submitText(c)}
            sisterPlayAnimation={sisterPlayAnimation}
            sisterCycleDone={sisterCycleDone}
            onSisterCycleComplete={handleSisterCycleComplete}
          />
        </div>

        <DockPublisher
          draft={draft}
          onDraft={setDraft}
          onSend={()=>submitText()}
          onChip={(c)=>submitText(c)}
          onQuickMark={submitQuickMark}
          onVoiceDone={submitVoice}
          onPhoto={()=>setShowPhoto(true)}
          syncItems={syncItems}
          nudge={nudge}
          suggestChips={suggestChips}
          livePreview={livePreview}
        />
      </div>

      {showPhoto && <PhotoSheet onCancel={()=>setShowPhoto(false)} onPick={submitPhoto}/>}

      <Toast toasts={toasts}/>
      <TabBar active={activeTab} onChange={setActiveTab}/>

      <TP>
        <TS label="场景">
          <TR
            label="用户身份"
            value={t.scene}
            options={[
              {value:'period', label:'经期'},
              {value:'follicular', label:'卵泡期'},
              {value:'pregnancy', label:'孕期'},
              {value:'parenting', label:'育儿'},
            ]}
            onChange={(v)=>setTweak('scene', v)}
          />
          <TR
            label="分析引流"
            value={t.entry || 'direct'}
            options={[
              {value:'direct', label:'无'},
              {value:'analysis', label:'顶部红绿灯'},
            ]}
            onChange={(v)=>setTweak('entry', v)}
          />
        </TS>
      </TP>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
